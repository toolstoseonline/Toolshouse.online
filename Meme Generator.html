<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        #memeCanvas {
            border: 1px solid #ccc;
            margin: 20px auto;
            display: block;
            max-width: 100%;
        }
        .controls {
            text-align: center;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        .text-input {
            width: 90%;
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Meme Generator</h1>
    <canvas id="memeCanvas" width="500" height="500"></canvas>
    <div class="controls">
        <input type="file" id="imageUpload" accept="image/*">
        <input type="text" id="topText" class="text-input" placeholder="Top Text">
        <input type="text" id="bottomText" class="text-input" placeholder="Bottom Text">
        <button id="generateButton">Generate Meme</button>
        <button id="downloadButton">Download Meme</button>
    </div>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        img.onload = function() {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            drawText();
        };

        document.getElementById('generateButton').addEventListener('click', function() {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            drawText();
        });

        function drawText() {
            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            ctx.font = '40px Impact';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 5;

            if (topText) {
                ctx.fillText(topText, canvas.width / 2, 50);
                ctx.strokeText(topText, canvas.width / 2, 50);
            }
            if (bottomText) {
                ctx.fillText(bottomText, canvas.width / 2, canvas.height - 20);
                ctx.strokeText(bottomText, canvas.width / 2, canvas.height - 20);
            }
        }

        document.getElementById('downloadButton').addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'meme.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
