<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Subtitle Studio — Add & Style Captions to Video</title>
  <!-- Tailwind + Fonts -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: #0b0b10; margin: 0; }
    /* custom smooth scroll & drag */
    .subtitle-block {
      transition: transform 0.05s linear, background 0.1s;
      cursor: grab;
      user-select: none;
      touch-action: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle-block:active { cursor: grabbing; }
    .timeline-track {
      scrollbar-width: thin;
      scrollbar-color: #6c5ce7 #2d2d3a;
    }
    .timeline-track::-webkit-scrollbar { height: 6px; }
    .timeline-track::-webkit-scrollbar-track { background: #1e1e2a; border-radius: 10px; }
    .timeline-track::-webkit-scrollbar-thumb { background: #6c5ce7; border-radius: 10px; }
    .video-container {
      background: #000;
      border-radius: 20px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }
    .toast-modern {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #1f1f2e;
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.85rem;
      color: white;
      z-index: 2000;
      transition: transform 0.25s ease, opacity 0.2s;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 5px 18px rgba(0,0,0,0.3);
      border: 1px solid rgba(108,92,231,0.4);
    }
    .toast-modern.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .subtitle-list-scroll {
      scrollbar-width: thin;
      max-height: 380px;
    }
    .time-input {
      background: #12121a;
      border: 1px solid #2c2c38;
      color: #eef2ff;
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
    }
    .drag-overlay-active {
      background: rgba(108,92,231,0.08);
      transition: 0.1s;
    }
    button:active { transform: scale(0.97); }
    .subtitle-editor-card {
      transition: all 0.2s;
    }
  </style>
</head>
<body class="antialiased">

<div class="max-w-[1600px] mx-auto px-3 sm:px-5 py-4 sm:py-6">
  <!-- header with brand + export -->
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m9 8 6 4-6 4Z"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tight text-white">Subtitle<span class="text-indigo-400">Forge</span></h1>
        <p class="text-xs text-gray-400">Drag, drop, edit & export SRT</p>
      </div>
    </div>
    <button id="globalExportBtn" class="bg-indigo-600 hover:bg-indigo-500 transition-all px-5 py-2 rounded-xl text-white font-semibold text-sm flex items-center gap-2 shadow-lg shadow-indigo-900/20">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polygon points="7 10 12 15 17 10 12 15 7 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export SRT
    </button>
  </div>

  <!-- main 2-col layout -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- LEFT PANEL: video + timeline -->
    <div class="lg:col-span-2 space-y-4">
      <!-- video zone -->
      <div class="video-container relative bg-black rounded-2xl overflow-hidden shadow-2xl" id="videoZone">
        <div id="videoPlaceholder" class="flex flex-col items-center justify-center py-16 sm:py-24 cursor-pointer bg-gradient-to-br from-[#0a0a12] to-[#111117]">
          <div class="bg-indigo-500/10 p-4 rounded-full mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polygon points="7 10 12 15 17 10 12 15 7 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <p class="text-white font-medium">Click or drop video file</p>
          <p class="text-gray-400 text-xs mt-1">MP4, MOV, WebM — max 200MB</p>
          <input type="file" id="videoFileInput" accept="video/mp4,video/webm,video/quicktime,video/mov" class="hidden">
        </div>
        <video id="mainVideo" class="w-full object-contain hidden" controls playsinline></video>
        <!-- dynamic subtitle overlay -->
        <div id="liveSubtitleOverlay" class="absolute bottom-[12%] left-0 right-0 text-center pointer-events-none transition-all duration-150" style="display: none;"></div>
      </div>

      <!-- Timeline bar with drag interaction -->
      <div class="bg-[#13131c] rounded-xl p-3 shadow-lg border border-[#252530]">
        <div class="flex justify-between text-[11px] font-mono text-gray-400 mb-2 px-1">
          <span>⏵ TIMELINE</span>
          <span id="timecodeDisplay">00:00 / 00:00</span>
        </div>
        <div id="timelineContainer" class="timeline-track relative bg-[#0a0a12] h-14 rounded-lg cursor-pointer overflow-hidden">
          <div id="timelineBlocksWrapper" class="relative w-full h-full"></div>
          <div id="playhead" class="absolute top-0 bottom-0 w-0.5 bg-indigo-400 z-20 shadow-sm" style="left: 0%; pointer-events: none;"></div>
        </div>
        <div class="flex justify-between mt-2 text-[10px] text-gray-500 px-1">
          <button id="resetPlayBtn" class="bg-[#23222e] hover:bg-indigo-700/40 px-2 py-1 rounded-md text-indigo-300 text-xs transition">⏵ Play/Pause</button>
          <span class="text-indigo-400/70 text-[10px]">drag blocks ↦ shift time</span>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: subtitle editor & style -->
    <div class="space-y-5">
      <!-- actions -->
      <div class="bg-[#13131c] rounded-xl p-4 border border-[#252530]">
        <div class="flex items-center justify-between flex-wrap gap-2 mb-4">
          <h2 class="text-white font-semibold text-base flex items-center gap-1"><span>📝</span> Subtitles</h2>
          <div class="flex gap-2">
            <button id="addSubtitleBtn" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg text-white text-xs font-semibold flex items-center gap-1 shadow">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              Add at current time
            </button>
            <button id="clearAllBtn" class="bg-gray-700/60 hover:bg-red-800/50 px-3 py-1.5 rounded-lg text-xs font-medium text-gray-200 transition">Clear all</button>
          </div>
        </div>
        <!-- subtitle list dynamic -->
        <div id="subtitleListContainer" class="subtitle-list-scroll overflow-y-auto space-y-3 pr-1" style="max-height: 360px;">
          <div class="text-center py-8 text-gray-500 text-sm">✨ No subtitles — click "Add" to start</div>
        </div>
      </div>

      <!-- style panel -->
      <div class="bg-[#13131c] rounded-xl p-4 border border-[#252530]">
        <h3 class="text-white text-sm font-semibold mb-3 flex items-center gap-2"><span>🎨</span> Caption style</h3>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[11px] text-gray-400">Font size</label>
            <select id="fontSizeSelect" class="w-full bg-[#0f0f18] border border-[#2c2c38] rounded-lg text-white text-sm py-1.5 px-2">
              <option value="18">Small (18px)</option>
              <option value="24" selected>Medium (24px)</option>
              <option value="32">Large (32px)</option>
              <option value="44">X-Large (44px)</option>
            </select>
          </div>
          <div>
            <label class="text-[11px] text-gray-400">Text color</label>
            <input type="color" id="textColorPicker" value="#FFFFFF" class="w-full h-9 bg-[#0f0f18] border border-[#2c2c38] rounded-lg cursor-pointer">
          </div>
          <div>
            <label class="text-[11px] text-gray-400">Background</label>
            <input type="color" id="bgColorPicker" value="#000000" class="w-full h-9 bg-[#0f0f18] border border-[#2c2c38] rounded-lg">
          </div>
          <div>
            <label class="text-[11px] text-gray-400">BG opacity</label>
            <input type="range" id="bgOpacitySlider" min="0" max="100" value="75" class="w-full accent-indigo-500 mt-1">
            <span id="opacityValue" class="text-[10px] text-gray-400">75%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toastMessage" class="toast-modern">✨ Ready</div>

<script>
  // ---------- APP STATE ----------
  let subtitles = [];            // { id, text, start, end }
  let nextId = 1;
  let videoDuration = 0;
  let videoFileUrl = null;
  const videoElem = document.getElementById('mainVideo');
  const videoPlaceholderDiv = document.getElementById('videoPlaceholder');
  const timelineWrap = document.getElementById('timelineBlocksWrapper');
  const playhead = document.getElementById('playhead');
  const timecodeSpan = document.getElementById('timecodeDisplay');
  const subtitleOverlay = document.getElementById('liveSubtitleOverlay');
  const subtitleListContainer = document.getElementById('subtitleListContainer');
  let dragSubId = null;
  let dragStartClientX = 0;
  let dragOriginalStart = 0;

  // style dom elements
  const fontSizeSelect = document.getElementById('fontSizeSelect');
  const textColorPicker = document.getElementById('textColorPicker');
  const bgColorPicker = document.getElementById('bgColorPicker');
  const bgOpacitySlider = document.getElementById('bgOpacitySlider');
  const opacitySpan = document.getElementById('opacityValue');

  // ----- helper: format time for inputs & display ----
  function formatTimeMMSSms(seconds) {
    if (isNaN(seconds)) seconds = 0;
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    const ms = Math.floor((seconds % 1) * 100);
    return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
  }
  function formatShortTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toFixed(1)}`;
  }
  function parseTimeFromString(str) {
    if (!str) return 0;
    str = str.trim().replace(',', '.');
    let parts = str.split(':');
    if (parts.length === 2) {
      let mins = parseFloat(parts[0]);
      let secs = parseFloat(parts[1]);
      if (isNaN(mins)) mins = 0;
      if (isNaN(secs)) secs = 0;
      return mins * 60 + secs;
    } else if (parts.length === 3) {
      let hours = parseFloat(parts[0]);
      let mins = parseFloat(parts[1]);
      let secs = parseFloat(parts[2]);
      return hours*3600 + mins*60 + secs;
    }
    return parseFloat(str) || 0;
  }

  function formatSRTTime(sec) {
    const hours = Math.floor(sec / 3600);
    const mins = Math.floor((sec % 3600) / 60);
    const secs = Math.floor(sec % 60);
    const ms = Math.floor((sec % 1) * 1000);
    return `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')},${ms.toString().padStart(3,'0')}`;
  }

  // show toast
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMessage');
    toast.textContent = msg;
    toast.style.background = isError ? '#c2413c' : '#2d2d44';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // RENDER timeline blocks
  function renderTimeline() {
    if (!timelineWrap || videoDuration <= 0) {
      timelineWrap.innerHTML = '';
      return;
    }
    timelineWrap.innerHTML = '';
    subtitles.forEach(sub => {
      const leftPercent = (sub.start / videoDuration) * 100;
      const widthPercent = ((sub.end - sub.start) / videoDuration) * 100;
      if (widthPercent <= 0) return;
      const block = document.createElement('div');
      block.className = 'subtitle-block absolute top-1/2 -translate-y-1/2 h-9 rounded-md bg-indigo-500 text-white text-[11px] font-semibold flex items-center px-2 shadow-md';
      block.style.left = `${leftPercent}%`;
      block.style.width = `${Math.max(widthPercent, 1.5)}%`;
      block.style.backgroundColor = '#6c5ce7';
      block.style.zIndex = 5;
      block.innerText = sub.text.length > 22 ? sub.text.slice(0, 20) + '..' : sub.text;
      block.setAttribute('data-id', sub.id);
      block.addEventListener('mousedown', (e) => startDragSubtitle(e, sub.id));
      block.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        startDragSubtitle(touch, sub.id);
      });
      timelineWrap.appendChild(block);
    });
  }

  // drag handlers
  function startDragSubtitle(e, subId) {
    e.stopPropagation();
    if (!videoDuration) return;
    dragSubId = subId;
    dragStartClientX = e.clientX;
    const sub = subtitles.find(s => s.id === subId);
    if (sub) dragOriginalStart = sub.start;
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchmove', onDragMove);
    document.addEventListener('touchend', stopDrag);
  }
  function onDragMove(e) {
    if (dragSubId === null) return;
    const subIdx = subtitles.findIndex(s => s.id === dragSubId);
    if (subIdx === -1) return;
    const currentX = e.touches ? e.touches[0].clientX : e.clientX;
    const timelineRect = document.getElementById('timelineContainer').getBoundingClientRect();
    const deltaX = currentX - dragStartClientX;
    const deltaTime = (deltaX / timelineRect.width) * videoDuration;
    let newStart = dragOriginalStart + deltaTime;
    const sub = subtitles[subIdx];
    const duration = sub.end - sub.start;
    newStart = Math.min(Math.max(0, newStart), videoDuration - 0.05);
    let newEnd = newStart + duration;
    if (newEnd > videoDuration) newEnd = videoDuration;
    if (newStart < 0) newStart = 0;
    subtitles[subIdx].start = newStart;
    subtitles[subIdx].end = newEnd;
    // sort & rerender
    subtitles.sort((a,b) => a.start - b.start);
    renderTimeline();
    renderSubtitleListUI();
    renderPreviewSubtitle();  // live preview while dragging
  }
  function stopDrag() {
    dragSubId = null;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', stopDrag);
    renderTimeline();
    renderSubtitleListUI();
  }

  // update playhead + time display
  function updatePlayheadAndTime() {
    if (!videoDuration || videoDuration === 0) return;
    const current = videoElem.currentTime;
    const percent = (current / videoDuration) * 100;
    playhead.style.left = `${percent}%`;
    timecodeSpan.innerText = `${formatTimeMMSSms(current)} / ${formatTimeMMSSms(videoDuration)}`;
    renderPreviewSubtitle();
  }

  function renderPreviewSubtitle() {
    if (!videoElem || !subtitleOverlay) return;
    const currentTime = videoElem.currentTime;
    const activeSub = subtitles.find(s => currentTime >= s.start && currentTime <= s.end);
    if (!activeSub) {
      subtitleOverlay.style.display = 'none';
      return;
    }
    const fontSize = fontSizeSelect.value;
    const textColor = textColorPicker.value;
    const bgRaw = bgColorPicker.value;
    const opacity = (bgOpacitySlider.value / 100);
    let r=0,g=0,b=0;
    if (bgRaw.length === 7) {
      r = parseInt(bgRaw.slice(1,3),16);
      g = parseInt(bgRaw.slice(3,5),16);
      b = parseInt(bgRaw.slice(5,7),16);
    }
    subtitleOverlay.style.display = 'block';
    subtitleOverlay.innerText = activeSub.text;
    subtitleOverlay.style.fontSize = `${fontSize}px`;
    subtitleOverlay.style.color = textColor;
    subtitleOverlay.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
    subtitleOverlay.style.padding = '8px 20px';
    subtitleOverlay.style.borderRadius = '14px';
    subtitleOverlay.style.fontWeight = '600';
    subtitleOverlay.style.maxWidth = '85%';
    subtitleOverlay.style.margin = '0 auto';
    subtitleOverlay.style.backdropFilter = 'blur(2px)';
    subtitleOverlay.style.whiteSpace = 'pre-wrap';
    subtitleOverlay.style.wordBreak = 'break-word';
    subtitleOverlay.style.lineHeight = '1.35';
    subtitleOverlay.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
  }

  // RENDER subtitle list (editor cards)
  function renderSubtitleListUI() {
    if (!subtitleListContainer) return;
    if (subtitles.length === 0) {
      subtitleListContainer.innerHTML = `<div class="text-center py-8 text-gray-500 text-sm">🎬 No subtitles — click "Add" to start</div>`;
      return;
    }
    subtitleListContainer.innerHTML = subtitles.map(sub => `
      <div class="bg-[#0e0e16] rounded-lg p-3 border border-[#262632] transition-all subtitle-editor-card" data-subid="${sub.id}">
        <div class="flex justify-between items-center mb-2">
          <span class="text-indigo-300 font-mono text-[11px] font-bold">#${sub.id}</span>
          <div class="flex gap-2">
            <button class="duplicate-sub-btn text-cyan-400 hover:text-cyan-300" data-id="${sub.id}">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="delete-sub-btn text-red-400 hover:text-red-300" data-id="${sub.id}">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <textarea class="subtitle-textarea w-full bg-[#1a1a26] border border-[#323242] rounded-lg text-white text-sm p-2 resize-y mb-2" data-id="${sub.id}" rows="2">${escapeHtml(sub.text)}</textarea>
        <div class="flex gap-2">
          <div class="flex-1">
            <label class="text-[10px] text-gray-400">Start</label>
            <input type="text" class="sub-start time-input w-full rounded-md px-2 py-1 text-xs" data-id="${sub.id}" value="${formatShortTime(sub.start)}">
          </div>
          <div class="flex-1">
            <label class="text-[10px] text-gray-400">End</label>
            <input type="text" class="sub-end time-input w-full rounded-md px-2 py-1 text-xs" data-id="${sub.id}" value="${formatShortTime(sub.end)}">
          </div>
        </div>
      </div>
    `).join('');

    // attach events
    document.querySelectorAll('.subtitle-textarea').forEach(el => {
      const id = parseInt(el.getAttribute('data-id'));
      el.addEventListener('input', (e) => {
        const sub = subtitles.find(s => s.id === id);
        if (sub) { sub.text = e.target.value; renderTimeline(); renderPreviewSubtitle(); }
      });
    });
    document.querySelectorAll('.sub-start').forEach(inp => {
      const id = parseInt(inp.getAttribute('data-id'));
      inp.addEventListener('change', (e) => {
        const sub = subtitles.find(s => s.id === id);
        if (sub) {
          let newVal = parseTimeFromString(e.target.value);
          newVal = Math.min(Math.max(0, newVal), sub.end - 0.05);
          if (newVal < 0) newVal = 0;
          sub.start = newVal;
          if (sub.end <= sub.start) sub.end = Math.min(sub.start + 1, videoDuration);
          subtitles.sort((a,b)=> a.start - b.start);
          renderTimeline();
          renderSubtitleListUI();
          renderPreviewSubtitle();
        }
      });
    });
    document.querySelectorAll('.sub-end').forEach(inp => {
      const id = parseInt(inp.getAttribute('data-id'));
      inp.addEventListener('change', (e) => {
        const sub = subtitles.find(s => s.id === id);
        if (sub && videoDuration) {
          let newEnd = parseTimeFromString(e.target.value);
          newEnd = Math.min(Math.max(sub.start + 0.1, newEnd), videoDuration);
          sub.end = newEnd;
          subtitles.sort((a,b)=> a.start - b.start);
          renderTimeline();
          renderSubtitleListUI();
          renderPreviewSubtitle();
        }
      });
    });
    document.querySelectorAll('.duplicate-sub-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        const original = subtitles.find(s => s.id === id);
        if (original) {
          const newSub = { id: ++nextId, text: original.text + " (copy)", start: Math.min(original.end + 0.2, videoDuration-0.5), end: Math.min(original.end + 3.2, videoDuration) };
          if (newSub.start >= videoDuration) newSub.start = Math.max(0, videoDuration-2);
          if (newSub.end <= newSub.start) newSub.end = newSub.start + 1.5;
          subtitles.push(newSub);
          subtitles.sort((a,b)=> a.start - b.start);
          renderTimeline();
          renderSubtitleListUI();
          renderPreviewSubtitle();
          showToast("Subtitle duplicated");
        }
      });
    });
    document.querySelectorAll('.delete-sub-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        subtitles = subtitles.filter(s => s.id !== id);
        renderTimeline();
        renderSubtitleListUI();
        renderPreviewSubtitle();
        showToast("Deleted");
      });
    });
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Add subtitle at current video time
  function addSubtitleAtCurrentTime() {
    if (!videoElem || !videoDuration || videoDuration === 0) {
      showToast("Please load a video first", true);
      return;
    }
    let current = videoElem.currentTime;
    if (current >= videoDuration - 0.1) current = Math.max(0, videoDuration - 1);
    let endTime = Math.min(current + 3, videoDuration);
    const newSub = { id: ++nextId, text: "Type your caption", start: current, end: endTime };
    subtitles.push(newSub);
    subtitles.sort((a,b)=> a.start - b.start);
    renderTimeline();
    renderSubtitleListUI();
    renderPreviewSubtitle();
    showToast("Subtitle added ✓");
  }

  function clearAllSubtitles() {
    if (subtitles.length === 0) return;
    subtitles = [];
    renderTimeline();
    renderSubtitleListUI();
    renderPreviewSubtitle();
    showToast("All subtitles cleared");
  }

  function exportSRT() {
    if (subtitles.length === 0) { showToast("No subtitles to export", true); return; }
    let srtContent = "";
    subtitles.forEach((sub, idx) => {
      srtContent += `${idx+1}\n`;
      srtContent += `${formatSRTTime(sub.start)} --> ${formatSRTTime(sub.end)}\n`;
      srtContent += `${sub.text.trim() || "(empty caption)"}\n\n`;
    });
    const blob = new Blob([srtContent], {type: "text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `subtitles_${Date.now()}.srt`;
    link.click();
    URL.revokeObjectURL(link.href);
    showToast("SRT exported!");
  }

  // video loading
  function loadVideo(file) {
    if (videoFileUrl) URL.revokeObjectURL(videoFileUrl);
    const url = URL.createObjectURL(file);
    videoFileUrl = url;
    videoElem.src = url;
    videoElem.classList.remove("hidden");
    videoPlaceholderDiv.classList.add("hidden");
    videoElem.load();
    videoElem.addEventListener('loadedmetadata', () => {
      videoDuration = videoElem.duration;
      renderTimeline();
      updatePlayheadAndTime();
      showToast(`Video ready — ${Math.floor(videoDuration)} sec`);
    });
    videoElem.addEventListener('timeupdate', () => { updatePlayheadAndTime(); });
    videoElem.play().catch(e=>console.log);
  }

  // drag & drop video zone
  const videoZone = document.getElementById('videoZone');
  videoZone.addEventListener('dragover', (e) => { e.preventDefault(); videoZone.classList.add('drag-overlay-active'); });
  videoZone.addEventListener('dragleave', () => videoZone.classList.remove('drag-overlay-active'));
  videoZone.addEventListener('drop', (e) => {
    e.preventDefault();
    videoZone.classList.remove('drag-overlay-active');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) loadVideo(file);
    else showToast("Drop a valid video file", true);
  });
  document.getElementById('videoFileInput').addEventListener('change', (e) => { if(e.target.files[0]) loadVideo(e.target.files[0]); });
  videoPlaceholderDiv.addEventListener('click', () => document.getElementById('videoFileInput').click());

  // timeline seek
  document.getElementById('timelineContainer').addEventListener('click', (e) => {
    if (!videoDuration) return;
    const rect = document.getElementById('timelineContainer').getBoundingClientRect();
    const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    videoElem.currentTime = percent * videoDuration;
  });

  document.getElementById('addSubtitleBtn').addEventListener('click', addSubtitleAtCurrentTime);
  document.getElementById('clearAllBtn').addEventListener('click', clearAllSubtitles);
  document.getElementById('globalExportBtn').addEventListener('click', exportSRT);
  document.getElementById('resetPlayBtn').addEventListener('click', () => { if(videoElem.paused) videoElem.play(); else videoElem.pause(); });

  function onStyleChange() { renderPreviewSubtitle(); }
  fontSizeSelect.addEventListener('change', onStyleChange);
  textColorPicker.addEventListener('input', onStyleChange);
  bgColorPicker.addEventListener('input', onStyleChange);
  bgOpacitySlider.addEventListener('input', (e) => { opacitySpan.innerText = e.target.value + "%"; onStyleChange(); });
  setInterval(() => { if(videoElem && !videoElem.paused) renderPreviewSubtitle(); }, 60);
  window.addEventListener('load', () => { lucideIconsFallback(); });
  function lucideIconsFallback() {}
</script>
</body>
</html>
