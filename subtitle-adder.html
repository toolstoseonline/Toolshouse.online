<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Free  Subtitles to Video – Tools House Online</title>
<meta name="description" content="Add subtitles to video online free. Upload SRT files instantly. No signup needed. Fast, accurate sync & works on mobile & desktop now.">
<link rel="canonical" href="https://www.toolshouse.online/subtitle-adder.html"
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    html, body { height: 100%; margin: 0; }

    .app-wrapper {
      height: 100%;
      width: 100%;
      overflow: auto;
    }

    .subtitle-overlay {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      text-align: center;
      max-width: 90%;
      transition: all 0.2s ease;
    }

    .timeline-track {
      position: relative;
      height: 48px;
      border-radius: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      cursor: pointer;
    }

    .subtitle-block {
      position: absolute;
      height: 32px;
      top: 8px;
      border-radius: 6px;
      cursor: grab;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: opacity 0.15s;
      user-select: none;
    }
    .subtitle-block:hover { opacity: 0.85; }

    .time-input {
      width: 80px;
      text-align: center;
    }

    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }
    .toast-msg.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      width: 100%;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .no-video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.5s ease forwards; }
    .fade-in-d1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-d2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-d3 { animation-delay: 0.3s; opacity: 0; }

    .btn-primary {
      transition: all 0.15s ease;
    }
    .btn-primary:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .scrollbar-thin::-webkit-scrollbar { height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="app-wrapper" id="appWrapper" style="background: #0f0f14;"><!-- Header -->
   <header class="px-6 py-5 flex items-center justify-between border-b fade-in" style="border-color: #1e1e2a;">
    <div class="flex items-center gap-3">
     <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background: #6c5ce7;"><i data-lucide="subtitles" style="width:20px;height:20px;color:#fff;"></i>
     </div>
     <div>
      <h1 id="pageTitle" class="text-lg font-bold" style="color: #f0f0f5;">Subtitles to Video</h1>
      <p id="tagline" class="text-xs" style="color: #6b6b80;">Add professional subtitles to any video</p>
     </div>
    </div><button onclick="exportSRT()" class="btn-primary flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold" style="background:#6c5ce7;color:#fff;"> <i data-lucide="download" style="width:16px;height:16px;"></i> Export SRT </button>
   </header>
   <main class="p-4 md:p-6 flex flex-col lg:flex-row gap-5"><!-- Left: Video Preview -->
    <section class="flex-1 fade-in fade-in-d1">
     <div class="video-container" id="videoContainer">
      <div class="no-video-placeholder" id="noVideoPlaceholder">
       <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background:rgba(108,92,231,0.15);"><i data-lucide="upload" style="width:28px;height:28px;color:#6c5ce7;"></i>
       </div>
       <p class="font-semibold text-base" style="color:#f0f0f5;">Drop your video here</p>
       <p class="text-xs" style="color:#6b6b80;">or click to browse</p><input type="file" accept="video/*" id="videoInput" class="absolute inset-0 opacity-0 cursor-pointer" aria-label="Upload video">
      </div>
      <video id="videoPlayer" class="hidden" controls></video>
      <div class="subtitle-overlay" id="subtitleOverlay"></div>
     </div><!-- Timeline -->
     <div class="mt-4 p-3 rounded-xl fade-in fade-in-d2" style="background:#1a1a24;">
      <div class="flex items-center justify-between mb-2"><span class="mono text-xs font-bold" style="color:#6c5ce7;">TIMELINE</span> <span class="mono text-xs" style="color:#6b6b80;" id="currentTimeLabel">00:00 / 00:00</span>
      </div>
      <div class="timeline-track scrollbar-thin" id="timeline" style="background:#12121a;" onclick="seekTimeline(event)">
       <div id="timelinePlayhead" style="position:absolute;top:0;bottom:0;width:2px;background:#6c5ce7;z-index:10;pointer-events:none;left:0;"></div>
      </div>
     </div>
    </section><!-- Right: Subtitle Editor -->
    <aside class="w-full lg:w-[380px] flex flex-col gap-4 fade-in fade-in-d3"><!-- Add Subtitle -->
     <div class="p-4 rounded-xl" style="background:#1a1a24;">
      <div class="flex items-center justify-between mb-3"><span class="font-bold text-sm" style="color:#f0f0f5;">Subtitles</span> <button onclick="addSubtitle()" class="btn-primary flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold" style="background:#6c5ce7;color:#fff;"> <i data-lucide="plus" style="width:14px;height:14px;"></i> Add </button>
      </div><!-- Subtitle List -->
      <div id="subtitleList" class="flex flex-col gap-2 max-h-[340px] overflow-y-auto pr-1" style="scrollbar-width:thin;">
       <div class="text-center py-8" style="color:#6b6b80;"><i data-lucide="message-square-plus" style="width:28px;height:28px;margin:0 auto 8px;display:block;color:#333;"></i>
        <p class="text-xs">No subtitles yet. Click "Add" to start.</p>
       </div>
      </div>
     </div><!-- Style Settings -->
     <div class="p-4 rounded-xl" style="background:#1a1a24;"><span class="font-bold text-sm block mb-3" style="color:#f0f0f5;">Style</span>
      <div class="grid grid-cols-2 gap-3"><label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">Font Size</span> <select id="subFontSize" onchange="renderPreview()" class="rounded-lg px-3 py-2 text-sm font-medium" style="background:#12121a;color:#f0f0f5;border:1px solid #2a2a3a;"> <option value="16">Small</option> <option value="22" selected>Medium</option> <option value="30">Large</option> <option value="40">X-Large</option> </select> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">Text Color</span> <input type="color" id="subColor" value="#ffffff" onchange="renderPreview()" class="w-full h-[38px] rounded-lg cursor-pointer" style="background:#12121a;border:1px solid #2a2a3a;"> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">BG Color</span> <input type="color" id="subBgColor" value="#000000" onchange="renderPreview()" class="w-full h-[38px] rounded-lg cursor-pointer" style="background:#12121a;border:1px solid #2a2a3a;"> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">BG Opacity</span> <input type="range" id="subBgOpacity" min="0" max="100" value="70" oninput="renderPreview()" class="mt-2"> </label>
      </div>
     </div>
    </aside>
   </main>
   <div class="toast-msg" id="toastMsg"></div>
  </div>
  <script>
    // State
    let subtitles = [];
    let subIdCounter = 0;
    let videoDuration = 0;

    const defaultConfig = {
      page_title: 'Subtitles to Video',
      tagline: 'Add professional subtitles to any video',
      background_color: '#0f0f14',
      surface_color: '#1a1a24',
      text_color: '#f0f0f5',
      accent_color: '#6c5ce7',
      muted_color: '#6b6b80',
      font_family: 'DM Sans',
      font_size: 16
    };

    // Element SDK init
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = key => config[key] || defaultConfig[key];
        document.getElementById('pageTitle').textContent = c('page_title');
        document.getElementById('tagline').textContent = c('tagline');
      },
      mapToCapabilities: (config) => {
        const mut = (key) => ({
          get: () => config[key] || defaultConfig[key],
          set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
        });
        return {
          recolorables: [mut('background_color'), mut('surface_color'), mut('text_color'), mut('accent_color'), mut('muted_color')],
          borderables: [],
          fontEditable: mut('font_family'),
          fontSizeable: mut('font_size')
        };
      },
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title],
        ['tagline', config.tagline || defaultConfig.tagline]
      ])
    });

    // Video loading
    const videoInput = document.getElementById('videoInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const noVideoPlaceholder = document.getElementById('noVideoPlaceholder');

    videoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      videoPlayer.src = url;
      videoPlayer.classList.remove('hidden');
      noVideoPlaceholder.classList.add('hidden');
      videoPlayer.onloadedmetadata = () => {
        videoDuration = videoPlayer.duration;
        renderTimeline();
      };
      showToast('Video loaded!');
    });

    // Time update
    videoPlayer.addEventListener('timeupdate', () => {
      renderPreview();
      updatePlayhead();
      updateTimeLabel();
    });

    function updateTimeLabel() {
      const cur = formatTimeSRT(videoPlayer.currentTime || 0).substring(0,8);
      const dur = formatTimeSRT(videoDuration || 0).substring(0,8);
      document.getElementById('currentTimeLabel').textContent = `${cur} / ${dur}`;
    }

    function updatePlayhead() {
      if (!videoDuration) return;
      const pct = (videoPlayer.currentTime / videoDuration) * 100;
      document.getElementById('timelinePlayhead').style.left = pct + '%';
    }

    function seekTimeline(e) {
      if (!videoDuration) return;
      const rect = document.getElementById('timeline').getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      videoPlayer.currentTime = pct * videoDuration;
    }

    // Subtitle CRUD
    function addSubtitle() {
      const startTime = videoPlayer.currentTime || 0;
      const sub = {
        id: ++subIdCounter,
        text: 'New subtitle',
        start: startTime,
        end: Math.min(startTime + 3, videoDuration || 999)
      };
      subtitles.push(sub);
      renderSubtitleList();
      renderTimeline();
      showToast('Subtitle added');
    }

    function updateSub(id, field, value) {
      const sub = subtitles.find(s => s.id === id);
      if (!sub) return;
      if (field === 'start' || field === 'end') {
        sub[field] = parseTimeInput(value);
      } else {
        sub[field] = value;
      }
      renderTimeline();
      renderPreview();
    }

    function deleteSub(id) {
      subtitles = subtitles.filter(s => s.id !== id);
      renderSubtitleList();
      renderTimeline();
      renderPreview();
    }

    function renderSubtitleList() {
      const list = document.getElementById('subtitleList');
      if (!subtitles.length) {
        list.innerHTML = `<div class="text-center py-8" style="color:#6b6b80;">
          <i data-lucide="message-square-plus" style="width:28px;height:28px;margin:0 auto 8px;display:block;color:#333;"></i>
          <p class="text-xs">No subtitles yet. Click "Add" to start.</p>
        </div>`;
        lucide.createIcons();
        return;
      }
      list.innerHTML = subtitles.map(s => `
        <div class="p-3 rounded-lg" style="background:#12121a;">
          <div class="flex items-center justify-between mb-2">
            <span class="mono text-xs font-bold" style="color:#6c5ce7;">#${s.id}</span>
            <button onclick="deleteSub(${s.id})" class="p-1 rounded hover:bg-red-500/20 transition" style="color:#ff6b6b;">
              <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
            </button>
          </div>
          <label class="sr-only" for="subtext${s.id}">Subtitle text</label>
          <textarea id="subtext${s.id}" rows="2" class="w-full rounded-lg px-3 py-2 text-sm mb-2 resize-none" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
            oninput="updateSub(${s.id},'text',this.value)">${s.text}</textarea>
          <div class="flex gap-2">
            <label class="flex-1 flex flex-col gap-1">
              <span class="text-xs" style="color:#6b6b80;">Start</span>
              <input type="text" value="${formatShort(s.start)}" class="time-input rounded-lg px-2 py-1 text-xs mono" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
                onchange="updateSub(${s.id},'start',this.value)" aria-label="Start time">
            </label>
            <label class="flex-1 flex flex-col gap-1">
              <span class="text-xs" style="color:#6b6b80;">End</span>
              <input type="text" value="${formatShort(s.end)}" class="time-input rounded-lg px-2 py-1 text-xs mono" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
                onchange="updateSub(${s.id},'end',this.value)" aria-label="End time">
            </label>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderTimeline() {
      const tl = document.getElementById('timeline');
      const blocks = tl.querySelectorAll('.subtitle-block');
      blocks.forEach(b => b.remove());
      if (!videoDuration) return;
      subtitles.forEach(s => {
        const left = (s.start / videoDuration) * 100;
        const width = ((s.end - s.start) / videoDuration) * 100;
        const el = document.createElement('div');
        el.className = 'subtitle-block';
        el.style.left = left + '%';
        el.style.width = Math.max(width, 1) + '%';
        el.style.background = '#6c5ce7';
        el.style.color = '#fff';
        el.textContent = s.text;
        tl.appendChild(el);
      });
    }

    function renderPreview() {
      const overlay = document.getElementById('subtitleOverlay');
      const t = videoPlayer.currentTime || 0;
      const active = subtitles.find(s => t >= s.start && t <= s.end);
      if (!active) { overlay.textContent = ''; return; }
      const fontSize = document.getElementById('subFontSize').value;
      const color = document.getElementById('subColor').value;
      const bgColor = document.getElementById('subBgColor').value;
      const opacity = document.getElementById('subBgOpacity').value / 100;
      const r = parseInt(bgColor.slice(1,3),16);
      const g = parseInt(bgColor.slice(3,5),16);
      const b = parseInt(bgColor.slice(5,7),16);
      overlay.textContent = active.text;
      overlay.style.fontSize = fontSize + 'px';
      overlay.style.color = color;
      overlay.style.background = `rgba(${r},${g},${b},${opacity})`;
      overlay.style.padding = '4px 16px';
      overlay.style.borderRadius = '6px';
      overlay.style.fontWeight = '600';
    }

    // Time helpers
    function formatTimeSRT(sec) {
      const h = Math.floor(sec/3600);
      const m = Math.floor((sec%3600)/60);
      const s = Math.floor(sec%60);
      const ms = Math.round((sec%1)*1000);
      return `${pad(h)}:${pad(m)}:${pad(s)},${String(ms).padStart(3,'0')}`;
    }
    function formatShort(sec) {
      const m = Math.floor(sec/60);
      const s = (sec%60).toFixed(1);
      return `${pad(m)}:${parseFloat(s)<10?'0':''}${parseFloat(s).toFixed(1)}`;
    }
    function pad(n) { return String(n).padStart(2,'0'); }
    function parseTimeInput(val) {
      const parts = val.split(':');
      if (parts.length === 2) return parseFloat(parts[0])*60 + parseFloat(parts[1]);
      if (parts.length === 3) return parseFloat(parts[0])*3600 + parseFloat(parts[1])*60 + parseFloat(parts[2]);
      return parseFloat(val) || 0;
    }

    // Export SRT
    function exportSRT() {
      if (!subtitles.length) { showToast('No subtitles to export'); return; }
      let srt = '';
      subtitles.forEach((s, i) => {
        srt += `${i+1}\n${formatTimeSRT(s.start)} --> ${formatTimeSRT(s.end)}\n${s.text}\n\n`;
      });
      const blob = new Blob([srt], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'subtitles.srt';
      a.click();
      showToast('SRT file downloaded!');
    }

    // Toast
    function showToast(msg) {
      const el = document.getElementById('toastMsg');
      el.textContent = msg;
      el.style.background = '#6c5ce7';
      el.style.color = '#fff';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    lucide.createIcons();
  </script>
