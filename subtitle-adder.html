<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtitles to Video</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    html, body { height: 100%; margin: 0; }
    .app-wrapper { height: 100%; width: 100%; overflow: auto; }

    .subtitle-overlay {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      text-align: center;
      max-width: 90%;
      transition: all 0.2s ease;
    }

    .timeline-track {
      position: relative;
      height: 50px;
      border-radius: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      cursor: pointer;
    }

    .subtitle-block {
      position: absolute;
      height: 36px;
      top: 7px;
      border-radius: 6px;
      cursor: grab;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: all 0.15s;
      user-select: none;
      touch-action: none;
    }
    .subtitle-block:hover { opacity: 0.9; transform: scaleY(1.1); }
    .subtitle-block.dragging { opacity: 0.7; }

    .time-input {
      width: 100%;
      max-width: 80px;
      text-align: center;
    }

    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }
    .toast-msg.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      width: 100%;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .no-video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      cursor: pointer;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.5s ease forwards; }
    .fade-in-d1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-d2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-d3 { animation-delay: 0.3s; opacity: 0; }

    .btn-primary {
      transition: all 0.15s ease;
    }
    .btn-primary:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .scrollbar-thin::-webkit-scrollbar { height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    
    @media (max-width: 768px) {
      .app-wrapper { padding-bottom: 60px; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="app-wrapper" id="appWrapper" style="background: #0f0f14;">
   <!-- Header -->
   <header class="px-4 md:px-6 py-4 md:py-5 flex flex-col md:flex-row items-start md:items-center justify-between border-b gap-3 fade-in" style="border-color: #1e1e2a;">
    <div class="flex items-center gap-3 w-full md:w-auto">
     <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background: #6c5ce7;">
      <i data-lucide="subtitles" style="width:20px;height:20px;color:#fff;"></i>
     </div>
     <div>
      <h1 id="pageTitle" class="text-lg font-bold" style="color: #f0f0f5;">Subtitles to Video</h1>
      <p id="tagline" class="text-xs" style="color: #6b6b80;">Add professional subtitles to any video</p>
     </div>
    </div>
    <div class="flex gap-2 w-full md:w-auto">
     <button onclick="exportSRT()" class="btn-primary flex-1 md:flex-none flex items-center justify-center gap-2 px-3 md:px-4 py-2 rounded-lg text-sm font-semibold" style="background:#6c5ce7;color:#fff;"> <i data-lucide="download" style="width:16px;height:16px;"></i> <span class="hidden sm:inline">Export SRT</span> <span class="sm:hidden">Export</span> </button>
    </div>
   </header>
   <main class="p-3 md:p-6 flex flex-col lg:flex-row gap-4 md:gap-5">
    <!-- Left: Video Preview -->
    <section class="flex-1 fade-in fade-in-d1 min-w-0">
     <div class="video-container" id="videoContainer">
      <div class="no-video-placeholder" id="noVideoPlaceholder" onclick="document.getElementById('videoInput').click()">
       <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background:rgba(108,92,231,0.15);">
        <i data-lucide="upload" style="width:28px;height:28px;color:#6c5ce7;"></i>
       </div>
       <p class="font-semibold text-base" style="color:#f0f0f5;">Drop your video here</p>
       <p class="text-xs" style="color:#6b6b80;">or click to browse</p><input type="file" accept="video/*" id="videoInput" class="hidden" aria-label="Upload video">
      </div>
      <video id="videoPlayer" class="hidden" controls></video>
      <div class="subtitle-overlay" id="subtitleOverlay"></div>
     </div><!-- Timeline -->
     <div class="mt-3 md:mt-4 p-3 rounded-xl fade-in fade-in-d2" style="background:#1a1a24;">
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 mb-2">
       <span class="text-xs font-bold" style="color:#6c5ce7;">⏱ TIMELINE</span> <span class="text-xs mono" style="color:#6b6b80;" id="currentTimeLabel">00:00 / 00:00</span>
      </div>
      <div class="timeline-track scrollbar-thin" id="timeline" style="background:#12121a;">
       <div id="timelinePlayhead" style="position:absolute;top:0;bottom:0;width:2px;background:#6c5ce7;z-index:10;pointer-events:none;left:0;"></div>
      </div>
     </div>
    </section><!-- Right: Subtitle Editor -->
    <aside class="w-full lg:w-[340px] md:w-[360px] flex flex-col gap-3 md:gap-4 fade-in fade-in-d3">
     <!-- Add Subtitle -->
     <div class="p-3 md:p-4 rounded-xl" style="background:#1a1a24;">
      <div class="flex items-center justify-between mb-3 gap-2">
       <span class="font-bold text-sm" style="color:#f0f0f5;">📝 Subtitles</span>
       <div class="flex gap-1">
        <button onclick="addSubtitle()" class="btn-primary flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-semibold" style="background:#6c5ce7;color:#fff;"> <i data-lucide="plus" style="width:14px;height:14px;"></i> <span class="hidden sm:inline">Add</span> </button> <button onclick="clearAllSubs()" class="btn-primary flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-semibold" style="background:#ff6b6b;color:#fff;" title="Clear all subtitles"> <i data-lucide="trash-2" style="width:14px;height:14px;"></i> </button>
       </div>
      </div><!-- Subtitle List -->
      <div id="subtitleList" class="flex flex-col gap-2 max-h-[400px] md:max-h-[340px] overflow-y-auto pr-1" style="scrollbar-width:thin;">
       <div class="text-center py-8" style="color:#6b6b80;">
        <i data-lucide="message-square-plus" style="width:28px;height:28px;margin:0 auto 8px;display:block;color:#333;"></i>
        <p class="text-xs">No subtitles yet. Click "Add" to start.</p>
       </div>
      </div>
     </div><!-- Style Settings -->
     <div class="p-3 md:p-4 rounded-xl" style="background:#1a1a24;">
      <span class="font-bold text-sm block mb-3" style="color:#f0f0f5;">🎨 Style</span>
      <div class="grid grid-cols-2 gap-2 md:gap-3">
       <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">Font Size</span> <select id="subFontSize" onchange="renderPreview()" class="rounded-lg px-2 py-2 text-xs md:text-sm font-medium" style="background:#12121a;color:#f0f0f5;border:1px solid #2a2a3a;"> <option value="16">Small</option> <option value="22" selected>Medium</option> <option value="30">Large</option> <option value="40">X-Large</option> </select> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">Text Color</span> <input type="color" id="subColor" value="#ffffff" onchange="renderPreview()" class="w-full h-[36px] rounded-lg cursor-pointer" style="background:#12121a;border:1px solid #2a2a3a;"> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">BG Color</span> <input type="color" id="subBgColor" value="#000000" onchange="renderPreview()" class="w-full h-[36px] rounded-lg cursor-pointer" style="background:#12121a;border:1px solid #2a2a3a;"> </label> <label class="flex flex-col gap-1"> <span class="text-xs" style="color:#6b6b80;">BG Opacity</span> <input type="range" id="subBgOpacity" min="0" max="100" value="70" oninput="renderPreview()" class="mt-1"> </label>
      </div>
     </div>
    </aside>
   </main>
   <div class="toast-msg" id="toastMsg"></div>
  </div>
  <script>
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let subtitles = [];
    let subIdCounter = 0;
    let videoDuration = 0;
    let isDraggingSubtitle = null;
    let dragStartX = 0;
    let dragStartTime = 0;

    const defaultConfig = {
      page_title: 'Subtitles to Video',
      tagline: 'Add professional subtitles to any video'
    };

    // ============================================
    // ELEMENT SDK INITIALIZATION
    // ============================================
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = (key) => config[key] || defaultConfig[key];
        const titleEl = document.getElementById('pageTitle');
        const taglineEl = document.getElementById('tagline');
        
        if (titleEl) titleEl.textContent = c('page_title');
        if (taglineEl) taglineEl.textContent = c('tagline');
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title],
        ['tagline', config.tagline || defaultConfig.tagline]
      ])
    });

    // ============================================
    // VIDEO UPLOAD & PLAYBACK
    // ============================================
    const videoInput = document.getElementById('videoInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const noVideoPlaceholder = document.getElementById('noVideoPlaceholder');
    const videoContainer = document.getElementById('videoContainer');

    videoInput.addEventListener('change', handleVideoUpload);
    
    videoContainer.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      videoContainer.style.opacity = '0.8';
    });
    
    videoContainer.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      videoContainer.style.opacity = '1';
    });
    
    videoContainer.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      videoContainer.style.opacity = '1';
      const file = e.dataTransfer.files?.[0];
      if (file && file.type.startsWith('video/')) {
        handleVideoUploadFile(file);
      } else {
        showToast('Please drop a valid video file', 'error');
      }
    });

    function handleVideoUpload(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      handleVideoUploadFile(file);
    }

    function handleVideoUploadFile(file) {
      if (!file.type.startsWith('video/')) {
        showToast('Please select a valid video file', 'error');
        return;
      }

      try {
        const url = URL.createObjectURL(file);
        videoPlayer.src = url;
        videoPlayer.classList.remove('hidden');
        noVideoPlaceholder.classList.add('hidden');

        videoPlayer.addEventListener('loadedmetadata', function handleMetadata() {
          videoDuration = videoPlayer.duration;
          renderTimeline();
          updateTimeLabel();
          showToast('Video loaded successfully!');
          videoPlayer.removeEventListener('loadedmetadata', handleMetadata);
        });

        videoPlayer.addEventListener('error', function handleError() {
          showToast('Error loading video file', 'error');
          videoPlayer.classList.add('hidden');
          noVideoPlaceholder.classList.remove('hidden');
          videoPlayer.removeEventListener('error', handleError);
        });

        videoPlayer.load();
      } catch (err) {
        showToast('Failed to upload video: ' + err.message, 'error');
      }
    }

    videoPlayer.addEventListener('timeupdate', () => {
      renderPreview();
      updatePlayhead();
      updateTimeLabel();
    });

    // ============================================
    // TIME DISPLAY & TIMELINE
    // ============================================
    function updateTimeLabel() {
      const currentEl = document.getElementById('currentTimeLabel');
      if (!currentEl) return;
      
      const cur = formatTimeDisplay(videoPlayer.currentTime || 0);
      const dur = formatTimeDisplay(videoDuration || 0);
      currentEl.textContent = `${cur} / ${dur}`;
    }

    function updatePlayhead() {
      if (!videoDuration || videoDuration === 0) return;
      const pct = (videoPlayer.currentTime / videoDuration) * 100;
      const playhead = document.getElementById('timelinePlayhead');
      if (playhead) playhead.style.left = pct + '%';
    }

    function seekTimeline(e) {
      if (!videoDuration || videoDuration === 0) return;
      const timeline = document.getElementById('timeline');
      const rect = timeline.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      videoPlayer.currentTime = pct * videoDuration;
    }

    // ============================================
    // SUBTITLE OPERATIONS
    // ============================================
    function addSubtitle() {
      if (videoDuration === 0) {
        showToast('Please upload a video first', 'info');
        return;
      }

      const startTime = videoPlayer.currentTime || 0;
      const sub = {
        id: ++subIdCounter,
        text: 'New subtitle',
        start: startTime,
        end: Math.min(startTime + 3, videoDuration)
      };
      subtitles.push(sub);
      subtitles.sort((a, b) => a.start - b.start);
      
      renderSubtitleList();
      renderTimeline();
      showToast('Subtitle added');
    }

    function duplicateSub(id) {
      const original = subtitles.find(s => s.id === id);
      if (!original) return;

      const dup = {
        id: ++subIdCounter,
        text: original.text,
        start: original.end + 0.1,
        end: Math.min(original.end + 3.1, videoDuration)
      };
      subtitles.push(dup);
      subtitles.sort((a, b) => a.start - b.start);
      
      renderSubtitleList();
      renderTimeline();
      showToast('Subtitle duplicated');
    }

    function updateSub(id, field, value) {
      const sub = subtitles.find(s => s.id === id);
      if (!sub) return;

      if (field === 'start' || field === 'end') {
        const newValue = parseTimeInput(value);
        if (field === 'start') {
          sub.start = Math.max(0, Math.min(newValue, sub.end - 0.1));
        } else {
          sub.end = Math.max(sub.start + 0.1, Math.min(newValue, videoDuration));
        }
      } else {
        sub[field] = value;
      }

      subtitles.sort((a, b) => a.start - b.start);
      renderTimeline();
      renderPreview();
    }

    function deleteSub(id) {
      subtitles = subtitles.filter(s => s.id !== id);
      renderSubtitleList();
      renderTimeline();
      renderPreview();
      showToast('Subtitle deleted');
    }

    function clearAllSubs() {
      if (subtitles.length === 0) {
        showToast('No subtitles to clear', 'info');
        return;
      }
      subtitles = [];
      subIdCounter = 0;
      renderSubtitleList();
      renderTimeline();
      renderPreview();
      showToast('All subtitles cleared');
    }

    // ============================================
    // RENDERING FUNCTIONS
    // ============================================
    function renderSubtitleList() {
      const list = document.getElementById('subtitleList');
      if (!list) return;

      if (subtitles.length === 0) {
        list.innerHTML = `
          <div class="text-center py-8" style="color:#6b6b80;">
            <i data-lucide="message-square-plus" style="width:28px;height:28px;margin:0 auto 8px;display:block;color:#333;"></i>
            <p class="text-xs">No subtitles yet. Click "Add" to start.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = subtitles.map(s => `
        <div class="p-2 md:p-3 rounded-lg transition" style="background:#12121a;" data-sub-id="${s.id}">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-bold" style="color:#6c5ce7;">#${s.id}</span>
            <div class="flex gap-1">
              <button onclick="duplicateSub(${s.id})" class="p-1 rounded hover:bg-blue-500/20 transition" style="color:#4ecdc4;" title="Duplicate">
                <i data-lucide="copy" style="width:12px;height:12px;"></i>
              </button>
              <button onclick="deleteSub(${s.id})" class="p-1 rounded hover:bg-red-500/20 transition" style="color:#ff6b6b;" title="Delete">
                <i data-lucide="trash-2" style="width:12px;height:12px;"></i>
              </button>
            </div>
          </div>
          <label class="block text-xs mb-1" style="color:#6b6b80;">Text</label>
          <textarea id="subtext${s.id}" rows="2" class="w-full rounded-lg px-2 py-1.5 text-xs md:text-sm mb-2 resize-none" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
            oninput="updateSub(${s.id},'text',this.value)">${s.text}</textarea>
          <div class="flex gap-1 md:gap-2">
            <label class="flex-1 flex flex-col gap-1">
              <span class="text-xs" style="color:#6b6b80;">Start</span>
              <input type="text" value="${formatShort(s.start)}" class="time-input rounded-lg px-2 py-1 text-xs" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
                onchange="updateSub(${s.id},'start',this.value)" placeholder="MM:SS">
            </label>
            <label class="flex-1 flex flex-col gap-1">
              <span class="text-xs" style="color:#6b6b80;">End</span>
              <input type="text" value="${formatShort(s.end)}" class="time-input rounded-lg px-2 py-1 text-xs" style="background:#1a1a24;color:#f0f0f5;border:1px solid #2a2a3a;"
                onchange="updateSub(${s.id},'end',this.value)" placeholder="MM:SS">
            </label>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderTimeline() {
      const tl = document.getElementById('timeline');
      if (!tl) return;

      const blocks = tl.querySelectorAll('.subtitle-block');
      blocks.forEach(b => b.remove());

      if (!videoDuration || videoDuration === 0) return;

      subtitles.forEach(s => {
        const left = (s.start / videoDuration) * 100;
        const width = Math.max(((s.end - s.start) / videoDuration) * 100, 2);
        
        const el = document.createElement('div');
        el.className = 'subtitle-block';
        el.style.left = left + '%';
        el.style.width = width + '%';
        el.style.background = '#6c5ce7';
        el.style.color = '#fff';
        el.textContent = s.text.substring(0, 20);
        el.title = s.text;
        
        el.addEventListener('mousedown', (e) => startDragSubtitle(e, s.id));
        el.addEventListener('touchstart', (e) => startDragSubtitle(e.touches[0], s.id), { passive: false });
        
        tl.appendChild(el);
      });
    }

    function renderPreview() {
      const overlay = document.getElementById('subtitleOverlay');
      if (!overlay) return;

      const t = videoPlayer.currentTime || 0;
      const active = subtitles.find(s => t >= s.start && t < s.end);

      if (!active) {
        overlay.textContent = '';
        overlay.style.display = 'none';
        return;
      }

      const fontSize = document.getElementById('subFontSize')?.value || 22;
      const color = document.getElementById('subColor')?.value || '#ffffff';
      const bgColor = document.getElementById('subBgColor')?.value || '#000000';
      const opacity = (document.getElementById('subBgOpacity')?.value || 70) / 100;

      const r = parseInt(bgColor.slice(1, 3), 16);
      const g = parseInt(bgColor.slice(3, 5), 16);
      const b = parseInt(bgColor.slice(5, 7), 16);

      overlay.textContent = active.text;
      overlay.style.display = 'block';
      overlay.style.fontSize = fontSize + 'px';
      overlay.style.color = color;
      overlay.style.background = `rgba(${r},${g},${b},${opacity})`;
      overlay.style.padding = '8px 16px';
      overlay.style.borderRadius = '6px';
      overlay.style.fontWeight = '600';
      overlay.style.lineHeight = '1.4';
      overlay.style.maxWidth = '85%';
      overlay.style.wordWrap = 'break-word';
    }

    // ============================================
    // SUBTITLE DRAGGING
    // ============================================
    function startDragSubtitle(e, subId) {
      e.preventDefault?.();
      isDraggingSubtitle = subId;
      dragStartX = e.clientX;
      const sub = subtitles.find(s => s.id === subId);
      if (sub) dragStartTime = sub.start;
      
      document.addEventListener('mousemove', onDragSubtitle);
      document.addEventListener('touchmove', onDragSubtitle);
      document.addEventListener('mouseup', stopDragSubtitle);
      document.addEventListener('touchend', stopDragSubtitle);
    }

    function onDragSubtitle(e) {
      if (!isDraggingSubtitle) return;
      const sub = subtitles.find(s => s.id === isDraggingSubtitle);
      if (!sub) return;

      const timeline = document.getElementById('timeline');
      const rect = timeline.getBoundingClientRect();
      const currentX = e.touches ? e.touches[0].clientX : e.clientX;
      const deltaX = currentX - dragStartX;
      const deltaTime = (deltaX / rect.width) * videoDuration;

      const newStart = Math.max(0, Math.min(dragStartTime + deltaTime, videoDuration - 0.1));
      const duration = sub.end - sub.start;
      
      sub.start = newStart;
      sub.end = Math.min(newStart + duration, videoDuration);

      renderTimeline();
    }

    function stopDragSubtitle() {
      isDraggingSubtitle = null;
      document.removeEventListener('mousemove', onDragSubtitle);
      document.removeEventListener('touchmove', onDragSubtitle);
      document.removeEventListener('mouseup', stopDragSubtitle);
      document.removeEventListener('touchend', stopDragSubtitle);
    }

    // ============================================
    // TIME FORMATTING HELPERS
    // ============================================
    function formatTimeSRT(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.round((sec % 1) * 1000);
      return `${padZero(h)}:${padZero(m)}:${padZero(s)},${String(ms).padStart(3, '0')}`;
    }

    function formatTimeDisplay(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.floor((sec % 1) * 100);
      return `${padZero(m)}:${padZero(s)}.${String(ms).padStart(2, '0')}`;
    }

    function formatShort(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${padZero(m)}:${s.toFixed(1)}`;
    }

    function padZero(n) {
      return String(Math.floor(n)).padStart(2, '0');
    }

    function parseTimeInput(val) {
      if (!val || typeof val !== 'string') return 0;
      const parts = val.split(':');
      
      if (parts.length === 2) {
        return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
      } else if (parts.length === 3) {
        return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
      }
      return parseFloat(val) || 0;
    }

    // ============================================
    // EXPORT FUNCTIONALITY
    // ============================================
    function exportSRT() {
      if (subtitles.length === 0) {
        showToast('No subtitles to export', 'info');
        return;
      }

      let srt = '';
      subtitles.forEach((s, idx) => {
        srt += `${idx + 1}\n`;
        srt += `${formatTimeSRT(s.start)} --> ${formatTimeSRT(s.end)}\n`;
        srt += `${s.text}\n\n`;
      });

      const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `subtitles_${Date.now()}.srt`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      showToast('SRT file downloaded!');
    }

    // ============================================
    // UI NOTIFICATIONS
    // ============================================
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toastMsg');
      if (!el) return;

      el.textContent = msg;
      
      const bgColors = {
        success: '#6c5ce7',
        error: '#ff6b6b',
        info: '#4ecdc4'
      };
      
      el.style.background = bgColors[type] || bgColors.success;
      el.style.color = '#fff';
      el.classList.add('show');

      setTimeout(() => {
        el.classList.remove('show');
      }, 2200);
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      updateTimeLabel();
    });
