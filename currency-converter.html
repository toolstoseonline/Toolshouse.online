<body>
    <div class="card">
        <h2>
            <span>💱</span> Live exchange
        </h2>
        <div class="sub">
            rates via · <strong>open er-api</strong> (hourly updated)
        </div>

        <!-- amount -->
        <div class="amount-field">
            <label>Amount</label>
            <input type="number" id="amount" placeholder="1.00" value="1.00" step="any" min="0">
        </div>

        <!-- currency selects + swap UI -->
        <div class="currency-row">
            <div class="currency-picker">
                <label>From</label>
                <select id="fromCurrency"></select>
            </div>
            <div class="swap-btn" id="swapIcon" title="swap currencies">↔️</div>
            <div class="currency-picker">
                <label>To</label>
                <select id="toCurrency"></select>
            </div>
        </div>

        <!-- action buttons -->
        <div class="action">
            <button class="convert-btn" id="convertBtn">💰 Convert</button>
            <button class="swap-action-btn" id="swapBtn">🔁 Swap</button>
        </div>

        <!-- result panel -->
        <div class="result-box">
            <div class="result" id="result">—</div>
            <div class="update" id="updateTime">fetching rates …</div>
        </div>
        <div class="credit">⚡ live from exchangerate-api.com (v6)</div>
    </div>

    <script>
        (function() {
            // use a reliable free CORS-friendly endpoint
            const BASE_URL = "https://open.er-api.com/v6/latest/";

            // DOM elements
            const amountInput = document.getElementById('amount');
            const fromSelect = document.getElementById('fromCurrency');
            const toSelect = document.getElementById('toCurrency');
            const resultDiv = document.getElementById('result');
            const updateDiv = document.getElementById('updateTime');
            const convertBtn = document.getElementById('convertBtn');
            const swapBtn = document.getElementById('swapBtn');
            const swapIcon = document.getElementById('swapIcon');

            // in-memory cache for base rates (usd as default fallback)
            let cachedRates = null;
            let cachedTimestamp = '';

            // --- initial load: populate selects using USD as base (reliable) ---
            async function loadCurrencies() {
                try {
                    // we only need the list of currency codes – any base works.
                    // use USD because it's always available
                    const response = await fetch(BASE_URL + 'USD');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    
                    if (data.result !== 'success' && !data.rates) {
                        throw new Error('API error: ' + (data.error || 'unknown'));
                    }

                    const rates = data.rates;  // e.g. {USD:1, EUR:0.92, ...}
                    cachedRates = rates;       // keep for later if needed, but we'll refetch per conversion
                    
                    // populate both selects with currency codes, sorted
                    const currencies = Object.keys(rates).sort();
                    
                    // clear existing (just in case)
                    fromSelect.innerHTML = '';
                    toSelect.innerHTML = '';

                    for (let code of currencies) {
                        const optionFrom = document.createElement('option');
                        optionFrom.value = code;
                        optionFrom.textContent = code;
                        fromSelect.appendChild(optionFrom);

                        const optionTo = document.createElement('option');
                        optionTo.value = code;
                        optionTo.textContent = code;
                        toSelect.appendChild(optionTo);
                    }

                    // set default selections: USD -> PKR (if exists)
                    if (currencies.includes('USD')) fromSelect.value = 'USD';
                    else fromSelect.value = currencies[0] || 'EUR';
                    
                    if (currencies.includes('PKR')) toSelect.value = 'PKR';
                    else if (currencies.includes('EUR')) toSelect.value = 'EUR';
                    else toSelect.value = currencies[Math.min(1, currencies.length-1)] || 'USD';

                    // show last update info from USD call
                    if (data.time_last_update_utc) {
                        updateDiv.innerHTML = `📅 ${data.time_last_update_utc}`;
                    } else {
                        updateDiv.innerHTML = `🕒 rates loaded (${new Date().toLocaleString()})`;
                    }

                } catch (err) {
                    console.warn('Error loading currencies:', err);
                    updateDiv.innerHTML = '⚠️ using fallback data — offline mode';
                    // fallback currency list (common ones)
                    const fallbackCurrencies = ['USD','EUR','GBP','JPY','PKR','INR','CAD','AUD','CHF','CNY'];
                    fromSelect.innerHTML = '';
                    toSelect.innerHTML = '';
                    for (let code of fallbackCurrencies) {
                        fromSelect.add(new Option(code, code));
                        toSelect.add(new Option(code, code));
                    }
                    fromSelect.value = 'USD';
                    toSelect.value = 'PKR';
                    // dummy rates will be fetched during convert with error handling
                }
            }

            // --- main conversion function ---
            async function convertCurrency() {
                const amount = parseFloat(amountInput.value);
                if (isNaN(amount) || amount < 0) {
                    resultDiv.innerText = '❌ enter a valid amount';
                    return;
                }

                const from = fromSelect.value;
                const to = toSelect.value;

                if (!from || !to) {
                    resultDiv.innerText = 'select currencies';
                    return;
                }

                // show loading state
                resultDiv.innerText = '⟳ fetching rate...';

                try {
                    // Fetch latest rates based on 'from' currency (most accurate)
                    const response = await fetch(BASE_URL + from);
                    if (!response.ok) throw new Error(`status ${response.status}`);

                    const data = await response.json();
                    
                    // api v6 returns "rates" object, and time info
                    if (!data.rates) {
                        throw new Error('invalid response structure');
                    }

                    const rate = data.rates[to];
                    if (rate === undefined) {
                        throw new Error(`rate for ${to} not found`);
                    }

                    const converted = amount * rate;
                    
                    // format currency display
                    resultDiv.innerText = `${amount.toFixed(2)} ${from}  =  ${converted.toFixed(4)} ${to}`;
                    
                    // update timestamp
                    if (data.time_last_update_utc) {
                        updateDiv.innerHTML = `📅 last update: ${data.time_last_update_utc}`;
                    } else {
                        updateDiv.innerHTML = `🕒 conversion at ${new Date().toLocaleTimeString()}`;
                    }

                } catch (error) {
                    console.warn('Conversion error:', error);
                    resultDiv.innerHTML = `⚠️ conversion error — try again`;
                    updateDiv.innerHTML = '⏳ using potentially outdated rates';

                    // fallback: try to use cachedRates if possible? but they are for USD only – approximate conversion
                    if (cachedRates && cachedRates[from] && cachedRates[to]) {
                        // approximate via USD cross: (1 / USDrate_from) * USDrate_to
                        const usdRateFrom = cachedRates[from];   // e.g. 1 USD = 0.85 EUR? wait: cachedRates are from USD base: rates["EUR"] = 0.85 means 1 USD = 0.85 EUR
                        const usdRateTo = cachedRates[to];
                        if (usdRateFrom && usdRateTo) {
                            const crossRate = usdRateTo / usdRateFrom;
                            const converted = amount * crossRate;
                            resultDiv.innerHTML = `${amount.toFixed(2)} ${from}  ≈  ${converted.toFixed(4)} ${to} (approx)`;
                            updateDiv.innerHTML += ' · approximate (cached)';
                        } else {
                            resultDiv.innerText = '— conversion unavailable';
                        }
                    } else {
                        // last resort — show empty
                        resultDiv.innerText = '—';
                    }
                }
            }

            // --- swap currencies ---
            function swapCurrencies() {
                const fromVal = fromSelect.value;
                const toVal = toSelect.value;
                // swap values
                fromSelect.value = toVal;
                toSelect.value = fromVal;
                // optional: trigger convert automatically? we just swap, then user can convert.
                // for better UX we also run conversion (many users expect it)
                convertCurrency();
            }

            // --- event bindings ---
            convertBtn.addEventListener('click', (e) => {
                e.preventDefault();
                convertCurrency();
            });

            swapBtn.addEventListener('click', (e) => {
                e.preventDefault();
                swapCurrencies();
            });

            swapIcon.addEventListener('click', (e) => {
                e.preventDefault();
                swapCurrencies();
            });

            // press enter in amount field triggers convert
            amountInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    convertCurrency();
                }
            });

            // optional: if selects change, we might not auto-convert but it's fine.
            // we'll also trigger convert when both are selected? not necessary, but we can add a small convenience: double click select? no.
            // but for smoothness, we can attach to change? but avoid too many requests.
            // let's attach convert to change of any select? maybe not, but user can press convert.
            // However, to make it lively, we can convert on select change if we want. I'll keep it minimal: they press convert.

            // But we also want a friendly "live" feeling: after swap we auto-convert, that's already inside swapCurrencies.
            // convert on initial load with defaults? Yes, show default conversion
            async function initialConvertAfterLoad() {
                // wait a tick for selects to populate
                setTimeout(() => {
                    convertCurrency();
                }, 100);
            }

            // load everything
            loadCurrencies().then(() => {
                initialConvertAfterLoad();
            }).catch(e => {
                console.warn('load failed, but we use fallback');
                initialConvertAfterLoad(); // try convert with fallback selects (they have values)
            });

            // extra: handle network errors on convert gracefully
            window.convertCurrency = convertCurrency; // (just for debugging)
        })();
    </script>
