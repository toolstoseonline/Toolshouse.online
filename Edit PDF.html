<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PDF Editor – Fully Working</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
#topbar{background:#1e293b;border-bottom:1px solid #334155;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#topbar h1{font-size:16px;font-weight:700;color:#f1f5f9;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:#334155;margin:0 4px}
.tb-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#cbd5e1;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.tb-btn.active{background:#1d4ed8;border-color:#3b82f6;color:#fff}
.tb-btn.danger{border-color:#7f1d1d}
.tb-btn.danger:hover{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.tb-btn.success{background:#14532d;border-color:#16a34a;color:#86efac}
.tb-btn.success:hover{background:#166534}
#fileName{font-size:12px;color:#64748b;margin-left:auto}
#pageInfo{font-size:13px;color:#94a3b8;white-space:nowrap}

/* ── TOOL OPTIONS BAR ── */
#optbar{background:#1e293b;border-bottom:1px solid #2d3748;padding:7px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:44px}
.opt-group{display:flex;align-items:center;gap:8px}
.opt-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.opt-inp{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:4px 8px;color:#e2e8f0;font-size:13px;outline:none}
.opt-inp:focus{border-color:#6366f1}
select.opt-inp{cursor:pointer}
input[type=color].opt-inp{width:36px;height:28px;padding:2px;cursor:pointer}
input[type=range]{accent-color:#6366f1;width:80px}

/* ── MAIN AREA ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:160px;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:6px}
#sidebar:empty::after{content:'Upload a PDF to see pages';font-size:11px;color:#475569;text-align:center;padding:20px 10px;display:block}
.thumb-card{background:#0f172a;border:2px solid transparent;border-radius:8px;padding:4px;cursor:pointer;transition:border-color .15s;position:relative}
.thumb-card:hover{border-color:#4f46e5}
.thumb-card.active{border-color:#6366f1}
.thumb-card canvas{width:100%;border-radius:4px;display:block}
.thumb-num{text-align:center;font-size:11px;color:#64748b;margin-top:3px}

/* ── CANVAS AREA ── */
#canvasWrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:20px;background:#0a0f1e;position:relative}
#editorContainer{position:relative;display:inline-block;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#pdfCanvas{display:block}
#overlayCanvas{position:absolute;top:0;left:0;cursor:crosshair}

/* ── RIGHT PANEL ── */
#rightPanel{width:220px;background:#1e293b;border-left:1px solid #334155;overflow-y:auto;padding:12px}
.rp-section{margin-bottom:18px}
.rp-title{font-size:11px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #312e81}
.rp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rp-row label{font-size:12px;color:#94a3b8}
.rp-input{background:#0f172a;border:1px solid #334155;border-radius:5px;color:#e2e8f0;font-size:12px;padding:3px 7px;width:90px;outline:none}
.rp-input:focus{border-color:#6366f1}
.ann-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.ann-item{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:6px 8px;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between;align-items:center;gap:4px}
.ann-item:hover{border-color:#6366f1}
.ann-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:0 2px}
.ann-item.selected-ann{border-color:#6366f1;background:#1e1b4b}

/* ── UPLOAD OVERLAY ── */
#uploadOverlay{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:20px}
.upload-box{border:2px dashed #475569;border-radius:20px;padding:60px 80px;text-align:center;cursor:pointer;transition:all .25s;position:relative}
.upload-box:hover,.upload-box.dragover{border-color:#6366f1;background:#1e1b4b20}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:52px;margin-bottom:12px}
.upload-title{font-size:20px;font-weight:700;color:#f1f5f9}
.upload-sub{font-size:13px;color:#64748b;margin-top:6px}
.upload-demo{font-size:12px;color:#4f46e5;cursor:pointer;text-decoration:underline;margin-top:16px}

/* ── STATUS BAR ── */
#statusbar{background:#0f172a;border-top:1px solid #1e293b;padding:4px 18px;display:flex;align-items:center;gap:16px}
#statusMsg{font-size:11px;color:#64748b}
#zoomDisplay{font-size:11px;color:#94a3b8}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#modal.show{display:flex}
#modalBox{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px 32px;width:420px;max-width:95vw}
#modalBox h2{font-size:16px;margin-bottom:16px;color:#f1f5f9}
#modalBox textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px;color:#e2e8f0;font-size:14px;resize:vertical;min-height:80px;outline:none;font-family:inherit}
#modalBox textarea:focus{border-color:#6366f1}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn-modal{padding:8px 20px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#cbd5e1;font-size:13px;cursor:pointer}
.btn-modal.primary{background:#4f46e5;border-color:#4f46e5;color:#fff}
.btn-modal:hover{opacity:.85}
</style>
</head>
<body>

<!-- UPLOAD OVERLAY -->
<div id="uploadOverlay">
  <div class="upload-box" id="uploadBox">
    <input type="file" id="fileInput" accept=".pdf"/>
    <div class="upload-icon">📄</div>
    <div class="upload-title">Drop your PDF here</div>
    <div class="upload-sub">or click to browse</div>
  </div>
  <div class="upload-demo" id="demoBtn">▶ Try with a demo PDF</div>
</div>

<!-- TOP BAR -->
<div id="topbar" style="display:none">
  <span style="font-size:20px">📝</span>
  <h1>PDF Editor</h1>
  <div class="tb-sep"></div>

  <!-- File -->
  <button class="tb-btn" onclick="openNewFile()">📂 Open</button>
  <button class="tb-btn success" id="saveBtn" onclick="savePDF()">💾 Save PDF</button>
  <div class="tb-sep"></div>

  <!-- Tools -->
  <button class="tb-btn" id="tool-select" onclick="setTool('select')">🖱 Select</button>
  <button class="tb-btn" id="tool-text" onclick="setTool('text')">T Text</button>
  <button class="tb-btn" id="tool-draw" onclick="setTool('draw')">✏️ Draw</button>
  <button class="tb-btn" id="tool-highlight" onclick="setTool('highlight')">🖊 Highlight</button>
  <button class="tb-btn" id="tool-rect" onclick="setTool('rect')">▭ Rectangle</button>
  <button class="tb-btn" id="tool-line" onclick="setTool('line')">╱ Line</button>
  <button class="tb-btn" id="tool-eraser" onclick="setTool('eraser')">🧹 Eraser</button>
  <div class="tb-sep"></div>

  <!-- Pages -->
  <button class="tb-btn" onclick="addPage()">➕ Add Page</button>
  <button class="tb-btn danger" onclick="deletePage()">🗑 Delete Page</button>
  <div class="tb-sep"></div>

  <!-- Nav -->
  <button class="tb-btn" onclick="goPage(-1)">◀</button>
  <span id="pageInfo">Page 1 / 1</span>
  <button class="tb-btn" onclick="goPage(1)">▶</button>
  <div class="tb-sep"></div>

  <!-- Zoom -->
  <button class="tb-btn" onclick="zoom(-0.2)">🔍−</button>
  <button class="tb-btn" onclick="zoom(0.2)">🔍+</button>
  <button class="tb-btn" onclick="resetZoom()">⊡</button>

  <span id="fileName" style="margin-left:auto;font-size:12px;color:#64748b"></span>
</div>

<!-- OPTION BAR -->
<div id="optbar" style="display:none">
  <div class="opt-group">
    <span class="opt-label">Color</span>
    <input type="color" class="opt-inp" id="optColor" value="#e53e3e" oninput="updateOpts()"/>
  </div>
  <div class="opt-group">
    <span class="opt-label">Size</span>
    <input type="range" id="optSize" min="1" max="60" value="18" oninput="updateOpts()"/>
    <span id="optSizeVal" style="font-size:12px;color:#94a3b8;min-width:24px">18</span>
  </div>
  <div class="opt-group" id="fontGroup">
    <span class="opt-label">Font</span>
    <select class="opt-inp" id="optFont" onchange="updateOpts()">
      <option>Helvetica</option>
      <option>Times New Roman</option>
      <option>Courier New</option>
      <option>Georgia</option>
      <option>Arial</option>
    </select>
  </div>
  <div class="opt-group" id="opacityGroup">
    <span class="opt-label">Opacity</span>
    <input type="range" id="optOpacity" min="10" max="100" value="80" oninput="updateOpts()"/>
    <span id="optOpacityVal" style="font-size:12px;color:#94a3b8;min-width:28px">80%</span>
  </div>
  <div class="opt-group" id="undoGroup" style="margin-left:auto">
    <button class="tb-btn" onclick="undo()" title="Undo">↩ Undo</button>
    <button class="tb-btn" onclick="redo()" title="Redo">↪ Redo</button>
    <button class="tb-btn danger" onclick="clearPage()">🗑 Clear page</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
  <!-- Sidebar thumbnails -->
  <div id="sidebar"></div>

  <!-- Canvas -->
  <div id="canvasWrap">
    <div id="editorContainer">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
    </div>
  </div>

  <!-- Right panel -->
  <div id="rightPanel">
    <div class="rp-section">
      <div class="rp-title">Page Info</div>
      <div class="rp-row"><label>Page</label><span id="rpPage" style="font-size:12px;color:#e2e8f0">–</span></div>
      <div class="rp-row"><label>Total</label><span id="rpTotal" style="font-size:12px;color:#e2e8f0">–</span></div>
      <div class="rp-row"><label>Annotations</label><span id="rpAnns" style="font-size:12px;color:#e2e8f0">0</span></div>
    </div>
    <div class="rp-section">
      <div class="rp-title">Annotations</div>
      <div class="ann-list" id="annList"></div>
    </div>
    <div class="rp-section">
      <div class="rp-title">Document</div>
      <div class="rp-row"><label>Zoom</label><span id="rpZoom" style="font-size:12px;color:#e2e8f0">100%</span></div>
      <button class="tb-btn" style="width:100%;margin-top:6px;justify-content:center" onclick="rotatePageCW()">↻ Rotate CW</button>
      <button class="tb-btn" style="width:100%;margin-top:6px;justify-content:center" onclick="rotatePageCCW()">↺ Rotate CCW</button>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar" style="display:none">
  <span id="statusMsg">Ready</span>
  <span id="zoomDisplay" style="margin-left:auto">100%</span>
</div>

<!-- TEXT INPUT MODAL -->
<div id="modal">
  <div id="modalBox">
    <h2 id="modalTitle">Add Text</h2>
    <textarea id="modalInput" placeholder="Type your text here…" rows="4"></textarea>
    <div class="modal-actions">
      <button class="btn-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-modal primary" onclick="commitText()">Add</button>
    </div>
  </div>
</div>

<!-- PDF.js + pdf-lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
'use strict';
/* =====================================================================
   STATE
===================================================================== */
let pdfDoc        = null;   // pdf-lib document (for saving)
let pdfJsDoc      = null;   // pdf.js document (for rendering)
let currentPage   = 1;
let totalPages    = 0;
let scale         = 1.5;
let currentTool   = 'select';
let currentFile   = null;

// Per-page annotations: { type, x, y, w, h, color, text, size, opacity, points, ... }
let annotations   = {};     // { pageNum: [ann, ...] }
let undoStack     = {};     // { pageNum: [[...snapshots]] }
let redoStack     = {};

// Drawing state
let isDrawing     = false;
let startX, startY;
let currentPoints = [];
let selectedAnn   = null;
let pendingTextPos= null;

// Options
let opts = { color:'#e53e3e', size:18, font:'Helvetica', opacity:0.8 };

/* =====================================================================
   PDF.js setup
===================================================================== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* =====================================================================
   UPLOAD / OPEN
===================================================================== */
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

const uploadBox = document.getElementById('uploadBox');
uploadBox.addEventListener('dragover', e=>{e.preventDefault();uploadBox.classList.add('dragover')});
uploadBox.addEventListener('dragleave',()=>uploadBox.classList.remove('dragover'));
uploadBox.addEventListener('drop', e=>{e.preventDefault();uploadBox.classList.remove('dragover');loadFile(e.dataTransfer.files[0])});

document.getElementById('demoBtn').onclick = createDemoPDF;

function openNewFile(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.pdf';
  inp.onchange = e => loadFile(e.target.files[0]);
  inp.click();
}

async function loadFile(file){
  if(!file || !file.name.endsWith('.pdf')){alert('Please select a PDF file.');return;}
  currentFile = file.name;
  setStatus('Loading PDF…');
  const ab = await file.arrayBuffer();
  await initPDF(ab);
}

async function initPDF(arrayBuffer){
  // Load with pdf-lib for editing
  pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, {ignoreEncryption:true});
  // Load with pdf.js for rendering
  pdfJsDoc = await pdfjsLib.getDocument({data: arrayBuffer.slice(0)}).promise;
  totalPages = pdfJsDoc.numPages;
  currentPage = 1;
  annotations = {};
  undoStack   = {};
  redoStack   = {};
  showUI();
  await renderPage(currentPage);
  buildThumbnails();
  updateRightPanel();
  setStatus('PDF loaded — ' + currentFile);
  document.getElementById('fileName').textContent = currentFile;
}

function showUI(){
  document.getElementById('uploadOverlay').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('optbar').style.display='flex';
  document.getElementById('main').style.display='flex';
  document.getElementById('statusbar').style.display='flex';
}

/* =====================================================================
   RENDER
===================================================================== */
const pdfCanvas     = document.getElementById('pdfCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const pdfCtx        = pdfCanvas.getContext('2d');
const ovCtx         = overlayCanvas.getContext('2d');

async function renderPage(pageNum){
  if(!pdfJsDoc) return;
  setStatus('Rendering page ' + pageNum + '…');
  const page = await pdfJsDoc.getPage(pageNum);
  const vp   = page.getViewport({scale});

  pdfCanvas.width  = overlayCanvas.width  = vp.width;
  pdfCanvas.height = overlayCanvas.height = vp.height;

  await page.render({canvasContext: pdfCtx, viewport: vp}).promise;
  drawAnnotations();
  updatePageUI();
  setStatus('Ready');
  document.getElementById('rpZoom').textContent = Math.round(scale*100)+'%';
  document.getElementById('zoomDisplay').textContent = Math.round(scale*100)+'%';
}

/* =====================================================================
   ANNOTATIONS DRAW
===================================================================== */
function drawAnnotations(){
  const anns = annotations[currentPage] || [];
  ovCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  anns.forEach((ann,i) => drawAnn(ann, i===selectedAnn));
}

function drawAnn(ann, selected=false){
  ovCtx.save();
  ovCtx.globalAlpha = ann.opacity ?? 0.8;

  if(ann.type==='text'){
    ovCtx.font = `${ann.size}px ${ann.font||'Arial'}`;
    ovCtx.fillStyle = ann.color;
    ovCtx.globalAlpha = 1;
    const lines = ann.text.split('\n');
    lines.forEach((line,i) => ovCtx.fillText(line, ann.x, ann.y + i*(ann.size*1.3)));
    if(selected){
      const w = Math.max(...lines.map(l=>ovCtx.measureText(l).width));
      ovCtx.strokeStyle='#6366f1'; ovCtx.lineWidth=1.5;
      ovCtx.setLineDash([4,3]);
      ovCtx.strokeRect(ann.x-2, ann.y-ann.size-2, w+4, ann.size*1.3*lines.length+4);
    }
  } else if(ann.type==='draw' || ann.type==='highlight'){
    const pts = ann.points||[];
    if(pts.length<2){ovCtx.restore();return;}
    ovCtx.strokeStyle = ann.color;
    ovCtx.lineWidth   = ann.size;
    ovCtx.lineCap     = 'round';
    ovCtx.lineJoin    = 'round';
    if(ann.type==='highlight'){ovCtx.globalAlpha=0.35;ovCtx.lineWidth=ann.size*1.5;}
    ovCtx.beginPath();
    ovCtx.moveTo(pts[0],pts[1]);
    for(let i=2;i<pts.length;i+=2) ovCtx.lineTo(pts[i],pts[i+1]);
    ovCtx.stroke();
  } else if(ann.type==='rect'){
    ovCtx.strokeStyle = ann.color;
    ovCtx.lineWidth   = ann.size;
    ovCtx.strokeRect(ann.x,ann.y,ann.w,ann.h);
    if(selected){ovCtx.strokeStyle='#6366f1';ovCtx.lineWidth=2;ovCtx.setLineDash([4,3]);ovCtx.strokeRect(ann.x-3,ann.y-3,ann.w+6,ann.h+6);}
  } else if(ann.type==='line'){
    ovCtx.strokeStyle = ann.color;
    ovCtx.lineWidth   = ann.size;
    ovCtx.lineCap     = 'round';
    ovCtx.beginPath();
    ovCtx.moveTo(ann.x,ann.y);
    ovCtx.lineTo(ann.x+ann.w,ann.y+ann.h);
    ovCtx.stroke();
  }
  ovCtx.restore();
}

/* =====================================================================
   MOUSE EVENTS ON OVERLAY
===================================================================== */
overlayCanvas.addEventListener('mousedown', onDown);
overlayCanvas.addEventListener('mousemove', onMove);
overlayCanvas.addEventListener('mouseup',   onUp);
overlayCanvas.addEventListener('dblclick',  onDbl);

function pos(e){
  const r = overlayCanvas.getBoundingClientRect();
  return {x: (e.clientX-r.left), y: (e.clientY-r.top)};
}

function onDown(e){
  const {x,y}=pos(e);
  if(currentTool==='select'){selectAt(x,y);return;}
  if(currentTool==='text'){pendingTextPos={x,y};openModal('Add Text','');return;}
  if(currentTool==='eraser'){eraseAt(x,y);return;}
  isDrawing=true; startX=x; startY=y; currentPoints=[x,y];
  pushUndo();
}

function onMove(e){
  if(!isDrawing)return;
  const {x,y}=pos(e);
  if(currentTool==='draw'||currentTool==='highlight'){
    currentPoints.push(x,y);
    drawAnnotations();
    ovCtx.save();
    ovCtx.globalAlpha=currentTool==='highlight'?0.35:opts.opacity;
    ovCtx.strokeStyle=opts.color;
    ovCtx.lineWidth=currentTool==='highlight'?opts.size*1.5:opts.size;
    ovCtx.lineCap='round';ovCtx.lineJoin='round';
    ovCtx.beginPath();
    ovCtx.moveTo(currentPoints[0],currentPoints[1]);
    for(let i=2;i<currentPoints.length;i+=2)ovCtx.lineTo(currentPoints[i],currentPoints[i+1]);
    ovCtx.stroke();ovCtx.restore();
  } else if(currentTool==='rect'){
    drawAnnotations();
    ovCtx.strokeStyle=opts.color;ovCtx.lineWidth=opts.size;
    ovCtx.strokeRect(startX,startY,x-startX,y-startY);
  } else if(currentTool==='line'){
    drawAnnotations();
    ovCtx.strokeStyle=opts.color;ovCtx.lineWidth=opts.size;ovCtx.lineCap='round';
    ovCtx.beginPath();ovCtx.moveTo(startX,startY);ovCtx.lineTo(x,y);ovCtx.stroke();
  }
}

function onUp(e){
  if(!isDrawing)return;
  isDrawing=false;
  const {x,y}=pos(e);
  if(!annotations[currentPage]) annotations[currentPage]=[];
  if(currentTool==='draw'||currentTool==='highlight'){
    annotations[currentPage].push({type:currentTool,points:[...currentPoints],color:opts.color,size:opts.size,opacity:opts.opacity});
  } else if(currentTool==='rect'){
    annotations[currentPage].push({type:'rect',x:startX,y:startY,w:x-startX,h:y-startY,color:opts.color,size:opts.size,opacity:opts.opacity});
  } else if(currentTool==='line'){
    annotations[currentPage].push({type:'line',x:startX,y:startY,w:x-startX,h:y-startY,color:opts.color,size:opts.size,opacity:opts.opacity});
  }
  currentPoints=[];
  drawAnnotations();
  updateRightPanel();
}

function onDbl(e){
  const {x,y}=pos(e);
  if(currentTool==='select'){
    // find text ann under cursor and edit it
    const anns=annotations[currentPage]||[];
    for(let i=anns.length-1;i>=0;i--){
      const a=anns[i];
      if(a.type==='text' && x>=a.x-4 && y<=a.y+4 && y>=a.y-a.size*2){
        selectedAnn=i;
        pendingTextPos={x:a.x,y:a.y,editIdx:i};
        openModal('Edit Text',a.text);
        return;
      }
    }
  }
}

function selectAt(x,y){
  const anns=annotations[currentPage]||[];
  selectedAnn=null;
  for(let i=anns.length-1;i>=0;i--){
    const a=anns[i];
    if(a.type==='text' && x>=a.x-4 && x<=a.x+200 && y<=a.y+8 && y>=a.y-a.size*1.5){selectedAnn=i;break;}
    if(a.type==='rect' && x>=Math.min(a.x,a.x+a.w)-5 && x<=Math.max(a.x,a.x+a.w)+5 && y>=Math.min(a.y,a.y+a.h)-5 && y<=Math.max(a.y,a.y+a.h)+5){selectedAnn=i;break;}
  }
  drawAnnotations();
  updateRightPanel();
}

function eraseAt(x,y){
  const anns=annotations[currentPage]||[];
  for(let i=anns.length-1;i>=0;i--){
    const a=anns[i];
    if(a.type==='text' && x>=a.x-10 && x<=a.x+200 && y<=a.y+10 && y>=a.y-a.size*1.5){anns.splice(i,1);break;}
    if((a.type==='rect'||a.type==='line') && x>=Math.min(a.x,a.x+a.w)-10 && x<=Math.max(a.x,a.x+a.w)+10 && y>=Math.min(a.y,a.y+a.h)-10 && y<=Math.max(a.y,a.y+a.h)+10){anns.splice(i,1);break;}
    if((a.type==='draw'||a.type==='highlight') && a.points){
      for(let j=0;j<a.points.length-2;j+=2){
        if(Math.hypot(a.points[j]-x,a.points[j+1]-y)<(a.size+8)){anns.splice(i,1);break;}
      }
    }
  }
  drawAnnotations();
  updateRightPanel();
}

/* =====================================================================
   TEXT MODAL
===================================================================== */
function openModal(title, val){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInput').value=val;
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('modalInput').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.remove('show');pendingTextPos=null;}
function commitText(){
  const txt=document.getElementById('modalInput').value.trim();
  closeModal();
  if(!txt||!pendingTextPos) return;
  if(!annotations[currentPage]) annotations[currentPage]=[];
  if(pendingTextPos.editIdx!=null){
    annotations[currentPage][pendingTextPos.editIdx].text=txt;
  } else {
    annotations[currentPage].push({type:'text',x:pendingTextPos.x,y:pendingTextPos.y,text:txt,color:opts.color,size:opts.size,font:opts.font,opacity:1});
  }
  pendingTextPos=null;
  drawAnnotations();
  updateRightPanel();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitText();}});

/* =====================================================================
   TOOLS
===================================================================== */
function setTool(t){
  currentTool=t;
  document.querySelectorAll('[id^=tool-]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('tool-'+t);
  if(el) el.classList.add('active');
  overlayCanvas.style.cursor = t==='text'?'text' : t==='eraser'?'cell' : t==='select'?'default' : 'crosshair';
  document.getElementById('fontGroup').style.display = t==='text'?'flex':'none';
  setStatus('Tool: '+t);
}

/* =====================================================================
   OPTIONS
===================================================================== */
function updateOpts(){
  opts.color   = document.getElementById('optColor').value;
  opts.size    = +document.getElementById('optSize').value;
  opts.font    = document.getElementById('optFont').value;
  opts.opacity = document.getElementById('optOpacity').value/100;
  document.getElementById('optSizeVal').textContent    = opts.size;
  document.getElementById('optOpacityVal').textContent = document.getElementById('optOpacity').value+'%';
}

/* =====================================================================
   UNDO / REDO
===================================================================== */
function pushUndo(){
  if(!undoStack[currentPage]) undoStack[currentPage]=[];
  undoStack[currentPage].push(JSON.stringify(annotations[currentPage]||[]));
  redoStack[currentPage]=[];
}
function undo(){
  if(!undoStack[currentPage]||!undoStack[currentPage].length) return;
  if(!redoStack[currentPage]) redoStack[currentPage]=[];
  redoStack[currentPage].push(JSON.stringify(annotations[currentPage]||[]));
  annotations[currentPage]=JSON.parse(undoStack[currentPage].pop());
  drawAnnotations();updateRightPanel();
}
function redo(){
  if(!redoStack[currentPage]||!redoStack[currentPage].length) return;
  undoStack[currentPage].push(JSON.stringify(annotations[currentPage]||[]));
  annotations[currentPage]=JSON.parse(redoStack[currentPage].pop());
  drawAnnotations();updateRightPanel();
}
function clearPage(){
  if(!confirm('Clear all annotations on this page?')) return;
  pushUndo();
  annotations[currentPage]=[];
  drawAnnotations();updateRightPanel();
}

/* =====================================================================
   NAVIGATION & ZOOM
===================================================================== */
async function goPage(dir){
  const next=currentPage+dir;
  if(next<1||next>totalPages) return;
  currentPage=next;
  selectedAnn=null;
  await renderPage(currentPage);
  updateRightPanel();
  highlightThumb(currentPage);
}

function zoom(delta){
  scale=Math.max(0.4,Math.min(4,scale+delta));
  renderPage(currentPage);
}
function resetZoom(){scale=1.5;renderPage(currentPage);}

function updatePageUI(){
  document.getElementById('pageInfo').textContent=`Page ${currentPage} / ${totalPages}`;
  document.getElementById('rpPage').textContent=currentPage;
  document.getElementById('rpTotal').textContent=totalPages;
}

/* =====================================================================
   THUMBNAILS
===================================================================== */
async function buildThumbnails(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';
  for(let i=1;i<=totalPages;i++){
    const card=document.createElement('div');
    card.className='thumb-card'+(i===currentPage?' active':'');
    card.id='thumb-'+i;
    const c=document.createElement('canvas');
    const n=document.createElement('div');
    n.className='thumb-num';n.textContent='Page '+i;
    card.appendChild(c);card.appendChild(n);
    card.onclick=(()=>{const p=i;return async()=>{currentPage=p;selectedAnn=null;await renderPage(p);updateRightPanel();highlightThumb(p);}})();
    sb.appendChild(card);

    // Render thumbnail async
    const page=await pdfJsDoc.getPage(i);
    const vp=page.getViewport({scale:0.18});
    c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  }
}

function highlightThumb(p){
  document.querySelectorAll('.thumb-card').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('thumb-'+p);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}

/* =====================================================================
   RIGHT PANEL
===================================================================== */
function updateRightPanel(){
  const anns=annotations[currentPage]||[];
  document.getElementById('rpAnns').textContent=anns.length;
  const list=document.getElementById('annList');
  list.innerHTML='';
  anns.forEach((a,i)=>{
    const row=document.createElement('div');
    row.className='ann-item'+(i===selectedAnn?' selected-ann':'');
    const label={text:'📝 Text',draw:'✏️ Draw',highlight:'🖊 Highlight',rect:'▭ Rect',line:'╱ Line'}[a.type]||a.type;
    row.innerHTML=`<span style="flex:1">${label}${a.text?' – '+a.text.slice(0,14):''}</span>
      <button class="ann-del" title="Delete" onclick="deleteAnn(${i})">✕</button>`;
    row.onclick=()=>{selectedAnn=i;drawAnnotations();updateRightPanel();};
    list.appendChild(row);
  });
}

function deleteAnn(i){
  pushUndo();
  (annotations[currentPage]||[]).splice(i,1);
  selectedAnn=null;
  drawAnnotations();updateRightPanel();
}

/* =====================================================================
   PAGE OPERATIONS
===================================================================== */
async function addPage(){
  const page=pdfDoc.addPage();
  page.drawText(' ',{x:10,y:10,size:1});
  // Reload
  const bytes=await pdfDoc.save();
  const ab=bytes.buffer.slice(bytes.byteOffset,bytes.byteOffset+bytes.byteLength);
  const oldAnns=JSON.parse(JSON.stringify(annotations));
  await initPDF(ab);
  annotations=oldAnns;
  currentPage=totalPages;
  await renderPage(currentPage);
  setStatus('New page added');
}

async function deletePage(){
  if(totalPages<=1){alert('Cannot delete the only page.');return;}
  if(!confirm(`Delete page ${currentPage}?`)) return;
  pdfDoc.removePage(currentPage-1);
  delete annotations[currentPage];
  const bytes=await pdfDoc.save();
  const ab=bytes.buffer.slice(bytes.byteOffset,bytes.byteOffset+bytes.byteLength);
  const oldAnns=JSON.parse(JSON.stringify(annotations));
  await initPDF(ab);
  annotations=oldAnns;
  if(currentPage>totalPages) currentPage=totalPages;
  await renderPage(currentPage);
  setStatus('Page deleted');
}

async function rotatePageCW(){await rotatePage(90);}
async function rotatePageCCW(){await rotatePage(-90);}
async function rotatePage(deg){
  const page=pdfDoc.getPages()[currentPage-1];
  page.setRotation(PDFLib.degrees((page.getRotation().angle+deg+360)%360));
  const bytes=await pdfDoc.save();
  const ab=bytes.buffer.slice(bytes.byteOffset,bytes.byteOffset+bytes.byteLength);
  const oldAnns=JSON.parse(JSON.stringify(annotations));
  await initPDF(ab);
  annotations=oldAnns;
  await renderPage(currentPage);
  setStatus('Page rotated');
}

/* =====================================================================
   SAVE PDF (bakes annotations into the PDF)
===================================================================== */
async function savePDF(){
  setStatus('Baking annotations into PDF…');
  try{
    // We'll work with a fresh copy of the pdf-lib doc
    const pages=pdfDoc.getPages();

    for(const [pageNumStr, anns] of Object.entries(annotations)){
      const pageNum=parseInt(pageNumStr);
      if(!anns||!anns.length) continue;
      const pdfPage=pages[pageNum-1];
      if(!pdfPage) continue;

      const {width:pw, height:ph}=pdfPage.getSize();
      const scaleX=pw/pdfCanvas.width;
      const scaleY=ph/pdfCanvas.height;

      for(const ann of anns){
        if(ann.type==='text'){
          const hex=ann.color||'#000000';
          const rgb=hexToRgb(hex);
          const fontName=ann.font||'Helvetica';
          let embFont;
          try{
            const stdFonts={
              'Helvetica':PDFLib.StandardFonts.Helvetica,
              'Times New Roman':PDFLib.StandardFonts.TimesRoman,
              'Courier New':PDFLib.StandardFonts.Courier,
              'Georgia':PDFLib.StandardFonts.TimesRoman,
              'Arial':PDFLib.StandardFonts.Helvetica,
            };
            embFont=await pdfDoc.embedFont(stdFonts[fontName]||PDFLib.StandardFonts.Helvetica);
          }catch{embFont=await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);}

          const lines=(ann.text||'').split('\n');
          const pdfFontSize=(ann.size||16)*scaleY;
          lines.forEach((line,li)=>{
            if(!line) return;
            const py=ph - ann.y*scaleY + (ann.size*scaleY*0.8) - li*(pdfFontSize*1.3);
            pdfPage.drawText(line,{
              x:ann.x*scaleX, y:py,
              size:pdfFontSize,
              font:embFont,
              color:PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255),
              opacity:ann.opacity??1,
            });
          });

        } else if(ann.type==='rect'){
          const rgb=hexToRgb(ann.color||'#e53e3e');
          pdfPage.drawRectangle({
            x:Math.min(ann.x,ann.x+ann.w)*scaleX,
            y:ph-Math.max(ann.y,ann.y+ann.h)*scaleY,
            width:Math.abs(ann.w)*scaleX,
            height:Math.abs(ann.h)*scaleY,
            borderColor:PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255),
            borderWidth:(ann.size||2)*Math.min(scaleX,scaleY),
            opacity:ann.opacity??0.8,
          });

        } else if(ann.type==='line'){
          const rgb=hexToRgb(ann.color||'#e53e3e');
          pdfPage.drawLine({
            start:{x:ann.x*scaleX, y:ph-ann.y*scaleY},
            end:{x:(ann.x+ann.w)*scaleX, y:ph-(ann.y+ann.h)*scaleY},
            color:PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255),
            thickness:(ann.size||2)*Math.min(scaleX,scaleY),
            opacity:ann.opacity??0.8,
          });

        } else if(ann.type==='draw'||ann.type==='highlight'){
          const pts=ann.points||[];
          if(pts.length<4) continue;
          const rgb=hexToRgb(ann.color||'#e53e3e');
          const op=ann.type==='highlight'?0.35:(ann.opacity??0.8);
          for(let i=0;i<pts.length-2;i+=2){
            pdfPage.drawLine({
              start:{x:pts[i]*scaleX,   y:ph-pts[i+1]*scaleY},
              end:  {x:pts[i+2]*scaleX, y:ph-pts[i+3]*scaleY},
              color:PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255),
              thickness:(ann.size||(ann.type==='highlight'?14:3))*Math.min(scaleX,scaleY),
              opacity:op,
            });
          }
        }
      }
    }

    // Save
    const bytes=await pdfDoc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=(currentFile||'edited').replace('.pdf','')+'-edited.pdf';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    setStatus('PDF saved successfully!');
  }catch(err){
    setStatus('Save error: '+err.message);
    console.error(err);
  }
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}
