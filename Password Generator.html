<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - Secure Passwords</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    transition:0.3s;
}
.container{
    background:#fff;
    padding:25px;
    width:350px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.output{
    display:flex;
}
.output input{
    flex:1;
    padding:10px;
    font-size:16px;
}
.output button{
    padding:10px;
    cursor:pointer;
}
.options{
    margin-top:15px;
}
.options label{
    display:block;
    margin:5px 0;
}
.strength{
    margin-top:10px;
    font-weight:bold;
}
.generate-btn{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#667eea;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius:8px;
}
.toggle{
    text-align:center;
    margin-top:10px;
    cursor:pointer;
    font-size:14px;
    color:#555;
}
.dark{
    background:#1e1e1e;
    color:#fff;
}
.dark .container{
    background:#2c2c2c;
}
.dark input{
    background:#444;
    color:#fff;
}
</style>
</head>
<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <div class="output">
        <input type="text" id="password" readonly>
        <button onclick="copyPassword()">Copy</button>
    </div>

    <div class="options">
        <label>Password Length:
            <input type="number" id="length" min="4" max="50" value="12">
        </label>

        <label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>
        <label><input type="checkbox" id="lowercase" checked> Include Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Include Symbols</label>
    </div>

    <div class="strength" id="strength">Strength: -</div>

    <button class="generate-btn" onclick="generatePassword()">Generate Password</button>

    <div class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</div>
</div>

<script>
function generatePassword(){
    const length = document.getElementById("length").value;
    const upper = document.getElementById("uppercase").checked;
    const lower = document.getElementById("lowercase").checked;
    const number = document.getElementById("numbers").checked;
    const symbol = document.getElementById("symbols").checked;

    const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lowerChars = "abcdefghijklmnopqrstuvwxyz";
    const numberChars = "0123456789";
    const symbolChars = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

    let allChars = "";
    if(upper) allChars += upperChars;
    if(lower) allChars += lowerChars;
    if(number) allChars += numberChars;
    if(symbol) allChars += symbolChars;

    if(allChars === ""){
        alert("Please select at least one option!");
        return;
    }

    let password = "";
    for(let i=0;i<length;i++){
        password += allChars.charAt(Math.floor(Math.random()*allChars.length));
    }

    document.getElementById("password").value = password;
    checkStrength(password);
}

function copyPassword(){
    const passwordField = document.getElementById("password");
    passwordField.select();
    document.execCommand("copy");
    alert("Password Copied!");
}

function checkStrength(password){
    let strengthText = "Weak";
    if(password.length >= 12 && 
       /[A-Z]/.test(password) &&
       /[a-z]/.test(password) &&
       /[0-9]/.test(password) &&
       /[^A-Za-z0-9]/.test(password)){
        strengthText = "Strong 💪";
    } else if(password.length >= 8){
        strengthText = "Medium ⚡";
    }

    document.getElementById("strength").innerText = "Strength: " + strengthText;
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>
</body>
</html>
