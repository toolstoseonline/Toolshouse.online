<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Photo Filters & Effects Online – Tools House Online</title>
<meta name="description" content="Apply photo filters and effects online for free. Add Instagram-like filters to your images. Fast photo editor. No signup required.">
<link rel="canonical" href="https://www.toolshouse.online/Filter & Effects.html">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#fff;
    width:450px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:10px;
    color:#333;
}

input[type="file"]{
    margin:10px 0;
}

.controls{
    margin-top:15px;
}

label{
    display:block;
    margin-top:10px;
    font-size:14px;
    text-align:left;
}

input[type="range"]{
    width:100%;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
}

img{
    max-width:100%;
    margin-top:15px;
    border-radius:10px;
}

.download-btn{
    background:#28a745;
}

.download-btn:hover{
    background:#218838;
}
</style>
<meta name="robots" content="index, follow">
<meta property="og:title" content="Free Photo Filters & Effects Online – Tools House Online">
<meta property="og:description" content="Apply photo filters and effects online for free. Add Instagram-like filters to your images. Fast photo editor. No signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.toolshouse.online/Filter & Effects.html">
<meta property="og:image" content="https://www.toolshouse.online/logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Free Photo Filters & Effects Online – Tools House Online">
<meta name="twitter:description" content="Apply photo filters and effects online for free. Add Instagram-like filters to your images. Fast photo editor. No signup required.">
</head>

<body>

<div class="container">
    <h1>Filter & Effects</h1>
    <p>Apply filters instantly</p>

    <input type="file" id="upload" accept="image/*">

    <img id="preview">

    <div class="controls">
        <label>Brightness</label>
        <input type="range" id="brightness" min="0" max="200" value="100">

        <label>Contrast</label>
        <input type="range" id="contrast" min="0" max="200" value="100">

        <label>Blur</label>
        <input type="range" id="blur" min="0" max="10" value="0">

        <label>Saturation</label>
        <input type="range" id="saturation" min="0" max="200" value="100">
    </div>

    <button onclick="applyFilters()">Apply Effects</button>
    <button class="download-btn" onclick="downloadImage()">Download Image</button>
</div>

<script>
let image = document.getElementById("preview");

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        image.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function applyFilters(){
    const brightness = document.getElementById("brightness").value;
    const contrast = document.getElementById("contrast").value;
    const blur = document.getElementById("blur").value;
    const saturation = document.getElementById("saturation").value;

    image.style.filter = `
        brightness(${brightness}%)
        contrast(${contrast}%)
        blur(${blur}px)
        saturate(${saturation}%)
    `;
}

function downloadImage(){
    if(!image.src){
        alert("Upload image first!");
        return;
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const tempImage = new Image();
    tempImage.crossOrigin = "anonymous";
    tempImage.src = image.src;

    tempImage.onload = function(){
        canvas.width = tempImage.width;
        canvas.height = tempImage.height;

        ctx.filter = image.style.filter;
        ctx.drawImage(tempImage,0,0);

        const link = document.createElement("a");
        link.download = "filtered-image.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
}
</script>
</body>
</html>
