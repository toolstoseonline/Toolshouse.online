<body>

<div class="container">
  <h2>💰 EMI <span style="font-weight:300; font-size:1.3rem;">calculator</span></h2>
  <div class="subhead">✦ no symbols · clean results ✦</div>

  <!-- Loan amount - plain input -->
  <div class="input-group">
    <label>🔹 Loan amount</label>
    <div class="input-icon">
      <input type="number" id="loanAmount" placeholder="e.g. 5000" step="any" value="">
    </div>
  </div>

  <!-- Annual interest rate (%) -->
  <div class="input-group">
    <label>🔹 Annual interest rate (%)</label>
    <div class="input-icon">
      <input type="number" id="interestRate" placeholder="e.g. 8.5" step="any" value="">
    </div>
  </div>

  <!-- Loan tenure (years) -->
  <div class="input-group">
    <label>🔹 Loan tenure (years)</label>
    <div class="input-icon">
      <input type="number" id="loanTenure" placeholder="e.g. 5" step="any" value="">
    </div>
  </div>

  <button onclick="calculateEMI()">
    <span>=</span> CALCULATE EMI <span>→</span>
  </button>

  <!-- result area with absolutely NO currency symbols, just numbers like your image -->
  <div class="result-card" id="result">
    <div class="result-item">
      <span class="label">Monthly EMI</span>
      <span class="value" id="emiValue">—</span>
    </div>
    <div class="result-item">
      <span class="label">Total interest</span>
      <span class="value" id="interestValue">—</span>
    </div>
    <div class="result-item">
      <span class="label">Total payment</span>
      <span class="value" id="totalValue">—</span>
    </div>
  </div>

  <div class="asterisk">
    <i>⚡ results shown as plain numbers · no ¥ ₹ $ ⚡</i>
  </div>
</div>

<script>
(function() {
  const loanInput = document.getElementById('loanAmount');
  const rateInput = document.getElementById('interestRate');
  const yearsInput = document.getElementById('loanTenure');

  const emiSpan = document.getElementById('emiValue');
  const interestSpan = document.getElementById('interestValue');
  const totalSpan = document.getElementById('totalValue');

  // format with 2 decimals and thousands separator, but WITHOUT any currency symbol
  function formatPlainNumber(value) {
    // handle potential negative or NaN, but our validation prevents that
    return value.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
  }

  window.calculateEMI = function() {
    // read values as string and convert to number
    let P = parseFloat(loanInput.value);
    let annualRate = parseFloat(rateInput.value);
    let years = parseFloat(yearsInput.value);

    // strict validation: fields must be filled, positive numbers
    if (isNaN(P) || isNaN(annualRate) || isNaN(years) || 
        loanInput.value.trim() === '' || rateInput.value.trim() === '' || yearsInput.value.trim() === '' ||
        P <= 0 || annualRate <= 0 || years <= 0) {

      emiSpan.innerText = '—';
      interestSpan.innerText = '—';
      totalSpan.innerText = '—';
      
      alert('Please enter all values correctly!\n\n• Amount must be > 0\n• Interest rate > 0\n• Tenure > 0');
      return;
    }

    // --- EMI calculation ---
    let monthlyRate = annualRate / 12 / 100;
    let months = years * 12;

    let EMI;
    if (monthlyRate === 0) {
      // practically never happens because rate>0, but keep safe
      EMI = P / months;
    } else {
      EMI = (P * monthlyRate * Math.pow(1 + monthlyRate, months)) / 
            (Math.pow(1 + monthlyRate, months) - 1);
    }

    let totalPayment = EMI * months;
    let totalInterest = totalPayment - P;

    // update result fields using plain formatter (no symbol)
    emiSpan.innerText = formatPlainNumber(EMI);
    interestSpan.innerText = formatPlainNumber(totalInterest);
    totalSpan.innerText = formatPlainNumber(totalPayment);
  };

  // Enter key triggers calculation
  [loanInput, rateInput, yearsInput].forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        calculateEMI();
      }
    });
  });

})();
</script>
