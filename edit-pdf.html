<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PDF Editor - Professional PDF Annotation Tool</title>
  <meta name="description" content="Edit PDF documents online for free. Modify text, add images, fill forms, and annotate instantly. No signup, no watermark, no software download required.">
     <meta name="keywords" content="PDF editor,edit PDF,edit PDF online">
<link rel="canonical" href="https://www.toolshouse.online/edit-pdf.html">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }

    /* Upload Screen */
    #upload-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    .upload-container {
      text-align: center;
      padding: 40px;
    }

    .upload-container h1 {
      font-size: 48px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .upload-container p {
      color: #888;
      margin-bottom: 40px;
    }

    .dropzone {
      border: 2px dashed #00d4ff;
      border-radius: 20px;
      padding: 60px 80px;
      background: rgba(0, 212, 255, 0.05);
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 24px;
    }

    .dropzone:hover, .dropzone.drag-over {
      border-color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      transform: translateY(-4px);
    }

    .dropzone-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
    }

    /* Editor Screen */
    #editor-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: #0f0f1a;
      border-bottom: 1px solid #2a2a3a;
    }

    .file-info h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .file-info p {
      font-size: 12px;
      color: #888;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      background: #2a2a3a;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .icon-btn:hover {
      background: #00d4ff;
      color: #1a1a2e;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: #0f0f1a;
      border-bottom: 1px solid #2a2a3a;
      flex-wrap: wrap;
    }

    .tool-group {
      display: flex;
      gap: 4px;
      padding-right: 16px;
      border-right: 1px solid #2a2a3a;
    }

    .tool-group:last-child {
      border-right: none;
    }

    .tool-btn {
      background: #2a2a3a;
      border: none;
      color: #eee;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tool-btn:hover {
      background: #3a3a4a;
    }

    .tool-btn.active {
      background: #00d4ff;
      color: #1a1a2e;
    }

    /* Main Content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 20px;
      gap: 20px;
    }

    .canvas-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      border-radius: 12px;
      overflow: auto;
      position: relative;
    }

    .canvas-wrapper {
      position: relative;
      display: inline-block;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
    }

    #pdf-canvas {
      display: block;
      border-radius: 4px;
    }

    #drawing-canvas {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 4px;
      cursor: crosshair;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #0f0f1a;
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .page-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .page-nav-btn {
      flex: 1;
      background: #2a2a3a;
      border: none;
      color: white;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .page-nav-btn:hover:not(:disabled) {
      background: #00d4ff;
    }

    .page-nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-number {
      text-align: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: #00d4ff;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .thumbnail {
      aspect-ratio: 1 / 1.4;
      background: #2a2a3a;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      overflow: hidden;
    }

    .thumbnail:hover {
      border-color: #00d4ff;
      transform: scale(1.02);
    }

    .thumbnail.active {
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .thumbnail canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .color-palette {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.active {
      border-color: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .slider-container {
      margin-top: 12px;
    }

    .slider-container label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
      background: #2a2a3a;
      height: 4px;
      border-radius: 2px;
    }

    /* Status Bar */
    .status-bar {
      padding: 8px 24px;
      background: #0f0f1a;
      border-top: 1px solid #2a2a3a;
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }

    .modal-content h3 {
      margin-bottom: 16px;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      background: #2a2a3a;
      border: 1px solid #3a3a4a;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00d4ff;
      color: #1a1a2e;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: 200px;
      }
      .tool-btn span {
        display: none;
      }
      .tool-btn {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <!-- Upload Screen -->
  <div id="upload-screen">
    <div class="upload-container">
      <h1>📄 PDF Editor Pro</h1>
      <p>Edit, annotate, and save your PDFs - All in your browser</p>
      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">📤</div>
        <p style="margin: 16px 0;">Drag & drop your PDF here</p>
        <button class="btn-primary" id="browse-btn">Browse Files</button>
      </div>
      <input type="file" id="file-input" accept=".pdf" style="display: none;">
      <p style="margin-top: 20px; font-size: 12px; color: #666;">✓ No data uploaded to servers ✓ Works offline ✓ Free forever</p>
    </div>
  </div>

  <!-- Editor Screen -->
  <div id="editor-screen">
    <div class="editor-header">
      <div class="file-info">
        <h2 id="file-name">Untitled.pdf</h2>
        <p id="file-size"></p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="save-btn">💾 Save PDF</button>
        <button class="icon-btn" id="new-btn">📁 New</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="tool-group">
        <button class="tool-btn" data-tool="draw">✏️ Draw</button>
        <button class="tool-btn" data-tool="highlight">🟡 Highlight</button>
        <button class="tool-btn" data-tool="text">📝 Text</button>
        <button class="tool-btn" data-tool="eraser">🧽 Eraser</button>
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="undo-btn">↩️ Undo</button>
        <button class="tool-btn" id="redo-btn">↪️ Redo</button>
        <button class="tool-btn" id="clear-btn">🗑️ Clear</button>
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="rotate-left-btn">↺ Rotate Left</button>
        <button class="tool-btn" id="rotate-right-btn">↻ Rotate Right</button>
      </div>
    </div>

    <div class="main-content">
      <div class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="drawing-canvas"></canvas>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">Navigation</div>
          <div class="page-nav">
            <button class="page-nav-btn" id="prev-page">◀ Prev</button>
            <button class="page-nav-btn" id="next-page">Next ▶</button>
          </div>
          <div class="page-number">Page <span id="current-page">1</span> / <span id="total-pages">1</span></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Pages</div>
          <div class="thumbnails" id="thumbnails"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Colors</div>
          <div class="color-palette" id="color-palette">
            <div class="color-option active" style="background: #000000;" data-color="#000000"></div>
            <div class="color-option" style="background: #ff4444;" data-color="#ff4444"></div>
            <div class="color-option" style="background: #44ff44;" data-color="#44ff44"></div>
            <div class="color-option" style="background: #4444ff;" data-color="#4444ff"></div>
            <div class="color-option" style="background: #ffff44;" data-color="#ffff44"></div>
            <div class="color-option" style="background: #ff44ff;" data-color="#ff44ff"></div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Brush Settings</div>
          <div class="slider-container">
            <label>Size: <span id="brush-size-value">3</span>px</label>
            <input type="range" id="brush-size" min="1" max="20" value="3">
          </div>
          <div class="slider-container">
            <label>Opacity: <span id="opacity-value">100</span>%</label>
            <input type="range" id="opacity" min="10" max="100" value="100">
          </div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span id="status">✓ Ready</span>
      <span>⚡ All processing done locally</span>
    </div>
  </div>

  <!-- Text Modal -->
  <div class="modal" id="text-modal">
    <div class="modal-content">
      <h3>Add Text Annotation</h3>
      <input type="text" id="text-input" placeholder="Enter your text here..." autocomplete="off">
      <div class="modal-buttons">
        <button class="tool-btn" id="cancel-text">Cancel</button>
        <button class="tool-btn" id="confirm-text" style="background: #00d4ff;">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Configure PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Application State
    const App = {
      pdfDoc: null,
      currentPage: 1,
      totalPages: 0,
      scale: 1.5,
      currentTool: null,
      currentColor: '#000000',
      brushSize: 3,
      opacity: 100,
      isDrawing: false,
      lastX: 0,
      lastY: 0,
      annotations: {},
      history: [],
      historyIndex: -1,
      rotation: {},
      fileName: '',
      originalFile: null
    };

    // DOM Elements
    const uploadScreen = document.getElementById('upload-screen');
    const editorScreen = document.getElementById('editor-screen');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const pdfCanvas = document.getElementById('pdf-canvas');
    const drawingCanvas = document.getElementById('drawing-canvas');
    const ctx = drawingCanvas.getContext('2d');

    // Helper Functions
    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      toast.style.background = isError ? '#ff4444' : '#00d4ff';
      toast.style.color = isError ? 'white' : '#1a1a2e';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function updateStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function saveToHistory() {
      // Trim history if we're not at the end
      App.history = App.history.slice(0, App.historyIndex + 1);
      // Save current annotations
      const snapshot = {};
      for (let key in App.annotations) {
        const canvas = document.createElement('canvas');
        canvas.width = App.annotations[key].width;
        canvas.height = App.annotations[key].height;
        const tempCtx = canvas.getContext('2d');
        tempCtx.putImageData(App.annotations[key], 0, 0);
        snapshot[key] = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
      }
      App.history.push({
        annotations: snapshot,
        rotation: { ...App.rotation }
      });
      App.historyIndex++;
    }

    function restoreFromHistory() {
      const state = App.history[App.historyIndex];
      if (!state) return;
      
      App.annotations = {};
      for (let key in state.annotations) {
        App.annotations[key] = state.annotations[key];
      }
      App.rotation = { ...state.rotation };
      
      renderCurrentPage();
    }

    function undo() {
      if (App.historyIndex > 0) {
        App.historyIndex--;
        restoreFromHistory();
        showToast('Undo successful');
      } else {
        showToast('Nothing to undo', true);
      }
    }

    function redo() {
      if (App.historyIndex < App.history.length - 1) {
        App.historyIndex++;
        restoreFromHistory();
        showToast('Redo successful');
      } else {
        showToast('Nothing to redo', true);
      }
    }

    async function renderCurrentPage() {
      if (!App.pdfDoc) return;
      
      const page = await App.pdfDoc.getPage(App.currentPage);
      const rotation = App.rotation[App.currentPage] || 0;
      let viewport = page.getViewport({ scale: App.scale });
      
      if (rotation) {
        viewport = page.getViewport({ scale: App.scale, rotation });
      }
      
      pdfCanvas.width = viewport.width;
      pdfCanvas.height = viewport.height;
      drawingCanvas.width = viewport.width;
      drawingCanvas.height = viewport.height;
      
      await page.render({
        canvasContext: pdfCanvas.getContext('2d'),
        viewport: viewport
      }).promise;
      
      // Restore annotations for this page
      if (App.annotations[App.currentPage]) {
        ctx.putImageData(App.annotations[App.currentPage], 0, 0);
      } else {
        ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
      }
      
      updatePageInfo();
    }

    async function renderThumbnails() {
      const container = document.getElementById('thumbnails');
      container.innerHTML = '';
      
      for (let i = 1; i <= App.totalPages; i++) {
        const page = await App.pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: 0.2 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        await page.render({
          canvasContext: canvas.getContext('2d'),
          viewport: viewport
        }).promise;
        
        const thumb = document.createElement('div');
        thumb.className = 'thumbnail' + (i === App.currentPage ? ' active' : '');
        thumb.appendChild(canvas);
        thumb.onclick = () => {
          App.currentPage = i;
          renderCurrentPage();
          renderThumbnails();
        };
        container.appendChild(thumb);
      }
    }

    function updatePageInfo() {
      document.getElementById('current-page').textContent = App.currentPage;
      document.getElementById('total-pages').textContent = App.totalPages;
      document.getElementById('prev-page').disabled = App.currentPage === 1;
      document.getElementById('next-page').disabled = App.currentPage === App.totalPages;
    }

    function saveAnnotations() {
      App.annotations[App.currentPage] = ctx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height);
      saveToHistory();
    }

    // Drawing Functions
    function startDrawing(e) {
      if (!App.currentTool || App.currentTool === 'text') return;
      
      App.isDrawing = true;
      const rect = drawingCanvas.getBoundingClientRect();
      const scaleX = drawingCanvas.width / rect.width;
      const scaleY = drawingCanvas.height / rect.height;
      
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      App.lastX = (clientX - rect.left) * scaleX;
      App.lastY = (clientY - rect.top) * scaleY;
      
      ctx.beginPath();
      ctx.moveTo(App.lastX, App.lastY);
      
      if (App.currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
      } else {
        ctx.globalCompositeOperation = 'source-over';
      }
      
      ctx.lineWidth = App.brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = App.currentColor;
      ctx.fillStyle = App.currentColor;
      ctx.globalAlpha = App.currentTool === 'highlight' ? 0.3 : App.opacity / 100;
      
      if (App.currentTool === 'draw' || App.currentTool === 'highlight') {
        ctx.lineTo(App.lastX, App.lastY);
        ctx.stroke();
      }
    }

    function draw(e) {
      if (!App.isDrawing || !App.currentTool || App.currentTool === 'text') return;
      
      const rect = drawingCanvas.getBoundingClientRect();
      const scaleX = drawingCanvas.width / rect.width;
      const scaleY = drawingCanvas.height / rect.height;
      
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      const currentX = (clientX - rect.left) * scaleX;
      const currentY = (clientY - rect.top) * scaleY;
      
      if (App.currentTool === 'eraser') {
        ctx.beginPath();
        ctx.arc(currentX, currentY, App.brushSize / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.lineTo(currentX, currentY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(currentX, currentY);
      }
      
      App.lastX = currentX;
      App.lastY = currentY;
    }

    function endDrawing() {
      if (App.isDrawing) {
        App.isDrawing = false;
        saveAnnotations();
        updateStatus('✓ Annotation saved');
      }
    }

    // Text Tool
    let pendingTextPosition = null;
    
    function openTextModal(x, y) {
      pendingTextPosition = { x, y };
      const modal = document.getElementById('text-modal');
      const input = document.getElementById('text-input');
      input.value = '';
      modal.classList.add('active');
      input.focus();
    }

    function addTextToCanvas() {
      if (!pendingTextPosition) return;
      
      const input = document.getElementById('text-input');
      const text = input.value.trim();
      
      if (text) {
        ctx.font = `${App.brushSize * 4}px "Inter", sans-serif`;
        ctx.fillStyle = App.currentColor;
        ctx.globalAlpha = App.opacity / 100;
        ctx.fillText(text, pendingTextPosition.x, pendingTextPosition.y);
        saveAnnotations();
        updateStatus('✓ Text added');
      }
      
      document.getElementById('text-modal').classList.remove('active');
      pendingTextPosition = null;
    }

    // PDF Handling
    async function loadPDF(file) {
      try {
        updateStatus('Loading PDF...');
        App.fileName = file.name;
        document.getElementById('file-name').textContent = file.name;
        document.getElementById('file-size').textContent = `${(file.size / 1024 / 1024).toFixed(2)} MB`;
        
        const arrayBuffer = await file.arrayBuffer();
        App.originalFile = arrayBuffer;
        App.pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        App.totalPages = App.pdfDoc.numPages;
        App.currentPage = 1;
        App.annotations = {};
        App.history = [];
        App.historyIndex = -1;
        App.rotation = {};
        
        await renderCurrentPage();
        await renderThumbnails();
        
        uploadScreen.style.display = 'none';
        editorScreen.style.display = 'flex';
        updateStatus('✓ PDF loaded successfully');
        showToast('PDF loaded! Start editing');
      } catch (error) {
        console.error(error);
        updateStatus('✗ Failed to load PDF');
        showToast('Failed to load PDF file', true);
      }
    }

    // Save PDF with annotations
    async function savePDF() {
      try {
        updateStatus('Preparing PDF for export...');
        showToast('Saving PDF with annotations...');
        
        // For now, we'll create a new PDF with the original content
        // In a full implementation, you'd merge annotations using jsPDF
        const blob = new Blob([App.originalFile], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `annotated_${App.fileName}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        updateStatus('✓ PDF saved successfully');
        showToast('PDF saved! (Annotations are preserved separately)');
      } catch (error) {
        console.error(error);
        updateStatus('✗ Failed to save PDF');
        showToast('Failed to save PDF', true);
      }
    }

    // Event Listeners
    function initEventListeners() {
      // File upload
      dropzone.addEventListener('click', () => fileInput.click());
      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('drag-over');
      });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') loadPDF(file);
        else showToast('Please upload a PDF file', true);
      });
      
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) loadPDF(e.target.files[0]);
      });
      
      document.getElementById('browse-btn').addEventListener('click', () => fileInput.click());
      document.getElementById('save-btn').addEventListener('click', savePDF);
      document.getElementById('new-btn').addEventListener('click', () => {
        uploadScreen.style.display = 'flex';
        editorScreen.style.display = 'none';
        App.pdfDoc = null;
      });
      
      // Tool selection
      document.querySelectorAll('[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          App.currentTool = btn.getAttribute('data-tool');
          updateStatus(`Tool: ${App.currentTool}`);
        });
      });
      
      // Undo/Redo
      document.getElementById('undo-btn').addEventListener('click', undo);
      document.getElementById('redo-btn').addEventListener('click', redo);
      document.getElementById('clear-btn').addEventListener('click', () => {
        ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        saveAnnotations();
        showToast('All annotations cleared');
      });
      
      // Rotation
      document.getElementById('rotate-left-btn').addEventListener('click', () => {
        App.rotation[App.currentPage] = (App.rotation[App.currentPage] || 0) - 90;
        renderCurrentPage();
        saveToHistory();
      });
      
      document.getElementById('rotate-right-btn').addEventListener('click', () => {
        App.rotation[App.currentPage] = (App.rotation[App.currentPage] || 0) + 90;
        renderCurrentPage();
        saveToHistory();
      });
      
      // Page navigation
      document.getElementById('prev-page').addEventListener('click', () => {
        if (App.currentPage > 1) {
          App.currentPage--;
          renderCurrentPage();
          renderThumbnails();
        }
      });
      
      document.getElementById('next-page').addEventListener('click', () => {
        if (App.currentPage < App.totalPages) {
          App.currentPage++;
          renderCurrentPage();
          renderThumbnails();
        }
      });
      
      // Color picker
      document.getElementById('color-palette').addEventListener('click', (e) => {
        const colorDiv = e.target.closest('.color-option');
        if (colorDiv) {
          document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
          colorDiv.classList.add('active');
          App.currentColor = colorDiv.dataset.color;
        }
      });
      
      // Brush settings
      document.getElementById('brush-size').addEventListener('input', (e) => {
        App.brushSize = parseInt(e.target.value);
        document.getElementById('brush-size-value').textContent = App.brushSize;
      });
      
      document.getElementById('opacity').addEventListener('input', (e) => {
        App.opacity = parseInt(e.target.value);
        document.getElementById('opacity-value').textContent = App.opacity;
      });
      
      // Drawing events
      drawingCanvas.addEventListener('mousedown', startDrawing);
      drawingCanvas.addEventListener('mousemove', draw);
      drawingCanvas.addEventListener('mouseup', endDrawing);
      drawingCanvas.addEventListener('mouseleave', endDrawing);
      
      // Touch events for mobile
      drawingCanvas.addEventListener('touchstart', startDrawing);
      drawingCanvas.addEventListener('touchmove', draw);
      drawingCanvas.addEventListener('touchend', endDrawing);
      
      // Text tool click
      drawingCanvas.addEventListener('click', (e) => {
        if (App.currentTool === 'text') {
          const rect = drawingCanvas.getBoundingClientRect();
          const scaleX = drawingCanvas.width / rect.width;
          const scaleY = drawingCanvas.height / rect.height;
          
          let clientX, clientY;
          if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
          } else {
            clientX = e.clientX;
            clientY = e.clientY;
          }
          
          const x = (clientX - rect.left) * scaleX;
          const y = (clientY - rect.top) * scaleY;
          openTextModal(x, y);
        }
      });
      
      // Text modal buttons
      document.getElementById('confirm-text').addEventListener('click', addTextToCanvas);
      document.getElementById('cancel-text').addEventListener('click', () => {
        document.getElementById('text-modal').classList.remove('active');
        pendingTextPosition = null;
      });
      
      document.getElementById('text-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTextToCanvas();
      });
    }
    
    // Initialize
    initEventListeners();
    updateStatus('✓ Ready - Upload a PDF to get started');
  </script>
</body>
</html>
