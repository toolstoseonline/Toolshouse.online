<body>

<div class="container">
<h1>🎵 MP3 Converter & Combiner</h1>

<input type="file" id="audioInput" multiple accept="audio/*"><br>

<button onclick="convertToMP3()" id="convertBtn">Convert to MP3</button>
<button onclick="combineToMP3()" id="combineBtn">Combine & Download MP3</button>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>

<p id="status"></p>

<script>
let isProcessing = false;

function updateProgress(percent){
    document.getElementById("progressBar").style.width = percent + "%";
}

function setProcessing(processing) {
    isProcessing = processing;
    document.getElementById("convertBtn").disabled = processing;
    document.getElementById("combineBtn").disabled = processing;
}

async function readFile(file){
    return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

async function convertToMP3(){
    if(isProcessing) return;
    
    const files = document.getElementById("audioInput").files;
    if(files.length === 0){
        alert("Please select audio file!");
        return;
    }

    setProcessing(true);
    document.getElementById("status").innerText = "Converting...";
    updateProgress(0);

    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const file = files[0];
        const arrayBuffer = await readFile(file);
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        await encodeMP3(audioBuffer);
    } catch (error) {
        alert("Error converting file: " + error.message);
        document.getElementById("status").innerText = "Conversion failed";
    } finally {
        setProcessing(false);
    }
}

async function combineToMP3(){
    if(isProcessing) return;
    
    const files = document.getElementById("audioInput").files;
    if(files.length < 2){
        alert("Select at least 2 files to combine!");
        return;
    }

    setProcessing(true);
    document.getElementById("status").innerText = "Combining files...";
    updateProgress(0);

    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let buffers = [];

        // Load all files
        for(let i=0;i<files.length;i++){
            document.getElementById("status").innerText = "Loading file " + (i+1) + "/" + files.length;
            const arrayBuffer = await readFile(files[i]);
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            buffers.push(audioBuffer);
            updateProgress((i/files.length)*30);
        }

        // Use the highest sample rate for output
        const sampleRate = Math.max(...buffers.map(b => b.sampleRate));
        const numberOfChannels = Math.max(...buffers.map(b => b.numberOfChannels));
        
        // Calculate total length
        let totalLength = 0;
        buffers.forEach(buffer => {
            totalLength += Math.ceil(buffer.length * sampleRate / buffer.sampleRate);
        });

        // Create output buffer
        const outputBuffer = audioContext.createBuffer(
            numberOfChannels,
            totalLength,
            sampleRate
        );

        // Combine buffers with resampling if needed
        let offset = 0;
        for(let i=0; i<buffers.length; i++) {
            const buffer = buffers[i];
            
            // Resample if necessary
            let sourceBuffer = buffer;
            if(buffer.sampleRate !== sampleRate) {
                sourceBuffer = await resampleAudioBuffer(buffer, sampleRate);
            }

            // Handle channel conversion if needed
            for(let channel=0; channel<numberOfChannels; channel++) {
                const channelData = outputBuffer.getChannelData(channel);
                const sourceChannel = sourceBuffer.getChannelData(
                    Math.min(channel, sourceBuffer.numberOfChannels - 1)
                );
                channelData.set(sourceChannel, offset);
            }
            
            offset += sourceBuffer.length;
            updateProgress(30 + ((i+1)/buffers.length)*40);
        }

        document.getElementById("status").innerText = "Encoding to MP3...";
        await encodeMP3(outputBuffer);
        
    } catch (error) {
        alert("Error combining files: " + error.message);
        document.getElementById("status").innerText = "Combination failed";
    } finally {
        setProcessing(false);
    }
}

// Helper function to resample audio buffer
async function resampleAudioBuffer(buffer, targetSampleRate) {
    const offlineCtx = new OfflineAudioContext(
        buffer.numberOfChannels,
        Math.ceil(buffer.duration * targetSampleRate),
        targetSampleRate
    );
    
    const source = offlineCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(offlineCtx.destination);
    source.start();
    
    return await offlineCtx.startRendering();
}

function encodeMP3(audioBuffer){
    return new Promise((resolve, reject) => {
        try {
            const mp3encoder = new lamejs.Mp3Encoder(
                audioBuffer.numberOfChannels,
                audioBuffer.sampleRate,
                128
            );

            let mp3Data = [];
            const samples = audioBuffer.getChannelData(0);
            const sampleBlockSize = 1152;

            for(let i=0; i<samples.length; i+=sampleBlockSize){
                const sampleChunk = samples.subarray(i, Math.min(i+sampleBlockSize, samples.length));
                const mp3buf = mp3encoder.encodeBuffer(
                    floatTo16BitPCM(sampleChunk)
                );
                if(mp3buf.length > 0){
                    mp3Data.push(mp3buf);
                }
                updateProgress(70 + (i/samples.length)*30);
            }

            const mp3buf = mp3encoder.flush();
            if(mp3buf.length > 0){
                mp3Data.push(mp3buf);
            }

            const blob = new Blob(mp3Data, {type:'audio/mp3'});
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "output.mp3";
            a.click();

            document.getElementById("status").innerText = "Download Ready!";
            updateProgress(100);
            
            // Clean up
            setTimeout(() => URL.revokeObjectURL(url), 100);
            resolve();
            
        } catch (error) {
            reject(error);
        }
    });
}

function floatTo16BitPCM(input){
    const output = new Int16Array(input.length);
    for(let i=0; i<input.length; i++){
        let s = Math.max(-1, Math.min(1, input[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return output;
}
