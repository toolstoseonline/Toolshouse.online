<style>
* {
    margin: 0;

body {

<body>

<div class="card">
    <h2>📄 PDF Compressor - Reduce PDF Size</h2>

    <div class="drop-area" id="dropArea">
        📂 Drag & Drop PDF Here<br>or Click to Upload
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>

    <div class="quality-control">
        <label>Compression Quality: <span id="qualityValue">75%</span></label>
        <input type="range" id="qualitySlider" min="10" max="100" value="75">
        <small>📉 Lower quality = smaller file size | 📈 Higher quality = better clarity</small>
    </div>

    <button id="compressBtn">🗜️ Compress PDF</button>

    <div class="loader" id="loader">
        <div></div>
        <p style="margin-top: 10px; color: #764ba2;">Processing...</p>
    </div>

    <div class="preview" id="preview"></div>
    
    <footer>
        <p>🔒 100% Client-side processing - Your files never leave your device</p>
        <p style="margin-top: 5px;">© 2024 Tools House Online - Free PDF Compressor</p>
    </footer>
</div>

<script>
// Configure PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

// DOM Elements
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const compressBtn = document.getElementById("compressBtn");
const loader = document.getElementById("loader");
const qualitySlider = document.getElementById("qualitySlider");
const qualityValue = document.getElementById("qualityValue");

let selectedFile = null;
let isCompressing = false;

qualitySlider.addEventListener("input", (e) => {
    qualityValue.textContent = e.target.value + "%";
});

dropArea.addEventListener("click", () => fileInput.click());

dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.style.background = "#f3f0ff";
    dropArea.style.borderColor = "#667eea";
});

dropArea.addEventListener("dragleave", () => {
    dropArea.style.background = "#faf8ff";
    dropArea.style.borderColor = "#764ba2";
});

dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.style.background = "#faf8ff";
    dropArea.style.borderColor = "#764ba2";
    const file = e.dataTransfer.files[0];
    if (file && file.type === "application/pdf") {
        handleFile(file);
    } else {
        showMessage("⚠️ Please upload a valid PDF file.", "error");
    }
});

fileInput.addEventListener("change", (e) => {
    if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
    }
});

function showMessage(msg, type = "info") {
    // Remove existing message
    const existingMsg = document.querySelector(".file-info");
    if (existingMsg) existingMsg.remove();
    
    const msgDiv = document.createElement("div");
    msgDiv.className = "file-info";
    msgDiv.style.background = type === "error" ? "#fee" : "#f0f0f0";
    msgDiv.style.color = type === "error" ? "#c33" : "#666";
    msgDiv.innerHTML = msg;
    preview.appendChild(msgDiv);
    
    setTimeout(() => {
        if (msgDiv.parentNode) msgDiv.remove();
    }, 5000);
}

function handleFile(file) {
    if (!file || file.type !== "application/pdf") {
        showMessage("❌ Please upload a valid PDF file.", "error");
        return;
    }
    
    if (file.size > 50 * 1024 * 1024) {
        showMessage("⚠️ File too large (max 50MB). Please upload a smaller PDF.", "error");
        return;
    }
    
    selectedFile = file;
    
    // Clear previous preview
    const existingCanvas = preview.querySelectorAll("canvas");
    existingCanvas.forEach(canvas => canvas.remove());
    
    // Show file info
    const fileSizeKB = (file.size / 1024).toFixed(2);
    const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
    const sizeDisplay = file.size > 1024 * 1024 ? `${fileSizeMB} MB` : `${fileSizeKB} KB`;
    
    const fileInfo = document.createElement("div");
    fileInfo.className = "file-info";
    fileInfo.innerHTML = `📄 ${file.name}<br>📊 Size: ${sizeDisplay}`;
    preview.appendChild(fileInfo);
    
    // Preview first page
    previewPDF(file);
}

async function previewPDF(file) {
    try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer, useSystemFonts: true }).promise;
        
        const existingCanvas = preview.querySelectorAll("canvas");
        existingCanvas.forEach(canvas => canvas.remove());
        
        // Show first page preview only (for performance)
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 0.5 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        canvas.style.maxWidth = "100%";
        canvas.style.height = "auto";
        
        // Insert after file info
        const fileInfoDiv = preview.querySelector(".file-info");
        if (fileInfoDiv) {
            fileInfoDiv.after(canvas);
        } else {
            preview.appendChild(canvas);
        }
        
        await page.render({
            canvasContext: context,
            viewport: viewport,
            background: "white"
        }).promise;
        
        const pageInfo = document.createElement("div");
        pageInfo.style.fontSize = "12px";
        pageInfo.style.color = "#888";
        pageInfo.style.marginTop = "5px";
        pageInfo.textContent = `📑 Total pages: ${pdf.numPages}`;
        canvas.after(pageInfo);
        
    } catch (error) {
        console.error("Preview error:", error);
        showMessage("⚠️ Preview not available, but compression will work.", "info");
    }
}

compressBtn.addEventListener("click", async () => {
    if (isCompressing) {
        showMessage("⏳ Compression in progress. Please wait.", "info");
        return;
    }
    
    if (!selectedFile) {
        showMessage("📁 Please upload a PDF file first.", "error");
        return;
    }

    if (selectedFile.size > 50 * 1024 * 1024) {
        showMessage("⚠️ File too large (max 50MB).", "error");
        return;
    }

    isCompressing = true;
    loader.style.display = "block";
    compressBtn.disabled = true;
    compressBtn.textContent = "⏳ Compressing...";

    try {
        const arrayBuffer = await selectedFile.arrayBuffer();
        const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer, useSystemFonts: true }).promise;
        const { PDFDocument } = PDFLib;
        
        const newPdfDoc = await PDFDocument.create();
        
        const quality = qualitySlider.value / 100;
        const totalPages = pdfDoc.numPages;
        
        // Determine scale based on quality
        let baseScale = 1.2;
        if (quality > 0.7) baseScale = 1.5;
        else if (quality > 0.4) baseScale = 1.2;
        else baseScale = 0.8;
        
        // Process pages in batches to avoid memory issues
        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
            // Update progress in console
            if (pageNum % 5 === 0 || pageNum === totalPages) {
                console.log(`Processing page ${pageNum} of ${totalPages}...`);
            }
            
            const page = await pdfDoc.getPage(pageNum);
            const originalViewport = page.getViewport({ scale: 1.0 });
            const originalWidth = originalViewport.width;
            const originalHeight = originalViewport.height;
            
            // Adjust scale for large pages
            let scale = baseScale;
            if (originalWidth > 2000 || originalHeight > 3000) {
                scale = Math.min(baseScale, 0.8);
            }
            
            const viewport = page.getViewport({ scale: scale });
            
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d", { alpha: false });
            
            canvas.width = Math.floor(viewport.width);
            canvas.height = Math.floor(viewport.height);
            
            // Render with white background
            context.fillStyle = "white";
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            try {
                await page.render({
                    canvasContext: context,
                    viewport: viewport,
                    background: "white",
                    intent: "display"
                }).promise;
            } catch (renderErr) {
                console.warn(`Render fallback for page ${pageNum}`);
            }
            
            // Convert to JPEG
            const imgData = canvas.toDataURL("image/jpeg", quality);
            
            let embeddedImage;
            try {
                embeddedImage = await newPdfDoc.embedJpg(imgData);
            } catch (embedErr) {
                // Fallback to PNG
                const pngData = canvas.toDataURL("image/png");
                embeddedImage = await newPdfDoc.embedPng(pngData);
            }
            
            // Add page with original dimensions
            const newPage = newPdfDoc.addPage([originalWidth, originalHeight]);
            newPage.drawImage(embeddedImage, {
                x: 0,
                y: 0,
                width: originalWidth,
                height: originalHeight
            });
            
            // Small delay to keep UI responsive
            if (pageNum % 3 === 0) {
                await new Promise(resolve => setTimeout(resolve, 10));
            }
        }
        
        const pdfBytes = await newPdfDoc.save();
        
        // Download compressed file
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const downloadUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = downloadUrl;
        
        let originalName = selectedFile.name;
        if (!originalName.toLowerCase().endsWith(".pdf")) {
            originalName += ".pdf";
        }
        link.download = "compressed_" + originalName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setTimeout(() => URL.revokeObjectURL(downloadUrl), 100);
        
        // Calculate compression stats
        const originalSizeKB = (selectedFile.size / 1024).toFixed(2);
        const compressedSizeKB = (pdfBytes.length / 1024).toFixed(2);
        const reductionPercent = ((1 - pdfBytes.length / selectedFile.size) * 100).toFixed(1);
        const savedKB = (selectedFile.size - pdfBytes.length) / 1024;
        
        // Show stats
        let statsHtml = `
            <div class="compression-stats">
                <strong>📊 Compression Results:</strong><br>
                📄 Original: ${originalSizeKB} KB<br>
                📦 Compressed: ${compressedSizeKB} KB<br>
                💾 Saved: ${savedKB.toFixed(2)} KB<br>
                📉 Reduction: ${reductionPercent}%
            </div>
        `;
        
        const existingStats = preview.querySelector(".compression-stats");
        if (existingStats) existingStats.remove();
        
        const statsDiv = document.createElement("div");
        statsDiv.innerHTML = statsHtml;
        preview.appendChild(statsDiv);
        
        let message = `✅ Compression Complete!\n\n📄 Original: ${originalSizeKB} KB\n📦 Compressed: ${compressedSizeKB} KB\n📉 Reduction: ${reductionPercent}%`;
        
        if (reductionPercent < 0) {
            message += `\n\n⚠️ The compressed file is slightly larger. Try lowering the quality slider.`;
        } else if (reductionPercent > 50) {
            message += `\n\n🎉 Excellent! File size reduced by over 50%!`;
        } else if (reductionPercent > 25) {
            message += `\n\n✓ Good compression achieved.`;
        } else {
            message += `\n\nℹ️ Try lowering quality for more compression.`;
        }
        
        alert(message);
        
        compressBtn.disabled = false;
        compressBtn.textContent = "🗜️ Compress PDF";
        loader.style.display = "none";
        isCompressing = false;
        
    } catch (error) {
        console.error("Compression error:", error);
        
        let errorMessage = "Error compressing PDF: ";
        if (error.message) {
            if (error.message.includes("Out of memory")) {
                errorMessage = "PDF is too large to compress in browser. Try a smaller file or lower resolution.";
            } else if (error.message.includes("Invalid PDF")) {
                errorMessage = "The PDF file appears to be corrupted or encrypted. Please try a different file.";
            } else if (error.message.includes("password")) {
                errorMessage = "This PDF is password protected. Please unlock it first.";
            } else {
                errorMessage += error.message;
            }
        } else {
            errorMessage += "Unknown error occurred.";
        }
        
        alert(errorMessage + "\n\n💡 Tip: Try using a lower quality setting.");
        
        compressBtn.disabled = false;
        compressBtn.textContent = "🗜️ Compress PDF";
        loader.style.display = "none";
        isCompressing = false;
    }
});

// Clean up on page unload
window.addEventListener("beforeunload", () => {
    if (selectedFile) {
        selectedFile = null;
    }
});

console.log("PDF Compressor ready - Tools House Online");
</script>
</body>
