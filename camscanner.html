<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CamScanner </title>
   <meta name="description" content="Scan documents online for free. Turn photos into high-quality PDFs with edge detection, shadow removal, and perspective correction. No app download,">
<meta name="keywords" content="CamScanner, scan documents, document scanner, mobile scanner">
    <link rel="canonical" href="https://www.toolshouse.online/camscanner.html">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-user-select:none;user-select:none}
body{font-family:'Outfit',sans-serif}
.app-root{height:100%;width:100%;overflow-y:auto;overflow-x:hidden}
.crop-handle{width:32px;height:32px;background:#00e676;border:3px solid #fff;border-radius:50%;position:absolute;cursor:grab;z-index:20;touch-action:none;box-shadow:0 2px 12px rgba(0,230,118,.5);transition:transform .1s}
.crop-handle:hover{transform:scale(1.15)}
.crop-handle:active{cursor:grabbing;transform:scale(1.3)}
.crop-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}
.crop-line{stroke:#00e676;stroke-width:2.5;fill:none;filter:drop-shadow(0 0 4px rgba(0,230,118,.7))}
.scan-line{position:absolute;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,#00e676,transparent);animation:scanMove 2s ease-in-out infinite;z-index:5;pointer-events:none;box-shadow:0 0 8px rgba(0,230,118,.4)}
@keyframes scanMove{0%{top:10%}50%{top:85%}100%{top:10%}}
.pulse-ring{animation:pulse 1.5s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.8);opacity:0}}
.btn-capture{width:80px;height:80px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.3);position:relative;cursor:pointer;transition:transform .15s;box-shadow:0 0 20px rgba(0,230,118,.3)}
.btn-capture:active{transform:scale(.85)}
.btn-capture::after{content:'';position:absolute;inset:8px;border-radius:50%;background:#fff}
.btn-capture:active::after{background:#e0e0e0}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:999px;color:#fff;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;animation:toastSlide .3s ease-out}
.toast.show{opacity:1}
@keyframes toastSlide{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.filter-btn{padding:8px 16px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;white-space:nowrap}
.filter-btn.active{border-color:#00e676;color:#00e676;background:rgba(0,230,118,.1)}
.control-btn{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
.control-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.2)}
.control-btn:active{transform:scale(.9)}
@media (max-width:480px){.btn-capture{width:70px;height:70px;border-width:4px}.crop-handle{width:28px;height:28px}.control-btn{width:44px;height:44px}}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="bg-gray-950 text-white">
  <div class="app-root" id="appRoot">
   <!-- SCREEN 1: HOME -->
   <div id="screenHome" class="h-full w-full flex flex-col items-center justify-center relative" style="background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%)">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(0,230,118,.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(0,150,255,.05),transparent 50%)"></div>
    <div class="relative z-10 flex flex-col items-center gap-6 px-6 text-center">
     <div class="relative">
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center shadow-lg shadow-emerald-500/20">
       <i data-lucide="scan" style="width:40px;height:40px;color:#fff"></i>
      </div>
     </div>
     <h1 id="mainTitle" class="text-3xl font-bold tracking-tight">CamScanner Pro</h1>
     <p class="text-gray-400 text-sm max-w-xs">Scan documents, detect pages automatically, crop &amp; export as PDF, JPG or PNG</p><button onclick="startCamera()" class="mt-4 px-8 py-3.5 rounded-2xl font-semibold text-base flex items-center gap-2 transition-all hover:scale-105 active:scale-95" style="background:linear-gradient(135deg,#00e676,#00bfa5);color:#0a0a0a"> <i data-lucide="camera" style="width:20px;height:20px"></i> Start Scanning </button> <button onclick="pickFile()" class="px-6 py-2.5 rounded-xl font-medium text-sm flex items-center gap-2 border border-gray-700 text-gray-300 hover:border-gray-500 transition-all"> <i data-lucide="image" style="width:18px;height:18px"></i> Import from Gallery </button> <input type="file" id="filePicker" accept="image/*" class="hidden" onchange="handleFilePick(event)">
    </div>
   </div><!-- SCREEN 2: CAMERA -->
   <div id="screenCamera" class="h-full w-full flex flex-col hidden" style="background:#000">
    <div class="flex items-center justify-between px-4 py-3 bg-black/80 backdrop-blur-sm z-30 relative">
     <button onclick="stopCamera();showScreen('Home')" class="p-2 rounded-full hover:bg-white/10"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button> <span class="font-semibold text-sm tracking-wide">CAMERA</span> <button onclick="toggleFlash()" id="flashBtn" class="p-2 rounded-full hover:bg-white/10"><i data-lucide="zap-off" style="width:20px;height:20px"></i></button>
    </div>
    <div class="flex-1 relative overflow-hidden flex items-center justify-center">
     <video id="camVideo" autoplay playsinline class="w-full h-full object-cover"></video>
     <div id="scanLineEl" class="scan-line hidden"></div>
     <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>
    </div>
    <div class="flex items-center justify-around py-5 bg-black/80 backdrop-blur-sm relative z-10">
     <button onclick="toggleAutoDetect()" id="autoDetectBtn" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition"> <i data-lucide="maximize" style="width:22px;height:22px;color:#00e676"></i> <span class="text-xs text-gray-300" id="autoLabel">Auto</span> </button>
     <div class="relative">
      <div class="absolute inset-0 rounded-full bg-emerald-400/30 pulse-ring"></div><button class="btn-capture" onclick="capturePhoto()"></button>
     </div><button onclick="switchCameraFacing()" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition"> <i data-lucide="refresh-cw" style="width:22px;height:22px"></i> <span class="text-xs text-gray-300">Flip</span> </button>
    </div>
   </div><!-- SCREEN 3: CROP -->
   <div id="screenCrop" class="h-full w-full flex flex-col hidden" style="background:#111">
    <div class="flex items-center justify-between px-4 py-3 bg-black/80 backdrop-blur-sm z-30 relative">
     <button onclick="showScreen('Camera');startCamera()" class="p-2 rounded-full hover:bg-white/10"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button> <span class="font-semibold text-sm tracking-wide">CROP &amp; ADJUST</span> <button onclick="applyCrop()" class="px-4 py-1.5 rounded-xl text-sm font-semibold" style="background:#00e676;color:#0a0a0a">Done</button>
    </div>
    <div class="flex gap-3 px-4 py-2 overflow-x-auto">
     <button onclick="autoCrop()" class="filter-btn bg-white/5 text-gray-300 hover:text-white flex items-center gap-1.5"><i data-lucide="cpu" style="width:14px;height:14px"></i>Auto Crop</button> <button onclick="resetCrop()" class="filter-btn bg-white/5 text-gray-300 hover:text-white flex items-center gap-1.5"><i data-lucide="rotate-ccw" style="width:14px;height:14px"></i>Reset</button>
    </div>
    <div class="flex-1 relative overflow-hidden flex items-center justify-center p-4" id="cropArea">
     <canvas id="cropCanvas" class="max-w-full max-h-full" style="touch-action:none"></canvas>
     <div id="cropHandles"></div>
     <svg id="cropSvg" class="crop-overlay" style="position:absolute;inset:0;width:100%;height:100%"></svg>
    </div>
   </div><!-- SCREEN 4: EDIT / EXPORT -->
   <div id="screenEdit" class="h-full w-full flex flex-col hidden" style="background:#111">
    <div class="flex items-center justify-between px-4 py-3 bg-black/80 backdrop-blur-sm z-30 relative">
     <button onclick="showScreen('Crop')" class="p-2 rounded-full hover:bg-white/10"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button> <span class="font-semibold text-sm tracking-wide">PREVIEW &amp; EXPORT</span>
     <div class="w-10"></div>
    </div>
    <div class="flex gap-2 px-4 py-2 overflow-x-auto">
     <button onclick="applyFilter('none')" class="filter-btn bg-white/5 text-gray-300 active" data-filter="none">Original</button> <button onclick="applyFilter('grayscale')" class="filter-btn bg-white/5 text-gray-300" data-filter="grayscale">B&amp;W</button> <button onclick="applyFilter('contrast')" class="filter-btn bg-white/5 text-gray-300" data-filter="contrast">High Contrast</button> <button onclick="applyFilter('bright')" class="filter-btn bg-white/5 text-gray-300" data-filter="bright">Brighten</button> <button onclick="applyFilter('sepia')" class="filter-btn bg-white/5 text-gray-300" data-filter="sepia">Sepia</button>
    </div>
    <div class="flex-1 flex items-center justify-center p-4 overflow-hidden">
     <canvas id="editCanvas" class="max-w-full max-h-full rounded-lg shadow-2xl"></canvas>
    </div>
    <div class="grid grid-cols-3 gap-3 px-4 py-4">
     <button onclick="exportAs('pdf')" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl font-semibold text-sm transition hover:scale-105 active:scale-95" style="background:linear-gradient(135deg,#e53935,#d32f2f);color:#fff"> <i data-lucide="file-text" style="width:22px;height:22px"></i>PDF </button> <button onclick="exportAs('jpg')" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl font-semibold text-sm transition hover:scale-105 active:scale-95" style="background:linear-gradient(135deg,#fb8c00,#f57c00);color:#fff"> <i data-lucide="image" style="width:22px;height:22px"></i>JPG </button> <button onclick="exportAs('png')" class="flex flex-col items-center gap-1.5 py-3 rounded-2xl font-semibold text-sm transition hover:scale-105 active:scale-95" style="background:linear-gradient(135deg,#00b0ff,#0091ea);color:#fff"> <i data-lucide="download" style="width:22px;height:22px"></i>PNG </button>
    </div>
   </div>
   <div id="toast" class="toast" style="background:#00e676;color:#0a0a0a"></div>
  </div>
  <script>
// === STATE ===
let stream = null, facing = 'environment', flashOn = false, autoDetect = true;
let capturedImg = null, croppedImg = null, currentFilter = 'none';
let cropPoints = []; // [{x,y},...] relative to canvas display
let dragIdx = -1;
let cropCanvasImg = null;

// === CONFIG ===
const defaultConfig = {
  app_title: 'CamScanner Pro',
  background_color: '#0a0a0a',
  surface_color: '#1a1a2e',
  text_color: '#ffffff',
  primary_action: '#00e676',
  secondary_action: '#6b7280'
};

function applyConfig(c) {
  const t = c.app_title || defaultConfig.app_title;
  const el = document.getElementById('mainTitle');
  if (el) el.textContent = t;
  document.title = t;

  document.body.style.color = c.text_color || defaultConfig.text_color;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v})} },
        { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v})} },
        { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v})} },
        { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({primary_action:v})} },
        { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({secondary_action:v})} },
      ],
      borderables: [],
      fontEditable: undefined,
      fontSizeable: undefined
    }),
    mapToEditPanelValues: (config) => new Map([
      ['app_title', config.app_title || defaultConfig.app_title]
    ])
  });
}

// === SCREENS ===
function showScreen(name) {
  ['Home','Camera','Crop','Edit'].forEach(s => {
    document.getElementById('screen'+s).classList.toggle('hidden', s !== name);
  });
  lucide.createIcons();
}

// === CAMERA ===
async function startCamera() {
  showScreen('Camera');
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    document.getElementById('camVideo').srcObject = stream;
    document.getElementById('scanLineEl').classList.toggle('hidden', !autoDetect);
  } catch(e) {
    showToast('Camera access denied');
    showScreen('Home');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('camVideo').srcObject = null;
}

function switchCameraFacing() {
  facing = facing === 'environment' ? 'user' : 'environment';
  startCamera();
}

function toggleFlash() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  if (track.getCapabilities && track.getCapabilities().torch) {
    flashOn = !flashOn;
    track.applyConstraints({advanced:[{torch:flashOn}]});
    document.getElementById('flashBtn').innerHTML = flashOn
      ? '<i data-lucide="zap" style="width:20px;height:20px;color:#00e676"></i>'
      : '<i data-lucide="zap-off" style="width:20px;height:20px"></i>';
    lucide.createIcons();
  } else {
    showToast('Flash not available');
  }
}

function toggleAutoDetect() {
  autoDetect = !autoDetect;
  document.getElementById('autoLabel').textContent = autoDetect ? 'Auto' : 'Manual';
  document.getElementById('scanLineEl').classList.toggle('hidden', !autoDetect);
}

// === CAPTURE ===
function capturePhoto() {
  const video = document.getElementById('camVideo');
  const c = document.createElement('canvas');
  c.width = video.videoWidth || 1280;
  c.height = video.videoHeight || 720;
  c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
  capturedImg = new Image();
  capturedImg.onload = () => { stopCamera(); initCropScreen(); };
  capturedImg.src = c.toDataURL('image/jpeg', 0.95);
}

function pickFile() { document.getElementById('filePicker').click(); }
function handleFilePick(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    capturedImg = new Image();
    capturedImg.onload = () => initCropScreen();
    capturedImg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// === CROP ===
function initCropScreen() {
  showScreen('Crop');
  const canvas = document.getElementById('cropCanvas');
  const area = document.getElementById('cropArea');
  const aw = area.clientWidth - 32, ah = area.clientHeight - 16;
  const scale = Math.min(aw / capturedImg.width, ah / capturedImg.height, 1);
  canvas.width = capturedImg.width * scale;
  canvas.height = capturedImg.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(capturedImg, 0, 0, canvas.width, canvas.height);
  cropCanvasImg = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // Default crop: 8% inset
  const m = 0.08;
  cropPoints = [
    {x: canvas.width*m, y: canvas.height*m},
    {x: canvas.width*(1-m), y: canvas.height*m},
    {x: canvas.width*(1-m), y: canvas.height*(1-m)},
    {x: canvas.width*m, y: canvas.height*(1-m)}
  ];

  if (autoDetect) autoCrop();
  drawCropUI();
  setupCropDrag();
}

function autoCrop() {
  // Simple edge detection: find content bounds
  const canvas = document.getElementById('cropCanvas');
  const ctx = canvas.getContext('2d');
  ctx.putImageData(cropCanvasImg, 0, 0);
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const w = canvas.width, h = canvas.height;
  let minX = w, minY = h, maxX = 0, maxY = 0;
  const threshold = 30;

  for (let y = 0; y < h; y += 4) {
    for (let x = 0; x < w; x += 4) {
      const i = (y * w + x) * 4;
      const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
      if (brightness < 240) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  const pad = 6;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w, maxX + pad);
  maxY = Math.min(h, maxY + pad);

  if (maxX - minX > 20 && maxY - minY > 20) {
    cropPoints = [
      {x: minX, y: minY}, {x: maxX, y: minY},
      {x: maxX, y: maxY}, {x: minX, y: maxY}
    ];
  }
  drawCropUI();
  showToast('Auto crop applied');
}

function resetCrop() {
  const canvas = document.getElementById('cropCanvas');
  const m = 0.08;
  cropPoints = [
    {x: canvas.width*m, y: canvas.height*m},
    {x: canvas.width*(1-m), y: canvas.height*m},
    {x: canvas.width*(1-m), y: canvas.height*(1-m)},
    {x: canvas.width*m, y: canvas.height*(1-m)}
  ];
  drawCropUI();
}

function drawCropUI() {
  const canvas = document.getElementById('cropCanvas');
  const rect = canvas.getBoundingClientRect();
  const area = document.getElementById('cropArea');
  const areaRect = area.getBoundingClientRect();
  const ox = rect.left - areaRect.left, oy = rect.top - areaRect.top;

  // Redraw image
  const ctx = canvas.getContext('2d');
  ctx.putImageData(cropCanvasImg, 0, 0);
  // Dim outside
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Clear inside crop
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cropPoints[0].x, cropPoints[0].y);
  for (let i = 1; i < 4; i++) ctx.lineTo(cropPoints[i].x, cropPoints[i].y);
  ctx.closePath();
  ctx.clip();
  ctx.putImageData(cropCanvasImg, 0, 0);
  ctx.restore();

  // SVG lines
  const svg = document.getElementById('cropSvg');
  const pts = cropPoints.map(p => `${ox+p.x},${oy+p.y}`);
  svg.innerHTML = `<polygon points="${pts.join(' ')}" class="crop-line"/>`;

  // Handles
  const hc = document.getElementById('cropHandles');
  hc.innerHTML = '';
  cropPoints.forEach((p, i) => {
    const h = document.createElement('div');
    h.className = 'crop-handle';
    h.style.left = (ox + p.x - 14) + 'px';
    h.style.top = (oy + p.y - 14) + 'px';
    h.dataset.idx = i;
    hc.appendChild(h);
  });
}

function setupCropDrag() {
  const area = document.getElementById('cropArea');
  const canvas = document.getElementById('cropCanvas');

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function onStart(e) {
    const t = e.target;
    if (t.classList.contains('crop-handle')) {
      dragIdx = parseInt(t.dataset.idx);
      e.preventDefault();
    }
  }
  function onMove(e) {
    if (dragIdx < 0) return;
    e.preventDefault();
    const pos = getPos(e);
    cropPoints[dragIdx] = {
      x: Math.max(0, Math.min(canvas.width, pos.x)),
      y: Math.max(0, Math.min(canvas.height, pos.y))
    };
    drawCropUI();
  }
  function onEnd() { dragIdx = -1; }

  area.addEventListener('mousedown', onStart);
  area.addEventListener('mousemove', onMove);
  area.addEventListener('mouseup', onEnd);
  area.addEventListener('touchstart', onStart, {passive:false});
  area.addEventListener('touchmove', onMove, {passive:false});
  area.addEventListener('touchend', onEnd);
}

function applyCrop() {
  // Extract cropped region
  const sx = Math.min(...cropPoints.map(p=>p.x)), sy = Math.min(...cropPoints.map(p=>p.y));
  const ex = Math.max(...cropPoints.map(p=>p.x)), ey = Math.max(...cropPoints.map(p=>p.y));
  const canvas = document.getElementById('cropCanvas');
  const scaleX = capturedImg.width / canvas.width;
  const scaleY = capturedImg.height / canvas.height;

  const cw = (ex-sx)*scaleX, ch = (ey-sy)*scaleY;
  const tc = document.createElement('canvas');
  tc.width = cw; tc.height = ch;
  tc.getContext('2d').drawImage(capturedImg, sx*scaleX, sy*scaleY, cw, ch, 0, 0, cw, ch);

  croppedImg = new Image();
  croppedImg.onload = () => { currentFilter = 'none'; showEditScreen(); };
  croppedImg.src = tc.toDataURL('image/jpeg', 0.95);
}

// === EDIT ===
function showEditScreen() {
  showScreen('Edit');
  renderEdit();
}

function renderEdit() {
  const canvas = document.getElementById('editCanvas');
  const area = canvas.parentElement;
  const aw = area.clientWidth - 32, ah = area.clientHeight - 32;
  const scale = Math.min(aw / croppedImg.width, ah / croppedImg.height, 1);
  canvas.width = croppedImg.width * scale;
  canvas.height = croppedImg.height * scale;
  const ctx = canvas.getContext('2d');

  ctx.filter = getFilterCSS(currentFilter);
  ctx.drawImage(croppedImg, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
}

function getFilterCSS(f) {
  switch(f) {
    case 'grayscale': return 'grayscale(100%) contrast(1.1)';
    case 'contrast': return 'contrast(1.6) brightness(1.05)';
    case 'bright': return 'brightness(1.3)';
    case 'sepia': return 'sepia(0.8) contrast(1.1)';
    default: return 'none';
  }
}

function applyFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderEdit();
}

// === EXPORT ===
function getExportCanvas() {
  const c = document.createElement('canvas');
  c.width = croppedImg.width; c.height = croppedImg.height;
  const ctx = c.getContext('2d');
  ctx.filter = getFilterCSS(currentFilter);
  ctx.drawImage(croppedImg, 0, 0);
  ctx.filter = 'none';
  return c;
}

function exportAs(type) {
  const c = getExportCanvas();
  if (type === 'pdf') {
    const { jsPDF } = window.jspdf;
    const orient = c.width > c.height ? 'l' : 'p';
    const pdf = new jsPDF(orient, 'px', [c.width, c.height]);
    pdf.addImage(c.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, c.width, c.height);
    pdf.save('scan.pdf');
    showToast('PDF saved!');
  } else if (type === 'jpg') {
    downloadURI(c.toDataURL('image/jpeg', 0.92), 'scan.jpg');
    showToast('JPG saved!');
  } else {
    downloadURI(c.toDataURL('image/png'), 'scan.png');
    showToast('PNG saved!');
  }
}

function downloadURI(uri, name) {
  const a = document.createElement('a');
  a.href = uri; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

lucide.createIcons();
