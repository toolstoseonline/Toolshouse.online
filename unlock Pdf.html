<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tools</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #e0ddd6;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 14px;
    color: #888;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    background: #f5f4f0;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 2rem;
  }

  .tab {
    flex: 1;
    padding: 9px 12px;
    border: none;
    background: transparent;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 400;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab.active {
    background: #fff;
    color: #1a1a1a;
    font-weight: 500;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .tab-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed #d0cec8;
    border-radius: 12px;
    padding: 2rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 1.25rem;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #6c63ff;
    background: #f9f8ff;
  }

  .drop-zone.has-file {
    border-color: #22c55e;
    background: #f0fdf4;
  }

  .drop-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto 10px;
    color: #aaa;
  }

  .drop-title {
    font-size: 14px;
    font-weight: 500;
    color: #444;
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 12px;
    color: #aaa;
  }

  .file-name {
    font-size: 13px;
    color: #22c55e;
    font-weight: 500;
    margin-top: 6px;
    word-break: break-all;
  }

  input[type="file"] { display: none; }

  /* Password input */
  .field {
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }

  .field input[type="text"],
  .field input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    border: 0.5px solid #d0cec8;
    border-radius: 8px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: #6c63ff;
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 11px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover { background: #333; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Status */
  .status {
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .status.error {
    display: flex;
    background: #fff1f1;
    color: #c0392b;
    border: 0.5px solid #fcd5d5;
  }

  .status.success {
    display: flex;
    background: #f0fdf4;
    color: #166534;
    border: 0.5px solid #bbf7d0;
  }

  .status.loading {
    display: flex;
    background: #f5f4f0;
    color: #555;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #ccc;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  /* Image preview strip */
  .preview-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .preview-thumb {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 6px;
    border: 0.5px solid #e0ddd6;
  }

  .preview-count {
    width: 56px;
    height: 56px;
    border-radius: 6px;
    background: #f5f4f0;
    border: 0.5px solid #e0ddd6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #888;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>PDF Tools</h1>
    <p>Lock or convert — nothing else</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('lock')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Lock PDF
    </button>
    <button class="tab" onclick="switchTab('convert')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
      Convert to PDF
    </button>
  </div>

  <!-- ── Lock Panel ── -->
  <div id="panel-lock" class="panel active">
    <!-- Drop zone for PDF -->
    <div class="drop-zone" id="lock-zone" onclick="document.getElementById('lock-file').click()"
         ondragover="onDrag(event,'lock-zone')" ondragleave="offDrag('lock-zone')"
         ondrop="onDrop(event,'lock-file','lock-zone',['application/pdf'])">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <div class="drop-title">Drop your PDF here</div>
      <div class="drop-sub">or click to browse</div>
      <div class="file-name" id="lock-fname"></div>
    </div>
    <input type="file" id="lock-file" accept=".pdf,application/pdf"
           onchange="onFileSelect(this,'lock-zone','lock-fname')">

    <!-- Password field -->
    <div class="field">
      <label for="lock-pass">Password</label>
      <input type="password" id="lock-pass" placeholder="Enter a strong password">
    </div>

    <button class="btn" onclick="runLock()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Lock & Download
    </button>

    <div class="status" id="lock-status"></div>
  </div>

  <!-- ── Convert Panel ── -->
  <div id="panel-convert" class="panel">
    <!-- Drop zone for images -->
    <div class="drop-zone" id="conv-zone" onclick="document.getElementById('conv-file').click()"
         ondragover="onDrag(event,'conv-zone')" ondragleave="offDrag('conv-zone')"
         ondrop="onDrop(event,'conv-file','conv-zone',['image/jpeg','image/png','image/webp'])">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <div class="drop-title">Drop images here</div>
      <div class="drop-sub">JPG or PNG — multiple files OK</div>
    </div>
    <input type="file" id="conv-file" accept="image/*" multiple
           onchange="onImagesSelect(this)">

    <!-- Thumbnail preview -->
    <div class="preview-strip" id="conv-preview"></div>

    <button class="btn" onclick="runConvert()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      Convert & Download
    </button>

    <div class="status" id="conv-status"></div>
  </div>
</div>

<script>
// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['lock','convert'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ─── Drag-and-drop helpers ────────────────────────────────────────────────────
function onDrag(e, zoneId) {
  e.preventDefault();
  document.getElementById(zoneId).classList.add('drag-over');
}
function offDrag(zoneId) {
  document.getElementById(zoneId).classList.remove('drag-over');
}
function onDrop(e, inputId, zoneId, allowed) {
  e.preventDefault();
  offDrag(zoneId);
  const file = e.dataTransfer.files[0];
  if (!file || !allowed.includes(file.type)) return;
  const input = document.getElementById(inputId);
  const dt = new DataTransfer();
  [...e.dataTransfer.files].forEach(f => dt.items.add(f));
  input.files = dt.files;
  input.dispatchEvent(new Event('change'));
}

// ─── Lock: file selected ──────────────────────────────────────────────────────
function onFileSelect(input, zoneId, nameId) {
  const zone = document.getElementById(zoneId);
  const label = document.getElementById(nameId);
  if (input.files[0]) {
    zone.classList.add('has-file');
    label.textContent = input.files[0].name;
  }
}

// ─── Convert: images selected — show thumbnails ───────────────────────────────
function onImagesSelect(input) {
  const preview = document.getElementById('conv-preview');
  preview.innerHTML = '';
  const files = [...input.files];
  if (!files.length) return;

  // Show first 4 as thumbs + count badge
  const show = files.slice(0, 4);
  show.forEach(f => {
    const img = document.createElement('img');
    img.className = 'preview-thumb';
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  });
  if (files.length > 4) {
    const badge = document.createElement('div');
    badge.className = 'preview-count';
    badge.textContent = '+' + (files.length - 4);
    preview.appendChild(badge);
  }

  document.getElementById('conv-zone').classList.add('has-file');
}

// ─── Status helper ────────────────────────────────────────────────────────────
function setStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading'
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span>${msg}</span>`;
}
function clearStatus(id) {
  document.getElementById(id).className = 'status';
}

// ─── LOCK: send PDF + password to Flask /lock ──────────────────────────────────
// HOW IT WORKS:
//   1. Read selected file and password from the form
//   2. Build FormData and POST to /lock
//   3. Python (lock_pdf) encrypts with pypdf and returns bytes
//   4. Browser receives blob → triggers download
async function runLock() {
  const file = document.getElementById('lock-file').files[0];
  const pass = document.getElementById('lock-pass').value.trim();

  if (!file) return setStatus('lock-status','error','Please select a PDF file.');
  if (!pass)  return setStatus('lock-status','error','Please enter a password.');

  setStatus('lock-status','loading','Locking PDF…');

  const form = new FormData();
  form.append('file', file);
  form.append('password', pass);

  try {
    const res = await fetch('/lock', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json();
      return setStatus('lock-status','error', err.error || 'Server error');
    }
    const blob = await res.blob();          // receive encrypted PDF
    download(blob, 'locked.pdf');
    setStatus('lock-status','success','Locked PDF downloaded!');
  } catch {
    setStatus('lock-status','error','Cannot reach server. Run: python pdf_tools.py');
  }
}

// ─── CONVERT: send images to Flask /convert ───────────────────────────────────
// HOW IT WORKS:
//   1. Read all selected images
//   2. POST to /convert as multipart
//   3. Python (convert_to_pdf) places each image on an A4 page with reportlab
//   4. Browser receives blob → triggers download
async function runConvert() {
  const files = document.getElementById('conv-file').files;
  if (!files.length) return setStatus('conv-status','error','Please select at least one image.');

  setStatus('conv-status','loading','Converting to PDF…');

  const form = new FormData();
  [...files].forEach(f => form.append('images[]', f));

  try {
    const res = await fetch('/convert', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json();
      return setStatus('conv-status','error', err.error || 'Server error');
    }
    const blob = await res.blob();          // receive generated PDF
    download(blob, 'converted.pdf');
    setStatus('conv-status','success','PDF downloaded!');
  } catch {
    setStatus('conv-status','error','Cannot reach server. Run: python pdf_tools.py');
  }
}

// ─── Download helper ──────────────────────────────────────────────────────────
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
