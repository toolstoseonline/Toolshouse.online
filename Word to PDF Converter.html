    width:20px;
    height:20px;

    0%{transform:rotate(0deg);}

<div class="card">
    <h2>📄 Word to PDF Converter</h2>

    <div class="file-input">
        <input type="file" id="fileInput" accept=".docx">
        <div class="warning">Max file size: 10MB (larger files may take time)</div>
    </div>

    <button onclick="convert()" id="convertBtn">Convert to PDF</button>
    
    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <span>Converting... Please wait</span>
    </div>

    <div class="footer-text">
        ⚡ Fast • 🔒 Secure • ☁️ No Upload to Server
    </div>
</div>

<script>
async function convert() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const convertBtn = document.getElementById("convertBtn");
    const loadingDiv = document.getElementById("loading");

    if (!file) {
        alert("📂 Please upload a DOCX file.");
        return;
    }

    if (!file.name.toLowerCase().endsWith(".docx")) {
        alert("❌ Only DOCX files are supported.");
        return;
    }

    // Check file size (10MB limit warning)
    if (file.size > 10 * 1024 * 1024) {
        const proceed = confirm("⚠️ File is larger than 10MB. Conversion may take time. Continue?");
        if (!proceed) return;
    }

    // Disable button and show loading
    convertBtn.disabled = true;
    loadingDiv.style.display = "flex";

    const reader = new FileReader();

    reader.onload = async function(e) {
        try {
            const arrayBuffer = e.target.result;

            // Extract text from DOCX
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            const text = result.value;

            if (!text.trim()) {
                alert("⚠️ No text found in the document.");
                return;
            }

            // Create PDF with multiple pages
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            // PDF settings
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 15;
            const maxLineWidth = pageWidth - (margin * 2);
            const lineHeight = 7; // mm per line
            let y = margin;

            // Split text into lines that fit the page width
            const lines = pdf.splitTextToSize(text, maxLineWidth);

            // Add lines to PDF with pagination
            for (let i = 0; i < lines.length; i++) {
                // Check if we need a new page (leaving bottom margin)
                if (y > pageHeight - margin) {
                    pdf.addPage();
                    y = margin;
                }
                
                pdf.text(lines[i], margin, y);
                y += lineHeight;
            }

            // Generate filename
            const fileName = file.name.replace(/\.docx$/i, "") + ".pdf";
            
            // Save the PDF
            pdf.save(fileName);
            
            // Success message
            setTimeout(() => {
                alert("✅ Conversion complete! PDF downloaded.");
            }, 100);

        } catch (error) {
            alert("❌ Conversion failed. Please check the file and try again.");
            console.error("Conversion error:", error);
        } finally {
            // Re-enable button and hide loading
            convertBtn.disabled = false;
            loadingDiv.style.display = "none";
        }
    };

    reader.onerror = function() {
        alert("❌ Error reading file.");
        convertBtn.disabled = false;
        loadingDiv.style.display = "none";
    };

    reader.readAsArrayBuffer(file);
}

// Optional: Clear file input when clicking on it again
document.getElementById('fileInput').addEventListener('click', function() {
    this.value = '';
});
</script>
