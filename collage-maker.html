<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collage Maker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .collage-grid {
      display: grid;
      gap: 6px;
      width: 100%;
      height: 100%;
    }

    .layout-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-3col { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero .cell:first-child { grid-row: 1 / -1; }
    .layout-mosaic { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-mosaic .cell:first-child { grid-column: 1 / 3; grid-row: 1 / 3; }
    .layout-strip { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; }
    .layout-tall { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-tall .cell:first-child { grid-row: 1 / 3; }
    .layout-tall .cell:nth-child(4) { grid-row: 2 / 4; }

    .cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .cell:hover { transform: scale(1.01); z-index: 2; }
    .cell img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .cell .placeholder-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; opacity: 0.5;
      pointer-events: none;
    }

    .cell .remove-btn {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px;
      border-radius: 50%; border: none;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 5;
      transition: transform 0.15s;
    }
    .cell:hover .remove-btn { display: flex; }
    .cell .remove-btn:hover { transform: scale(1.15); }

    .cell .zoom-controls {
      position: absolute; bottom: 8px; right: 8px;
      display: none; gap: 4px; z-index: 10;
      flex-direction: column;
    }
    .cell:hover .zoom-controls { display: flex; }

    .zoom-btn {
      width: 32px; height: 32px;
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      transition: transform 0.15s;
    }
    .zoom-btn:hover { transform: scale(1.1); }

    .zoom-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: none;
      z-index: 1000; align-items: center; justify-content: center;
      flex-direction: column; padding: 16px;
    }
    .zoom-modal.active { display: flex; }

    .zoom-modal-content {
      position: relative; width: 100%; height: 100%;
      max-width: 90vh; max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }

    .zoom-modal-img {
      width: 100%; height: 100%;
      object-fit: contain; cursor: grab;
      transform-origin: center;
    }
    .zoom-modal-img:active { cursor: grabbing; }

    .zoom-modal-controls {
      position: absolute; top: 16px; right: 16px;
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: flex-end;
    }

    .zoom-modal-btn {
      width: 44px; height: 44px;
      border-radius: 8px; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
      transition: all 0.15s;
    }

    .zoom-slider {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 6px; cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .zoom-info {
      position: absolute; bottom: 16px; right: 16px;
      font-size: 14px; font-weight: 500;
    }

    .crop-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: none;
      z-index: 1000; align-items: center; justify-content: center;
      flex-direction: column; padding: 16px;
    }
    .crop-modal.active { display: flex; }

    .crop-container {
      position: relative; width: 100%; height: 100%;
      max-width: 90vh; max-height: 90vh;
      display: flex; align-items: center; justify-content: center;
    }

    .crop-img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .crop-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); cursor: crosshair;
    }

    .crop-box {
      position: absolute; border: 2px solid #fff;
      background: rgba(255,255,255,0.1);
      cursor: move; display: none;
    }
    .crop-box.active { display: block; }

    .crop-handle {
      position: absolute; width: 12px; height: 12px;
      background: #fff; border: 1px solid #000;
      cursor: pointer;
    }
    .crop-handle.nw { top: -6px; left: -6px; cursor: nwse-resize; }
    .crop-handle.ne { top: -6px; right: -6px; cursor: nesw-resize; }
    .crop-handle.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
    .crop-handle.se { bottom: -6px; right: -6px; cursor: nwse-resize; }

    .crop-controls {
      position: absolute; top: 16px; right: 16px;
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: flex-end;
    }

    .crop-btn {
      width: 44px; height: 44px;
      border-radius: 8px; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
      background: #333; color: #fff;
      transition: all 0.15s;
    }
    .crop-btn:hover { background: #555; }

    .crop-presets {
      position: absolute; bottom: 16px; left: 16px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .crop-preset-btn {
      padding: 6px 12px; border-radius: 6px;
      background: #333; color: #fff; border: 1px solid #555;
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .crop-preset-btn:hover { background: #555; }
    .crop-preset-btn.active { background: #fff; color: #000; }

    .cell .filter-badge {
      position: absolute; bottom: 6px; left: 6px;
      font-size: 10px; padding: 2px 8px;
      border-radius: 999px; pointer-events: none;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .toolbar-btn {
      padding: 8px 14px; border-radius: 10px;
      border: 2px solid transparent;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }

    .layout-thumb {
      width: 48px; height: 36px;
      border-radius: 6px; cursor: pointer;
      border: 2px solid transparent;
      display: grid; gap: 2px; padding: 3px;
      transition: all 0.15s;
    }
    .layout-thumb.active { transform: scale(1.1); }
    .layout-thumb div { border-radius: 2px; }

    .filter-btn {
      padding: 5px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid;
      transition: all 0.15s;
    }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      z-index: 100; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast-msg.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease-out; }

    @media (max-width: 768px) {
      .collage-grid { gap: 4px; }
      .layout-3col { grid-template-columns: 1fr 1fr; }
      .layout-hero { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .layout-hero .cell:first-child { grid-row: 1; }
      .layout-mosaic { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
      .layout-mosaic .cell:first-child { grid-column: 1; grid-row: 1; }
      .layout-strip { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
      .layout-tall { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }
      .layout-tall .cell:first-child { grid-row: 1; }
      .layout-tall .cell:nth-child(4) { grid-row: 4; }
      
      .toolbar-btn { padding: 6px 12px; font-size: 12px; }
      .layout-thumb { width: 40px; height: 30px; }
      
      .zoom-modal-controls { flex-direction: column; gap: 8px; }
      .zoom-slider { width: 150px; }
    }

    @media (max-width: 480px) {
      .toolbar-btn { padding: 5px 10px; font-size: 11px; }
      .layout-thumb { width: 36px; height: 27px; }
      .zoom-modal { padding: 12px; }
      .zoom-modal-controls { top: 12px; right: 12px; gap: 6px; }
      .zoom-modal-btn { width: 40px; height: 40px; font-size: 18px; }
      .zoom-slider { width: 120px; bottom: 12px; }
      .zoom-info { font-size: 11px; bottom: 12px; right: 12px; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-hidden">
  <div class="h-full w-full flex flex-col" style="font-family: 'DM Sans', sans-serif;">
   <!-- Header -->
   <div class="px-4 py-3 border-b border-gray-200 bg-white">
    <h1 style="font-family: 'Syne', serif; font-size: 24px; font-weight: 700;">Collage Maker</h1>
   </div><!-- Main Content -->
   <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Toolbar -->
    <div class="px-4 py-3 border-b border-gray-200 bg-gray-50 overflow-x-auto">
     <div class="flex gap-2 flex-wrap">
      <button class="toolbar-btn" style="background: #000; color: #fff;" onclick="addPhoto()"> <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Add Photo </button>
      <div style="width: 1px; background: #ddd; margin: 0 4px;"></div>
      <div class="flex gap-1">
       <div class="layout-thumb" onclick="changeLayout('2x2')" style="grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;">
        <div style="background: #ddd;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #f0f0f0;"></div>
       </div>
       <div class="layout-thumb" onclick="changeLayout('3col')" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr;">
        <div style="background: #ddd;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #f0f0f0;"></div>
        <div style="background: #f0f0f0;"></div>
        <div style="background: #f0f0f0;"></div>
       </div>
       <div class="layout-thumb" onclick="changeLayout('hero')" style="grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr;">
        <div style="background: #ddd; grid-row: 1 / -1;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #e5e5e5;"></div>
       </div>
       <div class="layout-thumb" onclick="changeLayout('mosaic')" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;">
        <div style="background: #ddd; grid-column: 1 / 3; grid-row: 1 / 3;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #e5e5e5;"></div>
        <div style="background: #f0f0f0;"></div>
       </div>
      </div>
     </div>
    </div><!-- Canvas -->
    <div class="flex-1 overflow-hidden p-4 bg-white">
     <div class="collage-grid layout-2x2" id="collageGrid">
      <div class="cell" id="cell-0" style="background: #f5f5f5;" onclick="addPhotoTo(0)">
       <div class="placeholder-content">
        <i data-lucide="image" style="width: 24px; height: 24px; color: #999;"></i> <span style="font-size: 12px; color: #999;">Add photo</span>
       </div>
      </div>
      <div class="cell" id="cell-1" style="background: #f5f5f5;" onclick="addPhotoTo(1)">
       <div class="placeholder-content">
        <i data-lucide="image" style="width: 24px; height: 24px; color: #999;"></i> <span style="font-size: 12px; color: #999;">Add photo</span>
       </div>
      </div>
      <div class="cell" id="cell-2" style="background: #f5f5f5;" onclick="addPhotoTo(2)">
       <div class="placeholder-content">
        <i data-lucide="image" style="width: 24px; height: 24px; color: #999;"></i> <span style="font-size: 12px; color: #999;">Add photo</span>
       </div>
      </div>
      <div class="cell" id="cell-3" style="background: #f5f5f5;" onclick="addPhotoTo(3)">
       <div class="placeholder-content">
        <i data-lucide="image" style="width: 24px; height: 24px; color: #999;"></i> <span style="font-size: 12px; color: #999;">Add photo</span>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div><!-- Hidden file input --> <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)"> <!-- Zoom Modal -->
  <div class="zoom-modal" id="zoomModal">
   <div class="zoom-modal-content">
    <img class="zoom-modal-img" id="zoomImg" src="" alt="Zoomed image">
    <div class="zoom-modal-controls">
     <button class="zoom-modal-btn" style="background: #333; color: #fff;" onclick="zoomOut()" title="Zoom out">−</button> <button class="zoom-modal-btn" style="background: #333; color: #fff;" onclick="resetZoom()" title="Reset">⊡</button> <button class="zoom-modal-btn" style="background: #333; color: #fff;" onclick="zoomIn()" title="Zoom in">+</button> <button class="zoom-modal-btn" style="background: #333; color: #fff;" onclick="closeZoom()" title="Close"> <i data-lucide="x" style="width: 20px; height: 20px;"></i> </button>
    </div><input type="range" class="zoom-slider" id="zoomSlider" min="100" max="300" value="100" oninput="updateZoom(this.value)">
    <div class="zoom-info" id="zoomInfo">
     100%
    </div>
   </div>
  </div><!-- Crop Modal -->
  <div class="crop-modal" id="cropModal">
   <div class="crop-container"><img class="crop-img" id="cropImg" src="" alt="Crop image">
    <div class="crop-overlay" id="cropOverlay"></div>
    <div class="crop-box" id="cropBox">
     <div class="crop-handle nw"></div>
     <div class="crop-handle ne"></div>
     <div class="crop-handle sw"></div>
     <div class="crop-handle se"></div>
    </div>
    <div class="crop-controls"><button class="crop-btn" onclick="cropImageApply()" title="Apply crop"> <i data-lucide="check" style="width: 20px; height: 20px;"></i> </button> <button class="crop-btn" onclick="closeCrop()" title="Cancel"> <i data-lucide="x" style="width: 20px; height: 20px;"></i> </button>
    </div>
    <div class="crop-presets"><button class="crop-preset-btn active" onclick="setCropPreset(1, 1)">Square</button> <button class="crop-preset-btn" onclick="setCropPreset(16, 9)">16:9</button> <button class="crop-preset-btn" onclick="setCropPreset(4, 3)">4:3</button> <button class="crop-preset-btn" onclick="setCropPreset(3, 2)">3:2</button> <button class="crop-preset-btn" onclick="setCropPreset(9, 16)">9:16</button>
    </div>
   </div>
  </div><!-- Toast -->
  <div class="toast-msg" id="toast"></div>
  <script>
    let currentLayout = '2x2';
    let photos = {};
    let currentZoom = 100;
    let panX = 0, panY = 0;
    let isPanning = false;
    let panStartX, panStartY;
    
    let cropData = {};
    let currentCropIndex = null;
    let cropRatioX = 1, cropRatioY = 1;
    let cropBox = null;
    let isDraggingHandle = false;
    let currentHandle = null;

    lucide.createIcons();

    function addPhotoTo(index) {
      window.currentCellIndex = index;
      document.getElementById('fileInput').click();
    }

    function addPhoto() {
      document.getElementById('fileInput').click();
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const cellIndex = window.currentCellIndex ?? 0;
        const cell = document.getElementById(`cell-${cellIndex}`);
        
        if (cell) {
          const existingImg = cell.querySelector('img');
          if (existingImg) existingImg.remove();
          const placeholders = cell.querySelectorAll('.placeholder-content');
          placeholders.forEach(p => p.remove());

          const img = document.createElement('img');
          img.src = e.target.result;
          cell.appendChild(img);
          photos[cellIndex] = e.target.result;

          const removeBtn = document.createElement('button');
          removeBtn.className = 'remove-btn';
          removeBtn.style.background = '#000';
          removeBtn.style.color = '#fff';
          removeBtn.innerHTML = '<i data-lucide="x" style="width: 16px; height: 16px;"></i>';
          removeBtn.onclick = (evt) => { evt.stopPropagation(); removePhoto(cellIndex); };

          const zoomControls = document.createElement('div');
          zoomControls.className = 'zoom-controls';
          zoomControls.innerHTML = `
            <button class="zoom-btn" style="background: #000; color: #fff;" onclick="openZoom(event, ${cellIndex})" title="Zoom & pan">
              <i data-lucide="maximize2" style="width: 16px; height: 16px;"></i>
            </button>
            <button class="zoom-btn" style="background: #000; color: #fff;" onclick="openCrop(event, ${cellIndex})" title="Crop">
              <i data-lucide="crop" style="width: 16px; height: 16px;"></i>
            </button>
          `;

          cell.appendChild(removeBtn);
          cell.appendChild(zoomControls);
          lucide.createIcons();
          showToast('Photo added!');
        }
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    function removePhoto(index) {
      const cell = document.getElementById(`cell-${index}`);
      if (cell) {
        cell.innerHTML = `
          <div class="placeholder-content">
            <i data-lucide="image" style="width: 24px; height: 24px; color: #999;"></i>
            <span style="font-size: 12px; color: #999;">Add photo</span>
          </div>
        `;
        delete photos[index];
        lucide.createIcons();
        showToast('Photo removed');
      }
    }

    function openZoom(event, index) {
      event.stopPropagation();
      const img = document.getElementById(`cell-${index}`).querySelector('img');
      if (!img) return;

      currentZoom = 100;
      panX = 0;
      panY = 0;
      const zoomImg = document.getElementById('zoomImg');
      zoomImg.src = img.src;
      document.getElementById('zoomModal').classList.add('active');
      document.getElementById('zoomSlider').value = 100;
      document.getElementById('zoomInfo').textContent = '100%';
      updateZoomDisplay();
      setupPanning();
    }

    function closeZoom() {
      document.getElementById('zoomModal').classList.remove('active');
      isPanning = false;
    }

    function zoomIn() {
      currentZoom = Math.min(currentZoom + 25, 300);
      document.getElementById('zoomSlider').value = currentZoom;
      updateZoomDisplay();
    }

    function zoomOut() {
      currentZoom = Math.max(currentZoom - 25, 100);
      document.getElementById('zoomSlider').value = currentZoom;
      updateZoomDisplay();
    }

    function resetZoom() {
      currentZoom = 100;
      panX = 0;
      panY = 0;
      document.getElementById('zoomSlider').value = 100;
      updateZoomDisplay();
    }

    function updateZoom(value) {
      currentZoom = parseInt(value);
      updateZoomDisplay();
    }

    function updateZoomDisplay() {
      const img = document.getElementById('zoomImg');
      img.style.transform = `scale(${currentZoom / 100}) translate(${panX}px, ${panY}px)`;
      document.getElementById('zoomInfo').textContent = currentZoom + '%';
    }

    function setupPanning() {
      const img = document.getElementById('zoomImg');
      img.addEventListener('mousedown', startPan);
      img.addEventListener('touchstart', startPan);
      document.addEventListener('mousemove', pan);
      document.addEventListener('touchmove', pan);
      document.addEventListener('mouseup', endPan);
      document.addEventListener('touchend', endPan);
    }

    function startPan(e) {
      if (currentZoom <= 100) return;
      isPanning = true;
      panStartX = e.clientX || e.touches[0].clientX;
      panStartY = e.clientY || e.touches[0].clientY;
    }

    function pan(e) {
      if (!isPanning || currentZoom <= 100) return;
      const x = e.clientX || e.touches[0].clientX;
      const y = e.clientY || e.touches[0].clientY;
      panX += (x - panStartX) * 0.5;
      panY += (y - panStartY) * 0.5;
      panStartX = x;
      panStartY = y;
      updateZoomDisplay();
    }

    function endPan() {
      isPanning = false;
    }

    function changeLayout(layout) {
      currentLayout = layout;
      const grid = document.getElementById('collageGrid');
      grid.className = `collage-grid layout-${layout}`;
      
      const layoutThumbs = document.querySelectorAll('.layout-thumb');
      layoutThumbs.forEach(thumb => thumb.classList.remove('active'));
      event.target.closest('.layout-thumb').classList.add('active');
      
      showToast('Layout changed!');
    }

    function openCrop(event, index) {
      event.stopPropagation();
      const img = document.getElementById(`cell-${index}`).querySelector('img');
      if (!img) return;

      currentCropIndex = index;
      const cropImg = document.getElementById('cropImg');
      cropImg.src = img.src;
      
      cropData[index] = cropData[index] || { x: 0, y: 0, w: 200, h: 200 };
      cropBox = {
        x: 50,
        y: 50,
        w: 200,
        h: 200
      };
      cropRatioX = 1;
      cropRatioY = 1;

      document.getElementById('cropModal').classList.add('active');
      setupCropBox();
      setupCropHandles();
      lucide.createIcons();
    }

    function setupCropBox() {
      const box = document.getElementById('cropBox');
      box.classList.add('active');
      box.style.left = cropBox.x + 'px';
      box.style.top = cropBox.y + 'px';
      box.style.width = cropBox.w + 'px';
      box.style.height = cropBox.h + 'px';

      box.addEventListener('mousedown', startMoveCrop);
      box.addEventListener('touchstart', startMoveCrop);
    }

    function setupCropHandles() {
      const handles = document.querySelectorAll('.crop-handle');
      handles.forEach(handle => {

    function startMoveCrop(e) {

      const startBoxX = cropBox.x;
      const startBoxY = cropBox.y;

      const moveCrop = (e) => {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        cropBox.x = startBoxX + (x - startX);
        cropBox.y = startBoxY + (y - startY);
        updateCropBox();
      };

      const stopMoveCrop = () => {
        document.removeEventListener('mousemove', moveCrop);
        document.removeEventListener('touchmove', moveCrop);
        document.removeEventListener('mouseup', stopMoveCrop);
        document.removeEventListener('touchend', stopMoveCrop);
      };

      document.addEventListener('mousemove', moveCrop);
      document.addEventListener('touchmove', moveCrop);
      document.addEventListener('mouseup', stopMoveCrop);
      document.addEventListener('touchend', stopMoveCrop);
    }

    function startResizeCrop(e) {
      const handle = e.target.closest('.crop-handle');
      currentHandle = handle.className.split(' ')[1];
      const startX = e.clientX || e.touches[0].clientX;
      const startY = e.clientY || e.touches[0].clientY;
      const startW = cropBox.w;
      const startH = cropBox.h;
      const startBoxX = cropBox.x;
      const startBoxY = cropBox.y;

      const resizeCrop = (e) => {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        const deltaX = x - startX;
        const deltaY = y - startY;

        if (currentHandle.includes('se')) {
          let newW = startW + deltaX;
          let newH = startH + deltaY;
          if (cropRatioX && cropRatioY) {
            const ratio = cropRatioX / cropRatioY;
            newH = newW / ratio;
          }
          cropBox.w = Math.max(50, newW);
          cropBox.h = Math.max(50, newH);
        } else if (currentHandle.includes('sw')) {
          let newW = startW - deltaX;
          let newH = startH + deltaY;
          if (cropRatioX && cropRatioY) {
            const ratio = cropRatioX / cropRatioY;
            newH = newW / ratio;
          }
          cropBox.x = startBoxX + deltaX;
          cropBox.w = Math.max(50, newW);
          cropBox.h = Math.max(50, newH);
        } else if (currentHandle.includes('ne')) {
          let newW = startW + deltaX;
          let newH = startH - deltaY;
          if (cropRatioX && cropRatioY) {
            const ratio = cropRatioX / cropRatioY;
            newH = newW / ratio;
          }
          cropBox.y = startBoxY + deltaY;
          cropBox.w = Math.max(50, newW);
          cropBox.h = Math.max(50, newH);
        } else if (currentHandle.includes('nw')) {
          let newW = startW - deltaX;
          let newH = startH - deltaY;
          if (cropRatioX && cropRatioY) {
            const ratio = cropRatioX / cropRatioY;
            newH = newW / ratio;
          }
          cropBox.x = startBoxX + deltaX;
          cropBox.y = startBoxY + deltaY;
          cropBox.w = Math.max(50, newW);
          cropBox.h = Math.max(50, newH);
        }
        updateCropBox();
      };

      const stopResizeCrop = () => {
        document.removeEventListener('mousemove', resizeCrop);
        document.removeEventListener('touchmove', resizeCrop);
        document.removeEventListener('mouseup', stopResizeCrop);
        document.removeEventListener('touchend', stopResizeCrop);
      };

      document.addEventListener('mousemove', resizeCrop);
      document.addEventListener('touchmove', resizeCrop);
      document.addEventListener('mouseup', stopResizeCrop);
      document.addEventListener('touchend', stopResizeCrop);
    }

    function updateCropBox() {
      const box = document.getElementById('cropBox');
      box.style.left = cropBox.x + 'px';
      box.style.top = cropBox.y + 'px';
      box.style.width = cropBox.w + 'px';
      box.style.height = cropBox.h + 'px';
    }

    function setCropPreset(ratioX, ratioY) {
      cropRatioX = ratioX;
      cropRatioY = ratioY;
      const ratio = ratioX / ratioY;
      const newH = cropBox.w / ratio;
      cropBox.h = newH;
      updateCropBox();

      const presets = document.querySelectorAll('.crop-preset-btn');
      presets.forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
    }

    function cropImageApply() {
      const img = document.getElementById('cropImg');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const imgElement = new Image();

      imgElement.onload = () => {
        const scale = imgElement.width / img.offsetWidth;
        const cropX = Math.floor(cropBox.x * scale);
        const cropY = Math.floor(cropBox.y * scale);
        const cropW = Math.floor(cropBox.w * scale);
        const cropH = Math.floor(cropBox.h * scale);

        canvas.width = cropW;
        canvas.height = cropH;
        ctx.drawImage(imgElement, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

        const cellIndex = currentCropIndex;
        const cell = document.getElementById(`cell-${cellIndex}`);
        const oldImg = cell.querySelector('img');
        if (oldImg) oldImg.remove();

        const newImg = document.createElement('img');
        newImg.src = canvas.toDataURL();
        cell.insertBefore(newImg, cell.firstChild);
        photos[cellIndex] = canvas.toDataURL();

        closeCrop();
        showToast('Photo cropped!');
      };

      imgElement.src = img.src;
    }

    function closeCrop() {
      document.getElementById('cropModal').classList.remove('active');
      const box = document.getElementById('cropBox');
      box.classList.remove('active');
      currentCropIndex = null;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show', 'fade-up');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    window.addEventListener('load', () => {
      lucide.createIcons();
      document.querySelector('.layout-thumb').classList.add('active');
    });
