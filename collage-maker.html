<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Free Collage Maker Online – Create Photo Collage – Tools House Online</title>
<meta name="description" content="Create photo collages online free. Combine multiple photos into one image. No signup required. Fast, beautiful layouts on any device.">
<link rel="canonical" href="https://www.toolshouse.online/collage-maker.html">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .collage-grid {
      display: grid;
      gap: 6px;
      width: 100%;
      height: 100%;
    }

    .layout-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-3col { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero .cell:first-child { grid-row: 1 / -1; }
    .layout-mosaic { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-mosaic .cell:first-child { grid-column: 1 / 3; grid-row: 1 / 3; }
    .layout-strip { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; }
    .layout-tall { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-tall .cell:first-child { grid-row: 1 / 3; }
    .layout-tall .cell:nth-child(4) { grid-row: 2 / 4; }

    .cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .cell:hover { transform: scale(1.01); z-index: 2; }
    .cell img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .cell .placeholder-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; opacity: 0.5;
      pointer-events: none;
    }

    .cell .remove-btn {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px;
      border-radius: 50%; border: none;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 5;
      transition: transform 0.15s;
    }
    .cell:hover .remove-btn { display: flex; }
    .cell .remove-btn:hover { transform: scale(1.15); }

    .cell .filter-badge {
      position: absolute; bottom: 6px; left: 6px;
      font-size: 10px; padding: 2px 8px;
      border-radius: 999px; pointer-events: none;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .toolbar-btn {
      padding: 8px 14px; border-radius: 10px;
      border: 2px solid transparent;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }

    .layout-thumb {
      width: 48px; height: 36px;
      border-radius: 6px; cursor: pointer;
      border: 2px solid transparent;
      display: grid; gap: 2px; padding: 3px;
      transition: all 0.15s;
    }
    .layout-thumb.active { transform: scale(1.1); }
    .layout-thumb div { border-radius: 2px; }

    .filter-btn {
      padding: 5px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid;
      transition: all 0.15s;
    }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      z-index: 100; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast-msg.show { opacity: 1; }

    .canvas-img { image-rendering: auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .fade-up-d1 { animation-delay: 0.1s; }
    .fade-up-d2 { animation-delay: 0.2s; }
    .fade-up-d3 { animation-delay: 0.3s; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full flex flex-col overflow-auto" style="background:#0f0f12; color:#e8e4df; font-family:'DM Sans',sans-serif;"><!-- Header -->
   <header class="px-5 py-4 flex items-center justify-between flex-shrink-0 fade-up" style="border-bottom:1px solid #1e1e24;">
    <div>
     <h1 id="main-title" class="text-xl font-bold tracking-tight" style="font-family:'Syne',sans-serif; color:#f4a261;">Collage Maker</h1>
     <p id="subtitle" class="text-xs mt-0.5" style="color:#6b6872;">Design beautiful collages</p>
    </div>
    <div class="flex gap-2"><button id="btn-clear" class="toolbar-btn" style="background:#1a1a22; color:#e8e4df;" title="Clear all"> <i data-lucide="trash-2" style="width:15px;height:15px;"></i> Clear </button> <button id="btn-download" class="toolbar-btn" style="background:#f4a261; color:#0f0f12;" title="Download collage"> <i data-lucide="download" style="width:15px;height:15px;"></i> Export </button>
    </div>
   </header><!-- Toolbar -->
   <div class="px-5 py-3 flex flex-wrap items-center gap-4 flex-shrink-0 fade-up fade-up-d1" style="border-bottom:1px solid #1e1e24;"><!-- Layouts -->
    <div class="flex items-center gap-2"><span class="text-xs font-semibold uppercase tracking-wider" style="color:#6b6872;">Layout</span>
     <div class="flex gap-2" id="layout-picker"></div>
    </div>
    <div style="width:1px;height:24px;background:#1e1e24;"></div><!-- Gap slider -->
    <div class="flex items-center gap-2"><span class="text-xs font-semibold uppercase tracking-wider" style="color:#6b6872;">Gap</span> <input type="range" id="gap-slider" min="0" max="20" value="6" style="width:80px;accent-color:#f4a261;">
    </div>
    <div style="width:1px;height:24px;background:#1e1e24;"></div><!-- Border radius -->
    <div class="flex items-center gap-2"><span class="text-xs font-semibold uppercase tracking-wider" style="color:#6b6872;">Radius</span> <input type="range" id="radius-slider" min="0" max="30" value="8" style="width:80px;accent-color:#f4a261;">
    </div>
    <div style="width:1px;height:24px;background:#1e1e24;"></div><!-- BG Color -->
    <div class="flex items-center gap-2"><span class="text-xs font-semibold uppercase tracking-wider" style="color:#6b6872;">BG</span> <input type="color" id="bg-color" value="#0f0f12" style="width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;background:transparent;">
    </div>
   </div><!-- Filters -->
   <div class="px-5 py-2 flex items-center gap-2 flex-shrink-0 overflow-x-auto fade-up fade-up-d2" id="filter-bar"><span class="text-xs font-semibold uppercase tracking-wider flex-shrink-0" style="color:#6b6872;">Filter</span>
   </div><!-- Collage Canvas -->
   <div class="flex-1 p-5 fade-up fade-up-d3" style="min-height:0;">
    <div id="collage-area" class="collage-grid layout-2x2 w-full h-full" style="border-radius:12px;overflow:hidden;"></div>
   </div><!-- Hidden file input --> <input type="file" id="file-input" accept="image/*" style="display:none;"> <!-- Toast -->
   <div id="toast" class="toast-msg" style="background:#f4a261;color:#0f0f12;"></div>
  </div>
  <script>
const layouts = [
  { id:'2x2', label:'2×2', cls:'layout-2x2', cells:4, grid:'1fr 1fr / 1fr 1fr' },
  { id:'3col', label:'3 Col', cls:'layout-3col', cells:6, grid:'1fr 1fr 1fr / 1fr 1fr' },
  { id:'hero', label:'Hero', cls:'layout-hero', cells:3, grid:'2fr 1fr / 1fr 1fr' },
  { id:'mosaic', label:'Mosaic', cls:'layout-mosaic', cells:5, grid:'1fr 1fr 1fr / 1fr 1fr 1fr' },
  { id:'strip', label:'Strip', cls:'layout-strip', cells:4, grid:'1fr 1fr 1fr 1fr / 1fr' },
  { id:'tall', label:'Tall', cls:'layout-tall', cells:6, grid:'1fr 1fr / 1fr 1fr 1fr' },
];

const filters = [
  { id:'none', label:'None', css:'' },
  { id:'grayscale', label:'B&W', css:'grayscale(100%)' },
  { id:'sepia', label:'Sepia', css:'sepia(80%)' },
  { id:'contrast', label:'Contrast', css:'contrast(130%)' },
  { id:'bright', label:'Bright', css:'brightness(120%)' },
  { id:'saturate', label:'Vivid', css:'saturate(160%)' },
  { id:'warm', label:'Warm', css:'sepia(30%) saturate(140%)' },
  { id:'cool', label:'hue-rotate', css:'hue-rotate(30deg) saturate(110%)' },
];

let currentLayout = layouts[0];
let currentFilter = filters[0];
let cellImages = {};
let activeCellIdx = null;

const defaultConfig = {
  page_title: 'Collage Maker',
  subtitle_text: 'Design beautiful collages',
  background_color: '#0f0f12',
  surface_color: '#1a1a22',
  text_color: '#e8e4df',
  primary_action_color: '#f4a261',
  secondary_action_color: '#6b6872',
  font_family: 'Syne',
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  const app = document.getElementById('app');
  app.style.background = c.background_color;
  app.style.color = c.text_color;

  const title = document.getElementById('main-title');
  title.textContent = c.page_title;
  title.style.color = c.primary_action_color;
  title.style.fontFamily = `${c.font_family}, Syne, sans-serif`;
  title.style.fontSize = `${c.font_size * 1.3}px`;

  const sub = document.getElementById('subtitle');
  sub.textContent = c.subtitle_text;
  sub.style.color = c.secondary_action_color;
  sub.style.fontFamily = `${c.font_family}, DM Sans, sans-serif`;
  sub.style.fontSize = `${c.font_size * 0.75}px`;

  document.getElementById('btn-download').style.background = c.primary_action_color;
  document.getElementById('btn-clear').style.background = c.surface_color;
  document.getElementById('btn-clear').style.color = c.text_color;

  document.querySelectorAll('.layout-thumb').forEach(el => {
    if (!el.classList.contains('active')) {
      el.style.borderColor = c.surface_color;
      el.style.background = c.surface_color;
    } else {
      el.style.borderColor = c.primary_action_color;
    }
  });

  document.querySelectorAll('.cell').forEach(cell => {
    cell.style.background = c.surface_color;
    const ph = cell.querySelector('.placeholder-content');
    if (ph) ph.style.color = c.secondary_action_color;
    const rb = cell.querySelector('.remove-btn');
    if (rb) { rb.style.background = c.primary_action_color; rb.style.color = c.background_color; }
    const fb = cell.querySelector('.filter-badge');
    if (fb) { fb.style.background = c.primary_action_color; fb.style.color = c.background_color; }
  });

  document.querySelectorAll('[style*="border-bottom"]').forEach(el => {
    el.style.borderBottomColor = c.surface_color;
  });
}

// Init Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['page_title', config.page_title || defaultConfig.page_title],
    ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text],
  ])
});

// Build layout picker
const layoutPicker = document.getElementById('layout-picker');
layouts.forEach(l => {
  const thumb = document.createElement('div');
  thumb.className = 'layout-thumb' + (l.id === currentLayout.id ? ' active' : '');
  thumb.title = l.label;
  thumb.dataset.layout = l.id;
  thumb.style.background = '#1a1a22';
  thumb.style.borderColor = l.id === currentLayout.id ? '#f4a261' : '#1a1a22';

  // Mini preview grid
  const cols = l.grid.split('/')[0].trim().split(' ').length;
  const rows = (l.grid.split('/')[1] || '1fr').trim().split(' ').length;
  thumb.style.gridTemplateColumns = l.grid.split('/')[0].trim();
  thumb.style.gridTemplateRows = (l.grid.split('/')[1] || '1fr').trim();
  thumb.style.display = 'grid';
  thumb.style.gap = '2px';
  for (let i = 0; i < Math.min(l.cells, 8); i++) {
    const d = document.createElement('div');
    d.style.background = '#2a2a34';
    d.style.borderRadius = '2px';
    if (l.id === 'hero' && i === 0) d.style.gridRow = '1 / -1';
    if (l.id === 'mosaic' && i === 0) { d.style.gridColumn = '1 / 3'; d.style.gridRow = '1 / 3'; }
    if (l.id === 'tall' && i === 0) d.style.gridRow = '1 / 3';
    if (l.id === 'tall' && i === 3) d.style.gridRow = '2 / 4';
    thumb.appendChild(d);
  }
  thumb.addEventListener('click', () => selectLayout(l));
  layoutPicker.appendChild(thumb);
});

// Build filter bar
const filterBar = document.getElementById('filter-bar');
filters.forEach(f => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = f.label;
  btn.dataset.filter = f.id;
  btn.style.background = f.id === 'none' ? '#f4a261' : 'transparent';
  btn.style.color = f.id === 'none' ? '#0f0f12' : '#6b6872';
  btn.style.borderColor = f.id === 'none' ? '#f4a261' : '#2a2a34';
  btn.addEventListener('click', () => selectFilter(f));
  filterBar.appendChild(btn);
});

function selectLayout(l) {
  currentLayout = l;
  document.querySelectorAll('.layout-thumb').forEach(t => {
    t.classList.toggle('active', t.dataset.layout === l.id);
    t.style.borderColor = t.dataset.layout === l.id ? '#f4a261' : '#1a1a22';
  });
  buildCells();
}

function selectFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const active = b.dataset.filter === f.id;
    b.style.background = active ? '#f4a261' : 'transparent';
    b.style.color = active ? '#0f0f12' : '#6b6872';
    b.style.borderColor = active ? '#f4a261' : '#2a2a34';
  });
  document.querySelectorAll('.cell img').forEach(img => {
    img.style.filter = f.css;
  });
  document.querySelectorAll('.cell .filter-badge').forEach(b => {
    b.textContent = f.id !== 'none' ? f.label : '';
    b.style.display = f.id !== 'none' ? 'block' : 'none';
  });
}

function buildCells() {
  const area = document.getElementById('collage-area');
  area.className = 'collage-grid ' + currentLayout.cls;
  area.innerHTML = '';
  const gap = document.getElementById('gap-slider').value;
  const radius = document.getElementById('radius-slider').value;
  area.style.gap = gap + 'px';

  for (let i = 0; i < currentLayout.cells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.borderRadius = radius + 'px';
    cell.style.background = '#1a1a22';
    cell.dataset.idx = i;

    // Span rules
    if (currentLayout.id === 'hero' && i === 0) cell.style.gridRow = '1 / -1';
    if (currentLayout.id === 'mosaic' && i === 0) { cell.style.gridColumn = '1 / 3'; cell.style.gridRow = '1 / 3'; }
    if (currentLayout.id === 'tall' && i === 0) cell.style.gridRow = '1 / 3';
    if (currentLayout.id === 'tall' && i === 3) cell.style.gridRow = '2 / 4';

    if (cellImages[i]) {
      const img = document.createElement('img');
      img.src = cellImages[i];
      img.style.filter = currentFilter.css;
      img.style.borderRadius = radius + 'px';
      cell.appendChild(img);

      const rb = document.createElement('button');
      rb.className = 'remove-btn';
      rb.style.background = '#f4a261';
      rb.style.color = '#0f0f12';
      rb.innerHTML = '<i data-lucide="x" style="width:14px;height:14px;"></i>';
      rb.addEventListener('click', e => { e.stopPropagation(); delete cellImages[i]; buildCells(); });
      cell.appendChild(rb);

      if (currentFilter.id !== 'none') {
        const fb = document.createElement('div');
        fb.className = 'filter-badge';
        fb.style.background = '#f4a261';
        fb.style.color = '#0f0f12';
        fb.textContent = currentFilter.label;
        cell.appendChild(fb);
      }
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder-content';
      ph.style.color = '#6b6872';
      ph.innerHTML = `<i data-lucide="image-plus" style="width:28px;height:28px;"></i><span style="font-size:11px;">Click to add</span>`;
      cell.appendChild(ph);
    }

    cell.addEventListener('click', () => { activeCellIdx = i; document.getElementById('file-input').click(); });
    area.appendChild(cell);
  }
  lucide.createIcons();
  applyConfig(window.elementSdk.config || defaultConfig);
}

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    cellImages[activeCellIdx] = ev.target.result;
    buildCells();
    showToast('Image added!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

document.getElementById('gap-slider').addEventListener('input', e => {
  document.getElementById('collage-area').style.gap = e.target.value + 'px';
});

document.getElementById('radius-slider').addEventListener('input', e => {
  document.querySelectorAll('.cell').forEach(c => c.style.borderRadius = e.target.value + 'px');
  document.querySelectorAll('.cell img').forEach(img => img.style.borderRadius = e.target.value + 'px');
});

document.getElementById('bg-color').addEventListener('input', e => {
  document.getElementById('collage-area').style.background = e.target.value;
});

document.getElementById('btn-clear').addEventListener('click', () => {
  cellImages = {};
  buildCells();
  showToast('Collage cleared');
});

document.getElementById('btn-download').addEventListener('click', () => {
  const area = document.getElementById('collage-area');
  const hasImages = Object.keys(cellImages).length > 0;
  if (!hasImages) { showToast('Add some images first!'); return; }

  showToast('Exporting...');
  const canvas = document.createElement('canvas');
  const w = 1200, h = 900;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  const bgColor = document.getElementById('bg-color').value;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);

  const gap = parseInt(document.getElementById('gap-slider').value);
  const radius = parseInt(document.getElementById('radius-slider').value);
  const cells = area.querySelectorAll('.cell');
  const areaRect = area.getBoundingClientRect();

  let loaded = 0;
  const total = Object.keys(cellImages).length;
  if (total === 0) return;

  cells.forEach(cell => {
    const idx = parseInt(cell.dataset.idx);
    if (!cellImages[idx]) return;
    const img = new Image();
    img.onload = () => {
      const cr = cell.getBoundingClientRect();
      const sx = (cr.left - areaRect.left) / areaRect.width * w;
      const sy = (cr.top - areaRect.top) / areaRect.height * h;
      const sw = cr.width / areaRect.width * w;
      const sh = cr.height / areaRect.height * h;

      ctx.save();
      roundRect(ctx, sx, sy, sw, sh, radius);
      ctx.clip();

      // Cover fit
      const imgRatio = img.width / img.height;
      const cellRatio = sw / sh;
      let dx, dy, dw, dh;
      if (imgRatio > cellRatio) {
        dh = sh; dw = sh * imgRatio;
        dx = sx - (dw - sw) / 2; dy = sy;
      } else {
        dw = sw; dh = sw / imgRatio;
        dx = sx; dy = sy - (dh - sh) / 2;
      }

      if (currentFilter.id !== 'none') ctx.filter = currentFilter.css;
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();

      loaded++;
      if (loaded === total) {
        const a = document.createElement('a');
        a.download = 'collage.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        showToast('Downloaded!');
      }
    };
    img.src = cellImages[idx];
  });
});

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

buildCells();
