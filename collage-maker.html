<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collage Maker</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }

    .collage-grid {
      display: grid;
      gap: 6px;
      width: 100%;
      height: 100%;
    }

    .layout-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-3col { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-hero .cell:first-child { grid-row: 1 / -1; }
    .layout-mosaic { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-mosaic .cell:first-child { grid-column: 1 / 3; grid-row: 1 / 3; }
    .layout-strip { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; }
    .layout-tall { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-tall .cell:first-child { grid-row: 1 / 3; }
    .layout-tall .cell:nth-child(4) { grid-row: 2 / 4; }
    .layout-mosaic2 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-mosaic2 .cell:nth-child(2) { grid-column: 2 / 4; grid-row: 1 / 3; }
    .layout-focus { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-focus .cell:first-child { grid-row: 1 / -1; }
    .layout-quad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }
    .layout-quad .cell:nth-child(1) { grid-column: 1 / 3; }
    .layout-quad .cell:nth-child(4) { grid-column: 1 / 3; }
    .layout-frame { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-frame .cell:nth-child(2) { grid-row: 1 / 3; }
    .layout-zigzag { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-zigzag .cell:nth-child(1) { grid-column: 1 / 2; grid-row: 1 / 2; }
    .layout-zigzag .cell:nth-child(2) { grid-column: 2 / 4; grid-row: 1 / 2; }
    .layout-zigzag .cell:nth-child(3) { grid-column: 1 / 3; grid-row: 2 / 3; }
    .layout-zigzag .cell:nth-child(4) { grid-column: 3 / 4; grid-row: 2 / 4; }
    .layout-zigzag .cell:nth-child(5) { grid-column: 1 / 2; grid-row: 3 / 4; }
    .layout-zigzag .cell:nth-child(6) { grid-column: 2 / 3; grid-row: 3 / 4; }
    .layout-split { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .layout-split .cell:nth-child(1) { grid-column: 1 / 3; }
    .layout-split .cell:nth-child(2) { grid-column: 3 / 5; }
    .layout-split .cell:nth-child(3) { grid-column: 1 / 2; grid-row: 2; }
    .layout-split .cell:nth-child(4) { grid-column: 2 / 3; grid-row: 2; }
    .layout-split .cell:nth-child(5) { grid-column: 3 / 4; grid-row: 2; }
    .layout-split .cell:nth-child(6) { grid-column: 4 / 5; grid-row: 2; }
    .layout-corner { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-corner .cell:first-child { grid-column: 1 / 3; grid-row: 1 / 3; }
    .layout-corner .cell:nth-child(2) { grid-column: 3 / 4; grid-row: 1 / 2; }
    .layout-corner .cell:nth-child(3) { grid-column: 3 / 4; grid-row: 2 / 3; }
    .layout-corner .cell:nth-child(4) { grid-column: 1 / 2; grid-row: 3 / 4; }
    .layout-corner .cell:nth-child(5) { grid-column: 2 / 3; grid-row: 3 / 4; }
    .layout-corner .cell:nth-child(6) { grid-column: 3 / 4; grid-row: 3 / 4; }
    .layout-stack { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; }
    .layout-stack .cell:nth-child(1) { grid-column: 1 / 4; }
    .layout-stack .cell:nth-child(2) { grid-column: 1 / 4; }
    .layout-stack .cell:nth-child(3) { grid-column: 1 / 4; }
    .layout-wave { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-wave .cell:nth-child(1) { grid-column: 1 / 2; }
    .layout-wave .cell:nth-child(2) { grid-column: 2 / 4; grid-row: 1 / 2; }
    .layout-wave .cell:nth-child(3) { grid-column: 1 / 3; grid-row: 2 / 3; }
    .layout-wave .cell:nth-child(4) { grid-column: 3 / 4; grid-row: 2 / 3; }
    .layout-wave .cell:nth-child(5) { grid-column: 2 / 4; grid-row: 3 / 4; }
    .layout-wave .cell:nth-child(6) { grid-column: 1 / 2; grid-row: 3 / 4; }
    .layout-spiral { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .layout-spiral .cell:nth-child(1) { grid-column: 1 / 4; grid-row: 1 / 2; }
    .layout-spiral .cell:nth-child(2) { grid-column: 3 / 4; grid-row: 2 / 4; }
    .layout-spiral .cell:nth-child(3) { grid-column: 1 / 3; grid-row: 3 / 4; }
    .layout-spiral .cell:nth-child(4) { grid-column: 1 / 2; grid-row: 2 / 3; }
    .layout-spiral .cell:nth-child(5) { grid-column: 2 / 3; grid-row: 2 / 3; }
    .layout-spiral .cell:nth-child(6) { grid-column: 2 / 3; grid-row: 2 / 3; display: none; }

    @media (max-width: 768px) {
      .layout-3col { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .layout-hero { grid-template-columns: 1fr; grid-template-rows: auto; }
      .layout-hero .cell:first-child { grid-row: auto; grid-column: auto; }
      .layout-mosaic { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .layout-mosaic .cell:first-child { grid-column: auto; grid-row: auto; }
      .layout-strip { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .layout-tall { grid-template-columns: 1fr; grid-template-rows: auto; }
      .layout-tall .cell:first-child { grid-row: auto; }
      .layout-tall .cell:nth-child(4) { grid-row: auto; }
    }

    .cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      aspect-ratio: 1;
    }

    @media (max-width: 768px) {
      .cell { min-height: 100px; }
    }

    @media (max-width: 480px) {
      .cell { min-height: 80px; }
    }

    .cell:hover { transform: scale(1.01); z-index: 2; }
    .cell img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .cell .placeholder-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; opacity: 0.5;
      pointer-events: none;
    }

    .cell .remove-btn {
      position: absolute; top: 6px; right: 6px;
      width: 28px; height: 28px;
      border-radius: 50%; border: none;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 5;
      transition: transform 0.15s;
    }
    .cell:hover .remove-btn { display: flex; }
    .cell:active .remove-btn { display: flex; }
    .cell .remove-btn:hover { transform: scale(1.15); }

    .cell .filter-badge {
      position: absolute; bottom: 6px; left: 6px;
      font-size: 10px; padding: 2px 8px;
      border-radius: 999px; pointer-events: none;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .toolbar-btn {
      padding: 8px 14px; border-radius: 10px;
      border: 2px solid transparent;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .toolbar-btn { padding: 6px 10px; font-size: 12px; }
    }

    .layout-thumb {
      width: 48px; height: 36px;
      border-radius: 6px; cursor: pointer;
      border: 2px solid transparent;
      display: grid; gap: 2px; padding: 3px;
      transition: all 0.15s;
    }

    @media (max-width: 480px) {
      .layout-thumb { width: 40px; height: 30px; }
    }

    .layout-thumb.active { transform: scale(1.1); }
    .layout-thumb div { border-radius: 2px; }

    .filter-btn {
      padding: 5px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid;
      transition: all 0.15s;
    }

    @media (max-width: 480px) {
      .filter-btn { padding: 4px 10px; font-size: 11px; }
    }

    .toast-msg {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      z-index: 100; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 90vw;
    }
    .toast-msg.show { opacity: 1; }

    .canvas-img { image-rendering: auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease-out; }

    .crop-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .crop-container {
      background: white; border-radius: 12px;
      max-width: 500px; width: 100%;
      overflow: hidden; display: flex; flex-direction: column;
    }

    .crop-preview {
      position: relative; width: 100%; aspect-ratio: 1;
      background: #f3f4f6; overflow: hidden;
      cursor: grab;
    }

    .crop-preview.dragging { cursor: grabbing; }

    .crop-preview img {
      position: absolute; width: 100%; height: 100%;
      object-fit: cover;
    }

    .crop-grid {
      position: absolute; width: 100%; height: 100%;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,0,0,0.3) 33%, transparent 33%, transparent 66%, rgba(0,0,0,0.3) 66%),
                  linear-gradient(0deg, rgba(0,0,0,0.3) 33%, transparent 33%, transparent 66%, rgba(0,0,0,0.3) 66%);
      background-size: 33.33% 33.33%;
    }

    .crop-actions {
      display: flex; gap: 8px; padding: 16px;
      justify-content: flex-end;
    }

    .crop-actions button {
      padding: 8px 16px; border-radius: 6px; border: none;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }

    .crop-actions .cancel { background: #e5e7eb; color: #374151; }
    .crop-actions .cancel:hover { background: #d1d5db; }
    .crop-actions .apply { background: #3b82f6; color: white; }
    .crop-actions .apply:hover { background: #2563eb; }

    .zoom-control {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; background: #f9fafb; border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
    }

    .zoom-slider {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: #e5e7eb; border-radius: 2px; outline: none;
      cursor: pointer;
    }

    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #3b82f6; cursor: pointer;
    }

    .zoom-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #3b82f6; cursor: pointer; border: none;
    }

    .zoom-value {
      min-width: 40px; text-align: right; font-weight: 600;
      color: #374151;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-gray-50">
  <div class="h-full flex flex-col"><!-- Header -->
   <header class="bg-white border-b border-gray-200 px-4 py-4 md:px-6 md:py-5">
    <h1 class="text-xl md:text-2xl font-bold" style="font-family: 'Syne', sans-serif;">Collage Maker</h1>
    <p class="text-xs md:text-sm text-gray-600 mt-1">Create beautiful photo collages</p>
   </header><!-- Main Content -->
   <div class="flex-1 flex flex-col md:flex-row overflow-hidden gap-4 p-4 md:p-6"><!-- Canvas Area -->
    <div class="flex-1 bg-white rounded-lg shadow-sm overflow-hidden flex flex-col min-h-0">
     <div class="flex-1 overflow-auto p-4">
      <div id="collageGrid" class="collage-grid layout-2x2" style="gap: 6px;"><!-- Cells will be generated here -->
      </div>
     </div>
    </div><!-- Controls Panel -->
    <div class="w-full md:w-64 bg-white rounded-lg shadow-sm overflow-y-auto flex flex-col">
     <div class="p-4 md:p-5 space-y-6 flex-1"><!-- Layouts Section -->
      <div>
       <h3 class="text-sm font-semibold mb-3" style="font-family: 'Syne', sans-serif;">Layouts</h3>
       <div class="grid grid-cols-4 md:grid-cols-3 gap-2"><button onclick="changeLayout('2x2')" class="layout-thumb active" data-layout="2x2" style="grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; background: #f3f4f6; border-color: #3b82f6;">
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('3col')" class="layout-thumb" data-layout="3col" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('hero')" class="layout-thumb" data-layout="hero" style="grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb; grid-row: 1 / -1;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('strip')" class="layout-thumb" data-layout="strip" style="grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('mosaic2')" class="layout-thumb" data-layout="mosaic2" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb; grid-column: 2 / 4; grid-row: 1 / 3;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('focus')" class="layout-thumb" data-layout="focus" style="grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb; grid-row: 1 / -1;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('corner')" class="layout-thumb" data-layout="corner" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb; grid-column: 1 / 3; grid-row: 1 / 3;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('stack')" class="layout-thumb" data-layout="stack" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb; grid-column: 1 / 4;"></div>
         <div style="background: #e5e7eb; grid-column: 1 / 4;"></div>
         <div style="background: #e5e7eb; grid-column: 1 / 4;"></div></button> <button onclick="changeLayout('wave')" class="layout-thumb" data-layout="wave" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb; grid-column: 2 / 4;"></div>
         <div style="background: #e5e7eb;"></div>
         <div style="background: #e5e7eb;"></div></button> <button onclick="changeLayout('spiral')" class="layout-thumb" data-layout="spiral" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; background: #f3f4f6; border-color: #9ca3af;">
         <div style="background: #e5e7eb; grid-column: 1 / 4;"></div>
         <div style="background: #e5e7eb; grid-row: 2 / 4;"></div>
         <div style="background: #e5e7eb;"></div></button>
       </div>
      </div><!-- Filters Section -->
      <div>
       <h3 class="text-sm font-semibold mb-3" style="font-family: 'Syne', sans-serif;">Quick Filters</h3>
       <div class="space-y-2"><button onclick="applyFilter(null)" class="w-full filter-btn" style="border-color: #3b82f6; background: #eff6ff; color: #1e40af;">No Filter</button> <button onclick="applyFilter('grayscale')" class="w-full filter-btn" style="border-color: #9ca3af; color: #6b7280;">Grayscale</button> <button onclick="applyFilter('sepia')" class="w-full filter-btn" style="border-color: #9ca3af; color: #6b7280;">Sepia</button> <button onclick="applyFilter('brightness')" class="w-full filter-btn" style="border-color: #9ca3af; color: #6b7280;">Bright</button>
       </div>
      </div><!-- Download Button --> <button onclick="downloadCollage()" class="w-full toolbar-btn" style="background: #3b82f6; color: white; border-color: #3b82f6;"> <i data-lucide="download" style="width: 16px; height: 16px;"></i> Download </button>
     </div>
    </div>
   </div>
  </div><!-- Hidden Canvas for Download -->
  <canvas id="hiddenCanvas" style="display: none;"></canvas><!-- File Input --> <input id="fileInput" type="file" accept="image/*" style="display: none;"><!-- Toast Message -->
  <div id="toast" class="toast-msg"></div><!-- Crop Modal -->
  <div id="cropModal" style="display: none;" class="crop-modal">
   <div class="crop-container">
    <div class="zoom-control"><span style="font-weight: 500;">Auto</span> <input type="radio" name="cropMode" value="auto" checked onchange="cropMode='auto'"> <span style="font-weight: 500; margin-left: 12px;">Manual</span> <input type="radio" name="cropMode" value="manual" onchange="cropMode='manual'">
    </div>
    <div class="crop-preview" id="cropPreview"><img id="cropImage" src="" alt="Crop">
     <div class="crop-grid"></div>
    </div>
    <div class="crop-actions"><button class="cancel" onclick="cancelCrop()">Cancel</button> <button class="apply" onclick="applyCrop()">Apply</button>
    </div>
   </div>
  </div><!-- Zoom Modal -->
  <div id="zoomModal" style="display: none;" class="crop-modal">
   <div class="crop-container">
    <div class="zoom-control"><i data-lucide="zoom-out" style="width: 16px; height: 16px; color: #6b7280;"></i> <input type="range" class="zoom-slider" id="zoomSlider" min="100" max="300" value="100" oninput="updateZoom(this.value)"> <span class="zoom-value" id="zoomValue">100%</span>
    </div>
    <div class="crop-preview" id="zoomPreview"><img id="zoomImage" src="" alt="Zoom">
    </div>
    <div class="crop-actions"><button class="cancel" onclick="cancelZoom()">Cancel</button> <button class="apply" onclick="applyZoom()">Apply</button>
    </div>
   </div>
  </div>
  <script>
    let currentLayout = '2x2';
    let cells = [];
    let cropMode = 'auto';
    let currentEditingIndex = -1;
    let zoomLevel = 100;
    
    const cellCount = { '2x2': 4, '3col': 6, 'hero': 5, 'mosaic': 6, 'strip': 4, 'tall': 6, 'mosaic2': 6, 'focus': 5, 'quad': 6, 'frame': 6, 'zigzag': 6, 'split': 6, 'corner': 6, 'stack': 6, 'wave': 6, 'spiral': 5 };

    function initCollage() {
      createCells(cellCount[currentLayout]);
    }

    function createCells(count) {
      const grid = document.getElementById('collageGrid');
      grid.innerHTML = '';
      cells = [];

      for (let i = 0; i < count; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = `
          <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;" class="placeholder-content">
            <i data-lucide="image" style="width: 32px; height: 32px;"></i>
          </div>
          <button class="remove-btn" style="background: rgba(0,0,0,0.6); color: white;" onclick="removeImage(${i})">
            <i data-lucide="x" style="width: 16px; height: 16px;"></i>
          </button>
          <span class="filter-badge"></span>
        `;
        cell.addEventListener('click', () => uploadImage(i));
        grid.appendChild(cell);
        cells.push({ element: cell, image: null, filter: null, originalSrc: null });
      }

      lucide.createIcons();
    }

    function changeLayout(layout) {
      currentLayout = layout;
      document.querySelectorAll('.layout-thumb').forEach(t => {
        t.classList.toggle('active', t.dataset.layout === layout);
        t.style.borderColor = t.dataset.layout === layout ? '#3b82f6' : '#9ca3af';
      });

      const grid = document.getElementById('collageGrid');
      grid.className = `collage-grid layout-${layout}`;
      createCells(cellCount[layout]);
    }

    function uploadImage(index) {
      const fileInput = document.getElementById('fileInput');
      fileInput.dataset.cellIndex = index;
      fileInput.click();
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const index = parseInt(e.target.dataset.cellIndex);
        const img = document.createElement('img');
        img.src = event.target.result;
        img.className = 'canvas-img';

        const cell = cells[index];
        cell.element.innerHTML = `
          <button class="remove-btn" style="background: rgba(0,0,0,0.6); color: white;" onclick="removeImage(${index})">
            <i data-lucide="x" style="width: 16px; height: 16px;"></i>
          </button>
          <span class="filter-badge"></span>
        `;
        cell.element.appendChild(img);
        cell.image = img;
        cell.originalSrc = event.target.result;
        applyStoredFilter(index);
        lucide.createIcons();
      };
      reader.readAsDataURL(file);
    });

    function removeImage(index) {
      const cell = cells[index];
      const placeholder = document.createElement('div');
      placeholder.style.cssText = 'position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;';
      placeholder.className = 'placeholder-content';
      placeholder.innerHTML = '<i data-lucide="image" style="width: 32px; height: 32px;"></i>';

      cell.element.innerHTML = `
        <button class="remove-btn" style="background: rgba(0,0,0,0.6); color: white; display: none;" onclick="removeImage(${index})">
          <i data-lucide="x" style="width: 16px; height: 16px;"></i>
        </button>
        <span class="filter-badge"></span>
      `;
      cell.element.appendChild(placeholder);
      cell.image = null;
      cell.filter = null;
      cell.originalSrc = null;
      lucide.createIcons();
    }

    function applyFilter(filter) {
      cells.forEach(cell => {
        if (cell.image) {
          cell.filter = filter;
          applyStoredFilter(cells.indexOf(cell));
        }
      });
      showToast(`${filter ? filter.charAt(0).toUpperCase() + filter.slice(1) : 'No'} filter applied`);
    }

    function applyStoredFilter(index) {
      const cell = cells[index];
      if (!cell.image) return;

      const filters = {
        grayscale: 'grayscale(100%)',
        sepia: 'sepia(100%)',
        brightness: 'brightness(1.3)'
      };

      cell.image.style.filter = cell.filter ? filters[cell.filter] : '';
      const badge = cell.element.querySelector('.filter-badge');
      badge.textContent = cell.filter ? cell.filter : '';
      badge.style.display = cell.filter ? 'block' : 'none';
    }

    function startCrop() {
      if (!cells.some(c => c.image)) {
        showToast('Add an image first');
        return;
      }
      const imageCell = cells.find(c => c.image);
      currentEditingIndex = cells.indexOf(imageCell);
      openCropModal();
    }

    function openCropModal() {
      const cell = cells[currentEditingIndex];
      if (!cell.image) {
        showToast('No image to crop');
        return;
      }

      const modal = document.getElementById('cropModal');
      const img = document.getElementById('cropImage');
      img.src = cell.originalSrc;
      modal.style.display = 'flex';
      cropMode = 'auto';
      document.querySelector('input[value="auto"]').checked = true;
      lucide.createIcons();
    }

    function cancelCrop() {
      document.getElementById('cropModal').style.display = 'none';
    }

    function applyCrop() {
      const img = document.getElementById('cropImage');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const tempImg = new Image();
      tempImg.crossOrigin = 'anonymous';
      
      tempImg.onload = () => {
        const size = 300;
        canvas.width = size;
        canvas.height = size;
        
        if (cropMode === 'auto') {
          // Auto: fit image to square, maintaining aspect ratio
          const scale = Math.max(size / tempImg.width, size / tempImg.height);
          const width = tempImg.width * scale;
          const height = tempImg.height * scale;
          const x = (size - width) / 2;
          const y = (size - height) / 2;
          ctx.drawImage(tempImg, x, y, width, height);
        } else {
          // Manual: center crop
          const scale = Math.max(size / tempImg.width, size / tempImg.height);
          const width = tempImg.width * scale;
          const height = tempImg.height * scale;
          const x = (size - width) / 2;
          const y = (size - height) / 2;
          ctx.drawImage(tempImg, x, y, width, height);
        }

        const cell = cells[currentEditingIndex];
        const croppedImg = document.createElement('img');
        croppedImg.src = canvas.toDataURL();
        croppedImg.className = 'canvas-img';
        croppedImg.style.objectFit = 'cover';
        
        cell.element.innerHTML = `
          <button class="remove-btn" style="background: rgba(0,0,0,0.6); color: white;" onclick="removeImage(${currentEditingIndex})">
            <i data-lucide="x" style="width: 16px; height: 16px;"></i>
          </button>
          <span class="filter-badge"></span>
        `;
        cell.element.appendChild(croppedImg);
        cell.image = croppedImg;
        cell.originalSrc = canvas.toDataURL();
        applyStoredFilter(currentEditingIndex);
        lucide.createIcons();
        
        cancelCrop();
        showToast('Image cropped!');
      };
      
      tempImg.onerror = () => {
        showToast('Error loading image');
      };
      
      tempImg.src = img.src;
    }

    function startZoom() {
      if (!cells.some(c => c.image)) {
        showToast('Add an image first');
        return;
      }
      const imageCell = cells.find(c => c.image);
      currentEditingIndex = cells.indexOf(imageCell);
      openZoomModal();
    }

    function openZoomModal() {
      const cell = cells[currentEditingIndex];
      if (!cell.image) {
        showToast('No image to zoom');
        return;
      }

      const modal = document.getElementById('zoomModal');
      const img = document.getElementById('zoomImage');
      img.src = cell.originalSrc;
      document.getElementById('zoomSlider').value = 100;
      zoomLevel = 100;
      updateZoom(100);
      modal.style.display = 'flex';
      lucide.createIcons();
    }

    function cancelZoom() {
      document.getElementById('zoomModal').style.display = 'none';
    }

    function updateZoom(value) {
      zoomLevel = parseInt(value);
      document.getElementById('zoomValue').textContent = zoomLevel + '%';
      const zoomImage = document.getElementById('zoomImage');
      zoomImage.style.transform = `scale(${zoomLevel / 100})`;
    }

    function applyZoom() {
      const img = document.getElementById('zoomImage');
      const preview = document.getElementById('zoomPreview');
      
      const canvas = document.createElement('canvas');
      canvas.width = 300;
      canvas.height = 300;
      
      const ctx = canvas.getContext('2d');
      const tempImg = new Image();
      tempImg.crossOrigin = 'anonymous';
      
      tempImg.onload = () => {
        const scale = zoomLevel / 100;
        const x = (canvas.width - tempImg.width * scale) / 2;
        const y = (canvas.height - tempImg.height * scale) / 2;
        
        ctx.drawImage(tempImg, x, y, tempImg.width * scale, tempImg.height * scale);
        
        const cell = cells[currentEditingIndex];
        const zoomedImg = document.createElement('img');
        zoomedImg.src = canvas.toDataURL();
        zoomedImg.className = 'canvas-img';
        zoomedImg.style.objectFit = 'cover';
        
        cell.element.innerHTML = `
          <button class="remove-btn" style="background: rgba(0,0,0,0.6); color: white;" onclick="removeImage(${currentEditingIndex})">
            <i data-lucide="x" style="width: 16px; height: 16px;"></i>
          </button>
          <span class="filter-badge"></span>
        `;
        cell.element.appendChild(zoomedImg);
        cell.image = zoomedImg;
        cell.originalSrc = canvas.toDataURL();
        applyStoredFilter(currentEditingIndex);
        lucide.createIcons();
        
        cancelZoom();
        showToast('Image zoomed!');
      };
      
      tempImg.onerror = () => {
        showToast('Error loading image');
      };
      
      tempImg.src = img.src;
    }

    function downloadCollage() {
      if (!cells.some(c => c.image)) {
        showToast('Add images first');
        return;
      }

      const grid = document.getElementById('collageGrid');
      const width = 1200;
      const height = 900;

      const canvas = document.getElementById('hiddenCanvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);

      html2canvas(grid, { scale: 2, useCORS: true }).then((canvasResult) => {
        ctx.drawImage(canvasResult, 0, 0);
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.download = 'collage.jpg';
        link.click();
        showToast('Collage downloaded!');
      }).catch(() => {
        showToast('Download failed');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    initCollage();
    lucide.createIcons();
  </script>
