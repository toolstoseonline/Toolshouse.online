<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Tool</title>
    <style>
        /* CSS: Styling your tool */
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #1e293b; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>Paste your video link below to get started.</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com...">
        <button onclick="handleDownload()">Get Download Link</button>
        <div id="status"></div>
    </div>

    <script>
        /* JavaScript: Handling the logic */
        function handleDownload() {
            const url = document.getElementById('videoUrl').value;
            const status = document.getElementById('status');

            if (!url) {
                status.innerText = "❌ Please paste a valid URL first!";
                status.style.color = "red";
                return;
            }

            status.innerText = "⏳ Processing your request...";
            status.style.color = "#2563eb";

            // Note: Since GitHub Pages is static, you usually connect to an API here.
            // For now, we will simulate a redirect to a downloader service.
            setTimeout(() => {
                status.innerHTML = `✅ Ready! <a href="https://www.y2mate.com{encodeURIComponent(url)}" target="_blank" style="color: blue; text-decoration: underline;">Click here to download</a>`;
            }, 1500);
        }
    </script>

</body>
</html>
