        .loading {
            display: none;

        /* Mobile file input fix */

        }

    </style>
</head>
<body>

    </div>
    <div class="toast" id="toast">Action completed!</div>

    <div class="container">
        <div class="header">
            <h1>📄 HTML to PDF Converter</h1>
            <p>Professional client-side PDF generation with live preview</p>
        </div>

        <div class="controls">
            <div class="controls-grid">
                <div class="control-group">
                    <label class="control-label">📏 Page Size</label>
                    <select class="control-input" id="pageSize">
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>

                    <label class="control-label">🔄 Orientation</label>
                    <select class="control-input" id="orientation">
                        <option value="portrait">Portrait</option>

                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">📐 Margins (mm)</label>
                    <input type="number" class="control-input" id="margins" value="10" min="0" max="50">
                </div>
            </div>
            
            <div style="margin-top: 15px;">
                <label class="control-label">🎨 Quick Templates:</label>
                <div class="template-selector" id="templateSelector">
                    <button class="template-btn" data-template="blank">Blank</button>
                    <button class="template-btn" data-template="resume">Resume</button>
                    <button class="template-btn" data-template="invoice">Invoice</button>
                    <button class="template-btn" data-template="report">Report</button>
                    <button class="template-btn" data-template="certificate">Certificate</button>
                </div>
            </div>
        </div>

        <div class="converter-grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon">&lt;/&gt;</div>
                        HTML Source
                    </div>
                    <div class="panel-actions">
                        <label class="file-input-label" id="fileInputLabel">
                            📁 Load File
                            <input type="file" id="fileInput" accept=".html,.htm,.txt">
                        </label>
                        <button class="btn" id="clearBtn">🗑️ Clear</button>
                    </div>
                </div>
                <div class="panel-content">
                    <textarea id="htmlInput" placeholder="Enter your HTML code here..."></textarea>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon">👁</div>
                        Live Preview
                    </div>
                    <div class="panel-actions">
                        <button class="btn" id="refreshBtn">🔄 Refresh</button>
                    </div>
                </div>
                <div class="panel-content">
                    <iframe id="previewFrame" class="preview-frame" title="Preview"></iframe>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="downloadBtn">
                📄 Download PDF
            </button>
            <button class="btn btn-success" id="printBtn">
                🖨️ Print
            </button>
        </div>
        <footer>
            <p>🔒 100% Client-side - Your data never leaves your device</p>
        </footer>
    </div>

    <script>
        // DOM Elements
        const htmlInput = document.getElementById('htmlInput');
        const previewFrame = document.getElementById('previewFrame');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const overlay = document.getElementById('overlay');
        const toast = document.getElementById('toast');
        const clearBtn = document.getElementById('clearBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const printBtn = document.getElementById('printBtn');
        const pageSize = document.getElementById('pageSize');
        const orientation = document.getElementById('orientation');
        const margins = document.getElementById('margins');

        // Templates
        const templates = {
            blank: `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; margin: 0; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Blank Document</h1>
    <p>Start typing your content here...</p>
</body>
</html>`,
            
            resume: `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
        .header { text-align: center; border-bottom: 3px solid #2c3e50; padding-bottom: 20px; margin-bottom: 30px; }
        .name { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 0; }
        .section-title { font-size: 20px; color: #2c3e50; border-bottom: 2px solid #ecf0f1; margin: 20px 0 10px; }
        .skills { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill { background: #ecf0f1; padding: 5px 15px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="name">John Doe</h1>
        <p>Web Developer | john.doe@email.com | (123) 456-7890</p>
    </div>
    <div class="section-title">Professional Summary</div>
    <p>Experienced web developer with 5+ years of expertise in modern web technologies.</p>
    <div class="section-title">Skills</div>
    <div class="skills"><span class="skill">HTML/CSS</span><span class="skill">JavaScript</span><span class="skill">React</span><span class="skill">Node.js</span></div>
</body>
</html>`,
            
            invoice: `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; margin: 0; }
        .header { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .company { font-size: 24px; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #34495e; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .total { text-align: right; margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="company">Your Company</div>
        <div><h1>INVOICE</h1>Date: ${new Date().toLocaleDateString()}</div>
    </div>
    <table><thead><tr><th>Description</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
    <tbody><tr><td>Web Design</td><td>1</td><td>$500</td><td>$500</td></tr>
    <tr><td>Development</td><td>10</td><td>$100</td><td>$1000</td></tr></tbody></table>
    <div class="total">Total: $1500.00</div>
</body>
</html>`,
            
            report: `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; line-height: 1.6; }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .metric { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>
    <h1>Quarterly Report</h1>
    <p>Date: ${new Date().toLocaleDateString()}</p>
    <div class="metric"><strong>Revenue:</strong> $2.4M | <strong>Growth:</strong> +18%</div>
    <h2>Summary</h2>
    <p>This quarter showed significant growth across all metrics. Revenue increased by 18% compared to previous quarter.</p>
</body>
</html>`,
            
            certificate: `<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Georgia, serif; }
        .certificate { background: white; padding: 50px; text-align: center; border: 10px solid #d4af37; max-width: 600px; }
        h1 { color: #d4af37; font-size: 42px; margin-bottom: 20px; }
        .name { font-size: 32px; font-weight: bold; margin: 20px 0; border-bottom: 2px solid #d4af37; display: inline-block; }
    </style>
</head>
<body>
    <div class="certificate">
        <h1>CERTIFICATE</h1>
        <p>of Achievement</p>
        <div class="name">John Doe</div>
        <p>For outstanding performance</p>
        <p>Date: ${new Date().toLocaleDateString()}</p>
    </div>
</body>
</html>`
        };

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.background = isError ? '#dc3545' : '#333';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.style.background = '#333';
            }, 3000);
        }

        function updatePreview() {
            const content = htmlInput.value;
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            previewFrame.src = url;
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        let previewTimeout;
        function debouncedPreview() {
            clearTimeout(previewTimeout);
            previewTimeout = setTimeout(updatePreview, 800);
        }

        function loadTemplate(templateName) {
            if (templates[templateName]) {
                htmlInput.value = templates[templateName];
                updatePreview();
                showToast(`${templateName.charAt(0).toUpperCase() + templateName.slice(1)} template loaded`);
            }
        }

        async function generatePDF() {
            const content = htmlInput.value.trim();
            if (!content) {
                showToast('Please enter HTML content first', true);
                return;
            }

            const element = document.createElement('div');
            element.innerHTML = content;
            
            const marginVal = parseInt(margins.value) || 10;
            
            const opt = {
                margin: [marginVal, marginVal, marginVal, marginVal],
                filename: `document_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: false, logging: false },
                jsPDF: { unit: 'mm', format: pageSize.value, orientation: orientation.value }
            };

            loading.classList.add('active');
            overlay.classList.add('active');

            try {
                await html2pdf().set(opt).from(element).save();
                showToast('PDF downloaded successfully!');
            } catch (err) {
                console.error(err);
                showToast('Error generating PDF: ' + err.message, true);
            } finally {
                loading.classList.remove('active');
                overlay.classList.remove('active');
            }
        }

        function printDocument() {
            const content = htmlInput.value.trim();
            if (!content) {
                showToast('Please enter HTML content first', true);
                return;
            }
            const printWindow = window.open('', '_blank');
            printWindow.document.write(content);
            printWindow.document.close();
            printWindow.print();
        }

        // Event Listeners
        htmlInput.addEventListener('input', debouncedPreview);
        refreshBtn.addEventListener('click', updatePreview);
        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all HTML content?')) {
                htmlInput.value = '';
                updatePreview();
                showToast('Editor cleared');
            }
        });
        downloadBtn.addEventListener('click', generatePDF);
        printBtn.addEventListener('click', printDocument);

        // Template buttons
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTemplate(btn.dataset.template);
            });
        });

        // File input - Fixed for mobile
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    htmlInput.value = e.target.result;
                    updatePreview();
                    showToast(`Loaded: ${file.name}`);
                };
                reader.onerror = function() {
                    showToast('Error reading file', true);
                };
                reader.readAsText(file);
            }
            // Reset file input so same file can be loaded again
            fileInput.value = '';
        });

        // Initialize with sample content
        htmlInput.value = templates.blank;
        updatePreview();
        
        // Set active template
        document.querySelector('.template-btn[data-template="blank"]').classList.add('active');
    </script>
</body>
</html>
