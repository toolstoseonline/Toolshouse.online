<body>

<div class="container">
  <!-- page title changed to "Voice Recorder" with pop vibe -->
  <h1>Voice Recorder <span>🎤 pop</span></h1>

  <!-- timer block with extra pop shadows -->
  <div class="timer-wrapper">
    <div class="timer-display" id="timerDisplay">00:00.0</div>
  </div>
  <div class="timer-label">⏱️ recording time</div>

  <!-- large tappable buttons for mobile -->
  <div class="button-group">
    <button class="record" onclick="startRecording()">🔴 Record</button>
    <button class="stop" onclick="stopRecording()" disabled>⏹️ Stop</button>
    <button class="download" onclick="downloadAudio()" disabled>📥 Download</button>
  </div>

  <!-- audio player with mobile-friendly style -->
  <div class="audio-player">
    <audio id="audioPlayback" controls></audio>
  </div>

  <!-- status with pop design -->
  <div class="status-pill">
    <span id="status">✨ ready to record</span>
  </div>
  <div class="subtle-note">
    <span>👆 tap Record – timer starts</span>
  </div>
</div>

<script>
let mediaRecorder;
let audioChunks = [];
let audioBlob;

// Timer variables
let timerInterval = null;
let startTime = 0;
let elapsedSeconds = 0;
let isRecording = false;

const timerElement = document.getElementById('timerDisplay');
const recordBtn = document.querySelector(".record");
const stopBtn = document.querySelector(".stop");
const downloadBtn = document.querySelector(".download");
const statusDiv = document.getElementById("status");
const audioPlayback = document.getElementById("audioPlayback");

function formatTime(totalSeconds) {
    let mins = Math.floor(totalSeconds / 60);
    let secs = Math.floor(totalSeconds % 60);
    let tenth = Math.floor((totalSeconds - Math.floor(totalSeconds)) * 10);
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${tenth}`;
}

function updateTimerDisplay() {
    if (isRecording) {
        let now = Date.now();
        let diff = (now - startTime) / 1000;
        let displayTime = elapsedSeconds + diff;
        timerElement.textContent = formatTime(displayTime);
    } else {
        timerElement.textContent = formatTime(elapsedSeconds);
    }
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    startTime = Date.now();
    isRecording = true;
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 100);
}

function stopTimer() {
    if (isRecording) {
        let now = Date.now();
        let diff = (now - startTime) / 1000;
        elapsedSeconds = elapsedSeconds + diff;
        isRecording = false;
    }
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    updateTimerDisplay();
}

function resetTimer() {
    stopTimer();
    elapsedSeconds = 0;
    isRecording = false;
    updateTimerDisplay();
}

async function startRecording(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        resetTimer();          // fresh recording

        mediaRecorder.start();
        startTimer();

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            stopTimer();         // freeze timer

            audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            const audioURL = URL.createObjectURL(audioBlob);
            audioPlayback.src = audioURL;
            downloadBtn.disabled = false;

            // stop microphone tracks
            stream.getTracks().forEach(track => track.stop());
        };

        // update UI
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        downloadBtn.disabled = true;   
        statusDiv.innerText = "🔴 recording now...";
    }
    catch(error){
        alert("🎤 Please allow microphone access to record.");
    }
}

function stopRecording(){
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        stopTimer(); 
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        statusDiv.innerText = "⏸ stopped";
    }
}

function downloadAudio(){
    if (audioBlob) {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(audioBlob);
        a.download = "voice-recording.webm";
        a.click();
    } else {
        alert("No recording yet. Tap Record first.");
    }
}

// clean up timer on page hide
window.addEventListener('beforeunload', function() {
    if (timerInterval) clearInterval(timerInterval);
});
</script>
