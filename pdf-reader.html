<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Free PDF Reader Online – Read PDF in Browser – Tools House Online</title>
<meta name="description" content="Read PDF files online free. Open PDFs in browser on mobile & PC. No download required. Fast, secure & works on all devices instantly.">
<link rel="canonical" href="https://www.toolshouse.online/pdf-reader.html">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    html, body { height: 100%; margin: 0; }
    .app-wrap { height: 100%; overflow: auto; }
    .pdf-canvas { max-width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.18); border-radius: 8px; }
    .drop-zone { border: 2.5px dashed #6366f1; transition: all 0.25s; }
    .drop-zone.dragover { background: #eef2ff; border-color: #4f46e5; transform: scale(1.01); }
    .ctrl-btn { transition: all 0.15s; }
    .ctrl-btn:hover { background: #4f46e5; color: #fff; }
    .ctrl-btn:active { transform: scale(0.94); }
    .toast { animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    input[type="range"] { accent-color: #6366f1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 8px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-50">
  <div class="app-wrap flex flex-col" id="appWrap"><!-- Header -->
   <header class="flex items-center justify-between px-4 md:px-6 py-3 bg-white border-b border-slate-200 shrink-0">
    <div class="flex items-center gap-2.5"><button class="md:hidden w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="toggleSidebar()" id="sidebarToggle" title="Menu"> <i data-lucide="menu" style="width:18px;height:18px;"></i> </button>
     <div class="w-9 h-9 rounded-lg bg-indigo-500 flex items-center justify-center"><i data-lucide="file-text" style="width:20px;height:20px;color:#fff;"></i>
     </div>
     <h1 id="appTitle" class="text-lg md:text-xl font-bold text-slate-800">PDF Reader</h1>
    </div>
    <div class="flex items-center gap-2">
     <div id="fileInfo" class="hidden text-xs md:text-sm text-slate-500 truncate max-w-[140px] md:max-w-xs"></div>
    </div>
   </header><!-- Main Content Wrapper -->
   <div class="flex flex-1 overflow-hidden"><!-- Left Sidebar -->
    <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 shrink-0 overflow-hidden">
     <div class="p-4 border-b border-slate-100">
      <h2 class="text-sm font-semibold text-slate-700 flex items-center gap-2"><i data-lucide="history" style="width:16px;height:16px;color:#64748b;"></i> Recently Opened</h2>
     </div>
     <div id="sidebarList" class="flex-1 overflow-y-auto">
      <div class="p-4 text-center text-xs text-slate-400">
       No PDFs opened yet
      </div>
     </div>
    </aside><!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden"><!-- Header -->
     <header class="flex items-center justify-between px-4 md:px-6 py-3 bg-white border-b border-slate-200 shrink-0">
      <div class="flex items-center gap-2.5"><button class="md:hidden w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="toggleSidebar()" id="sidebarToggle" title="Menu"> <i data-lucide="menu" style="width:18px;height:18px;"></i> </button>
       <div class="w-9 h-9 rounded-lg bg-indigo-500 flex items-center justify-center"><i data-lucide="file-text" style="width:20px;height:20px;color:#fff;"></i>
       </div>
       <h1 id="appTitle" class="text-lg md:text-xl font-bold text-slate-800">PDF Reader</h1>
      </div>
      <div class="flex items-center gap-2">
       <button class="hidden md:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition text-sm font-medium" onclick="toggleLibrary()" id="libraryBtn" title="View Library"> <i data-lucide="library" style="width:16px;height:16px;"></i> <span class="hidden md:inline">Library</span> </button>
       <div id="fileInfo" class="hidden text-xs md:text-sm text-slate-500 truncate max-w-[140px] md:max-w-xs"></div>
      </div>
     </header><!-- Upload Screen -->
     <div id="uploadScreen" class="flex-1 flex items-center justify-center p-4">
      <div class="drop-zone rounded-2xl p-8 md:p-14 flex flex-col items-center text-center cursor-pointer w-full max-w-lg" id="dropZone" onclick="document.getElementById('fileInput').click()">
       <div class="w-20 h-20 rounded-full bg-indigo-50 flex items-center justify-center mb-5"><i data-lucide="upload-cloud" style="width:40px;height:40px;color:#6366f1;"></i>
       </div>
       <p class="text-xl font-semibold text-slate-700 mb-2">Drop your PDF here</p>
       <p class="text-slate-400 text-sm mb-5">or click to browse files</p><span class="inline-flex items-center gap-2 bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-medium text-sm hover:bg-indigo-600 transition"> <i data-lucide="folder-open" style="width:16px;height:16px;"></i> Choose PDF </span> <input type="file" id="fileInput" accept="application/pdf" class="hidden">
      </div>
     </div><!-- Reader Screen -->
     <div id="readerScreen" class="hidden flex-1 flex flex-col overflow-hidden"><!-- Toolbar -->
      <div class="flex items-center justify-between gap-2 px-3 md:px-5 py-2 bg-white border-b border-slate-100 shrink-0 flex-wrap">
       <div class="flex items-center gap-1.5"><button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="prevPage()" title="Previous"> <i data-lucide="chevron-left" style="width:18px;height:18px;"></i> </button> <span class="text-sm font-medium text-slate-600 min-w-[80px] text-center"> <span id="currentPage">1</span> / <span id="totalPages">1</span> </span> <button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="nextPage()" title="Next"> <i data-lucide="chevron-right" style="width:18px;height:18px;"></i> </button>
       </div>
       <div class="flex items-center gap-1.5"><button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="changeZoom(-0.2)" title="Zoom Out"> <i data-lucide="zoom-out" style="width:16px;height:16px;"></i> </button> <span id="zoomLevel" class="text-xs font-medium text-slate-500 w-12 text-center">100%</span> <button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="changeZoom(0.2)" title="Zoom In"> <i data-lucide="zoom-in" style="width:16px;height:16px;"></i> </button> <button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="fitWidth()" title="Fit Width"> <i data-lucide="maximize-2" style="width:16px;height:16px;"></i> </button>
       </div>
       <div class="flex items-center gap-1.5"><button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="toggleAllPages()" id="viewToggle" title="View All"> <i data-lucide="layers" style="width:16px;height:16px;"></i> </button> <button class="ctrl-btn w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-600" onclick="closePdf()" title="Close"> <i data-lucide="x" style="width:16px;height:16px;"></i> </button>
       </div>
      </div><!-- Page Slider -->
      <div class="px-4 py-1.5 bg-white border-b border-slate-50 shrink-0" id="sliderBar"><input type="range" id="pageSlider" min="1" max="1" value="1" class="w-full h-1.5 cursor-pointer" oninput="goToPage(parseInt(this.value))">
      </div><!-- Canvas Area -->
      <div id="canvasContainer" class="flex-1 overflow-auto flex justify-center p-4 md:p-6 bg-slate-100">
       <div id="singleView">
        <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
       </div>
       <div id="allPagesView" class="hidden flex flex-col items-center gap-6 w-full">
       </div>
      </div>
     </div><!-- Library Modal -->
     <div id="libraryModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[80vh] flex flex-col">
       <div class="flex items-center justify-between p-5 border-b border-slate-100">
        <h2 class="text-lg font-semibold text-slate-800">PDF Library</h2><button class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center" onclick="closeLibrary()"> <i data-lucide="x" style="width:18px;height:18px;color:#64748b;"></i> </button>
       </div>
       <div id="emptyState" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
        <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mb-3"><i data-lucide="inbox" style="width:32px;height:32px;color:#94a3b8;"></i>
        </div>
        <p class="text-slate-500 text-sm">No PDFs loaded yet</p>
       </div>
       <div id="pdfList" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-3 p-5">
       </div>
      </div>
     </div><!-- Mobile Mini Library Bar -->
     <div id="mobileMiniBar" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-2 px-2 max-h-20 overflow-x-auto z-20 shadow-lg">
      <div class="flex items-center gap-2">
       <h4 class="text-xs font-semibold text-slate-600 shrink-0 whitespace-nowrap">PDFs:</h4>
       <div id="mobileMiniLibrary" class="flex gap-2 overflow-x-auto pb-1">
        <div class="text-xs text-slate-400 py-2">
         None loaded
        </div>
       </div>
      </div>
     </div><!-- Mobile Sidebar Overlay -->
     <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-30 md:hidden" onclick="closeSidebar()"></div>
    </div><!-- Right Sidebar - All PDFs Mini Section -->
    <aside id="rightSidebar" class="hidden lg:flex flex-col w-64 bg-white border-l border-slate-200 shrink-0 overflow-hidden">
     <div class="p-4 border-b border-slate-100">
      <h2 class="text-sm font-semibold text-slate-700 flex items-center gap-2"><i data-lucide="library" style="width:16px;height:16px;color:#64748b;"></i> All PDFs</h2>
     </div>
     <div id="rightSidebarLibrary" class="flex-1 overflow-y-auto">
      <div class="p-4 text-center text-xs text-slate-400">
       No PDFs loaded yet
      </div>
     </div>
    </aside>
   </div>
   <script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null, pageNum = 1, scale = 1.0, rendering = false, allPagesMode = false, pdfLibrary = [], recentPdfs = [];

  const defaultConfig = {
    app_title: 'PDF Reader',
    primary_color: '#6366f1',
    surface_color: '#ffffff',
    text_color: '#1e293b',
    accent_color: '#4f46e5',
    bg_color: '#f1f5f9',
    font_family: 'DM Sans'
  };

  function applyConfig(config) {
    const c = { ...defaultConfig, ...config };
    document.getElementById('appTitle').textContent = c.app_title;
    document.body.style.fontFamily = `${c.font_family}, sans-serif`;
  }

  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => {
      const c = (key) => ({
        get: () => config[key] || defaultConfig[key],
        set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
      });
      return {
        recolorables: [c('bg_color'), c('surface_color'), c('text_color'), c('primary_color'), c('accent_color')],
        borderables: [],
        fontEditable: c('font_family'),
        fontSizeable: undefined
      };
    },
    mapToEditPanelValues: (config) => new Map([
      ['app_title', config.app_title || defaultConfig.app_title]
    ])
  });

  // Drag & drop
  const dropZone = document.getElementById('dropZone');
  ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }));
  dropZone.addEventListener('drop', ev => { if (ev.dataTransfer.files[0]) loadFile(ev.dataTransfer.files[0]); });
  document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast fixed bottom-4 left-4 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm z-50';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  async function loadFile(file) {
    if (file.type !== 'application/pdf') { showToast('Please select a PDF file'); return; }
    const data = await file.arrayBuffer();
    try {
      pdfDoc = await pdfjsLib.getDocument({ data }).promise;
      const pdfEntry = { name: file.name, data, doc: pdfDoc, loaded: new Date().toLocaleTimeString() };
      pdfLibrary.push(pdfEntry);
      addToRecent({ name: file.name, index: pdfLibrary.length - 1, pages: pdfDoc.numPages });
      pageNum = 1; allPagesMode = false;
      document.getElementById('totalPages').textContent = pdfDoc.numPages;
      document.getElementById('pageSlider').max = pdfDoc.numPages;
      document.getElementById('fileInfo').textContent = file.name;
      document.getElementById('fileInfo').classList.remove('hidden');
      document.getElementById('uploadScreen').classList.add('hidden');
      document.getElementById('readerScreen').classList.remove('hidden');
      document.getElementById('allPagesView').classList.add('hidden');
      document.getElementById('singleView').classList.remove('hidden');
      updateLibraryUI();
      fitWidth();
    } catch { showToast('Could not read this PDF'); }
  }

  function addToRecent(pdf) {
    recentPdfs = recentPdfs.filter(p => p.name !== pdf.name);
    recentPdfs.unshift({ ...pdf, timestamp: new Date() });
    if (recentPdfs.length > 8) recentPdfs.pop();
    updateSidebarUI();
  }

  function formatDateTime(date) {
    const now = new Date();
    const diff = now - date;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 7) return `${days}d ago`;
    
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function updateSidebarUI() {
    const list = document.getElementById('sidebarList');
    if (recentPdfs.length === 0) {
      list.innerHTML = '<div class="p-4 text-center text-xs text-slate-400">No PDFs opened yet</div>';
      return;
    }
    list.innerHTML = recentPdfs.map((pdf, idx) => `
      <button onclick="openPdfFromLibrary(${pdf.index})" class="w-full text-left px-4 py-3 border-b border-slate-50 hover:bg-indigo-50 transition flex items-start gap-2 group">
        <i data-lucide="file-pdf" style="width:14px;height:14px;color:#6366f1;margin-top:2px;" class="shrink-0"></i>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-medium text-slate-700 truncate group-hover:text-indigo-600">${pdf.name}</p>
          <p class="text-xs text-slate-400 mt-0.5">${pdf.pages} pages • ${formatDateTime(pdf.timestamp)}</p>
        </div>
      </button>
    `).join('');
    lucide.createIcons();
    updateMiniLibrary();
  }

  function updateMiniLibrary() {
    const miniMobile = document.getElementById('mobileMiniLibrary');
    const rightSidebarLib = document.getElementById('rightSidebarLibrary');
    
    if (pdfLibrary.length === 0) {
      miniMobile.innerHTML = '<div class="text-xs text-slate-400 py-2">None loaded</div>';
      rightSidebarLib.innerHTML = '<div class="p-4 text-center text-xs text-slate-400">No PDFs loaded yet</div>';
      return;
    }
    
    const mobileThumbsHTML = pdfLibrary.map((pdf, idx) => `
      <button onclick="openPdfFromLibrary(${idx})" class="h-14 min-w-12 rounded border border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 transition flex items-center justify-center group" title="${pdf.name}">
        <i data-lucide="file-pdf" style="width:18px;height:18px;color:#6366f1;" class="group-hover:scale-110 transition"></i>
      </button>
    `).join('');
    
    miniMobile.innerHTML = mobileThumbsHTML;
    
    const rightSidebarHTML = pdfLibrary.map((pdf, idx) => `
      <button onclick="openPdfFromLibrary(${idx})" class="w-full text-left px-3 py-2 border-b border-slate-50 hover:bg-indigo-50 transition flex items-start gap-2 group">
        <i data-lucide="file-pdf" style="width:14px;height:14px;color:#6366f1;margin-top:3px;" class="shrink-0"></i>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-medium text-slate-700 truncate group-hover:text-indigo-600">${pdf.name}</p>
          <p class="text-xs text-slate-400 mt-0.5">${pdf.doc.numPages} pages</p>
        </div>
      </button>
    `).join('');
    
    rightSidebarLib.innerHTML = rightSidebarHTML;
    lucide.createIcons();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('sidebarOverlay').classList.toggle('hidden');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('sidebarOverlay').classList.add('hidden');
  }

  async function renderPage(num) {
    if (!pdfDoc || rendering) return;
    rendering = true;
    const page = await pdfDoc.getPage(num);
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const vp = page.getViewport({ scale });
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    document.getElementById('currentPage').textContent = num;
    document.getElementById('pageSlider').value = num;
    document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
    rendering = false;
  }

  function prevPage() { if (pageNum > 1) { pageNum--; renderPage(pageNum); } }
  function nextPage() { if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } }
  function goToPage(n) { if (pdfDoc && n >= 1 && n <= pdfDoc.numPages) { pageNum = n; renderPage(pageNum); } }

  function changeZoom(delta) {
    scale = Math.min(3, Math.max(0.3, scale + delta));
    if (allPagesMode) renderAllPages(); else renderPage(pageNum);
  }

  function fitWidth() {
    if (!pdfDoc) return;
    pdfDoc.getPage(pageNum).then(page => {
      const container = document.getElementById('canvasContainer');
      const w = container.clientWidth - 48;
      const vp = page.getViewport({ scale: 1 });
      scale = w / vp.width;
      if (allPagesMode) renderAllPages(); else renderPage(pageNum);
    });
  }

  async function renderAllPages() {
    const container = document.getElementById('allPagesView');
    container.innerHTML = '';
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      canvas.className = 'pdf-canvas';
      container.appendChild(canvas);
      const label = document.createElement('p');
      label.textContent = `Page ${i}`;
      label.className = 'text-xs text-slate-400 mb-2 -mt-2';
      container.appendChild(label);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }
    document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
  }

  function toggleAllPages() {
    allPagesMode = !allPagesMode;
    document.getElementById('singleView').classList.toggle('hidden', allPagesMode);
    document.getElementById('allPagesView').classList.toggle('hidden', !allPagesMode);
    document.getElementById('sliderBar').classList.toggle('hidden', allPagesMode);
    if (allPagesMode) renderAllPages(); else renderPage(pageNum);
  }

  function closePdf() {
    pdfDoc = null; pageNum = 1; scale = 1;
    document.getElementById('readerScreen').classList.add('hidden');
    document.getElementById('uploadScreen').classList.remove('hidden');
    document.getElementById('fileInfo').classList.add('hidden');
    document.getElementById('allPagesView').innerHTML = '';
    document.getElementById('fileInput').value = '';
  }

  function toggleLibrary() {
    document.getElementById('libraryModal').classList.remove('hidden');
  }

  function closeLibrary() {
    document.getElementById('libraryModal').classList.add('hidden');
  }

  function updateLibraryUI() {
    const list = document.getElementById('pdfList');
    const empty = document.getElementById('emptyState');
    
    if (pdfLibrary.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    
    empty.classList.add('hidden');
    list.innerHTML = pdfLibrary.map((pdf, idx) => `
      <div class="p-4 rounded-lg border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer" onclick="openPdfFromLibrary(${idx})">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center shrink-0">
            <i data-lucide="file-pdf" style="width:20px;height:20px;color:#6366f1;"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-medium text-slate-700 truncate text-sm">${pdf.name}</p>
            <p class="text-xs text-slate-400 mt-1">${pdf.doc.numPages} pages • ${pdf.loaded}</p>
          </div>
          <button class="w-6 h-6 rounded hover:bg-slate-200 flex items-center justify-center ml-2" onclick="event.stopPropagation(); deletePdfFromLibrary(${idx})" title="Delete">
            <i data-lucide="trash-2" style="width:14px;height:14px;color:#64748b;"></i>
          </button>
        </div>
      </div>
    `).join('');
    lucide.createIcons();
    updateMiniLibrary();
  }

  function openPdfFromLibrary(idx) {
    const pdf = pdfLibrary[idx];
    pdfDoc = pdf.doc;
    pageNum = 1;
    document.getElementById('totalPages').textContent = pdfDoc.numPages;
    document.getElementById('pageSlider').max = pdfDoc.numPages;
    document.getElementById('fileInfo').textContent = pdf.name;
    document.getElementById('uploadScreen').classList.add('hidden');
    document.getElementById('readerScreen').classList.remove('hidden');
    closeLibrary();
    renderPage(1);
  }

  function deletePdfFromLibrary(idx) {
    pdfLibrary.splice(idx, 1);
    updateLibraryUI();
    showToast('PDF removed from library');
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!pdfDoc) return;
    if (e.key === 'ArrowLeft') prevPage();
    else if (e.key === 'ArrowRight') nextPage();
    else if (e.key === '+' || e.key === '=') changeZoom(0.2);
    else if (e.key === '-') changeZoom(-0.2);
  });
