<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF Converter - Working Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .editor-section, .preview-section {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tool-btn {
            padding: 8px 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .html-editor {
            width: 100%;
            height: 400px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            resize: vertical;
            background: white;
        }

        .html-editor:focus {
            outline: none;
            border-color: #667eea;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            overflow: auto;
            padding: 10px;
        }

        .pdf-settings {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting-item label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        .setting-item select, 
        .setting-item input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .templates {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .template-btn {
            padding: 5px 12px;
            background: #e0e7ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #667eea;
            color: white;
        }

        .stats {
            margin-top: 10px;
            padding: 10px;
            background: #e8f0fe;
            border-radius: 8px;
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            font-weight: 500;
        }

        .notification-success {
            background: #48bb78;
            color: white;
        }

        .notification-error {
            background: #f56565;
            color: white;
        }

        .notification-info {
            background: #4299e1;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 HTML to PDF Converter</h1>
        <p class="subtitle">Convert HTML code to professional PDF documents</p>

        <div class="main-content">
            <!-- Left Panel - HTML Editor -->
            <div class="editor-section">
                <div class="section-title">✏️ HTML Editor</div>
                
                <div class="templates">
                    <span style="font-size: 0.85em; color: #666;">Quick Templates:</span>
                    <button class="template-btn" data-template="basic">📄 Basic</button>
                    <button class="template-btn" data-template="invoice">💰 Invoice</button>
                    <button class="template-btn" data-template="resume">📝 Resume</button>
                    <button class="template-btn" data-template="report">📊 Report</button>
                </div>

                <textarea id="htmlEditor" class="html-editor" placeholder="Enter your HTML code here..."></textarea>
                
                <div class="stats" id="editorStats">
                    Characters: 0 | Lines: 0 | Words: 0
                </div>
                
                <div class="toolbar" style="margin-top: 10px;">
                    <button id="clearEditorBtn" class="tool-btn">🗑️ Clear Editor</button>
                    <button id="resetDefaultBtn" class="tool-btn">🔄 Reset Default</button>
                </div>
            </div>

            <!-- Right Panel - Preview & Settings -->
            <div class="preview-section">
                <div class="section-title">👁️ Live Preview</div>
                
                <div class="toolbar">
                    <button id="refreshPreviewBtn" class="tool-btn">🔄 Refresh Preview</button>
                </div>

                <div class="preview-frame" id="previewFrame">
                    <div id="previewContent" style="padding: 20px; font-family: Arial;">
                        <p>Loading preview...</p>
                    </div>
                </div>

                <!-- PDF Settings -->
                <div class="pdf-settings">
                    <div class="section-title" style="font-size: 1.1em; margin-bottom: 10px;">⚙️ PDF Settings</div>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>📄 Paper Size:</label>
                            <select id="pageSize">
                                <option value="a4">A4</option>
                                <option value="letter">Letter</option>
                                <option value="legal">Legal</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>📐 Orientation:</label>
                            <select id="orientation">
                                <option value="portrait">Portrait</option>
                                <option value="landscape">Landscape</option>
                            </select>
                        </div>
                        <div class="setting-item">
                            <label>📏 Margin (mm):</label>
                            <select id="margin">
                                <option value="10">Small (10mm)</option>
                                <option value="15" selected>Normal (15mm)</option>
                                <option value="20">Large (20mm)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="convertBtn" class="btn btn-primary">🔄 Convert to PDF</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Converting HTML to PDF...</p>
            <p style="font-size: 0.85em; margin-top: 10px;">Please wait...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        class HTMLToPDFConverter {
            constructor() {
                this.initializeElements();
                this.attachEventListeners();
                this.setDefaultHTML();
                this.updatePreview();
            }

            initializeElements() {
                this.htmlEditor = document.getElementById('htmlEditor');
                this.previewContent = document.getElementById('previewContent');
                this.convertBtn = document.getElementById('convertBtn');
                this.refreshPreviewBtn = document.getElementById('refreshPreviewBtn');
                this.clearEditorBtn = document.getElementById('clearEditorBtn');
                this.resetDefaultBtn = document.getElementById('resetDefaultBtn');
                this.editorStats = document.getElementById('editorStats');
                
                this.pageSize = document.getElementById('pageSize');
                this.orientation = document.getElementById('orientation');
                this.margin = document.getElementById('margin');
                
                this.loading = document.getElementById('loading');
            }

            attachEventListeners() {
                this.convertBtn.addEventListener('click', () => this.convertToPDF());
                this.refreshPreviewBtn.addEventListener('click', () => this.updatePreview());
                this.clearEditorBtn.addEventListener('click', () => this.clearEditor());
                this.resetDefaultBtn.addEventListener('click', () => this.setDefaultHTML());
                this.htmlEditor.addEventListener('input', () => {
                    this.updateStats();
                    this.updatePreview();
                });
                
                // Template buttons
                document.querySelectorAll('.template-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.loadTemplate(btn.dataset.template));
                });
            }

            setDefaultHTML() {
                const defaultHTML = `<!DOCTYPE html>

    <div class="card">
        <h3>✨ Features:</h3>
        <ul class="feature-list">
            <li>✓ Live HTML editing with instant preview</li>
            <li>✓ Multiple templates (Basic, Invoice, Resume, Report)</li>
            <li>✓ Custom PDF settings (size, orientation, margins)</li>
            <li>✓ Real-time statistics (characters, lines, words)</li>
            <li>✓ Professional PDF output</li>
        </ul>
    </div>
    
    <h3>Sample Data Table:</h3>
    <table>
        <tr>
            <th>Feature</th>
            <th>Status</th>
            <th>Version</th>
        </tr>
        <tr>
            <td>HTML Editor</td>
            <td>✅ Working</td>
            <td>1.0</td>
        </tr>
        <tr>
            <td>Live Preview</td>
            <td>✅ Working</td>
            <td>1.0</td>
        </tr>
        <tr>
            <td>PDF Export</td>

            <td>1.0</td>
        </tr>
    </table>
    
    <p><strong>Note:</strong> You can customize the PDF size, orientation, and margins from the settings panel on the right.</p>
    <p style="color: #667eea; font-style: italic;">Edit the HTML code on the left to see changes in real-time!</p>
</body>
</html>`;
                
                this.htmlEditor.value = defaultHTML;
                this.updateStats();
                this.showNotification('Default template loaded!', 'success');
            }

            loadTemplate(type) {
                let templateHTML = '';
                
                switch(type) {
                    case 'basic':
                        templateHTML = this.getBasicTemplate();
                        break;
                    case 'invoice':
                        templateHTML = this.getInvoiceTemplate();
                        break;
                    case 'resume':
                        templateHTML = this.getResumeTemplate();
                        break;
                    case 'report':
                        templateHTML = this.getReportTemplate();
                        break;
                }
                
                this.htmlEditor.value = templateHTML;
                this.updateStats();
                this.updatePreview();
                this.showNotification(`${type.charAt(0).toUpperCase() + type.slice(1)} template loaded!`, 'success');
            }

            updatePreview() {
                try {
                    const htmlContent = this.htmlEditor.value;
                    this.previewContent.innerHTML = htmlContent;
                } catch (error) {
                    console.error('Preview error:', error);
                    this.previewContent.innerHTML = '<p style="color: red;">Error rendering HTML. Please check your code.</p>';
                }
            }

            updateStats() {
                const content = this.htmlEditor.value;
                const chars = content.length;
                const lines = content.split('\n').length;
                const words = content.trim() ? content.trim().split(/\s+/).length : 0;
                this.editorStats.textContent = `Characters: ${chars} | Lines: ${lines} | Words: ${words}`;
            }

            clearEditor() {
                this.htmlEditor.value = '';
                this.updateStats();
                this.updatePreview();
                this.showNotification('Editor cleared!', 'info');
            }

            async convertToPDF() {
                this.loading.style.display = 'flex';
                this.convertBtn.disabled = true;
                
                try {
                    // Get the HTML content
                    const htmlContent = this.htmlEditor.value;
                    
                    // Create a temporary container for PDF generation
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = htmlContent;
                    tempDiv.style.padding = '20px';
                    tempDiv.style.background = 'white';
                    document.body.appendChild(tempDiv);
                    
                    // Get settings
                    const opt = {
                        margin: parseInt(this.margin.value),
                        filename: `document_${new Date().toISOString().slice(0,19)}.pdf`,
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2, useCORS: true, logging: false },
                        jsPDF: { 
                            unit: 'mm', 
                            format: this.pageSize.value, 
                            orientation: this.orientation.value 
                        }
                    };
                    
                    // Generate PDF
                    await html2pdf().set(opt).from(tempDiv).save();
                    
                    // Clean up
                    document.body.removeChild(tempDiv);
                    
                    this.showNotification('PDF created and downloaded successfully!', 'success');
                } catch (error) {
                    console.error('Conversion error:', error);
                    this.showNotification('Error converting to PDF. Please check your HTML code.', 'error');
                } finally {
                    this.loading.style.display = 'none';
                    this.convertBtn.disabled = false;
                }
            }

            showNotification(message, type) {
                const notification = document.createElement('div');
                notification.className = `notification notification-${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
        }

        // Initialize the converter
        document.addEventListener('DOMContentLoaded', () => {
            new HTMLToPDFConverter();
        });
    </script>
