        // Initialize preview
        function updatePreview() {
            const content = htmlInput.value;
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            previewFrame.src = url;
        }

        function refreshPreview() {
            updatePreview();
            showToast('Preview refreshed');
        }

        function clearEditor() {
            if(confirm('Are you sure you want to clear the editor?')) {
                htmlInput.value = '';
                updatePreview();
            }
        }

        function loadTemplate(name) {
            htmlInput.value = templates[name];
            updatePreview();
            
            // Update active state
            document.querySelectorAll('.template-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            showToast(`${name.charAt(0).toUpperCase() + name.slice(1)} template loaded`);
        }

        function generatePDF() {
            const element = document.createElement('div');
            element.innerHTML = htmlInput.value;
            
            const opt = {
                margin: parseInt(document.getElementById('margins').value),
                filename: `document_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: parseInt(document.getElementById('scale').value) / 100,
                    useCORS: true,
                    logging: false
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: document.getElementById('pageSize').value,
                    orientation: document.getElementById('orientation').value
                }
            };

            loading.classList.add('active');
            overlay.classList.add('active');

            html2pdf().set(opt).from(element).save().then(() => {
                loading.classList.remove('active');
                overlay.classList.remove('active');
                showToast('PDF downloaded successfully!');
            }).catch(err => {
                loading.classList.remove('active');
                overlay.classList.remove('active');
                showToast('Error generating PDF: ' + err.message);
            });
        }

        function printDocument() {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(htmlInput.value);
            printWindow.document.close();
            printWindow.print();
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // File input handler
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    htmlInput.value = e.target.result;
                    updatePreview();
                    showToast('File loaded successfully');
                };
                reader.readAsText(file);
            }
        });

        // Auto-update preview on input (debounced)
        let timeout;
        htmlInput.addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(updatePreview, 1000);
        });

        // Initial load
        updatePreview();
    </script>
</body>
</html>
