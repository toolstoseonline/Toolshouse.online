<body>

<div class="container">
    <h1>📱 QR Code Generator</h1>
    <p class="subtitle">Create custom QR codes instantly - Free & Private</p>

    <div class="input-group">
        <label>QR Code Type</label>
        <select id="qr-type">
            <option value="text">📝 Text / URL</option>
            <option value="phone">📞 Phone Number</option>
            <option value="email">✉️ Email Address</option>
            <option value="sms">💬 SMS Message</option>
            <option value="wifi">📶 WiFi Network</option>
        </select>
    </div>

    <div class="input-group" id="text-input-group">
        <label>Content</label>
        <input type="text" id="qr-text" placeholder="Enter text or URL here">
    </div>

    <div class="input-group" id="phone-input-group" style="display:none;">
        <label>Phone Number</label>
        <input type="tel" id="qr-phone" placeholder="+1234567890">
    </div>

    <div class="input-group" id="email-input-group" style="display:none;">
        <label>Email Address</label>
        <input type="email" id="qr-email" placeholder="example@email.com">
    </div>

    <div class="input-group" id="sms-input-group" style="display:none;">
        <label>Phone Number</label>
        <input type="tel" id="qr-sms-number" placeholder="+1234567890">
        <label style="margin-top: 8px;">Message (optional)</label>
        <input type="text" id="qr-sms-message" placeholder="Hello!">
    </div>

    <div class="input-group" id="wifi-input-group" style="display:none;">
        <label>WiFi Name (SSID)</label>
        <input type="text" id="wifi-ssid" placeholder="Your WiFi Name">
        <label style="margin-top: 8px;">Password</label>
        <input type="password" id="wifi-password" placeholder="WiFi Password">
        <label style="margin-top: 8px;">Encryption</label>
        <select id="wifi-encryption">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="nopass">No Password</option>
        </select>
    </div>

    <div class="color-group">
        <div class="input-group">
            <label>Foreground Color</label>
            <input type="color" id="fg-color" value="#000000">
        </div>
        <div class="input-group">
            <label>Background Color</label>
            <input type="color" id="bg-color" value="#ffffff">
        </div>
    </div>

    <div class="size-control">
        <label>Size: <span id="size-value">200</span>px</label>
        <input type="range" id="qr-size" min="100" max="400" value="200" step="10">
    </div>

    <button class="btn-primary" onclick="generateQR()">✨ Generate QR Code</button>

    <div class="qrcode-container">
        <div id="qrcode"></div>
    </div>

    <button class="btn-secondary" onclick="downloadQR('png')">📥 Download PNG</button>
    <button class="btn-secondary" onclick="downloadQR('jpg')" style="margin-top: 8px;">📥 Download JPG</button>

    <div id="error-msg" class="error-message"></div>

    <footer>
        <p>🔒 100% Client-side processing | Your data never leaves your device</p>
        <p style="margin-top: 5px;">© 2024 ToolsHouse - Free QR Code Generator</p>
    </footer>
</div>

<script>
let currentQR = null;
let currentImageData = null;

function showError(msg) {
    const errorDiv = document.getElementById('error-msg');
    errorDiv.textContent = msg;
    errorDiv.classList.add('show');
    setTimeout(() => errorDiv.classList.remove('show'), 4000);
}

function updateInputFields() {
    const type = document.getElementById('qr-type').value;
    
    document.getElementById('text-input-group').style.display = 'none';
    document.getElementById('phone-input-group').style.display = 'none';
    document.getElementById('email-input-group').style.display = 'none';
    document.getElementById('sms-input-group').style.display = 'none';
    document.getElementById('wifi-input-group').style.display = 'none';
    
    switch(type) {
        case 'text':
            document.getElementById('text-input-group').style.display = 'block';
            break;
        case 'phone':
            document.getElementById('phone-input-group').style.display = 'block';
            break;
        case 'email':
            document.getElementById('email-input-group').style.display = 'block';
            break;
        case 'sms':
            document.getElementById('sms-input-group').style.display = 'block';
            break;
        case 'wifi':
            document.getElementById('wifi-input-group').style.display = 'block';
            break;
    }
}

function getQRData() {
    const type = document.getElementById('qr-type').value;
    let data = '';
    
    switch(type) {
        case 'text':
            data = document.getElementById('qr-text').value.trim();
            if (!data) throw new Error('Please enter text or URL');
            break;
        case 'phone':
            data = 'tel:' + document.getElementById('qr-phone').value.trim();
            if (!data.replace('tel:', '')) throw new Error('Please enter phone number');
            break;
        case 'email':
            data = 'mailto:' + document.getElementById('qr-email').value.trim();
            if (!data.replace('mailto:', '')) throw new Error('Please enter email address');
            break;
        case 'sms':
            const phone = document.getElementById('qr-sms-number').value.trim();
            const message = document.getElementById('qr-sms-message').value.trim();
            if (!phone) throw new Error('Please enter phone number');
            data = `sms:${phone}`;
            if (message) data += `?body=${encodeURIComponent(message)}`;
            break;
        case 'wifi':
            const ssid = document.getElementById('wifi-ssid').value.trim();
            const pass = document.getElementById('wifi-password').value;
            const enc = document.getElementById('wifi-encryption').value;
            if (!ssid) throw new Error('Please enter WiFi name (SSID)');
            if (enc === 'nopass') {
                data = `WIFI:S:${ssid};T:nopass;;`;
            } else {
                if (!pass) throw new Error('Please enter WiFi password');
                data = `WIFI:S:${ssid};T:${enc};P:${pass};;`;
            }
            break;
    }
    
    return data;
}

function generateQR() {
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    
    try {
        const qrData = getQRData();
        const size = parseInt(document.getElementById('qr-size').value);
        
        currentQR = new QRCode(qrDiv, {
            text: qrData,
            width: size,
            height: size,
            colorDark: document.getElementById('fg-color').value,
            colorLight: document.getElementById('bg-color').value,
            correctLevel: QRCode.CorrectLevel.M
        });
        
        // Store image data for download
        setTimeout(() => {
            const img = qrDiv.querySelector('img');
            if (img) {
                currentImageData = img.src;
            }
        }, 100);
        
        showError('QR Code generated successfully!');
        
    } catch (err) {
        showError(err.message);
    }
}

function downloadQR(format) {
    const img = document.querySelector('#qrcode img');
    if (!img) {
        showError('Please generate a QR code first');
        return;
    }
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = img.width;
    canvas.height = img.height;
    
    ctx.drawImage(img, 0, 0, img.width, img.height);
    
    const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
    const extension = format === 'png' ? 'png' : 'jpg';
    
    canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `qrcode.${extension}`;
        a.click();
        URL.revokeObjectURL(url);
    }, mimeType, 1.0);
}

// Event listeners
document.getElementById('qr-type').addEventListener('change', updateInputFields);

// Generate on input with debounce
let timeout;
function debouncedGenerate() {
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        const data = document.getElementById('qr-text').value;
        if (data.trim()) generateQR();
    }, 500);
}

document.getElementById('qr-text').addEventListener('input', debouncedGenerate);
document.getElementById('qr-phone').addEventListener('input', debouncedGenerate);
document.getElementById('qr-email').addEventListener('input', debouncedGenerate);
document.getElementById('qr-sms-number').addEventListener('input', debouncedGenerate);
document.getElementById('wifi-ssid').addEventListener('input', debouncedGenerate);
document.getElementById('wifi-password').addEventListener('input', debouncedGenerate);

// Update size display
document.getElementById('qr-size').addEventListener('input', (e) => {
    document.getElementById('size-value').textContent = e.target.value;
    if (document.querySelector('#qrcode img')) generateQR();
});

// Color changes regenerate
document.getElementById('fg-color').addEventListener('input', () => {
    if (document.querySelector('#qrcode img')) generateQR();
});
document.getElementById('bg-color').addEventListener('input', () => {
    if (document.querySelector('#qrcode img')) generateQR();
});

// Initialize with example
updateInputFields();
document.getElementById('qr-text').value = 'https://www.toolshouse.online';
generateQR();
</script>
</body>
