<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Voice Recorder | Studio Quality</title>
  <meta name="description" content="Record voice online for free with microphone. Capture high-quality audio with pause/resume controls, waveform visualization, and noise suppression. Download as MP3. No signup.">
    <meta name="keywords" content="voice recorder,record voice online,audio recorder">
<link rel="canonical" href="https://www.toolshouse.online/voice-recorder.html">
  <!-- Tailwind + Fonts + Lucide -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    /* waveform animation keyframes */
    @keyframes waveRise {
      0%, 100% { transform: scaleY(0.3); opacity: 0.6; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.7); }
      70% { box-shadow: 0 0 0 18px rgba(108, 99, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0); }
    }
    
    .wave-bar-animated {
      animation: waveRise 0.8s ease-in-out infinite;
      transform-origin: center;
      transition: background 0.2s ease;
    }
    
    .recording-active .wave-bar-animated {
      animation-play-state: running;
    }
    
    .paused-state .wave-bar-animated {
      animation-play-state: paused;
      opacity: 0.5;
    }
    
    .idle-state .wave-bar-animated {
      animation-play-state: paused;
      transform: scaleY(0.2);
    }
    
    .record-pulse {
      animation: pulseGlow 1.5s infinite;
    }
    
    /* smooth transitions */
    button {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    
    button:active {
      transform: scale(0.94);
    }
    
    /* custom scroll */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #6c63ff;
      border-radius: 10px;
    }
  </style>
</head>
<body class="h-full w-full" style="background: radial-gradient(circle at 20% 30%, #0b0b15, #0a0a12);">
  <div id="appRoot" class="min-h-screen w-full flex items-center justify-center p-5">
    <div class="w-full max-w-lg mx-auto">
      <!-- main glass card -->
      <div class="rounded-3xl p-6 md:p-8 backdrop-blur-xl shadow-2xl transition-all" style="background: rgba(18, 18, 30, 0.65); border: 1px solid rgba(108, 99, 255, 0.25);">
        
        <!-- header -->
        <div class="text-center mb-6">
          <h1 id="appTitle" class="text-3xl font-bold bg-gradient-to-r from-indigo-300 to-purple-300 bg-clip-text text-transparent">Voice Canvas</h1>
          <p class="text-xs text-indigo-200/60 mt-1 tracking-wide">tap ● record ● save</p>
        </div>
        
        <!-- timer block -->
        <div class="flex justify-center mb-5">
          <div class="bg-black/30 rounded-2xl px-7 py-3 backdrop-blur-sm border border-white/10">
            <span id="timerDisplay" class="text-6xl font-mono font-bold tracking-wider text-indigo-200">00:00</span>
          </div>
        </div>
        
        <!-- waveform visualizer (dynamic bars) -->
        <div id="waveformContainer" class="idle-state flex items-center justify-center gap-1.5 h-20 mb-7">
          <!-- 24 bars injected via JS for better randomness & control -->
        </div>
        
        <!-- action buttons row -->
        <div class="flex flex-wrap items-center justify-center gap-6 mb-6">
          <!-- MAIN RECORD / STOP button -->
          <button id="recordMainBtn" class="relative w-24 h-24 rounded-full flex items-center justify-center shadow-2xl transition-all duration-200 hover:scale-105" style="background: linear-gradient(145deg, #6c63ff, #4a3bcc); box-shadow: 0 12px 28px -8px rgba(108,99,255,0.4);">
            <div id="pulseRingEffect" class="absolute inset-0 rounded-full bg-indigo-500 opacity-0"></div>
            <div id="recordIconWrap" class="relative z-10">
              <i data-lucide="mic" id="micIcon" style="width: 40px; height: 40px; color: white; stroke-width: 1.8;"></i>
            </div>
          </button>
          
          <!-- PAUSE / RESUME button (dynamic) -->
          <button id="pauseResumeBtn" class="w-16 h-16 rounded-full flex items-center justify-center transition-all hover:scale-105 disabled:opacity-30 disabled:scale-100" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(108,99,255,0.5); backdrop-filter: blur(4px);">
            <i data-lucide="pause" id="pauseIcon" style="width: 26px; height: 26px; color: #b7adff;"></i>
          </button>
        </div>
        
        <!-- status text -->
        <div class="text-center mt-2">
          <p id="statusMessage" class="text-sm font-semibold uppercase tracking-wider bg-black/30 inline-block px-4 py-1.5 rounded-full backdrop-blur-sm" style="color: #b8aeff;">● READY</p>
        </div>
      </div>
      
      <!-- recordings section header -->
      <div class="mt-8 flex items-center justify-between px-1">
        <h3 class="text-sm font-semibold text-indigo-200/80 uppercase tracking-wider">📼 Recent recordings</h3>
        <span id="recordingsCount" class="text-xs bg-white/10 px-2 py-0.5 rounded-full text-indigo-200">0</span>
      </div>
      
      <!-- dynamic list container -->
      <div id="recordingsList" class="mt-3 space-y-3 max-h-[320px] overflow-y-auto pr-1"></div>
      
      <!-- empty state hint -->
      <div id="emptyHint" class="text-center text-indigo-200/40 text-sm py-6 italic">No recordings yet — press the mic button</div>
    </div>
  </div>
  
  <!-- toast notification -->
  <div id="globalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-xl text-sm font-medium shadow-xl backdrop-blur-md transition-all duration-300 opacity-0 pointer-events-none z-50" style="background: #2a2a3c; color: #e2e2ff; border-left: 4px solid #6c63ff;"></div>

  <script>
    // ----------------------------- STATE ----------------------------------
    let mediaRecorder = null;
    let audioChunks = [];
    let mediaStream = null;
    let timerInterval = null;
    let elapsedSeconds = 0;
    let isRecordingActive = false;     // actually recording (not stopped)
    let isPaused = false;
    let savedRecordings = [];           // array of { id, blobUrl, durationFormatted, name, blob }
    
    // DOM elements
    const timerDisplay = document.getElementById('timerDisplay');
    const recordBtn = document.getElementById('recordMainBtn');
    const pauseResumeBtn = document.getElementById('pauseResumeBtn');
    const pauseIconSpan = document.getElementById('pauseIcon');
    const micIconSpan = document.getElementById('micIcon');
    const pulseRingDiv = document.getElementById('pulseRingEffect');
    const statusSpan = document.getElementById('statusMessage');
    const waveformContainer = document.getElementById('waveformContainer');
    const recordingsListDiv = document.getElementById('recordingsList');
    const emptyHintDiv = document.getElementById('emptyHint');
    const recordingsCountSpan = document.getElementById('recordingsCount');
    const toastDiv = document.getElementById('globalToast');
    
    // Helper: show toast message
    function showToastMessage(msg, isError = false) {
      toastDiv.textContent = msg;
      toastDiv.style.opacity = '1';
      toastDiv.style.transform = 'translateY(0px)';
      if (isError) toastDiv.style.borderLeftColor = '#ff6b6b';
      else toastDiv.style.borderLeftColor = '#6c63ff';
      setTimeout(() => {
        toastDiv.style.opacity = '0';
      }, 2400);
    }
    
    // format time mm:ss
    function formatTime(sec) {
      const mins = Math.floor(sec / 60);
      const remainSec = sec % 60;
      return `${mins.toString().padStart(2, '0')}:${remainSec.toString().padStart(2, '0')}`;
    }
    
    // update timer UI
    function updateTimerUI() {
      if (timerDisplay) timerDisplay.innerText = formatTime(elapsedSeconds);
    }
    
    // update waveform visual state (class management)
    function setWaveformState(state) {
      // state: 'idle', 'recording', 'paused'
      waveformContainer.classList.remove('idle-state', 'recording-active', 'paused-state');
      if (state === 'idle') waveformContainer.classList.add('idle-state');
      else if (state === 'recording') waveformContainer.classList.add('recording-active');
      else if (state === 'paused') waveformContainer.classList.add('paused-state');
    }
    
    // generate fresh waveform bars (random heights)
    function buildWaveformBars() {
      const barsCount = 28;
      let barsHtml = '';
      for (let i = 0; i < barsCount; i++) {
        // random base height between 10px and 36px, but will be animated via scaleY
        const baseHeight = 8 + Math.floor(Math.random() * 28);
        // custom property for dynamic feel
        const animDelay = (i * 0.04).toFixed(3);
        barsHtml += `<div class="wave-bar-animated rounded-full w-1.5 mx-0.5" style="height: ${baseHeight}px; background: linear-gradient(180deg, #8b7aff, #6c63ff); animation-delay: ${animDelay}s; transition: height 0.1s;"></div>`;
      }
      waveformContainer.innerHTML = barsHtml;
    }
    
    // refresh the recordings list UI
    function renderRecordingsList() {
      if (!recordingsListDiv) return;
      if (savedRecordings.length === 0) {
        recordingsListDiv.innerHTML = '';
        emptyHintDiv.classList.remove('hidden');
        recordingsCountSpan.innerText = '0';
        return;
      }
      emptyHintDiv.classList.add('hidden');
      recordingsCountSpan.innerText = savedRecordings.length;
      
      let listHtml = '';
      savedRecordings.forEach((rec, idx) => {
        const displayName = rec.name || `Recording ${idx + 1}`;
        listHtml += `
          <div class="flex items-center gap-3 p-3 rounded-xl transition-all hover:scale-[1.01] bg-white/5 border border-white/10 backdrop-blur-sm group">
            <button class="play-recording-btn w-10 h-10 rounded-full flex items-center justify-center shrink-0 hover:bg-indigo-500/30 transition" data-id="${rec.id}" data-action="play" style="background: rgba(108,99,255,0.2);">
              <i data-lucide="play" style="width: 18px; height: 18px; color: #b7adff;"></i>
            </button>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate text-indigo-100">${escapeHtml(displayName)}</p>
              <p class="text-xs text-indigo-300/60 font-mono">${rec.durationFormatted}</p>
            </div>
            <button class="download-rec-btn w-9 h-9 rounded-full flex items-center justify-center hover:bg-indigo-500/20" data-id="${rec.id}" data-action="download">
              <i data-lucide="download" style="width: 16px; height: 16px; color: #b7adff;"></i>
            </button>
            <button class="delete-rec-btn w-9 h-9 rounded-full flex items-center justify-center hover:bg-rose-500/20" data-id="${rec.id}" data-action="delete">
              <i data-lucide="trash-2" style="width: 16px; height: 16px; color: #ff9f8f;"></i>
            </button>
          </div>
        `;
      });
      recordingsListDiv.innerHTML = listHtml;
      
      // rebind Lucide icons for new buttons
      if (window.lucide) lucide.createIcons();
      
      // attach dynamic event listeners after render
      document.querySelectorAll('.play-recording-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          const rec = savedRecordings.find(r => r.id === id);
          if (rec && rec.blobUrl) {
            const audio = new Audio(rec.blobUrl);
            audio.play().catch(err => showToastMessage('Cannot play audio', true));
            showToastMessage(`▶ Playing ${rec.name || 'recording'}`);
          } else showToastMessage('Audio file missing', true);
        });
      });
      
      document.querySelectorAll('.download-rec-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          const rec = savedRecordings.find(r => r.id === id);
          if (rec && rec.blobUrl) {
            const a = document.createElement('a');
            a.href = rec.blobUrl;
            a.download = `${rec.name || 'voice_record'}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToastMessage(`⬇ Saved ${rec.name || 'audio'}.webm`);
          } else showToastMessage('Download failed', true);
        });
      });
      
      document.querySelectorAll('.delete-rec-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.getAttribute('data-id'));
          const recIndex = savedRecordings.findIndex(r => r.id === id);
          if (recIndex !== -1) {
            const oldRec = savedRecordings[recIndex];
            if (oldRec.blobUrl) URL.revokeObjectURL(oldRec.blobUrl);
            savedRecordings.splice(recIndex, 1);
            renderRecordingsList();
            showToastMessage(`🗑 Deleted recording`);
          }
        });
      });
    }
    
    // simple escape for safety
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // stop all recording, clean up
    async function fullyStopRecording() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
        // if paused, we resume before stopping? Actually stop works even when paused.
        mediaRecorder.stop();
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => {
          if (track.readyState === 'live') track.stop();
        });
        mediaStream = null;
      }
      isRecordingActive = false;
      isPaused = false;
      // update UI state
      updateMainUI();
      setWaveformState('idle');
    }
    
    // add recording to list after stop
    function finalizeRecording(blob, durationSec) {
      if (!blob || blob.size < 500) {
        showToastMessage('Recording too short or empty', true);
        return;
      }
      const blobUrl = URL.createObjectURL(blob);
      const formattedDur = formatTime(durationSec);
      const newId = Date.now() + Math.floor(Math.random() * 10000);
      const recordName = `Voice ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}`;
      savedRecordings.unshift({
        id: newId,
        blobUrl: blobUrl,
        durationFormatted: formattedDur,
        name: recordName,
        blob: blob
      });
      renderRecordingsList();
      showToastMessage(`🎙 Saved recording · ${formattedDur}`);
    }
    
    // start capturing microphone
    async function initiateRecording() {
      if (isRecordingActive) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        mediaStream = stream;
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = () => {
          // when recorder stops, create blob
          if (audioChunks.length) {
            const finalBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const recordedDuration = elapsedSeconds;
            finalizeRecording(finalBlob, recordedDuration);
          } else {
            showToastMessage('No audio captured', true);
          }
          // reset counters & timers
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = null;
          isRecordingActive = false;
          isPaused = false;
          elapsedSeconds = 0;
          updateTimerUI();
          updateMainUI();
          setWaveformState('idle');
          // release stream tracks already inside onstop we should stop tracks after
          if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
          }
          mediaRecorder = null;
        };
        
        mediaRecorder.start(250); // collect data in chunks
        isRecordingActive = true;
        isPaused = false;
        elapsedSeconds = 0;
        updateTimerUI();
        
        // start timer increment
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (isRecordingActive && !isPaused) {
            elapsedSeconds++;
            updateTimerUI();
          }
        }, 1000);
        
        updateMainUI();
        setWaveformState('recording');
        showToastMessage('🔴 Recording started');
      } catch (err) {
        console.error(err);
        showToastMessage('Microphone access denied or error', true);
        isRecordingActive = false;
        updateMainUI();
        setWaveformState('idle');
      }
    }
    
    // stop recording and save
    function stopRecordingAndSave() {
      if (!isRecordingActive) return;
      if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
        // prevent double stop
        mediaRecorder.stop();
        // timer will be cleared inside onstop handler
      } else {
        // fallback cleanup
        if (timerInterval) clearInterval(timerInterval);
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        isRecordingActive = false;
        isPaused = false;
        elapsedSeconds = 0;
        updateTimerUI();
        updateMainUI();
        setWaveformState('idle');
      }
    }
    
    // toggle pause/resume during active recording
    function togglePauseResume() {
      if (!isRecordingActive) return;
      if (!mediaRecorder) return;
      
      if (!isPaused && (mediaRecorder.state === 'recording')) {
        // pause recording
        mediaRecorder.pause();
        isPaused = true;
        setWaveformState('paused');
        updateMainUI();
        showToastMessage('⏸ Paused');
      } 
      else if (isPaused && (mediaRecorder.state === 'paused')) {
        // resume
        mediaRecorder.resume();
        isPaused = false;
        setWaveformState('recording');
        updateMainUI();
        showToastMessage('▶ Recording resumed');
      }
    }
    
    // update all UI components based on recording state
    function updateMainUI() {
      // update record button icon & pulse ring
      if (isRecordingActive) {
        // recording mode: mic icon should show "stop" sign? we keep mic but change inner icon? better show square? but design: use stop/record hybrid? we'll change icon to "square" when active.
        if (micIconSpan && micIconSpan.parentElement) {
          // change icon to stop (square) while recording
          const iconElem = document.querySelector('#recordIconWrap i');
          if (iconElem) {
            if (isRecordingActive && !isPaused) {
              iconElem.setAttribute('data-lucide', 'square');
              lucide.createIcons({ icons: { square: true } });
            } else if (isRecordingActive && isPaused) {
              iconElem.setAttribute('data-lucide', 'mic-off');
              lucide.createIcons({ icons: { 'mic-off': true } });
            } else {
              iconElem.setAttribute('data-lucide', 'mic');
              lucide.createIcons({ icons: { mic: true } });
            }
          }
        }
        // pulse ring effect
        if (isRecordingActive && !isPaused) {
          pulseRingDiv.classList.add('record-pulse');
          pulseRingDiv.style.opacity = '0.8';
        } else {
          pulseRingDiv.classList.remove('record-pulse');
          pulseRingDiv.style.opacity = '0';
        }
        // status message
        if (isPaused) statusSpan.innerHTML = '⏸ PAUSED';
        else statusSpan.innerHTML = '🔴 RECORDING';
        
        // pause/resume button icon: show pause if recording & not paused, show play if paused
        const pauseIconInner = document.querySelector('#pauseResumeBtn i');
        if (pauseIconInner) {
          if (!isPaused && isRecordingActive) {
            pauseIconInner.setAttribute('data-lucide', 'pause');
          } else if (isPaused && isRecordingActive) {
            pauseIconInner.setAttribute('data-lucide', 'play');
          } else {
            pauseIconInner.setAttribute('data-lucide', 'pause');
          }
          lucide.createIcons();
        }
        pauseResumeBtn.disabled = false;
      } 
      else {
        // idle mode: reset mic icon to default mic
        const iconElem = document.querySelector('#recordIconWrap i');
        if (iconElem) {
          iconElem.setAttribute('data-lucide', 'mic');
          lucide.createIcons({ icons: { mic: true } });
        }
        pulseRingDiv.classList.remove('record-pulse');
        pulseRingDiv.style.opacity = '0';
        statusSpan.innerHTML = '● READY';
        const pauseIconInner = document.querySelector('#pauseResumeBtn i');
        if (pauseIconInner) {
          pauseIconInner.setAttribute('data-lucide', 'pause');
          lucide.createIcons();
        }
        pauseResumeBtn.disabled = true;
      }
      // if not recording, disable pause/resume button styling
      if (!isRecordingActive) {
        pauseResumeBtn.style.opacity = '0.5';
      } else {
        pauseResumeBtn.style.opacity = '1';
      }
      lucide.createIcons(); // final refresh
    }
    
    // Main record button action: toggle between start recording and stop recording
    function onMainRecordClick() {
      if (!isRecordingActive) {
        // start new recording session
        initiateRecording().catch(e => showToastMessage('Mic error: ' + e.message, true));
      } else {
        // active recording -> stop and save
        stopRecordingAndSave();
      }
    }
    
    // attach global event listeners + initial setup
    function bindEvents() {
      if (recordBtn) {
        recordBtn.removeEventListener('click', onMainRecordClick);
        recordBtn.addEventListener('click', onMainRecordClick);
      }
      if (pauseResumeBtn) {
        pauseResumeBtn.removeEventListener('click', togglePauseResume);
        pauseResumeBtn.addEventListener('click', togglePauseResume);
      }
    }
    
    // initial waveform + check support
    function initApp() {
      buildWaveformBars();
      bindEvents();
      updateMainUI();
      setWaveformState('idle');
      // disable pause button initially
      pauseResumeBtn.disabled = true;
      pauseResumeBtn.style.opacity = '0.5';
      // check if browser supports media recorder
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToastMessage('Your browser does not support audio recording', true);
        recordBtn.disabled = true;
      }
      lucide.createIcons();
    }
    
    // optional: element SDK hooks (just stub for compatibility)
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig: { app_title: 'Voice Recorder', background_color: '#0f0f1a', accent_color: '#6c63ff' },
        onConfigChange: (cfg) => { if (cfg.app_title) document.getElementById('appTitle').innerText = cfg.app_title; },
        mapToCapabilities: () => ({ recolorables: [], fontEditable: null })
      });
    }
    
    // start everything
    initApp();
  </script>
</body>
</html>
