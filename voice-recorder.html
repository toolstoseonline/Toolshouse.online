<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Recorder</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes waveform {
      0%, 100% { height: 8px; }
      50% { height: var(--h); }
    }
    @keyframes slideInNotif {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideOutNotif {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-100%); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 1.2s ease-out infinite; }
    .wave-bar {
      animation: waveform 0.6s ease-in-out infinite;
      animation-delay: var(--d);
    }
    .recording .wave-bar { animation-play-state: running; }
    .paused .wave-bar, .idle .wave-bar { animation-play-state: paused; }
    .notification-enter { animation: slideInNotif 0.3s ease-out; }
    .notification-exit { animation: slideOutNotif 0.3s ease-in; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto flex flex-col items-center justify-center p-4 sm:p-6" style="background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);"><!-- Main Card -->
   <div class="w-full max-w-md mx-auto">
    <div class="rounded-2xl sm:rounded-3xl p-6 sm:p-8 text-center" style="background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);">
     <h1 id="title" class="text-xl sm:text-2xl font-bold mb-1" style="color: #e0e0ff;">Voice Recorder</h1>
     <p class="text-xs sm:text-sm mb-6 sm:mb-8" style="color: #6b6b8a;">Tap to record, tap again to stop</p><!-- Timer -->
     <div id="timer" class="text-4xl sm:text-5xl font-mono font-semibold tracking-wider mb-4 sm:mb-6" style="color: #c0c0ff;">
      00:00
     </div><!-- Waveform -->
     <div id="waveform" class="idle flex items-center justify-center gap-1 h-12 sm:h-16 mb-6 sm:mb-8">
      <script>
        document.write(Array.from({length:24}, (_,i) =>
          `<div class="wave-bar rounded-full w-1 sm:w-1.5" style="--h:${12+Math.random()*36}px;--d:${i*0.05}s;height:8px;background:linear-gradient(to top,#6c63ff,#b794f6);"></div>`
        ).join(''));
      </script>
     </div><!-- Controls -->
     <div class="flex items-center justify-center gap-3 sm:gap-5"><!-- Record / Stop --> <button id="btnRecord" onclick="toggleRecord()" class="relative w-16 sm:w-20 h-16 sm:h-20 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-105 active:scale-95 touch-manipulation" style="background: linear-gradient(135deg, #6c63ff, #4834d4);">
       <div id="pulseRing" class="absolute inset-0 rounded-full hidden" style="background: #6c63ff;"></div>
       <div id="iconRecord" class="relative z-10"><i data-lucide="mic" style="width:24px;height:24px;color:#fff;"></i>
       </div></button> <!-- Pause --> <button id="btnPause" onclick="togglePause()" class="w-12 sm:w-14 h-12 sm:h-14 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-105 active:scale-95 touch-manipulation hidden" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);"> <i data-lucide="pause" style="width:18px;height:18px;color:#c0c0ff;"></i> </button>
     </div><!-- Status -->
     <p id="status" class="mt-4 sm:mt-5 text-xs font-medium tracking-widest uppercase" style="color: #6c63ff;">Ready</p>
    </div><!-- Recordings List -->
    <div id="recordingsList" class="mt-4 sm:mt-6 space-y-2 sm:space-y-3"></div>
   </div><!-- Toast Notification -->
   <div id="toast" class="fixed top-0 left-0 right-0 px-4 py-4 text-sm sm:text-base font-medium opacity-0 transition-opacity duration-300 pointer-events-none" style="background:#6c63ff;color:#fff;"></div><!-- Mobile Notification Popup -->
   <div id="notificationPopup" class="fixed top-0 left-0 right-0 z-50 opacity-0 pointer-events-none transition-opacity duration-300 p-4">
    <div class="bg-white rounded-lg shadow-2xl p-4 sm:p-6 max-w-sm mx-auto" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
     <div class="flex items-start gap-3 sm:gap-4">
      <div class="flex-shrink-0 mt-0.5"><i id="notifIcon" data-lucide="mic" style="width:24px;height:24px;color:#6c63ff;"></i>
      </div>
      <div class="flex-1 min-w-0">
       <h3 id="notifTitle" class="text-sm sm:text-base font-semibold" style="color:#0f0f1a;">Recording</h3>
       <p id="notifMessage" class="text-xs sm:text-sm mt-1" style="color:#6b6b8a;">Your voice is being recorded</p>
      </div><button onclick="closeNotification()" class="flex-shrink-0 -mt-1"> <i data-lucide="x" style="width:20px;height:20px;color:#6b6b8a;"></i> </button>
     </div>
    </div>
   </div>
  </div>
  <script>
  let mediaRecorder, chunks=[], stream, timerInterval, seconds=0, isRecording=false, isPaused=false, recordings=[];
  
  async function toggleRecord() {
    if (!isRecording) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const url = URL.createObjectURL(blob);
          const timestamp = new Date().toLocaleTimeString();
          recordings.unshift({ url, timestamp, duration: seconds });
          renderRecordings();
          showNotification('success', 'Recording Saved', `${seconds}s recording saved successfully`);
        };
        
        mediaRecorder.start();
        isRecording = true;
        isPaused = false;
        seconds = 0;
        startTimer();
        updateUI();
        showNotification('recording', 'Recording', 'Your voice is being recorded');
        document.getElementById('waveform').classList.remove('idle', 'paused');
        document.getElementById('waveform').classList.add('recording');
      } catch (err) {
        showNotification('error', 'Error', 'Microphone access denied');
      }
    } else {
      mediaRecorder.stop();
      stream.getTracks().forEach(track => track.stop());
      isRecording = false;
      stopTimer();
      updateUI();
      closeNotification();
      document.getElementById('waveform').classList.remove('recording', 'paused');
      document.getElementById('waveform').classList.add('idle');
    }
  }
  
  function togglePause() {
    if (isRecording) {
      if (isPaused) {
        mediaRecorder.resume();
        isPaused = false;
        document.getElementById('waveform').classList.remove('paused');
        document.getElementById('waveform').classList.add('recording');
        showNotification('recording', 'Recording Resumed', 'Continue recording your voice');
      } else {
        mediaRecorder.pause();
        isPaused = true;
        document.getElementById('waveform').classList.remove('recording');
        document.getElementById('waveform').classList.add('paused');
        showNotification('paused', 'Recording Paused', 'Tap to continue');
      }
      updateUI();
    }
  }
  
  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      document.getElementById('timer').textContent = 
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }, 1000);
  }
  
  function stopTimer() {
    clearInterval(timerInterval);
  }
  
  function updateUI() {
    const btnRecord = document.getElementById('btnRecord');
    const btnPause = document.getElementById('btnPause');
    const status = document.getElementById('status');
    const pulseRing = document.getElementById('pulseRing');
    const iconRecord = document.getElementById('iconRecord');
    
    if (isRecording) {
      btnRecord.style.background = 'linear-gradient(135deg, #ff6b6b, #ee5a52)';
      btnPause.classList.remove('hidden');
      status.textContent = isPaused ? 'Paused' : 'Recording';
      status.style.color = isPaused ? '#ffd700' : '#ff6b6b';
      pulseRing.classList.remove('hidden');
      pulseRing.classList.add('pulse-ring');
    } else {
      btnRecord.style.background = 'linear-gradient(135deg, #6c63ff, #4834d4)';
      btnPause.classList.add('hidden');
      status.textContent = 'Ready';
      status.style.color = '#6c63ff';
      pulseRing.classList.add('hidden');
      pulseRing.classList.remove('pulse-ring');
      document.getElementById('timer').textContent = '00:00';
    }
  }
  
  function showNotification(type, title, message) {
    const popup = document.getElementById('notificationPopup');
    const titleEl = document.getElementById('notifTitle');
    const messageEl = document.getElementById('notifMessage');
    const icon = document.getElementById('notifIcon');
    
    titleEl.textContent = title;
    messageEl.textContent = message;
    
    if (type === 'recording') {
      icon.setAttribute('data-lucide', 'mic-2');
      popup.style.background = 'rgba(255,255,255,0.95)';
    } else if (type === 'success') {
      icon.setAttribute('data-lucide', 'check-circle');
      popup.style.color = '#10b981';
    } else if (type === 'error') {
      icon.setAttribute('data-lucide', 'alert-circle');
      popup.style.color = '#ef4444';
    } else if (type === 'paused') {
      icon.setAttribute('data-lucide', 'pause-circle');
    }
    
    lucide.createIcons();
    popup.classList.add('notification-enter');
    popup.classList.remove('notification-exit');
    popup.style.opacity = '1';
    popup.style.pointerEvents = 'auto';
    
    if (type !== 'recording') {
      setTimeout(closeNotification, 3000);
    }
  }
  
  function closeNotification() {
    const popup = document.getElementById('notificationPopup');
    popup.classList.remove('notification-enter');
    popup.classList.add('notification-exit');
    setTimeout(() => {
      popup.style.opacity = '0';
      popup.style.pointerEvents = 'none';
    }, 300);
  }
  
  function renderRecordings() {
    const list = document.getElementById('recordingsList');
    list.innerHTML = recordings.map((rec, idx) => `
      <div class="rounded-lg p-3 sm:p-4 flex items-center justify-between gap-3" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);">
        <div class="flex-1 min-w-0">
          <p class="text-xs sm:text-sm font-medium" style="color:#e0e0ff; word-break: break-word;">${rec.timestamp}</p>
          <p class="text-xs" style="color:#6b6b8a;">${rec.duration}s</p>
        </div>
        <div class="flex gap-2">
          <button onclick="playRecording(${idx})" class="p-2 rounded-lg hover:bg-white/10 transition touch-manipulation">
            <i data-lucide="play" style="width:18px;height:18px;color:#6c63ff;"></i>
          </button>
          <button onclick="deleteRecording(${idx})" class="p-2 rounded-lg hover:bg-white/10 transition touch-manipulation">
            <i data-lucide="trash-2" style="width:18px;height:18px;color:#ff6b6b;"></i>
          </button>
        </div>
      </div>
    `).join('');
    if (recordings.length > 0) lucide.createIcons();
  }
  
  function playRecording(idx) {
    const audio = new Audio(recordings[idx].url);
    audio.play();
    showNotification('success', 'Playing', `Playing ${recordings[idx].duration}s recording`);
  }
  
  function deleteRecording(idx) {
    recordings.splice(idx, 1);
    renderRecordings();
    showNotification('success', 'Deleted', 'Recording removed');
  }
  
  lucide.createIcons();
  updateUI();
  </script>
