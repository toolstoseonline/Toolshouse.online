  <style>
    * {
      margin: 0;
      padding: 0;

    body {
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1225 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

    /* Main Calculator Container */
    .scientific-calc {
      background: #1a1f2f;
      border-radius: 48px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
      padding: 20px;
      width: 100%;
      max-width: 780px;
      transition: all 0.2s;
    }

    /* Display Area */
    .display-panel {
      background: #0b0e16;
      border-radius: 32px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
      text-align: right;
      word-break: break-word;
    }

    .expression {
      font-size: 1.1rem;
      color: #8e9aaf;
      min-height: 32px;
      letter-spacing: 0.5px;
      font-family: monospace;

    .result {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f0f3ff;
      margin-top: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: monospace;
    }

    /* Button Grids */
    .basic-buttons, .scientific-buttons {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .basic-buttons {
      grid-template-columns: repeat(5, 1fr);
    }

    .scientific-buttons {
      grid-template-columns: repeat(5, 1fr);
    }

    /* Button Styles */
    .calc-btn {
      background: #252b3d;
      border: none;
      border-radius: 60px;
      padding: 14px 0;
      font-size: 1.2rem;
      font-weight: 600;
      color: #eef2ff;
      cursor: pointer;
      transition: all 0.12s linear;
      box-shadow: 0 4px 0 #10131f;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .calc-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #10131f;
    }

    .num-btn {
      background: #2f354a;
      font-size: 1.4rem;
    }

    .op-btn {
      background: #f3a712;
      color: #1a1f2f;
      box-shadow: 0 4px 0 #b4620a;
      font-weight: 800;
    }

    .eq-btn {
      background: #00b894;
      color: #0a0f1e;
      box-shadow: 0 4px 0 #008f6b;
      font-size: 1.5rem;
    }

    .clear-btn {
      background: #e17055;
      box-shadow: 0 4px 0 #b83e1f;
    }

    .func-btn {
      background: #3d2b56;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0px;
    }

    .mem-btn {
      background: #2c3e66;
    }

    .angle-btn {
      background: #006d77;
    }

    /* special */
    .calc-btn i {
      pointer-events: none;
      font-size: 1rem;
    }

    /* mode toggle */
    .mode-switch {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
      gap: 10px;
    }

    .mode-badge {
      background: #0f1320;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: #8e9aaf;
      font-weight: bold;
    }

    @media (max-width: 620px) {
      .scientific-buttons { gap: 8px; }
      .basic-buttons { gap: 8px; }
      .calc-btn { padding: 10px 0; font-size: 0.9rem; }
      .result { font-size: 2rem; }
      .calc-btn i { font-size: 0.8rem; }
    }

<body>

<div class="scientific-calc">
  <div class="mode-switch">
    <div class="mode-badge"><i class="fas fa-calculator"></i> Scientific Mode | All Functions</div>
  </div>
  
  <div class="display-panel">
    <div class="expression" id="expressionDisplay"></div>
    <div class="result" id="resultDisplay">0</div>
  </div>

  <!-- Scientific Function Row (Trig, Log, etc) -->
  <div class="scientific-buttons">
    <button class="calc-btn func-btn" data-func="sin"><i class="fas fa-angle-double-up"></i> sin</button>
    <button class="calc-btn func-btn" data-func="cos">cos</button>
    <button class="calc-btn func-btn" data-func="tan">tan</button>
    <button class="calc-btn func-btn" data-func="asin">asin</button>
    <button class="calc-btn func-btn" data-func="acos">acos</button>
    
    <button class="calc-btn func-btn" data-func="atan">atan</button>
    <button class="calc-btn func-btn" data-func="ln">ln</button>
    <button class="calc-btn func-btn" data-func="log">log₁₀</button>
    <button class="calc-btn func-btn" data-func="sqrt">√</button>
    <button class="calc-btn func-btn" data-func="cbrt">∛</button>
    
    <button class="calc-btn func-btn" data-func="exp">eˣ</button>
    <button class="calc-btn func-btn" data-func="pow2">x²</button>
    <button class="calc-btn func-btn" data-func="pow3">x³</button>
    <button class="calc-btn func-btn" data-func="fact">n!</button>
    <button class="calc-btn func-btn" data-func="recip">1/x</button>
    
    <button class="calc-btn func-btn" data-func="pi">π</button>
    <button class="calc-btn func-btn" data-func="e">e</button>
    <button class="calc-btn angle-btn" data-angle="deg">DEG</button>
    <button class="calc-btn angle-btn" data-angle="rad">RAD</button>
    <button class="calc-btn func-btn" data-func="abs">|x|</button>
  </div>

  <!-- Basic & Numeric Buttons Grid -->
  <div class="basic-buttons">
    <button class="calc-btn clear-btn" data-action="clear">AC</button>
    <button class="calc-btn clear-btn" data-action="del">⌫</button>
    <button class="calc-btn func-btn" data-func="percent">%</button>
    <button class="calc-btn op-btn" data-op="/">÷</button>
    <button class="calc-btn op-btn" data-op="^">xʸ</button>
    
    <button class="calc-btn num-btn" data-num="7">7</button>
    <button class="calc-btn num-btn" data-num="8">8</button>
    <button class="calc-btn num-btn" data-num="9">9</button>
    <button class="calc-btn op-btn" data-op="*">×</button>
    <button class="calc-btn func-btn" data-func="mod">mod</button>
    
    <button class="calc-btn num-btn" data-num="4">4</button>
    <button class="calc-btn num-btn" data-num="5">5</button>
    <button class="calc-btn num-btn" data-num="6">6</button>
    <button class="calc-btn op-btn" data-op="-">−</button>
    <button class="calc-btn func-btn" data-func="open">(</button>
    
    <button class="calc-btn num-btn" data-num="1">1</button>
    <button class="calc-btn num-btn" data-num="2">2</button>
    <button class="calc-btn num-btn" data-num="3">3</button>
    <button class="calc-btn op-btn" data-op="+">+</button>
    <button class="calc-btn func-btn" data-func="close">)</button>
    
    <button class="calc-btn num-btn" data-num="0">0</button>
    <button class="calc-btn num-btn" data-action="dot">.</button>
    <button class="calc-btn eq-btn" data-action="equal">=</button>
    <button class="calc-btn func-btn" data-func="pow10">10ˣ</button>
    <button class="calc-btn func-btn" data-func="sqrt3">∛</button>
  </div>
  <div style="text-align: center; margin-top: 12px; font-size: 11px; color: #5a6782;">
    <i class="fas fa-sync-alt"></i> Full scientific | Rad/Deg toggle | Keyboard support
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // SCIENTIFIC CALCULATOR - Fully Featured (Trig, Log, Power, Factorial)
  // --------------------------------------------------------------
  let currentExpression = "";   // stores visible expression
  let lastResult = null;
  let angleMode = "rad";        // 'deg' or 'rad'
  let waitingForOperand = false;
  
  const expressionDiv = document.getElementById("expressionDisplay");
  const resultDiv = document.getElementById("resultDisplay");

  function updateDisplay() {
    if (!currentExpression || currentExpression === "") {
      expressionDiv.innerText = " ";
    } else {
      expressionDiv.innerText = currentExpression;
    }
    // result display handled separately
  }

  function setResult(value, updateExpr = true) {
    let displayValue = value;
    if (typeof value === 'number') {
      if (isNaN(value) || !isFinite(value)) {
        displayValue = "Error";
      } else {
        // format nicely, avoid scientific overflow at small numbers
        displayValue = parseFloat(value.toFixed(10)).toString();
        if (displayValue.length > 20) displayValue = value.toExponential(8);
      }
    }
    resultDiv.innerText = displayValue;
    if (updateExpr && typeof value === 'number' && isFinite(value) && !isNaN(value)) {
      currentExpression = displayValue;
      updateDisplay();
    }
  }

  function evaluateExpression(expr) {
    try {
      // replace display symbols with js operators
      let processed = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
      // handle custom functions BEFORE eval: sin, cos, ln, log, sqrt, etc.
      // but we also parse function calls like sin(45) etc. Using Function constructor safely with math context
      // we define a safe eval with only Math and our helpers.
      const mathContext = {
        sin: (x) => {
          let val = angleMode === 'deg' ? x * Math.PI / 180 : x;
          return Math.sin(val);
        },
        cos: (x) => {
          let val = angleMode === 'deg' ? x * Math.PI / 180 : x;
          return Math.cos(val);
        },
        tan: (x) => {
          let val = angleMode === 'deg' ? x * Math.PI / 180 : x;
          return Math.tan(val);
        },
        asin: (x) => {
          let res = Math.asin(x);
          return angleMode === 'deg' ? res * 180 / Math.PI : res;
        },
        acos: (x) => {
          let res = Math.acos(x);
          return angleMode === 'deg' ? res * 180 / Math.PI : res;
        },
        atan: (x) => {
          let res = Math.atan(x);
          return angleMode === 'deg' ? res * 180 / Math.PI : res;
        },
        ln: (x) => Math.log(x),
        log: (x) => Math.log10(x),
        sqrt: (x) => Math.sqrt(x),
        cbrt: (x) => Math.cbrt(x),
        exp: (x) => Math.exp(x),
        pow2: (x) => x ** 2,
        pow3: (x) => x ** 3,
        pow10: (x) => Math.pow(10, x),
        fact: (x) => {
          if (x < 0 || !Number.isInteger(x)) return NaN;
          let f = 1;
          for (let i = 2; i <= x; i++) f *= i;
          return f;
        },
        recip: (x) => 1 / x,
        abs: (x) => Math.abs(x),
        mod: (a, b) => a % b,
        percent: (x) => x / 100
      };
      
      // replace function patterns in expression: sin( -> mathContext.sin(
      let evalExpr = processed;
      const funcs = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'ln', 'log', 'sqrt', 'cbrt', 'exp', 'pow2', 'pow3', 'fact', 'recip', 'abs', 'mod', 'percent', 'pow10'];
      funcs.forEach(fn => {
        const regex = new RegExp(`\\b${fn}\\s*\\(`, 'g');
        evalExpr = evalExpr.replace(regex, `mathContext.${fn}(`);
      });
      // replace constants
      evalExpr = evalExpr.replace(/π/g, 'Math.PI').replace(/e(?![a-z])/g, 'Math.E');
      
      // careful with exponentiation ** already handled.
      // Use Function constructor to capture mathContext and Math
      const evaluate = new Function('mathContext', 'Math', 'return (' + evalExpr + ')');
      let result = evaluate(mathContext, Math);
      if (isNaN(result) || !isFinite(result)) throw new Error("Math Error");
      return result;
    } catch (err) {
      console.warn(err);
      return NaN;
    }
  }

  function computeResult() {
    if (!currentExpression.trim()) {
      return;
    }
    let exprToEval = currentExpression;
    const result = evaluateExpression(exprToEval);
    if (isNaN(result) || !isFinite(result)) {
      setResult("ERROR", false);
      resultDiv.innerText = "ERROR";
      waitingForOperand = true;
    } else {
      setResult(result, true);
      lastResult = result;
      waitingForOperand = true;   // next number starts new expression
      currentExpression = result.toString();
      updateDisplay();
    }
  }

  function appendToExpression(value) {
    if (waitingForOperand && /[0-9(]/.test(value)) {
      // after equal, start fresh
      currentExpression = "";
      waitingForOperand = false;
    } else if (waitingForOperand && value === '-' && currentExpression === "") {
      waitingForOperand = false;
    } else {
      if (waitingForOperand && '+-*/%^'.includes(value)) {
        waitingForOperand = false;
      }
    }
    currentExpression += value;
    updateDisplay();
    // try to evaluate live small preview on result? but keep as expression
    if (!waitingForOperand && !currentExpression.endsWith('(') && !currentExpression.endsWith('+') && !currentExpression.endsWith('-') && !currentExpression.endsWith('*') && !currentExpression.endsWith('/') && !currentExpression.endsWith('^')) {
      try {
        let preview = evaluateExpression(currentExpression);
        if (!isNaN(preview) && isFinite(preview)) {
          let prevVal = parseFloat(preview.toFixed(8));
          resultDiv.innerText = prevVal.toString();
        } else {
          resultDiv.innerText = "...";
        }
      } catch(e) { resultDiv.innerText = ""; }
    } else {
      if (!currentExpression) resultDiv.innerText = "0";
      else resultDiv.innerText = "";
    }
  }

  function clearAll() {
    currentExpression = "";
    waitingForOperand = false;
    setResult(0, true);
    updateDisplay();
    resultDiv.innerText = "0";
  }

  function deleteLast() {
    if (waitingForOperand) {
      waitingForOperand = false;
      if (lastResult !== null) currentExpression = lastResult.toString();
      else currentExpression = "";
    } else {
      currentExpression = currentExpression.slice(0, -1);
    }
    if (currentExpression === "") setResult(0, true);
    else updateDisplay();
    if (currentExpression) {
      try {
        let preview = evaluateExpression(currentExpression);
        if (!isNaN(preview) && isFinite(preview)) resultDiv.innerText = parseFloat(preview.toFixed(8)).toString();
        else resultDiv.innerText = "";
      } catch(e) { resultDiv.innerText = ""; }
    } else {
      resultDiv.innerText = "0";
    }
  }

  function applyUnaryFunction(funcName) {
    let currentVal = null;
    if (currentExpression !== "") {
      try {
        currentVal = evaluateExpression(currentExpression);
        if (isNaN(currentVal) || !isFinite(currentVal)) throw new Error();
      } catch(e) { currentVal = NaN; }
    }
    if (currentVal === null || isNaN(currentVal)) {
      if (lastResult !== null && !isNaN(lastResult)) currentVal = lastResult;
      else currentVal = 0;
    }
    let result;
    const mathCtx = {
      sin: (x) => angleMode === 'deg' ? Math.sin(x * Math.PI/180) : Math.sin(x),
      cos: (x) => angleMode === 'deg' ? Math.cos(x * Math.PI/180) : Math.cos(x),
      tan: (x) => angleMode === 'deg' ? Math.tan(x * Math.PI/180) : Math.tan(x),
      asin: (x) => { let r = Math.asin(x); return angleMode === 'deg' ? r * 180/Math.PI : r; },
      acos: (x) => { let r = Math.acos(x); return angleMode === 'deg' ? r * 180/Math.PI : r; },
      atan: (x) => { let r = Math.atan(x); return angleMode === 'deg' ? r * 180/Math.PI : r; },
      ln: (x) => Math.log(x), log: (x) => Math.log10(x), sqrt: (x) => Math.sqrt(x), cbrt: (x) => Math.cbrt(x),
      exp: (x) => Math.exp(x), pow2: (x) => x**2, pow3: (x) => x**3, pow10: (x) => Math.pow(10,x),
      fact: (x) => { if(x<0 || !Number.isInteger(x)) return NaN; let f=1; for(let i=2;i<=x;i++) f*=i; return f; },
      recip: (x) => 1/x, abs: (x) => Math.abs(x), percent: (x) => x/100
    };
    if (mathCtx[funcName]) {
      result = mathCtx[funcName](currentVal);
    } else if (funcName === 'mod') {
      result = NaN;
    } else {
      return;
    }
    if (isNaN(result) || !isFinite(result)) {
      setResult("ERROR", false);
      currentExpression = "";
    } else {
      setResult(result, true);
      currentExpression = result.toString();
      waitingForOperand = true;
    }
    updateDisplay();
  }

  function insertConstant(constant) {
    if (waitingForOperand) {
      currentExpression = "";
      waitingForOperand = false;
    }
    currentExpression += constant;
    updateDisplay();
    // live preview
    try {
      let preview = evaluateExpression(currentExpression);
      if (!isNaN(preview) && isFinite(preview)) resultDiv.innerText = parseFloat(preview.toFixed(8)).toString();
    } catch(e) {}
  }

  // Event binding
  document.querySelectorAll(".calc-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      // numeric
      if (btn.dataset.num !== undefined) {
        appendToExpression(btn.dataset.num);
      }
      else if (btn.dataset.op !== undefined) {
        let op = btn.dataset.op;
        if (op === '^') op = '^';
        appendToExpression(op);
      }
      else if (btn.dataset.action === "clear") clearAll();
      else if (btn.dataset.action === "del") deleteLast();
      else if (btn.dataset.action === "dot") appendToExpression('.');
      else if (btn.dataset.action === "equal") computeResult();
      else if (btn.dataset.func !== undefined) {
        let func = btn.dataset.func;
        if (func === 'open') appendToExpression('(');
        else if (func === 'close') appendToExpression(')');
        else if (func === 'pi') insertConstant('π');
        else if (func === 'e') insertConstant('e');
        else if (func === 'percent') appendToExpression('%');
        else if (func === 'mod') appendToExpression('mod(');
        else if (['sin','cos','tan','asin','acos','atan','ln','log','sqrt','cbrt','exp','pow2','pow3','pow10','fact','recip','abs'].includes(func)) {
          // if pow2, pow3, fact, recip are unary we can also handle directly
          if (func === 'pow2') applyUnaryFunction('pow2');
          else if (func === 'pow3') applyUnaryFunction('pow3');
          else if (func === 'fact') applyUnaryFunction('fact');
          else if (func === 'recip') applyUnaryFunction('recip');
          else if (func === 'abs') applyUnaryFunction('abs');
          else if (func === 'pow10') applyUnaryFunction('pow10');
          else if (func === 'ln') applyUnaryFunction('ln');
          else if (func === 'log') applyUnaryFunction('log');
          else if (func === 'sqrt') applyUnaryFunction('sqrt');
          else if (func === 'cbrt') applyUnaryFunction('cbrt');
          else if (func === 'exp') applyUnaryFunction('exp');
          else if (func === 'sin') applyUnaryFunction('sin');
          else if (func === 'cos') applyUnaryFunction('cos');
          else if (func === 'tan') applyUnaryFunction('tan');
          else if (func === 'asin') applyUnaryFunction('asin');
          else if (func === 'acos') applyUnaryFunction('acos');
          else if (func === 'atan') applyUnaryFunction('atan');
          else {
            appendToExpression(`${func}(`);
          }
        } else {
          appendToExpression(`${func}(`);
        }
      }
      else if (btn.dataset.angle === "deg") { angleMode = "deg"; setResult(resultDiv.innerText === "ERROR" ? 0 : parseFloat(resultDiv.innerText), false);}
      else if (btn.dataset.angle === "rad") { angleMode = "rad"; setResult(resultDiv.innerText === "ERROR" ? 0 : parseFloat(resultDiv.innerText), false);}
    });
  });

  // Keyboard Support
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if (/[0-9]/.test(key)) appendToExpression(key);
    else if (key === '.') appendToExpression('.');
    else if (key === '+') appendToExpression('+');
    else if (key === '-') appendToExpression('-');
    else if (key === '*') appendToExpression('*');
    else if (key === '/') appendToExpression('/');
    else if (key === '^') appendToExpression('^');
    else if (key === '%') appendToExpression('%');
    else if (key === 'Enter' || key === '=') { e.preventDefault(); computeResult(); }
    else if (key === 'Backspace') deleteLast();
    else if (key === 'Escape') clearAll();
    else if (key === '(') appendToExpression('(');
    else if (key === ')') appendToExpression(')');
    else if (key === 's') { applyUnaryFunction('sin'); e.preventDefault();}
    else if (key === 'c') { applyUnaryFunction('cos'); e.preventDefault();}
  });
  
  setResult(0, true);
  updateDisplay();
</script>
