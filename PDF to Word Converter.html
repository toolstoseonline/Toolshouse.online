<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word Converter - Clean Output</title>

<!-- PDF.js for PDF parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- FileSaver.js for saving files -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:15px;
}

.card{
    background:#ffffff;
    width:95%;
    max-width:500px;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

h2{
    margin-bottom:25px;
    color:#333;
    font-size:1.8rem;
}

.file-input{
    margin-bottom:20px;
}

input[type="file"]{
    padding:12px;
    border:2px dashed #764ba2;
    border-radius:12px;
    width:100%;
    cursor:pointer;
    transition:0.3s;
    background:#f9f9f9;
}

input[type="file"]:hover{
    background:#f3f0ff;
    border-color:#5a3796;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#764ba2;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:15px;
}

button:hover:not(:disabled){
    background:#5a3796;
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button:disabled{
    background:#b19cd9;
    cursor:not-allowed;
    opacity:0.7;
}

.loading{
    margin:15px 0;
    color:#764ba2;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:20px;
    height:20px;
    border:3px solid #f3f3f3;
    border-top:3px solid #764ba2;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.progress-bar{
    width:100%;
    height:20px;
    background:#f0f0f0;
    border-radius:10px;
    margin:15px 0;
    overflow:hidden;
    display:none;
}

.progress-fill{
    height:100%;
    background:#764ba2;
    width:0%;
    transition:width 0.3s ease;
    border-radius:10px;
}

.footer-text{
    margin-top:15px;
    font-size:13px;
    color:#888;
}

.warning{
    color:#e67e22;
    font-size:12px;
    margin-top:8px;
    text-align:left;
    padding-left:5px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@media(max-width:480px){
    .card{
        padding:30px 20px;
    }
    
    h2{
        font-size:1.5rem;
    }
}
</style>

</head>

<body>

<div class="card">
    <h2>📑 PDF to Word Converter</h2>
    <p style="color:#666; margin-bottom:20px; font-size:14px;">Clean & readable Word output</p>

    <div class="file-input">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="warning">Max file size: 20MB • Multi-page supported</div>
    </div>

    <button onclick="convertPDFtoWord()" id="convertBtn">Convert to Word (DOCX)</button>
    
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <span id="loadingText">Processing page 1...</span>
    </div>

    <div class="footer-text">
        ⚡ Fast • 🔒 Secure • ☁️ No Upload • 📄 Clean Formatting
    </div>
</div>

<script>
// Initialize PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function convertPDFtoWord() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const convertBtn = document.getElementById("convertBtn");
    const loadingDiv = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");

    if (!file) {
        alert("📂 Please upload a PDF file.");
        return;
    }

    if (!file.name.toLowerCase().endsWith(".pdf")) {
        alert("❌ Only PDF files are supported.");
        return;
    }

    if (file.size > 20 * 1024 * 1024) {
        const proceed = confirm("⚠️ File is larger than 20MB. Conversion may take time. Continue?");
        if (!proceed) return;
    }

    convertBtn.disabled = true;
    loadingDiv.style.display = "flex";
    progressBar.style.display = "block";
    progressFill.style.width = "0%";

    try {
        const arrayBuffer = await readFileAsArrayBuffer(file);
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const numPages = pdf.numPages;
        
        let htmlContent = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Converted from PDF</title>
<style>
    body { 
        font-family: 'Calibri', 'Arial', sans-serif; 
        line-height: 1.6; 
        margin: 2.5cm 2cm;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
        background: white;
        color: #333;
    }
    h1 { 
        color: #2c3e50; 
        border-bottom: 2px solid #764ba2;
        padding-bottom: 10px;
        font-size: 28px;
        margin-top: 30px;
    }
    h2 {
        color: #34495e;
        font-size: 22px;
        margin-top: 25px;
        border-left: 4px solid #667eea;
        padding-left: 15px;
    }
    p { 
        margin: 15px 0;
        text-align: justify;
        font-size: 12pt;
    }
    .page-break { 
        page-break-after: always; 
        border-top: 1px dashed #ccc;
        margin: 30px 0;
        text-align: center;
        color: #999;
        font-style: italic;
    }
    .page-number {
        text-align: center;
        color: #764ba2;
        font-weight: bold;
        margin: 20px 0;
        font-size: 14px;
    }
    .content {
        background: white;
    }
    .date {
        color: #666;
        font-style: italic;
        margin-bottom: 30px;
        text-align: right;
    }
    .footer {
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        text-align: center;
        color: #999;
        font-size: 11px;
    }
</style>
</head>
<body>
<div class="content">
    <h1>📄 PDF to Word Conversion</h1>
    <div class="date">Converted on: ${new Date().toLocaleString()}</div>
    <div class="date">Original file: ${file.name}</div>
    <hr style="margin: 30px 0; border: 1px solid #764ba2;">`;
        
        // Extract text from each page
        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
            const progress = (pageNum / numPages) * 100;
            progressFill.style.width = progress + "%";
            loadingText.textContent = `Processing page ${pageNum} of ${numPages}...`;
            
            const page = await pdf.getPage(pageNum);
            const textContent = await page.getTextContent();
            
            // Group text by lines for better formatting
            const lines = [];
            let currentLine = [];
            let lastY = null;
            
            // Sort items by Y position (top to bottom) and X position (left to right)
            const items = textContent.items.sort((a, b) => {
                if (Math.abs(a.transform[5] - b.transform[5]) < 5) {
                    return a.transform[4] - b.transform[4];
                }
                return b.transform[5] - a.transform[5];
            });
            
            for (let item of items) {
                if (lastY !== null && Math.abs(item.transform[5] - lastY) > 8) {
                    if (currentLine.length > 0) {
                        lines.push(currentLine.sort((a, b) => a.x - b.x).map(i => i.text).join(' '));
                        currentLine = [];
                    }
                }
                currentLine.push({
                    text: item.str,
                    x: item.transform[4]
                });
                lastY = item.transform[5];
            }
            
            if (currentLine.length > 0) {
                lines.push(currentLine.sort((a, b) => a.x - b.x).map(i => i.text).join(' '));
            }
            
            // Add page header with better formatting
            htmlContent += `
    <div class="page-number">=== Page ${pageNum} of ${numPages} ===</div>`;
            
            // Add formatted text
            lines.forEach(line => {
                if (line.trim()) {
                    // Check if it might be a heading (short line, all caps, etc.)
                    if (line.length < 50 && line === line.toUpperCase()) {
                        htmlContent += `\n    <h2>${escapeHtml(line)}</h2>`;
                    } else {
                        htmlContent += `\n    <p>${escapeHtml(line)}</p>`;
                    }
                }
            });
            
            // Add page break (except after last page)
            if (pageNum < numPages) {
                htmlContent += `\n    <div class="page-break"></div>`;
            }
        }
        
        // Close HTML
        htmlContent += `
    <div class="footer">
        Generated by PDF to Word Converter • ${numPages} page${numPages > 1 ? 's' : ''} • Clean format
    </div>
</div>
</body>
</html>`;
        
        if (htmlContent.length < 500) {
            alert("⚠️ No readable text found in the PDF.");
            return;
        }
        
        // Create and download as .doc file (Word opens these perfectly)
        const blob = new Blob([htmlContent], { type: 'application/msword' });
        const fileName = file.name.replace(/\.pdf$/i, "") + "_converted.doc";
        saveAs(blob, fileName);
        
        setTimeout(() => {
            alert(`✅ Conversion complete! ${numPages} page(s) converted.\n\nThe Word document has clean formatting with proper margins, headings, and page numbers.`);
        }, 500);

    } catch (error) {
        alert("❌ Conversion failed: " + error.message);
        console.error("Conversion error:", error);
    } finally {
        convertBtn.disabled = false;
        loadingDiv.style.display = "none";
        progressBar.style.display = "none";
        progressFill.style.width = "0%";
    }
}

function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function escapeHtml(text) {
    if (!text) return '';
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .replace(/\n/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

// Clear file input
document.getElementById('fileInput').addEventListener('click', function() {
    this.value = '';
});

// Drag and drop
const fileInput = document.getElementById('fileInput');
const card = document.querySelector('.card');

card.addEventListener('dragover', (e) => {
    e.preventDefault();
    card.style.border = '2px dashed #764ba2';
});

card.addEventListener('dragleave', (e) => {
    e.preventDefault();
    card.style.border = 'none';
});

card.addEventListener('drop', (e) => {
    e.preventDefault();
    card.style.border = 'none';
    
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type === 'application/pdf') {
        fileInput.files = files;
    } else {
        alert('Please drop a PDF file');
    }
});
</script>

</body>
</html>
