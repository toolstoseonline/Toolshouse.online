<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional PDF to Word Converter</title>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fafc;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f0fe;
        }

        .upload-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #718096;
            font-size: 14px;
        }

        .file-info {
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .file-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .file-info-item:last-child {
            margin-bottom: 0;
        }

        .file-info-label {
            font-weight: 600;
        }

        .options-panel {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .options-title {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 15px;
        }

        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .option-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option-item label {
            color: #4a5568;
            cursor: pointer;
        }

        .progress-container {
            background: #edf2f7;
            border-radius: 10px;
            height: 30px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            width: 0%;
            position: relative;
            z-index: 1;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            color: #4a5568;
            font-size: 14px;
            min-height: 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .feature-text {
            color: #718096;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDF to Word Converter</h1>
        <p class="subtitle">Convert PDF files to editable Word documents with formatting preserved</p>
        
        <div class="upload-area" id="uploadArea">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 16v-6m0 0l-3 3m3-3l3 3M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="#667eea" stroke-linecap="round"/>
            </svg>
            <div class="upload-text" id="uploadText">Drag & drop your PDF here or click to browse</div>
            <div class="upload-hint">Supports up to 100MB</div>
            <input type="file" id="pdfFile" accept=".pdf" style="display: none;">
        </div>

        <div class="file-info" id="fileInfo" style="display: none;">
            <div class="file-info-item">
                <span class="file-info-label">File name:</span>
                <span id="fileName">-</span>
            </div>
            <div class="file-info-item">
                <span class="file-info-label">File size:</span>
                <span id="fileSize">-</span>
            </div>
            <div class="file-info-item">
                <span class="file-info-label">Pages:</span>
                <span id="pageCount">-</span>
            </div>
        </div>

        <div class="options-panel">
            <div class="options-title">⚙️ Conversion Options</div>
            <div class="option-item">
                <input type="checkbox" id="preserveFormatting" checked>
                <label for="preserveFormatting">Preserve formatting and layout</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="extractImages" checked>
                <label for="extractImages">Extract images (when possible)</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="preserveTables" checked>
                <label for="preserveTables">Preserve table structures</label>
            </div>
        </div>

        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <button class="btn btn-primary" id="convertBtn" onclick="convertPDF()" disabled>Convert to Word</button>
        <div class="status-message" id="status"></div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📝</div>
                <div class="feature-text">Text preserved</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <div class="feature-text">Formatting kept</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Fast conversion</div>
            </div>
        </div>
    </div>

    <script>
        // Set worker path for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // DOM elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('pdfFile');
        const uploadText = document.getElementById('uploadText');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const pageCount = document.getElementById('pageCount');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const status = document.getElementById('status');

        let currentPDF = null;
        let pdfPages = 0;

        // Drag and drop handlers
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            // Validate file type
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('Please select a valid PDF file.');
                return;
            }

            // Validate file size (100MB max)
            if (file.size > 100 * 1024 * 1024) {
                alert('File size exceeds 100MB limit.');
                return;
            }

            // Display file info
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';
            uploadText.textContent = 'File selected: ' + file.name;

            // Load PDF to get page count
            try {
                const arrayBuffer = await readFileAsArrayBuffer(file);
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                pdfPages = pdf.numPages;
                pageCount.textContent = pdfPages + ' pages';
                currentPDF = pdf;
                convertBtn.disabled = false;
                status.textContent = '✅ PDF loaded successfully. Ready to convert.';
            } catch (error) {
                console.error('Error loading PDF:', error);
                status.textContent = '❌ Error loading PDF. Please try again.';
                convertBtn.disabled = true;
            }
        }

        async function convertPDF() {
            if (!currentPDF) {
                alert('Please select a PDF file first.');
                return;
            }

            const preserveFormatting = document.getElementById('preserveFormatting').checked;
            const extractImages = document.getElementById('extractImages').checked;
            const preserveTables = document.getElementById('preserveTables').checked;

            // Show progress
            progressContainer.style.display = 'block';
            convertBtn.disabled = true;
            status.textContent = 'Starting conversion...';

            try {
                let fullContent = '';
                let totalPages = currentPDF.numPages;

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    // Update progress
                    const progress = Math.round((pageNum / totalPages) * 100);
                    progressBar.style.width = progress + '%';
                    progressText.textContent = progress + '%';
                    status.textContent = `Converting page ${pageNum} of ${totalPages}...`;

                    // Get page
                    const page = await currentPDF.getPage(pageNum);
                    
                    // Get page dimensions
                    const viewport = page.getViewport({ scale: 1.0 });
                    
                    // Get text content with detailed info
                    const textContent = await page.getTextContent({
                        normalizeWhitespace: true,
                        disableCombineTextItems: false
                    });

                    // Process text items with position information
                    const textItems = textContent.items.map(item => ({
                        text: item.str,
                        x: item.transform[4],
                        y: item.transform[5],
                        height: item.height || 12,
                        width: item.width || 0,
                        font: item.fontName || 'default'
                    }));

                    // Sort items by position
                    textItems.sort((a, b) => {
                        if (Math.abs(a.y - b.y) < 5) {
                            return a.x - b.x;
                        }
                        return b.y - a.y;
                    });

                    // Group into lines and paragraphs
                    let pageHTML = '';
                    let currentLine = [];
                    let lastY = null;
                    let lastX = null;
                    let lineSpacing = 12;

                    for (const item of textItems) {
                        if (item.text.trim() === '') continue;

                        if (lastY !== null && Math.abs(item.y - lastY) > lineSpacing) {
                            // New line
                            if (currentLine.length > 0) {
                                const lineText = currentLine.map(i => i.text).join(' ');
                                
                                // Check if this might be a heading
                                if (lineText.length < 100 && /^[A-Z\s]+$/.test(lineText)) {
                                    pageHTML += `<h2 style="margin:0 0 10px 0;">${escapeHTML(lineText)}</h2>`;
                                } 
                                // Check if this might be a list item
                                else if (/^[•\-*\d]/.test(lineText)) {
                                    pageHTML += `<li style="margin:0 0 5px 20px;">${escapeHTML(lineText)}</li>`;
                                }
                                else {
                                    pageHTML += `<p style="margin:0 0 8px 0; line-height:1.5;">${escapeHTML(lineText)}</p>`;
                                }
                                currentLine = [];
                            }
                        }
                        currentLine.push(item);
                        lastY = item.y;
                        lastX = item.x;
                    }

                    // Add last line
                    if (currentLine.length > 0) {
                        const lineText = currentLine.map(i => i.text).join(' ');
                        pageHTML += `<p style="margin:0 0 8px 0; line-height:1.5;">${escapeHTML(lineText)}</p>`;
                    }

                    // Add page content with page break
                    fullContent += `
                        <div style="page-break-after: ${pageNum < totalPages ? 'always' : 'auto'}; margin-bottom: 20px;">
                            ${pageHTML}
                        </div>
                    `;
                }

                // Generate Word document with improved formatting
                const wordContent = generateWordDocument(fullContent, {
                    preserveFormatting,
                    extractImages,
                    preserveTables
                });

                // Download the file
                downloadWordDocument(wordContent, fileName.textContent.replace('.pdf', '.doc'));

                status.textContent = '✅ Conversion complete! Download started.';
                
                // Reset progress after 3 seconds
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                    progressText.textContent = '0%';
                    convertBtn.disabled = false;
                }, 3000);

            } catch (error) {
                console.error('Conversion error:', error);
                status.textContent = '❌ Error during conversion. Please try again.';
                progressContainer.style.display = 'none';
                convertBtn.disabled = false;
            }
        }

        function generateWordDocument(content, options) {
            const date = new Date().toLocaleDateString();
            
            return `<!DOCTYPE html>
<html xmlns:v="urn:schemas-microsoft-com:vml"
      xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Converted PDF Document</title>
    <style>
        /* Word-specific styles */
        body {
            font-family: 'Calibri', 'Arial', sans-serif;
            font-size: 11pt;
            line-height: 1.5;
            margin: 2.54cm 3.17cm; /* Standard Word margins */
            padding: 0;
            background: white;
            color: black;
        }
        
        /* Page setup */
        @page {
            size: A4;
            margin: 2.54cm 3.17cm;
            mso-page-orientation: portrait;
        }
        
        /* Typography */
        p {
            margin: 0 0 8pt 0;
            padding: 0;
            text-align: left;
            line-height: 1.5;
            widows: 2;
            orphans: 2;
        }
        
        h1 {
            font-size: 18pt;
            font-weight: bold;
            margin: 12pt 0 6pt 0;
            page-break-after: avoid;
        }
        
        h2 {
            font-size: 16pt;
            font-weight: bold;
            margin: 10pt 0 6pt 0;
            page-break-after: avoid;
        }
        
        h3 {
            font-size: 14pt;
            font-weight: bold;
            margin: 8pt 0 4pt 0;
            page-break-after: avoid;
        }
        
        /* Lists */
        ul, ol {
            margin: 4pt 0 8pt 20pt;
            padding: 0;
        }
        
        li {
            margin: 0 0 2pt 0;
            line-height: 1.4;
        }
        
        /* Tables */
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 10pt 0;
            border: 1pt solid #ddd;
        }
        
        td, th {
            border: 1pt solid #ddd;
            padding: 5pt;
            vertical-align: top;
        }
        
        th {
            background: #f2f2f2;
            font-weight: bold;
        }
        
        /* Page breaks */
        div[style*="page-break-after: always"] {
            page-break-after: always;
        }
        
        /* Images */
        img {
            max-width: 100%;
            height: auto;
        }
        
        /* Special formatting */
        .highlight {
            background-color: yellow;
        }
        
        .underline {
            text-decoration: underline;
        }
        
        .bold {
            font-weight: bold;
        }
        
        .italic {
            font-style: italic;
        }
        
        /* Document info */
        .document-info {
            color: #666;
            font-size: 9pt;
            margin-bottom: 20pt;
            border-bottom: 1pt solid #ccc;
            padding-bottom: 5pt;
        }
    </style>
</head>
<body>
    <div class="document-info">
        Converted from PDF: ${fileName.textContent || 'document.pdf'}<br>
        Conversion date: ${date}<br>
        Pages: ${pdfPages}
    </div>
    
    ${content}
    
    <div style="margin-top: 20pt; color: #666; font-size: 8pt; text-align: center;">
        Converted with PDF to Word Converter
    </div>
</body>
</html>`;
        }

        function downloadWordDocument(content, filename) {
            // Add BOM for Unicode support
            const blob = new Blob(['\uFEFF' + content], {
                type: 'application/msword'
            });

            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename || 'converted_document.doc';
            document.body.appendChild(link);
            link.click();
            
            // Cleanup
            setTimeout(() => {
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            }, 100);
        }

        // Utility functions
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
