<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word Converter</title>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4e73df,#1cc88a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:450px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
h1{
    margin-bottom:20px;
}
input{
    margin:15px 0;
}
button{
    background:#4e73df;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}
button:hover{
    background:#2e59d9;
}
#status{
    margin-top:15px;
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">
    <h1>PDF to Word Converter</h1>
    <input type="file" id="pdfFile" accept="application/pdf">
    <br>
    <button onclick="convertPDF()">Convert to Word</button>
    <p id="status"></p>
</div>

<script>
async function convertPDF(){
    const fileInput = document.getElementById('pdfFile');
    const status = document.getElementById('status');

    if(!fileInput.files.length){
        alert("Please upload a PDF file.");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(){
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;

        let fullText = "";

        for(let i = 1; i <= pdf.numPages; i++){
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const strings = content.items.map(item => item.str);
            fullText += strings.join(" ") + "\n\n";
        }

        downloadWord(fullText);
        status.innerText = "Conversion Complete!";
    };

    reader.readAsArrayBuffer(file);
    status.innerText = "Converting...";
}

function downloadWord(text){
    const header = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' 
        xmlns:w='urn:schemas-microsoft-com:office:word' 
        xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'></head><body>`;
    const footer = "</body></html>";

    const sourceHTML = header + text.replace(/\n/g,"<br>") + footer;

    const blob = new Blob(['\ufeff', sourceHTML], {
        type: 'application/msword'
    });

    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "converted.doc";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
