<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi‑PDF to Word Converter</title>
     <meta name="monetag" content="4b2c32842658b4f266b8a1f905f4bd21">

<!-- PDF.js for PDF parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- FileSaver.js for saving files -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:15px;
}

.card{
    background:#ffffff;
    width:95%;
    max-width:650px;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

h2{
    margin-bottom:10px;
    color:#333;
    font-size:1.8rem;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
    font-size:0.95rem;
    border-bottom:1px solid #eee;
    padding-bottom:10px;
}

.file-input{
    margin-bottom:15px;
}

input[type="file"]{
    padding:12px;
    border:2px dashed #764ba2;
    border-radius:12px;
    width:100%;
    cursor:pointer;
    transition:0.3s;
    background:#f9f9f9;
}

input[type="file"]:hover{
    background:#f3f0ff;
    border-color:#5a3796;
}

.file-list{
    text-align:left;
    background:#f5f5f5;
    border-radius:8px;
    padding:10px 15px;
    margin:15px 0;
    max-height:150px;
    overflow-y:auto;
    font-size:0.9rem;
}

.file-list ul{
    list-style-type:none;
    padding-left:5px;
}

.file-list li{
    padding:4px 0;
    border-bottom:1px dashed #ddd;
    color:#444;
    display:flex;
    align-items:center;
    gap:6px;
}

.file-list li::before{
    content:"📄";
    font-size:0.9rem;
    opacity:0.8;
}

.button-group{
    display:flex;
    gap:10px;
    margin:15px 0;
    flex-wrap:wrap;
}

button{
    flex:1 1 auto;
    padding:14px 12px;
    border:none;
    border-radius:12px;
    background:#764ba2;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover:not(:disabled){
    background:#5a3796;
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

button:disabled{
    background:#b19cd9;
    cursor:not-allowed;
    opacity:0.7;
}

#convertBtn{
    background:#4a2c73;
    flex:2;
}

#testBtn{
    background:#2c7a4d;
}

.loading{
    margin:15px 0;
    color:#764ba2;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:20px;
    height:20px;
    border:3px solid #f3f3f3;
    border-top:3px solid #764ba2;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.progress-section{
    background:#fafafa;
    border-radius:12px;
    padding:15px;
    margin:15px 0;
    border:1px solid #eaeaea;
}

.progress-item{
    margin-bottom:15px;
}

.progress-header{
    display:flex;
    justify-content:space-between;
    font-size:0.9rem;
    color:#333;
    margin-bottom:5px;
}

.progress-bar{
    width:100%;
    height:20px;
    background:#e9e9e9;
    border-radius:10px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    background:#764ba2;
    width:0%;
    transition:width 0.25s ease;
    border-radius:10px;
}

.footer-text{
    margin-top:20px;
    font-size:13px;
    color:#888;
}

.warning{
    color:#e67e22;
    font-size:12px;
    margin-top:6px;
    text-align:left;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@media(max-width:550px){
    .card{padding:30px 20px;}
    h2{font-size:1.5rem;}
    .button-group{flex-direction:column;}
}
</style>
</head>

<body>

<div class="card">
    <h2>📑 Multi‑PDF to Word</h2>
    <div class="subtitle">Select multiple PDF files – each becomes a separate DOC</div>

    <div class="file-input">
        <input type="file" id="fileInput" accept=".pdf" multiple>
        <div class="warning">📁 Hold Ctrl/Cmd to select multiple files • No upload • unlimited size</div>
    </div>

    <!-- Dynamic list of selected files -->
    <div id="fileListContainer" class="file-list" style="display:none;">
        <strong>📋 Selected files:</strong>
        <ul id="fileList"></ul>
    </div>

    <div class="button-group">
        <button onclick="convertMultiplePDFs()" id="convertBtn">📥 Convert all to Word</button>
        <button onclick="testFirstPDF()" id="testBtn">🧪 Test first PDF</button>
    </div>

    <!-- Progress area (shows overall + per‑file progress) -->
    <div id="progressSection" class="progress-section" style="display:none;">
        <div id="globalProgress" class="progress-item">
            <div class="progress-header"><span id="globalFileName">Overall</span> <span id="globalPercent">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="globalProgressFill"></div></div>
        </div>
        <div id="fileProgress" class="progress-item">
            <div class="progress-header"><span id="currentFileName">-</span> <span id="filePercent">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="fileProgressFill"></div></div>
        </div>
        <div id="loading" class="loading" style="display:flex;">
            <div class="spinner"></div>
            <span id="loadingText">Ready</span>
        </div>
    </div>

    <div class="footer-text">
        ⚡ Batch process • 🔒 100% local • 📄 One .doc per PDF • ♾️ No file size limit
    </div>
</div>

<script>
// Initialize PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

// DOM elements
const fileInput = document.getElementById('fileInput');
const fileListContainer = document.getElementById('fileListContainer');
const fileListEl = document.getElementById('fileList');
const convertBtn = document.getElementById('convertBtn');
const testBtn = document.getElementById('testBtn');
const progressSection = document.getElementById('progressSection');
const globalFileNameSpan = document.getElementById('globalFileName');
const globalPercentSpan = document.getElementById('globalPercent');
const globalProgressFill = document.getElementById('globalProgressFill');
const currentFileNameSpan = document.getElementById('currentFileName');
const filePercentSpan = document.getElementById('filePercent');
const fileProgressFill = document.getElementById('fileProgressFill');
const loadingDiv = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');

// Helper: format file size
function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

// Update file list UI when selection changes
fileInput.addEventListener('change', function() {
    const files = Array.from(this.files);
    if (files.length === 0) {
        fileListContainer.style.display = 'none';
        return;
    }
    fileListContainer.style.display = 'block';
    fileListEl.innerHTML = files.map(f => 
        `<li>${f.name} (${formatSize(f.size)})</li>`
    ).join('');
});

// Clear selection on click (optional)
fileInput.addEventListener('click', function() {
    // only clear if user wants to reselect; we keep previous for convenience
});

// Test first PDF (same as before, but using first selected file)
async function testFirstPDF() {
    const files = fileInput.files;
    if (!files || files.length === 0) {
        alert("Please select at least one PDF file.");
        return;
    }
    const file = files[0];
    try {
        alert(`Testing: ${file.name}\nSize: ${formatSize(file.size)}`);
        const arrayBuffer = await readFileAsArrayBuffer(file);
        alert(`File read: ${arrayBuffer.byteLength} bytes. Loading PDF...`);
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        alert(`✅ PDF loaded!\nPages: ${pdf.numPages}\nVersion: ${pdf.pdfInfo?.version || 'unknown'}`);
    } catch (error) {
        alert("❌ Test failed: " + error.message);
    }
}

// Main batch conversion
async function convertMultiplePDFs() {
    const files = Array.from(fileInput.files);
    if (files.length === 0) {
        alert("📂 Please select one or more PDF files.");
        return;
    }

    // Disable buttons
    convertBtn.disabled = true;
    testBtn.disabled = true;
    progressSection.style.display = 'block';
    loadingDiv.style.display = 'flex';
    loadingText.textContent = 'Starting...';

    // Overall progress: files counter
    const totalFiles = files.length;
    let completedFiles = 0;
    let successCount = 0;
    let errorCount = 0;

    // Process each file sequentially (to avoid overwhelming browser)
    for (let idx = 0; idx < files.length; idx++) {
        const file = files[idx];
        // Update global progress
        const overallPercent = Math.round((idx / totalFiles) * 100);
        globalFileNameSpan.textContent = `Batch ${idx+1}/${totalFiles}`;
        globalPercentSpan.textContent = `${overallPercent}%`;
        globalProgressFill.style.width = overallPercent + '%';

        try {
            await convertSinglePDF(file, idx, totalFiles);
            successCount++;
        } catch (error) {
            console.error(`Error converting ${file.name}:`, error);
            alert(`❌ Error with "${file.name}": ${error.message}`);
            errorCount++;
        } finally {
            completedFiles++;
        }
    }

    // Final progress
    globalFileNameSpan.textContent = `Completed`;
    globalPercentSpan.textContent = `100%`;
    globalProgressFill.style.width = '100%';
    loadingText.textContent = `Done. Success: ${successCount}, Errors: ${errorCount}`;

    // Re-enable buttons after a short delay
    setTimeout(() => {
        convertBtn.disabled = false;
        testBtn.disabled = false;
        // optionally hide progress after some seconds
    }, 1500);
}

// Convert a single PDF file and save as .doc
async function convertSinglePDF(file, fileIndex, totalFiles) {
    // Update UI for current file
    currentFileNameSpan.textContent = file.name;
    filePercentSpan.textContent = '0%';
    fileProgressFill.style.width = '0%';
    loadingText.textContent = `Reading ${file.name}...`;

    const arrayBuffer = await readFileAsArrayBuffer(file);

    loadingText.textContent = `Loading PDF ${fileIndex+1}/${totalFiles}...`;
    const loadingTask = pdfjsLib.getDocument({ 
        data: arrayBuffer,
        useSystemFonts: true,
        disableFontFace: true,
        nativeImageDecoderSupport: 'display',
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true
    });
    
    const pdf = await loadingTask.promise;
    const numPages = pdf.numPages;
    
    // Build HTML content for Word
    let htmlContent = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Converted from ${escapeHtml(file.name)}</title>
<style>
    body { font-family: 'Times New Roman', Times, serif; line-height: 1.5; margin: 1.5in 1in; background: white; }
    .page { margin-bottom: 30px; page-break-after: always; }
    .page-header { text-align: center; font-weight: bold; margin: 20px 0; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    p { margin: 0 0 8px 0; }
    h1 { font-size: 24px; font-weight: bold; margin: 20px 0 10px 0; }
    h2 { font-size: 20px; font-weight: bold; margin: 15px 0 10px 0; }
    .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #666; }
</style>
</head>
<body>
<div class="content">
    <h1>📄 ${escapeHtml(file.name)}</h1>
    <p><strong>Converted:</strong> ${new Date().toLocaleString()}</p>
    <p><strong>Pages:</strong> ${numPages}</p>
    <hr style="margin: 20px 0;">`;

    // Process pages
    for (let pageNum = 1; pageNum <= numPages; pageNum++) {
        const pageProgress = Math.round((pageNum / numPages) * 100);
        filePercentSpan.textContent = pageProgress + '%';
        fileProgressFill.style.width = pageProgress + '%';
        loadingText.textContent = `${file.name} – page ${pageNum}/${numPages}`;

        try {
            const page = await pdf.getPage(pageNum);
            const textContent = await page.getTextContent();
            
            htmlContent += `\n    <div class="page">`;
            htmlContent += `\n        <div class="page-header">Page ${pageNum}</div>`;

            if (textContent.items.length > 0) {
                let lastY = null;
                let paragraph = [];
                
                for (let item of textContent.items) {
                    if (item.str && item.str.trim()) {
                        const currentY = Math.round(item.transform[5]);
                        if (lastY !== null && Math.abs(currentY - lastY) > 5) {
                            if (paragraph.length) flushParagraph();
                        }
                        paragraph.push(item.str);
                        lastY = currentY;
                    }
                }
                if (paragraph.length) flushParagraph();

                function flushParagraph() {
                    const lineText = paragraph.join(' ');
                    if (lineText.length < 50 && lineText === lineText.toUpperCase()) {
                        htmlContent += `\n        <h2>${escapeHtml(lineText)}</h2>`;
                    } else {
                        htmlContent += `\n        <p>${escapeHtml(lineText)}</p>`;
                    }
                    paragraph = [];
                }
            } else {
                htmlContent += `\n        <p><em>(No extractable text on this page)</em></p>`;
            }
            htmlContent += `\n    </div>`;
        } catch (pageError) {
            htmlContent += `\n    <div class="page"><p style="color:red;">Error on page ${pageNum}: ${escapeHtml(pageError.message)}</p></div>`;
        }
    }

    htmlContent += `\n    <div class="footer">Generated by Multi‑PDF to Word · ${numPages} page(s)</div>\n</div>\n</body>\n</html>`;

    // Sanity check
    if (htmlContent.length < 500) {
        throw new Error("No readable text found – maybe a scanned PDF?");
    }

    // Create and trigger download
    const blob = new Blob([htmlContent], { type: 'application/msword' });
    // generate unique name (original name + maybe index if duplicates)
    const baseName = file.name.replace(/\.pdf$/i, '').replace(/[\\/*?:"<>|]/g, '_');
    const fileName = `${baseName}.doc`;
    
    // Use FileSaver's saveAs
    saveAs(blob, fileName);

    // Brief pause to let browser breathe between files
    await new Promise(r => setTimeout(r, 300));
}

function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("File read failed"));
        reader.readAsArrayBuffer(file);
    });
}

function escapeHtml(text) {
    if (!text) return '';
    return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

// Drag & drop enhancement for the card (optional)
const card = document.querySelector('.card');
card.addEventListener('dragover', (e) => e.preventDefault());
card.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        // filter only pdf
        const pdfs = Array.from(files).filter(f => f.type === 'application/pdf');
        if (pdfs.length === 0) {
            alert('Please drop PDF files only.');
            return;
        }
        // Create a new FileList-like array by setting input files (limited but we can reassign)
        // The easiest is to create a DataTransfer to set files
        const dataTransfer = new DataTransfer();
        pdfs.forEach(f => dataTransfer.items.add(f));
        fileInput.files = dataTransfer.files;
        // trigger change event manually
        fileInput.dispatchEvent(new Event('change', { bubbles: true }));
    }
});

console.log("PDF.js version:", pdfjsLib.version);
</script>
</body>
</html>
