<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word Converter - Fixed Version</title>

<!-- PDF.js for PDF parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- FileSaver.js for saving files -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:15px;
}

.card{
    background:#ffffff;
    width:95%;
    max-width:500px;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

h2{
    margin-bottom:25px;
    color:#333;
    font-size:1.8rem;
}

.file-input{
    margin-bottom:20px;
}

input[type="file"]{
    padding:12px;
    border:2px dashed #764ba2;
    border-radius:12px;
    width:100%;
    cursor:pointer;
    transition:0.3s;
    background:#f9f9f9;
}

input[type="file"]:hover{
    background:#f3f0ff;
    border-color:#5a3796;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#764ba2;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:15px;
}

button:hover:not(:disabled){
    background:#5a3796;
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button:disabled{
    background:#b19cd9;
    cursor:not-allowed;
    opacity:0.7;
}

.loading{
    margin:15px 0;
    color:#764ba2;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:20px;
    height:20px;
    border:3px solid #f3f3f3;
    border-top:3px solid #764ba2;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.progress-bar{
    width:100%;
    height:20px;
    background:#f0f0f0;
    border-radius:10px;
    margin:15px 0;
    overflow:hidden;
    display:none;
}

.progress-fill{
    height:100%;
    background:#764ba2;
    width:0%;
    transition:width 0.3s ease;
    border-radius:10px;
}

.footer-text{
    margin-top:15px;
    font-size:13px;
    color:#888;
}

.warning{
    color:#e67e22;
    font-size:12px;
    margin-top:8px;
    text-align:left;
    padding-left:5px;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@media(max-width:480px){
    .card{
        padding:30px 20px;
    }
    
    h2{
        font-size:1.5rem;
    }
}

.test-btn {
    background: #4CAF50;
    margin-top: 10px;
    font-size: 14px;
    padding: 8px;
}

.test-btn:hover {
    background: #45a049;
}
</style>

</head>

<body>

<div class="card">
    <h2>📑 PDF to Word Converter</h2>
    <p style="color:#666; margin-bottom:20px; font-size:14px;">Fixed Version - 100% Working</p>

    <div class="file-input">
        <input type="file" id="fileInput" accept=".pdf">
        <div class="warning">📁 Unlimited file size • Multi-page supported • No upload required</div>
    </div>

    <button onclick="convertPDFtoWord()" id="convertBtn">Convert to Word (DOC)</button>
    
    <button onclick="testPDF()" class="test-btn" id="testBtn">Test PDF Loading</button>
    
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <span id="loadingText">Processing page 1...</span>
    </div>

    <div class="footer-text">
        ⚡ Fast • 🔒 Secure • ☁️ No Upload • 📄 Clean Formatting • ♾️ No Size Limit
    </div>
</div>

<script>
// Initialize PDF.js worker - FIXED
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

// Test function to check if PDF.js is working
async function testPDF() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    
    if (!file) {
        alert("Please select a PDF file first");
        return;
    }
    
    try {
        alert("Testing PDF: " + file.name + "\nSize: " + (file.size / 1024).toFixed(2) + " KB");
        
        const arrayBuffer = await readFileAsArrayBuffer(file);
        alert("File read successfully! Size: " + arrayBuffer.byteLength + " bytes");
        
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        
        alert("PDF loaded successfully!\n" +
              "Pages: " + pdf.numPages + "\n" +
              "Version: " + (pdf.pdfInfo && pdf.pdfInfo.version ? pdf.pdfInfo.version : "Unknown"));
        
    } catch (error) {
        alert("Test failed: " + error.message);
        console.error("Test error:", error);
    }
}

// Main conversion function - SIMPLIFIED
async function convertPDFtoWord() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const convertBtn = document.getElementById("convertBtn");
    const loadingDiv = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");

    if (!file) {
        alert("📂 Please upload a PDF file.");
        return;
    }

    if (!file.name.toLowerCase().endsWith(".pdf")) {
        alert("❌ Only PDF files are supported.");
        return;
    }

    convertBtn.disabled = true;
    loadingDiv.style.display = "flex";
    progressBar.style.display = "block";
    progressFill.style.width = "0%";

    try {
        // Read file
        loadingText.textContent = "Reading PDF file...";
        const arrayBuffer = await readFileAsArrayBuffer(file);
        
        // Load PDF
        loadingText.textContent = "Loading PDF document...";
        const loadingTask = pdfjsLib.getDocument({ 
            data: arrayBuffer,
            useSystemFonts: true,
            disableFontFace: true,
            nativeImageDecoderSupport: 'display',
            standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/standard_fonts/',
            cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
            cMapPacked: true
        });
        
        const pdf = await loadingTask.promise;
        const numPages = pdf.numPages;
        
        loadingText.textContent = `Processing ${numPages} pages...`;
        
        // Create HTML content
        let htmlContent = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Converted from PDF</title>
<style>
    body { 
        font-family: 'Times New Roman', Times, serif; 
        line-height: 1.5; 
        margin: 1.5in 1in;
        background: white;
        color: black;
    }
    .page {
        margin-bottom: 30px;
        page-break-after: always;
    }
    .page-header {
        text-align: center;
        font-weight: bold;
        margin: 20px 0;
        color: #333;
        border-bottom: 1px solid #ccc;
        padding-bottom: 10px;
    }
    p { 
        margin: 0 0 10px 0;
        text-align: left;
    }
    h1 {
        font-size: 24px;
        font-weight: bold;
        margin: 20px 0 10px 0;
    }
    h2 {
        font-size: 20px;
        font-weight: bold;
        margin: 15px 0 10px 0;
    }
    .footer {
        margin-top: 30px;
        text-align: center;
        font-size: 10px;
        color: #666;
    }
</style>
</head>
<body>
<div class="content">`;
        
        // Add document info
        htmlContent += `
    <h1>📄 Document Conversion</h1>
    <p><strong>File:</strong> ${escapeHtml(file.name)}</p>
    <p><strong>Date:</strong> ${new Date().toLocaleString()}</p>
    <p><strong>Pages:</strong> ${numPages}</p>
    <hr style="margin: 20px 0;">`;
        
        // Process each page
        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
            const progress = Math.round((pageNum / numPages) * 100);
            progressFill.style.width = progress + "%";
            loadingText.textContent = `Processing page ${pageNum} of ${numPages} (${progress}%)`;
            
            try {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                
                htmlContent += `
    <div class="page">
        <div class="page-header">Page ${pageNum} of ${numPages}</div>`;
                
                // Extract and add text
                if (textContent.items && textContent.items.length > 0) {
                    let lastY = null;
                    let paragraph = [];
                    
                    // Process each text item
                    for (let item of textContent.items) {
                        if (item.str && item.str.trim()) {
                            const currentY = Math.round(item.transform[5]);
                            
                            // New line if Y position changed significantly
                            if (lastY !== null && Math.abs(currentY - lastY) > 5) {
                                if (paragraph.length > 0) {
                                    const lineText = paragraph.join(' ');
                                    if (lineText.length < 50 && lineText === lineText.toUpperCase()) {
                                        htmlContent += `\n        <h2>${escapeHtml(lineText)}</h2>`;
                                    } else {
                                        htmlContent += `\n        <p>${escapeHtml(lineText)}</p>`;
                                    }
                                    paragraph = [];
                                }
                            }
                            
                            paragraph.push(item.str);
                            lastY = currentY;
                        }
                    }
                    
                    // Add last paragraph
                    if (paragraph.length > 0) {
                        const lineText = paragraph.join(' ');
                        if (lineText.length < 50 && lineText === lineText.toUpperCase()) {
                            htmlContent += `\n        <h2>${escapeHtml(lineText)}</h2>`;
                        } else {
                            htmlContent += `\n        <p>${escapeHtml(lineText)}</p>`;
                        }
                    }
                } else {
                    htmlContent += `\n        <p><em>(No text found on this page)</em></p>`;
                }
                
                htmlContent += `\n    </div>`;
                
            } catch (pageError) {
                console.error(`Error on page ${pageNum}:`, pageError);
                htmlContent += `
    <div class="page">
        <div class="page-header">Page ${pageNum} of ${numPages}</div>
        <p style="color: red;">Error reading page: ${escapeHtml(pageError.message)}</p>
    </div>`;
            }
        }
        
        // Close HTML
        htmlContent += `
    <div class="footer">
        Generated by PDF to Word Converter • ${numPages} page${numPages > 1 ? 's' : ''}
    </div>
</div>
</body>
</html>`;
        
        // Check if we got any text
        if (htmlContent.length < 500) {
            alert("⚠️ No readable text found in the PDF. The file might be scanned or image-based.");
            return;
        }
        
        // Create and download Word document
        loadingText.textContent = "Creating Word document...";
        
        // Use .doc extension - Word opens these perfectly
        const blob = new Blob([htmlContent], { type: 'application/msword' });
        const fileName = file.name.replace(/\.pdf$/i, "") + ".doc";
        
        // Save file
        saveAs(blob, fileName);
        
        // Show success message
        setTimeout(() => {
            alert(`✅ Conversion successful!\n\nFile: ${file.name}\nPages: ${numPages}\nSize: ${(file.size / 1024 / 1024).toFixed(2)} MB\n\nSaved as: ${fileName}`);
        }, 500);

    } catch (error) {
        console.error("Conversion error:", error);
        alert("❌ Conversion failed: " + error.message + "\n\nPlease try with a different PDF file.");
    } finally {
        convertBtn.disabled = false;
        loadingDiv.style.display = "none";
        progressBar.style.display = "none";
        progressFill.style.width = "0%";
    }
}

function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(new Error("Failed to read file: " + e.target.error));
        reader.readAsArrayBuffer(file);
    });
}

function escapeHtml(text) {
    if (!text) return '';
    return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .trim();
}

// Clear file input
document.getElementById('fileInput').addEventListener('click', function() {
    this.value = '';
});

// Drag and drop
const fileInput = document.getElementById('fileInput');
const card = document.querySelector('.card');

card.addEventListener('dragover', (e) => {
    e.preventDefault();
    card.style.border = '2px dashed #764ba2';
});

card.addEventListener('dragleave', (e) => {
    e.preventDefault();
    card.style.border = 'none';
});

card.addEventListener('drop', (e) => {
    e.preventDefault();
    card.style.border = 'none';
    
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type === 'application/pdf') {
        fileInput.files = files;
    } else {
        alert('Please drop a PDF file');
    }
});

// Log PDF.js version
console.log("PDF.js version:", pdfjsLib.version);
console.log("PDF.js worker:", pdfjsLib.GlobalWorkerOptions.workerSrc);
</script>

</body>
</html>
