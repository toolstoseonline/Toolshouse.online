    <script>
        class CamScanner {
            constructor() {
                this.currentStream = null;
                this.pages = [];
                this.currentPage = 0;
                this.exportFormat = 'pdf';
                this.autoCapture = false;
                this.detectionInterval = null;
                this.init();
            }

            init() {
                this.bindEvents();
            }

            bindEvents() {
                document.getElementById('start-btn').addEventListener('click', () => this.startScan());
                document.getElementById('camera-back-btn').addEventListener('click', () => this.showScreen('welcome-screen'));
                document.getElementById('capture-btn').addEventListener('click', () => this.captureImage());
                document.getElementById('auto-capture-btn').addEventListener('click', () => this.toggleAutoCapture());
                document.getElementById('flash-btn').addEventListener('click', () => this.toggleFlash());
                document.getElementById('gallery-btn').addEventListener('click', () => document.getElementById('file-input').click());
                document.getElementById('file-input').addEventListener('change', (e) => this.handleFileSelect(e));
                document.getElementById('back-to-camera').addEventListener('click', () => this.showScreen('camera-screen'));
                document.getElementById('done-btn').addEventListener('click', () => this.downloadDocument());
                document.getElementById('nav-home-btn').addEventListener('click', () => {
                    this.showScreen('welcome-screen');
                    this.stopCamera();
                });
                document.getElementById('nav-scan-btn').addEventListener('click', () => this.startScan());
            }

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
                
                const bottomNav = document.getElementById('bottom-nav');
                
                if (screenId === 'camera-screen') {
                    this.startCamera();
                    bottomNav.style.display = 'none';
                } else if (screenId === 'welcome-screen') {
                    this.stopCamera();
                    bottomNav.style.display = 'none';
                } else {
                    this.stopCamera();
                    bottomNav.style.display = 'flex';
                }
                
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                if (screenId === 'welcome-screen') {
                    document.getElementById('nav-home-btn').classList.add('active');
                } else if (screenId === 'save-screen') {
                    document.getElementById('nav-scan-btn').classList.add('active');
                }
            }

            startScan() {
                this.pages = [];
                this.showScreen('camera-screen');
            }

            async startCamera() {
                try {
                    this.stopCamera();
                    
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        this.showToast('Camera not supported', 'error');
                        return;
                    }
                    
                    const constraintsList = [
                        { video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
                        { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                        { video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false },
                        { video: true, audio: false }
                    ];
                    
                    let stream = null;
                    for (const constraints of constraintsList) {
                        try {
                            stream = await navigator.mediaDevices.getUserMedia(constraints);
                            break;
                        } catch (err) {
                            console.log('Camera constraint failed:', err.message);
                        }
                    }
                    
                    if (!stream) {
                        throw new Error('Could not access camera');
                    }
                    
                    this.currentStream = stream;
                    const video = document.getElementById('camera-video');
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        this.showToast('Camera ready - Position document in frame');
                        setTimeout(() => this.startDocumentDetection(), 500);
                    };
                } catch (err) {
                    console.error('Camera error:', err);
                    this.showToast('Camera error: ' + err.message, 'error');
                }
            }

            stopCamera() {
                if (this.detectionInterval) {
                    clearInterval(this.detectionInterval);
                    this.detectionInterval = null;
                }
                if (this.currentStream) {
                    this.currentStream.getTracks().forEach(t => t.stop());
                    this.currentStream = null;
                }
            }

            startDocumentDetection() {
                let detectionCount = 0;
                let lastDetection = false;
                
                this.detectionInterval = setInterval(() => {
                    const video = document.getElementById('camera-video');
                    if (!video.videoWidth) return;
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 320;
                    canvas.height = 240;
                    ctx.drawImage(video, 0, 0, 320, 240);
                    
                    // Only scan within frame area (center 70%)
                    const frameWidth = Math.floor(320 * 0.7);
                    const frameHeight = Math.floor(240 * 0.5);
                    const frameX = Math.floor((320 - frameWidth) / 2);
                    const frameY = Math.floor((240 - frameHeight) / 2);
                    
                    const frameCanvas = document.createElement('canvas');
                    const frameCtx = frameCanvas.getContext('2d');
                    frameCanvas.width = frameWidth;
                    frameCanvas.height = frameHeight;
                    frameCtx.drawImage(canvas, frameX, frameY, frameWidth, frameHeight, 0, 0, frameWidth, frameHeight);
                    
                    const edges = this.detectDocumentEdges(frameCanvas);
                    const isDetected = edges !== null;
                    
                    if (isDetected) {
                        detectionCount++;
                    } else {
                        detectionCount = 0;
                    }
                    
                    if (detectionCount >= 2 && !lastDetection) {
                        this.updateDetectionUI(true);
                        lastDetection = true;
                        if (this.autoCapture) {
                            setTimeout(() => this.captureImage(), 1000);
                        }
                    } else if (detectionCount === 0 && lastDetection) {
                        this.updateDetectionUI(false);
                        lastDetection = false;
                    }
                }, 250);
            }

            detectDocumentEdges(canvas) {
                try {
                    const ctx = canvas.getContext('2d');
                    const width = canvas.width;
                    const height = canvas.height;
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    
                    const gray = new Uint8Array(width * height);
                    for (let i = 0; i < data.length; i += 4) {
                        gray[i / 4] = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                    }
                    
                    const centerX = Math.floor(width / 2);
                    const centerY = Math.floor(height / 2);
                    let left = 0, right = width - 1, top = 0, bottom = height - 1;
                    const threshold = 30;
                    const scanLines = 20;
                    
                    const leftEdges = [];
                    for (let i = 0; i < scanLines; i++) {
                        const y = Math.floor((height / scanLines) * i + height / (scanLines * 2));
                        for (let x = 10; x < centerX; x++) {
                            const diff = Math.abs(gray[y * width + x] - gray[y * width + (x - 5)]);
                            if (diff > threshold) {
                                leftEdges.push(x);
                                break;
                            }
                        }
                    }
                    if (leftEdges.length > 5) left = Math.floor(leftEdges.reduce((a, b) => a + b) / leftEdges.length);
                    
                    const rightEdges = [];
                    for (let i = 0; i < scanLines; i++) {
                        const y = Math.floor((height / scanLines) * i + height / (scanLines * 2));
                        for (let x = width - 10; x > centerX; x--) {
                            const diff = Math.abs(gray[y * width + x] - gray[y * width + (x + 5)]);
                            if (diff > threshold) {
                                rightEdges.push(x);
                                break;
                            }
                        }
                    }
                    if (rightEdges.length > 5) right = Math.floor(rightEdges.reduce((a, b) => a + b) / rightEdges.length);
                    
                    const topEdges = [];
                    for (let i = 0; i < scanLines; i++) {
                        const x = Math.floor((width / scanLines) * i + width / (scanLines * 2));
                        for (let y = 10; y < centerY; y++) {
                            const diff = Math.abs(gray[y * width + x] - gray[(y - 5) * width + x]);
                            if (diff > threshold) {
                                topEdges.push(y);
                                break;
                            }
                        }
                    }
                    if (topEdges.length > 5) top = Math.floor(topEdges.reduce((a, b) => a + b) / topEdges.length);
                    
                    const bottomEdges = [];
                    for (let i = 0; i < scanLines; i++) {
                        const x = Math.floor((width / scanLines) * i + width / (scanLines * 2));
                        for (let y = height - 10; y > centerY; y--) {
                            const diff = Math.abs(gray[y * width + x] - gray[(y + 5) * width + x]);
                            if (diff > threshold) {
                                bottomEdges.push(y);
                                break;
                            }
                        }
                    }
                    if (bottomEdges.length > 5) bottom = Math.floor(bottomEdges.reduce((a, b) => a + b) / bottomEdges.length);
                    
                    const docWidth = right - left;
                    const docHeight = bottom - top;
                    
                    if (docWidth < width * 0.3 || docHeight < height * 0.3) return null;
                    if (docWidth > width * 0.95 || docHeight > height * 0.95) return null;
                    
                    const aspectRatio = docWidth / docHeight;
                    if (aspectRatio < 0.3 || aspectRatio > 3.5) return null;
                    
                    return { left, right, top, bottom };
                } catch (err) {
                    return null;
                }
            }

            updateDetectionUI(detected) {
                const hint = document.getElementById('scan-hint');
                const frame = document.getElementById('scan-frame');
                const captureBtn = document.getElementById('capture-btn');
                
                if (detected) {
                    hint.textContent = 'Document detected! Tap capture';
                    hint.classList.add('detected');
                    frame.classList.add('detected');
                    captureBtn.style.background = '#10b981';
                } else {
                    hint.textContent = 'Position document within frame';
                    hint.classList.remove('detected');
                    frame.classList.remove('detected');
                    captureBtn.style.background = '#4f46e5';
                }
            }

            captureImage() {
                const video = document.getElementById('camera-video');
                if (!video.videoWidth) {
                    this.showToast('Camera not ready', 'error');
                    return;
                }
                
                // Flash effect
                const flash = document.createElement('div');
                flash.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; opacity: 0.8; z-index: 1000; pointer-events: none;';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 200);
                
                // Capture FULL image
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                // Detect edges in frame area for guidance
                const frameWidth = Math.floor(video.videoWidth * 0.7);
                const frameHeight = Math.floor(video.videoHeight * 0.5);
                const frameX = Math.floor((video.videoWidth - frameWidth) / 2);
                const frameY = Math.floor((video.videoHeight - frameHeight) / 2);
                
                const frameCanvas = document.createElement('canvas');
                const frameCtx = frameCanvas.getContext('2d');
                frameCanvas.width = frameWidth;
                frameCanvas.height = frameHeight;
                frameCtx.drawImage(canvas, frameX, frameY, frameWidth, frameHeight, 0, 0, frameWidth, frameHeight);
                
                const edges = this.detectDocumentEdges(frameCanvas);
                
                // Use FULL image but auto-crop if document detected
                let processedImage;
                if (edges) {
                    const fullEdges = {
                        left: edges.left + frameX,
                        right: edges.right + frameX,
                        top: edges.top + frameY,
                        bottom: edges.bottom + frameY
                    };
                    processedImage = this.cropToEdges(canvas, fullEdges);
                } else {
                    processedImage = canvas.toDataURL('image/jpeg', 0.95);
                }
                
                this.pages.push({ image: processedImage });
                this.currentPage = 0;
                this.showPreview();
                this.showToast('Document captured!');
            }

            cropToEdges(canvas, edges) {
                const cropped = document.createElement('canvas');
                const ctx = cropped.getContext('2d');
                const width = edges.right - edges.left;
                const height = edges.bottom - edges.top;
                cropped.width = width;
                cropped.height = height;
                ctx.drawImage(canvas, edges.left, edges.top, width, height, 0, 0, width, height);
                return cropped.toDataURL('image/jpeg', 0.95);
            }

            showPreview() {
                if (this.pages.length > 0) {
                    document.getElementById('preview-image').src = this.pages[this.currentPage].image;
                    this.showScreen('save-screen');
                }
            }

            setExportFormat(format) {
                this.exportFormat = format;
                document.querySelectorAll('.save-option').forEach(btn => btn.classList.remove('active'));
                event.currentTarget.classList.add('active');
            }

            downloadDocument() {
                if (this.pages.length === 0) return;
                
                if (this.exportFormat === 'pdf') {
                    this.downloadPDF();
                } else {
                    this.downloadImage(this.exportFormat);
                }
            }

            downloadPDF() {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                this.pages.forEach((page, index) => {
                    if (index > 0) pdf.addPage();
                    
                    const img = new Image();
                    img.onload = () => {
                        const imgWidth = 210;
                        const imgHeight = (img.height * imgWidth) / img.width;
                        const x = 0;
                        const y = (297 - imgHeight) / 2;
                        pdf.addImage(page.image, 'JPEG', x, y, imgWidth, imgHeight);
                        
                        if (index === this.pages.length - 1) {
                            pdf.save('scanned-document.pdf');
                            this.showToast('PDF downloaded!');
                        }
                    };
                    img.src = page.image;
                });
            }

            downloadImage(format) {
                const link = document.createElement('a');
                link.href = this.pages[0].image;
                link.download = `scanned-document.${format}`;
                link.click();
                this.showToast(`${format.toUpperCase()} downloaded!`);
            }

            shareDocument() {
                if (navigator.share && this.pages.length > 0) {
                    fetch(this.pages[0].image)
                        .then(res => res.blob())
                        .then(blob => {
                            const file = new File([blob], 'scanned-document.jpg', { type: 'image/jpeg' });
                            navigator.share({
                                title: 'Scanned Document',
                                files: [file]
                            });
                        });
                } else {
                    this.showToast('Sharing not supported', 'error');
                }
            }

            printDocument() {
                if (this.pages.length === 0) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write('<html><body style="margin:0;">');
                this.pages.forEach(page => {
                    printWindow.document.write(`<img src="${page.image}" style="width:100%;page-break-after:always;">`);
                });
                printWindow.document.write('</body></html>');
                printWindow.document.close();
                printWindow.print();
            }

            async performOCR() {
                if (this.pages.length === 0 || !window.Tesseract) {
                    this.showToast('OCR not available', 'error');
                    return;
                }
                
                this.showLoading('Extracting text...');
                
                try {
                    const result = await window.Tesseract.recognize(
                        this.pages[0].image,
                        'eng',
                        { logger: () => {} }
                    );
                    
                    this.hideLoading();
                    
                    if (result.data.text.trim()) {

                        this.showToast('No text found', 'error');
                    }
                } catch (err) {
                    this.hideLoading();
                    this.showToast('OCR failed', 'error');
                }
            }

            async startQRScanning(modal) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });
                    
                    this.qrStream = stream;
                    const video = document.getElementById('qr-video');
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = () => {
                        video.play();
                        this.qrScanning = true;
                        this.scanQRFrame();
                    };
                } catch (err) {
                    console.error('QR camera error:', err);
                    this.showToast('Camera access denied', 'error');
                }
            }
            
            stopQRScanning() {
                this.qrScanning = false;
                if (this.qrStream) {
                    this.qrStream.getTracks().forEach(t => t.stop());
                    this.qrStream = null;
                }
            }
            
            scanQRFrame() {
                if (!this.qrScanning) return;
                
                const video = document.getElementById('qr-video');
                const canvas = document.getElementById('qr-canvas');
                const ctx = canvas.getContext('2d');
                
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Get image data for QR detection
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Simple QR code detection using jsQR if available, or fallback
                    this.detectAndProcessQR(imageData, canvas);
                }
                
                requestAnimationFrame(() => this.scanQRFrame());
            }
            
            detectAndProcessQR(imageData, canvas) {
                // Try to use jsQR library if loaded
                if (window.jsQR) {
                    const code = window.jsQR(imageData.data, imageData.width, imageData.height);
                    if (code) {
                        this.handleQRCodeDetected(code.data);
                        return;
                    }
                }
                
                // Fallback: Try to detect QR-like patterns
                // Look for finder patterns (three corners of QR code)
                const detected = this.detectQRPatterns(canvas);
                if (detected) {
                    this.handleQRCodeDetected('QR Code detected (raw scan)');
                }
            }
            
            detectQRPatterns(canvas) {
                // Simple pattern detection - look for dark squares in corners
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                
                // Sample center area for QR code
                const centerX = Math.floor(width / 2);
                const centerY = Math.floor(height / 2);
                const scanSize = Math.min(width, height) * 0.3;
                
                let darkPixels = 0;
                let totalPixels = 0;
                
                for (let y = centerY - scanSize/2; y < centerY + scanSize/2; y += 10) {
                    for (let x = centerX - scanSize/2; x < centerX + scanSize/2; x += 10) {
                        const i = (Math.floor(y) * width + Math.floor(x)) * 4;
                        const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                        if (brightness < 100) darkPixels++;
                        totalPixels++;
                    }
                }
                
                // If we have significant dark patterns, might be a QR
                return (darkPixels / totalPixels) > 0.3 && (darkPixels / totalPixels) < 0.7;
            }
            
            handleQRCodeDetected(data) {
                // Prevent multiple detections
                if (this.qrLastDetected && Date.now() - this.qrLastDetected < 3000) return;
                this.qrLastDetected = Date.now();
                
                // Stop scanning temporarily
                this.qrScanning = false;
                
                // Update hint
                const hint = document.getElementById('qr-hint');
                hint.textContent = 'QR Code detected!';
                hint.style.background = 'rgba(16, 185, 129, 0.8)';
                
                // Show result after short delay
                setTimeout(() => {
                    this.showQRResult(data);
                }, 500);
            }
            
            showQRResult(data) {
                // Determine type of QR data
                let type = 'text';
                let displayData = data;
                let actions = [];
                
                if (data.startsWith('http://') || data.startsWith('https://')) {
                    type = 'url';
                    actions.push({ label: 'Open', action: () => window.open(data, '_blank') });
                } else if (data.startsWith('tel:') || /^[\d\-\+\(\)\s]{7,}$/.test(data)) {
                    type = 'phone';
                    const phone = data.replace('tel:', '');
                    actions.push({ label: 'Call', action: () => window.location.href = `tel:${phone}` });
                } else if (data.startsWith('mailto:') || data.includes('@')) {
                    type = 'email';
                    actions.push({ label: 'Email', action: () => window.location.href = `mailto:${data}` });
                } else if (data.startsWith('WIFI:')) {
                    type = 'wifi';
                }
                
                actions.push(
                    { label: 'Copy', action: () => {
                        navigator.clipboard.writeText(data);
                        this.showToast('Copied to clipboard!');

                    }}
                );
                
                // Create result modal
                const resultModal = document.createElement('div');

                resultModal.innerHTML = `

                document.body.appendChild(resultModal);
                
                // Action buttons
                resultModal.querySelectorAll('.qr-action-btn').forEach((btn, i) => {
                    btn.addEventListener('click', () => {
                        actions[i].action();
                    });
                });
                
                document.getElementById('qr-scan-again').addEventListener('click', () => {
                    resultModal.remove();
                    this.qrScanning = true;
                    this.qrLastDetected = 0;
                    const hint = document.getElementById('qr-hint');
                    if (hint) {
                        hint.textContent = 'Point camera at QR code';
                        hint.style.background = 'rgba(0,0,0,0.6)';
                    }

                });
                
                document.getElementById('qr-close').addEventListener('click', () => {
                    resultModal.remove();
                    document.getElementById('qr-scanner-modal')?.remove();
                    this.stopQRScanning();
                });
                
                // Save to history
                this.saveQRToHistory(data, type);
            }
            
            saveQRToHistory(data, type) {
                let history = JSON.parse(localStorage.getItem('camScannerQRHistory') || '[]');
                history.unshift({ data, type, time: Date.now() });
                if (history.length > 20) history = history.slice(0, 20);
                localStorage.setItem('camScannerQRHistory', JSON.stringify(history));
            }

            newScan() {

                this.startScan();

            rotate(degrees) {
                if (this.pages.length === 0) return;
                
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    if (degrees === 90 || degrees === -90) {
                        canvas.width = img.height;
                        canvas.height = img.width;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }
                    
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(degrees * Math.PI / 180);
                    ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    
                    this.pages[this.currentPage].image = canvas.toDataURL('image/jpeg', 0.95);
                    document.getElementById('preview-image').src = this.pages[this.currentPage].image;
                    this.showToast('Rotated!');
                };
                img.src = this.pages[this.currentPage].image;
            }

                                <div class="crop-handle" data-handle="sw" style="position: absolute; bottom: -6px; left: -6px; width: 12px; height: 12px; background: #4f46e5; border: 2px solid white; cursor: sw-resize; border-radius: 50%;"></div>
                                <div class="crop-handle" data-handle="se" style="position: absolute; bottom: -6px; right: -6px; width: 12px; height: 12px; background: #4f46e5; border: 2px solid white; cursor: se-resize; border-radius: 50%;"></div>

                                <div class="crop-handle" data-handle="w" style="position: absolute; left: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #4f46e5; border: 2px solid white; cursor: w-resize; border-radius: 50%;"></div>
                                <div class="crop-handle" data-handle="e" style="position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #4f46e5; border: 2px solid white; cursor: e-resize; border-radius: 50%;"></div>

            setupManualCrop(modal, img, scale) {
                const selection = modal.querySelector('#crop-selection');
                const wrapper = modal.querySelector('#crop-wrapper');
                const image = modal.querySelector('#crop-image');
                let isDragging = false;
                let isResizing = false;
                let currentHandle = null;
                let startX, startY, startLeft, startTop, startWidth, startHeight;
                
                const getEventPos = (e) => {
                    if (e.touches) {
                        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    }
                    return { x: e.clientX, y: e.clientY };
                };
                
                const onStart = (e) => {
                    if (e.target.classList.contains('crop-handle')) {
                        isResizing = true;
                        currentHandle = e.target.dataset.handle;
                    } else if (e.target === selection) {
                        isDragging = true;
                    }
                    
                    const pos = getEventPos(e);
                    startX = pos.x;
                    startY = pos.y;
                    startLeft = parseInt(selection.style.left) || 0;
                    startTop = parseInt(selection.style.top) || 0;
                    startWidth = parseInt(selection.style.width) || 100;
                    startHeight = parseInt(selection.style.height) || 100;
                    
                    e.preventDefault();
                };
                
                const onMove = (e) => {
                    if (!isDragging && !isResizing) return;
                    
                    const pos = getEventPos(e);
                    const dx = pos.x - startX;
                    const dy = pos.y - startY;
                    
                    const imgRect = image.getBoundingClientRect();
                    const wrapperRect = wrapper.getBoundingClientRect();
                    const maxX = imgRect.width;
                    const maxY = imgRect.height;
                    
                    if (isDragging) {
                        let newLeft = startLeft + dx;
                        let newTop = startTop + dy;
                        
                        // Constrain to image bounds
                        newLeft = Math.max(0, Math.min(newLeft, maxX - startWidth));
                        newTop = Math.max(0, Math.min(newTop, maxY - startHeight));
                        
                        selection.style.left = newLeft + 'px';
                        selection.style.top = newTop + 'px';
                    } else if (isResizing) {
                        let newLeft = startLeft;
                        let newTop = startTop;
                        let newWidth = startWidth;
                        let newHeight = startHeight;
                        
                        if (currentHandle.includes('e')) newWidth = startWidth + dx;
                        if (currentHandle.includes('w')) {
                            newWidth = startWidth - dx;
                            newLeft = startLeft + dx;
                        }
                        if (currentHandle.includes('s')) newHeight = startHeight + dy;
                        if (currentHandle.includes('n')) {
                            newHeight = startHeight - dy;
                            newTop = startTop + dy;
                        }
                        
                        // Minimum size
                        if (newWidth < 50) newWidth = 50;
                        if (newHeight < 50) newHeight = 50;
                        
                        // Constrain to image bounds
                        if (newLeft < 0) { newWidth += newLeft; newLeft = 0; }
                        if (newTop < 0) { newHeight += newTop; newTop = 0; }
                        if (newLeft + newWidth > maxX) newWidth = maxX - newLeft;
                        if (newTop + newHeight > maxY) newHeight = maxY - newTop;
                        
                        selection.style.left = newLeft + 'px';
                        selection.style.top = newTop + 'px';
                        selection.style.width = newWidth + 'px';
                        selection.style.height = newHeight + 'px';
                    }
                    
                    e.preventDefault();
                };
                
                const onEnd = () => {
                    isDragging = false;
                    isResizing = false;
                    currentHandle = null;
                };
                
                // Mouse events
                selection.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
                
                // Touch events
                selection.addEventListener('touchstart', onStart, { passive: false });
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd);
                
                // Cleanup when modal closes
                modal.addEventListener('remove', () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);
                });
            }
            
            applyManualCrop(modal, img, scale) {
                const selection = modal.querySelector('#crop-selection');
                const left = parseInt(selection.style.left) / scale;
                const top = parseInt(selection.style.top) / scale;
                const width = parseInt(selection.style.width) / scale;
                const height = parseInt(selection.style.height) / scale;
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, left, top, width, height, 0, 0, width, height);
                
                const cropped = canvas.toDataURL('image/jpeg', 0.95);
                this.pages[this.currentPage].image = cropped;
                document.getElementById('preview-image').src = cropped;
                
                modal.remove();
                this.showToast('Document cropped!');
            }

            enhanceDocument() {
                if (this.pages.length === 0) return;
                this.showEnhanceModal();
            }
            
            showEnhanceModal() {
                const img = new Image();
                img.onload = () => {
                    this.createEnhanceInterface(img);
                };
                img.src = this.pages[this.currentPage].image;
            }
            
            createEnhanceInterface(img) {
                const modal = document.createElement('div');
                modal.id = 'enhance-modal';
                modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1f2937; z-index: 1000; display: flex; flex-direction: column;';
                
                modal.innerHTML = `
                    <div style="padding: 1rem; color: white; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1rem;"><i class="fas fa-magic"></i> Enhance Document</h3>
                        <button id="close-enhance" style="background: none; border: none; color: white; font-size: 1.25rem; cursor: pointer;"><i class="fas fa-times"></i></button>
                    </div>
                    
                    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; background: #000;">
                        <canvas id="enhance-canvas" style="max-width: 100%; max-height: 60vh; box-shadow: 0 4px 20px rgba(0,0,0,0.5);"></canvas>
                    </div>
                    
                    <div style="padding: 1rem; background: #374151;">
                        <!-- Filter Presets -->
                        <div style="margin-bottom: 1rem;">
                            <label style="color: #9ca3af; font-size: 0.75rem; display: block; margin-bottom: 0.5rem;">PRESETS</label>
                            <div style="display: flex; gap: 0.5rem; overflow-x: auto;">
                                <button class="enhance-preset active" data-preset="original" style="padding: 0.5rem 1rem; border-radius: 2rem; border: none; background: #4f46e5; color: white; font-size: 0.875rem; cursor: pointer; white-space: nowrap;">Original</button>
                                <button class="enhance-preset" data-preset="document" style="padding: 0.5rem 1rem; border-radius: 2rem; border: none; background: #6b7280; color: white; font-size: 0.875rem; cursor: pointer; white-space: nowrap;">Document</button>
                                <button class="enhance-preset" data-preset="grayscale" style="padding: 0.5rem 1rem; border-radius: 2rem; border: none; background: #6b7280; color: white; font-size: 0.875rem; cursor: pointer; white-space: nowrap;">Grayscale</button>
                                <button class="enhance-preset" data-preset="bw" style="padding: 0.5rem 1rem; border-radius: 2rem; border: none; background: #6b7280; color: white; font-size: 0.875rem; cursor: pointer; white-space: nowrap;">B&W</button>
                                <button class="enhance-preset" data-preset="sharpen" style="padding: 0.5rem 1rem; border-radius: 2rem; border: none; background: #6b7280; color: white; font-size: 0.875rem; cursor: pointer; white-space: nowrap;">Sharpen</button>
                            </div>
                        </div>
                        
                        <!-- Adjustments -->
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1rem;">
                            <div>
                                <label style="color: #9ca3af; font-size: 0.75rem; display: flex; justify-content: space-between;">
                                    <span>BRIGHTNESS</span>
                                    <span id="brightness-val">100%</span>
                                </label>
                                <input type="range" id="brightness" min="50" max="150" value="100" style="width: 100%; margin-top: 0.25rem;">
                            </div>
                            <div>
                                <label style="color: #9ca3af; font-size: 0.75rem; display: flex; justify-content: space-between;">
                                    <span>CONTRAST</span>
                                    <span id="contrast-val">100%</span>
                                </label>
                                <input type="range" id="contrast" min="50" max="150" value="100" style="width: 100%; margin-top: 0.25rem;">
                            </div>
                            <div>
                                <label style="color: #9ca3af; font-size: 0.75rem; display: flex; justify-content: space-between;">
                                    <span>SATURATION</span>
                                    <span id="saturation-val">100%</span>
                                </label>
                                <input type="range" id="saturation" min="0" max="200" value="100" style="width: 100%; margin-top: 0.25rem;">
                            </div>
                            <div>
                                <label style="color: #9ca3af; font-size: 0.75rem; display: flex; justify-content: space-between;">
                                    <span>SHARPNESS</span>
                                    <span id="sharpness-val">0%</span>
                                </label>
                                <input type="range" id="sharpness" min="0" max="100" value="0" style="width: 100%; margin-top: 0.25rem;">
                            </div>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="reset-enhance" class="btn btn-secondary" style="flex: 1; padding: 0.75rem;"><i class="fas fa-undo"></i> Reset</button>
                            <button id="apply-enhance" class="btn btn-primary" style="flex: 2; padding: 0.75rem;"><i class="fas fa-check"></i> Apply</button>
                            <button id="cancel-enhance" class="btn btn-secondary" style="flex: 1; padding: 0.75rem;">Cancel</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                
                // Setup canvas
                const canvas = document.getElementById('enhance-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // Store original image data
                this.originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Setup controls
                this.setupEnhanceControls(modal, canvas, ctx);
                
                // Button handlers
                document.getElementById('apply-enhance').addEventListener('click', () => {
                    this.applyEnhancement(canvas);
                    modal.remove();
                });
                
                document.getElementById('reset-enhance').addEventListener('click', () => {
                    this.resetEnhancement(canvas, ctx);
                });
                
                document.getElementById('cancel-enhance').addEventListener('click', () => {
                    modal.remove();
                });
                
                document.getElementById('close-enhance').addEventListener('click', () => {
                    modal.remove();
                });
            }
            
            setupEnhanceControls(modal, canvas, ctx) {
                const brightness = modal.querySelector('#brightness');
                const contrast = modal.querySelector('#contrast');
                const saturation = modal.querySelector('#saturation');
                const sharpness = modal.querySelector('#sharpness');
                const presets = modal.querySelectorAll('.enhance-preset');
                
                let currentPreset = 'original';
                
                const updateImage = () => {
                    this.applyFilters(canvas, ctx, {
                        brightness: parseInt(brightness.value),
                        contrast: parseInt(contrast.value),
                        saturation: parseInt(saturation.value),
                        sharpness: parseInt(sharpness.value),
                        preset: currentPreset
                    });
                };
                
                // Slider events
                brightness.addEventListener('input', (e) => {
                    modal.querySelector('#brightness-val').textContent = e.target.value + '%';
                    updateImage();
                });
                
                contrast.addEventListener('input', (e) => {
                    modal.querySelector('#contrast-val').textContent = e.target.value + '%';
                    updateImage();
                });
                
                saturation.addEventListener('input', (e) => {
                    modal.querySelector('#saturation-val').textContent = e.target.value + '%';
                    updateImage();
                });
                
                sharpness.addEventListener('input', (e) => {
                    modal.querySelector('#sharpness-val').textContent = e.target.value + '%';
                    updateImage();
                });
                
                // Preset buttons
                presets.forEach(btn => {
                    btn.addEventListener('click', () => {
                        presets.forEach(b => {
                            b.classList.remove('active');
                            b.style.background = '#6b7280';
                        });
                        btn.classList.add('active');
                        btn.style.background = '#4f46e5';
                        
                        currentPreset = btn.dataset.preset;
                        this.applyPreset(brightness, contrast, saturation, sharpness, currentPreset);
                        updateImage();
                    });
                });
            }
            
            applyPreset(brightness, contrast, saturation, sharpness, preset) {
                const presets = {
                    original: { b: 100, c: 100, s: 100, sh: 0 },
                    document: { b: 110, c: 130, s: 0, sh: 20 },
                    grayscale: { b: 100, c: 100, s: 0, sh: 0 },
                    bw: { b: 100, c: 150, s: 0, sh: 30 },
                    sharpen: { b: 100, c: 110, s: 100, sh: 50 }
                };
                
                const p = presets[preset] || presets.original;
                brightness.value = p.b;
                contrast.value = p.c;
                saturation.value = p.s;
                sharpness.value = p.sh;
                
                // Update display values
                document.getElementById('brightness-val').textContent = p.b + '%';
                document.getElementById('contrast-val').textContent = p.c + '%';
                document.getElementById('saturation-val').textContent = p.s + '%';
                document.getElementById('sharpness-val').textContent = p.sh + '%';
            }
            
            applyFilters(canvas, ctx, settings) {
                const width = canvas.width;
                const height = canvas.height;
                const imageData = ctx.createImageData(width, height);
                const data = imageData.data;
                const original = this.originalImageData.data;
                
                const brightness = settings.brightness / 100;
                const contrast = settings.contrast / 100;
                const saturation = settings.saturation / 100;
                
                for (let i = 0; i < original.length; i += 4) {
                    let r = original[i];
                    let g = original[i + 1];
                    let b = original[i + 2];
                    
                    // Brightness
                    r *= brightness;
                    g *= brightness;
                    b *= brightness;
                    
                    // Contrast
                    r = ((r - 128) * contrast) + 128;
                    g = ((g - 128) * contrast) + 128;
                    b = ((b - 128) * contrast) + 128;
                    
                    // Saturation
                    if (settings.preset !== 'grayscale' && settings.preset !== 'bw') {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        r = gray + (r - gray) * saturation;
                        g = gray + (g - gray) * saturation;
                        b = gray + (b - gray) * saturation;
                    } else {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        r = g = b = gray;
                    }
                    
                    // B&W threshold
                    if (settings.preset === 'bw') {
                        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        r = g = b = gray > 128 ? 255 : 0;
                    }
                    
                    // Clamp values
                    data[i] = Math.max(0, Math.min(255, r));
                    data[i + 1] = Math.max(0, Math.min(255, g));
                    data[i + 2] = Math.max(0, Math.min(255, b));
                    data[i + 3] = original[i + 3];
                }
                
                ctx.putImageData(imageData, 0, 0);
            }
            
            resetEnhancement(canvas, ctx) {
                ctx.putImageData(this.originalImageData, 0, 0);
                
                // Reset sliders
                document.getElementById('brightness').value = 100;
                document.getElementById('contrast').value = 100;
                document.getElementById('saturation').value = 100;
                document.getElementById('sharpness').value = 0;
                
                document.getElementById('brightness-val').textContent = '100%';
                document.getElementById('contrast-val').textContent = '100%';
                document.getElementById('saturation-val').textContent = '100%';
                document.getElementById('sharpness-val').textContent = '0%';
                
                // Reset preset
                document.querySelectorAll('.enhance-preset').forEach(b => {
                    b.classList.remove('active');
                    b.style.background = '#6b7280';
                });
                document.querySelector('[data-preset="original"]').classList.add('active');
                document.querySelector('[data-preset="original"]').style.background = '#4f46e5';
            }
            
            applyEnhancement(canvas) {
                const enhanced = canvas.toDataURL('image/jpeg', 0.95);
                this.pages[this.currentPage].image = enhanced;
                document.getElementById('preview-image').src = enhanced;
                this.showToast('Document enhanced!');
            }

            handleFileSelect(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.pages.push({ image: e.target.result });
                    this.currentPage = 0;
                    this.showPreview();
                };
                reader.readAsDataURL(file);
            }

            toggleAutoCapture() {
                this.autoCapture = !this.autoCapture;
                const btn = document.getElementById('auto-capture-btn');
                const span = btn.querySelector('span');
                
                if (this.autoCapture) {
                    span.textContent = 'Auto: ON';
                    btn.style.borderColor = '#10b981';
                    btn.style.background = 'rgba(16, 185, 129, 0.3)';
                    this.showToast('Auto-capture enabled');
                } else {
                    span.textContent = 'Auto: OFF';
                    btn.style.borderColor = 'transparent';
                    btn.style.background = 'rgba(0,0,0,0.5)';
                    this.showToast('Auto-capture disabled');
                }
            }

            async toggleFlash() {
                if (!this.currentStream) return;
                const track = this.currentStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    const isFlashOn = track.getSettings().torch || false;
                    await track.applyConstraints({ advanced: [{ torch: !isFlashOn }] });
                    this.showToast(isFlashOn ? 'Flash off' : 'Flash on');
                } else {
                    this.showToast('Flash not available', 'error');
                }
            }

            showLoading(text = 'Processing...') {
                document.getElementById('loading-text').textContent = text;
                document.getElementById('loading-overlay').style.display = 'flex';
            }

            hideLoading() {
                document.getElementById('loading-overlay').style.display = 'none';
            }

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toast-message');
                toastMessage.textContent = message;
                toast.className = 'toast' + (type === 'error' ? ' error' : '');
                toast.style.display = 'flex';
                setTimeout(() => toast.style.display = 'none', 3000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            window.scanner = new CamScanner();
        });
    </script>
</body>
</html>
