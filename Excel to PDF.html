<body>
<div class="container">
<h1>Excel to PDF Converter</h1>
<input type="file" id="excelFile" accept=".xlsx,.xls">
<button id="convertBtn">Convert to PDF</button>
<p class="status" id="status"></p>
<p class="error" id="error"></p>
<iframe id="preview"></iframe>
<a id="downloadBtn" class="download-btn" download="converted.pdf">Download PDF</a>
</div>
<script>
const { jsPDF } = window.jspdf;
const fileInput    = document.getElementById("excelFile");
const convertBtn   = document.getElementById("convertBtn");
const statusText   = document.getElementById("status");
const errorText    = document.getElementById("error");
const preview      = document.getElementById("preview");
const downloadBtn  = document.getElementById("downloadBtn");

convertBtn.addEventListener("click", () => {
  errorText.textContent  = "";
  statusText.textContent = "";
  downloadBtn.style.display = "none";

  const file = fileInput.files[0];
  if (!file) {
    errorText.textContent = "Please upload an Excel file.";
    return;
  }

  statusText.textContent  = "Processing file...";
  convertBtn.disabled     = true;

  const reader = new FileReader();
  reader.readAsArrayBuffer(file);

  reader.onload = function(e) {
    try {
      const data     = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet    = XLSX.utils.sheet_to_json(
                         workbook.Sheets[sheetName], { header: 1 }
                       );

      const doc        = new jsPDF();
      const pageWidth  = doc.internal.pageSize.getWidth();
      const maxWidth   = pageWidth - 20; // left(10) + right(10) margin
      let   y          = 10;

      // FIX 3: empty rows filter karo
      const filteredSheet = sheet.filter(row =>
        Array.isArray(row) && row.some(cell => cell !== null && cell !== undefined && cell !== "")
      );

      filteredSheet.forEach(row => {
        // FIX 2: long text wrap karo — splitTextToSize use karo
        const rowText  = row.map(cell => (cell !== null && cell !== undefined) ? String(cell) : "").join(" | ");
        const lines    = doc.splitTextToSize(rowText, maxWidth);

        lines.forEach(line => {
          if (y > 280) {
            doc.addPage();
            y = 10;
          }
          doc.text(line, 10, y);
          y += 8;
        });

        y += 2; // row ke baad thodi space
      });

      const pdfBlob = doc.output("blob");
      const pdfUrl  = URL.createObjectURL(pdfBlob);

      preview.src           = pdfUrl;
      downloadBtn.href      = pdfUrl;
      downloadBtn.style.display = "block";
      statusText.textContent = "Conversion completed!";

    } catch (err) {
      // FIX 1: error handling — corrupt/invalid file
      errorText.textContent = "File read karne mein masla hua. Valid Excel file upload karein.";
      statusText.textContent = "";
    }

    // FIX 4: button hamesha re-enable ho — try/catch ke baad
    convertBtn.disabled = false;
  };

  // FIX 1: reader.onerror bhi handle karo
  reader.onerror = function() {
    errorText.textContent  = "File load nahi ho saki. Dobara try karein.";
    statusText.textContent = "";
    convertBtn.disabled    = false; // FIX 4: yahan bhi re-enable
  };
});
</script>
