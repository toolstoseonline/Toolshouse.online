<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel to PDF Converter Online Free – XLS XLSX to PDF – Tools House Online</title>
<meta name="description" content="Convert Excel to PDF online for free. Upload XLS or XLSX and download PDF instantly. Fast and secure. No signup required.">
<link rel="canonical" href="https://www.toolshouse.online/Excel to PDF.html">
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --accent:#3b82f6;
  --success:#22c55e;
  --error:#ef4444;
}

*{box-sizing:border-box;font-family:system-ui,sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  background:var(--card);
  width:100%;
  max-width:600px;
  padding:25px;
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}

h1{text-align:center;margin-bottom:20px;}

input,button{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

button{
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

.status{text-align:center;font-size:14px;}
.error{color:var(--error);text-align:center;}

iframe{
  width:100%;
  height:300px;
  border:none;
  margin-top:10px;
  border-radius:8px;
}

.download-btn{
  display:none;
  background:var(--success);
  color:black;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Excel to PDF Converter</h1>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button id="convertBtn">Convert to PDF</button>

<p class="status" id="status"></p>
<p class="error" id="error"></p>

<iframe id="preview"></iframe>

<a id="downloadBtn" class="download-btn" download="converted.pdf">Download PDF</a>
</div>

<script>
const { jsPDF } = window.jspdf;

const fileInput=document.getElementById("excelFile");
const convertBtn=document.getElementById("convertBtn");
const statusText=document.getElementById("status");
const errorText=document.getElementById("error");
const preview=document.getElementById("preview");
const downloadBtn=document.getElementById("downloadBtn");

convertBtn.addEventListener("click",()=>{
  errorText.textContent="";
  statusText.textContent="";
  downloadBtn.style.display="none";

  const file=fileInput.files[0];

  if(!file){
    errorText.textContent="Please upload an Excel file.";
    return;
  }

  statusText.textContent="Processing file...";
  convertBtn.disabled=true;

  const reader=new FileReader();
  reader.readAsArrayBuffer(file);

  reader.onload=function(e){
    const data=new Uint8Array(e.target.result);
    const workbook=XLSX.read(data,{type:"array"});
    const sheetName=workbook.SheetNames[0];
    const sheet=XLSX.utils.sheet_to_json(workbook.Sheets[sheetName],{header:1});

    const doc=new jsPDF();
    let y=10;

    sheet.forEach(row=>{
      doc.text(row.join(" | "),10,y);
      y+=10;
      if(y>280){
        doc.addPage();
        y=10;
      }
    });

    const pdfBlob=doc.output("blob");
    const pdfUrl=URL.createObjectURL(pdfBlob);

    preview.src=pdfUrl;
    downloadBtn.href=pdfUrl;
    downloadBtn.style.display="block";

    statusText.textContent="Conversion completed!";
    convertBtn.disabled=false;
  };
});
</script>
<script>(function(s){s.dataset.zone='10673896',s.src='https://gizokraijaw.net/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script'))) </script>
</body>
</html>
