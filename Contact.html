<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - ToolsHouse.Online</title>
<meta name="description" content="Contact Tools House Online for any questions, feedback, or support. We are happy to help — reach us anytime at toolstoseonline@gmail.com.">
<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f7fb;
}
header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.contact-info{
    background:#eef2ff;
    padding:20px;
    border-radius:8px;
    margin-bottom:30px;
}
.contact-info p{
    margin:10px 0;
    font-size:16px;
}
.contact-info a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}
form{
    display:flex;
    flex-direction:column;
}
input, textarea{
    margin-bottom:15px;
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
}
textarea{
    resize:none;
    height:120px;
}
button{
    background:#2563eb;
    color:white;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#1e40af;
}
footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:white;
    margin-top:40px;
}
</style>
</head>
<body>
<header>
    <h1>Contact Us</h1>
</header>
<div class="container">
    <h2>Get in Touch</h2>
    <div class="contact-info">
        <p><strong>Website:</strong> www.ToolsHouse.Online</p>
        <p><strong>Email:</strong> 
        <a href="mailto:toolstoseonline@gmail.com">
        toolstoseonline@gmail.com
        </a></p>
        <p>No phone number or physical address is currently available.</p>
    </div>
    <h2>Send Us a Message</h2>
    
    <!-- FormSubmit Form - Email Actually Send Hogi -->
    <form action="https://formsubmit.co/toolstoseonline@gmail.com" method="POST">
        <!-- Honeypot for spam protection -->
        <input type="text" name="_honey" style="display:none">
        
        <!-- Disable captcha -->
        <input type="hidden" name="_captcha" value="false">
        
        <!-- Success page redirect (optional) -->
        <input type="hidden" name="_next" value="https://www.toolshouse.online/thank-you.html">
        
        <!-- Form fields with 'name' attributes -->
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Write your message here..." required></textarea>
        
        <button type="submit">Send Message</button>
    </form>
</div>
<footer>
    © 2026 ToolsHouse.Online | All Rights Reserved
</footer>
</body>
</html>
