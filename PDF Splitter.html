<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Splitter Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    background:white;
    width:95%;
    max-width:900px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
    text-align:center;
}

.drop-area{
    border:2px dashed #764ba2;
    padding:25px;
    border-radius:15px;
    cursor:pointer;
    margin-bottom:15px;
}

.preview-container{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    max-height:400px;
    overflow:auto;
}

.page-box{
    text-align:center;
}

canvas{
    width:150px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:12px;
    background:#764ba2;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>PDF Splitter - Select Pages</h2>

    <div class="drop-area" id="dropArea">
        Click or Drag PDF Here
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>

    <div class="preview-container" id="previewContainer"></div>

    <button onclick="splitPDF()">Download Selected Pages</button>
</div>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const previewContainer = document.getElementById("previewContainer");

let pdfFile = null;

dropArea.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",(e)=>{
    handleFile(e.target.files[0]);
});

dropArea.addEventListener("dragover",(e)=>e.preventDefault());

dropArea.addEventListener("drop",(e)=>{
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
});

function handleFile(file){
    if(!file || file.type !== "application/pdf"){
        alert("Upload valid PDF");
        return;
    }

    pdfFile = file;
    previewContainer.innerHTML="";

    const reader = new FileReader();
    reader.onload = function(){
        const typedarray = new Uint8Array(this.result);
        pdfjsLib.getDocument(typedarray).promise.then(pdf=>{
            for(let i=1;i<=pdf.numPages;i++){
                pdf.getPage(i).then(page=>{
                    const viewport = page.getViewport({scale:0.4});
                    const canvas = document.createElement("canvas");
                    const context = canvas.getContext("2d");
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const pageBox = document.createElement("div");
                    pageBox.className = "page-box";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = i-1;

                    pageBox.appendChild(canvas);
                    pageBox.appendChild(document.createElement("br"));
                    pageBox.appendChild(document.createTextNode("Page "+i));
                    pageBox.appendChild(document.createElement("br"));
                    pageBox.appendChild(checkbox);

                    previewContainer.appendChild(pageBox);

                    page.render({
                        canvasContext: context,
                        viewport: viewport
                    });
                });
            }
        });
    };
    reader.readAsArrayBuffer(file);
}

async function splitPDF(){
    if(!pdfFile){
        alert("Upload PDF first");
        return;
    }

    const checked = document.querySelectorAll("input[type='checkbox']:checked");

    if(checked.length === 0){
        alert("Select at least one page");
        return;
    }

    const { PDFDocument } = PDFLib;
    const bytes = await pdfFile.arrayBuffer();
    const pdfDoc = await PDFDocument.load(bytes);
    const newPdf = await PDFDocument.create();

    for(const cb of checked){
        const pageIndex = Number(cb.value);
        const [copiedPage] = await newPdf.copyPages(pdfDoc,[pageIndex]);
        newPdf.addPage(copiedPage);
    }

    const newBytes = await newPdf.save();
    const blob = new Blob([newBytes], {type:"application/pdf"});

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "selected-pages.pdf";
    link.click();
}
</script>

</body>
</html>
