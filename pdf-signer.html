<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Sign PDF | Mobile-Friendly E-Signature Tool</title>
<meta name="description" content="Sign PDF online free on any device. Mobile-friendly signature pad, elegant fonts, image upload. No signup required.">
<meta name="keywords" content="sign pdf mobile, electronic signature, pdf signer free, touch signature">
<link rel="canonical" href="https://www.toolshouse.online/sign-pdf.html">
<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0c0c14;
  --surface: #13131c;
  --card: #1b1b26;
  --border: #2a2a38;
  --accent: #e0b354;
  --accent-dark: #c9942c;
  --text: #f0ede8;
  --muted: #8f8ca3;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow: 0 8px 24px rgba(0,0,0,0.4);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
  line-height: 1.4;
  touch-action: pan-y pinch-zoom;
}

/* Main container */
.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 16px 12px;
  background: rgba(19,19,28,0.8);
  backdrop-filter: blur(12px);
  border-radius: var(--radius-md);
  margin-bottom: 18px;
  border: 1px solid var(--border);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.35rem;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #f3d382, #e0b354);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.logo svg {
  width: 30px;
  height: 30px;
  stroke: var(--accent);
  stroke-width: 1.6;
  fill: none;
}
.badge-mobile {
  background: var(--accent);
  color: #0a0a0a;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 500;
}

/* 2-col layout: responsive */
.layout {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Sidebar (signature creation) */
.sidebar {
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  padding: 18px;
  box-shadow: var(--shadow);
}

/* main area (pdf viewer) */
.main-area {
  background: var(--card);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 480px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  padding: 6px;
  border-radius: 60px;
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  padding: 10px 6px;
  border-radius: 40px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
}
.tab-btn.active {
  background: var(--accent);
  color: #0c0c14;
  font-weight: 600;
}
.tab-btn svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
}

/* canvas wrapper - mobile touch friendly */
.canvas-card {
  background: white;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
#sigCanvas {
  width: 100%;
  height: auto;
  background: white;
  display: block;
  cursor: crosshair;
  touch-action: none;
  border-radius: 10px;
}
.placeholder-sign {
  position: absolute;
  bottom: 12px;
  left: 12px;
  font-family: 'Dancing Script', cursive;
  font-size: 1.2rem;
  color: #ccc;
  pointer-events: none;
  opacity: 0.7;
}

/* controls row */
.control-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 12px 0;
  align-items: center;
}
.btn-sm {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 8px 14px;
  font-size: 0.75rem;
  color: var(--text);
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}
.btn-sm:active { background: var(--accent); color: black; transform: scale(0.97);}
.btn-primary {
  background: var(--accent);
  border: none;
  border-radius: 60px;
  padding: 12px 18px;
  font-weight: 700;
  font-size: 0.9rem;
  color: #0a0a0a;
  width: 100%;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.btn-primary:active { transform: scale(0.98); background: var(--accent-dark);}
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 60px;
  padding: 8px 12px;
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
}
input[type="range"] { accent-color: var(--accent); width: 100%;}
.color-palette {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin: 8px 0;
}
.color-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: 0.1s;
}
.color-dot.active { border-color: white; transform: scale(1.1);}

/* font grid for mobile */
.font-scroll {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  max-height: 220px;
  overflow-y: auto;
  margin: 12px 0;
  background: rgba(0,0,0,0.2);
  border-radius: 16px;
  padding: 8px;
}
.font-card {
  background: #20202a;
  border-radius: 14px;
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.1s;
}
.font-card.active {
  border-color: var(--accent);
  background: rgba(224,179,84,0.15);
}
.font-preview {
  font-size: 1.2rem;
  background: white;
  color: black;
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 4px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.font-name {
  font-size: 0.6rem;
  color: var(--muted);
}
/* image upload */
.img-upload-box {
  border: 2px dashed var(--border);
  border-radius: 20px;
  padding: 28px 12px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 12px;
}
.img-preview-small {
  max-width: 100%;
  max-height: 100px;
  margin-top: 8px;
  border-radius: 12px;
  display: none;
}

/* PDF Toolbar */
.pdf-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.pdf-toolbar button {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 40px;
  color: var(--text);
  font-size: 0.7rem;
  display: inline-flex;
  gap: 5px;
  align-items: center;
  cursor: pointer;
}
.pdf-container {
  position: relative;
  display: flex;
  justify-content: center;
  padding: 20px;
  background: #0f0f17;
  overflow: auto;
  min-height: 380px;
}
#pdfCanvas {
  max-width: 100%;
  height: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  border-radius: 8px;
  display: block;
}
.sig-overlay {
  position: absolute;
  cursor: move;
  border: 2px solid rgba(224,179,84,0.7);
  border-radius: 6px;
  background: transparent;
  touch-action: none;
}
.sig-overlay.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(224,179,84,0.3);}
.sig-overlay img { width: 100%; height: 100%; display: block; pointer-events: none; }
.sig-overlay .del-btn {
  position: absolute;
  top: -12px;
  right: -12px;
  width: 24px;
  height: 24px;
  background: #e34d4d;
  border-radius: 30px;
  border: none;
  color: white;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.9;
  box-shadow: 0 2px 6px black;
}
.resize-handle {
  position: absolute;
  bottom: -8px;
  right: -8px;
  width: 16px;
  height: 16px;
  background: var(--accent);
  border-radius: 3px;
  cursor: se-resize;
}
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent);
  color: #111;
  padding: 10px 24px;
  border-radius: 40px;
  font-weight: 600;
  z-index: 2000;
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  pointer-events: none;
  font-size: 0.85rem;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0);}
/* responsive */
@media (min-width: 860px) {
  .layout {
    flex-direction: row;
    align-items: flex-start;
  }
  .sidebar {
    flex: 0 0 340px;
    position: sticky;
    top: 12px;
    max-height: calc(100vh - 30px);
    overflow-y: auto;
  }
  .main-area {
    flex: 1;
  }
}
@media (max-width: 480px) {
  .toast { white-space: normal; max-width: 85vw; text-align: center; font-size: 0.75rem;}
  .btn-sm { padding: 6px 10px; font-size: 0.7rem;}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 28 28"><path d="M4 4h16v18H4zM20 8l4 2v12h-4" stroke="currentColor" fill="none"/><path d="M8 12h8M8 16h6" stroke="currentColor"/><path d="M6 22 L10 18 L14 22 L20 16" stroke="currentColor" fill="none"/></svg>
      SignFlow
    </div>
    <div class="badge-mobile">📱 Mobile ready · Touch friendly</div>
  </div>

  <div class="layout">
    <!-- Sidebar: Signature creation -->
    <div class="sidebar">
      <h3 style="font-size:1rem; margin-bottom:12px;">✍️ Create signature</h3>
      <div class="tabs">
        <button class="tab-btn active" id="tabDrawBtn">🖌️ Draw</button>
        <button class="tab-btn" id="tabTypeBtn">✍️ Type</button>
        <button class="tab-btn" id="tabImageBtn">🖼️ Image</button>
      </div>

      <!-- Draw tab -->
      <div id="drawPanel">

        </div>

          <div class="color-dot" style="background:#1e2a3a;" data-color="#1e2a3a"></div>

          <div class="color-dot" style="background:#1c5a3a;" data-color="#1c5a3a"></div>
          <div class="color-dot" style="background:#b45f2b;" data-color="#b45f2b"></div>
          <div class="color-dot" style="background:#8b2c2c;" data-color="#8b2c2c"></div>
          <div class="color-dot" style="background:#b5850a;" data-color="#b5850a"></div>
          <input type="color" id="customDrawColor" value="#000000" style="width:34px; height:34px; border-radius:50%; border:1px solid #aaa; cursor:pointer;">

      <!-- Type tab (hidden initially) -->

        <input type="text" id="typeNameInput" placeholder="Your full name" style="width:100%; padding:12px; border-radius:40px; background:#20202a; border:1px solid var(--border); color:white; margin-bottom:12px;">
        <div class="color-palette" id="typeColors">
          <div class="color-dot" style="background:#1e2a3a;" data-color="#1e2a3a"></div>

          <div class="color-dot" style="background:#1c5a3a;" data-color="#1c5a3a"></div>
          <div class="color-dot" style="background:#b45f2b;" data-color="#b45f2b"></div>
          <div class="color-dot" style="background:#8b2c2c;" data-color="#8b2c2c"></div>
          <div class="color-dot" style="background:#b5850a;" data-color="#b5850a"></div>
          <input type="color" id="customTypeColor" value="#000000" style="width:34px; height:34px; border-radius:50%;">
        </div>

      <!-- Image tab -->
      <div id="imagePanel" style="display:none;">

          📸 Tap to upload signature image (PNG/transparent)
        </div>

        <img id="uploadedImgPreview" class="img-preview-small" alt="preview">
        <button class="btn-primary" id="useImageSigBtn" style="margin-top:12px;">✅ Use this image</button>
      </div>

      <!-- Signature placement options -->
      <hr style="margin: 20px 0; border-color:var(--border);">
      <div>
        <label style="font-size:0.8rem;">📏 Signature size (px)</label>

          <input type="number" id="sigWidth" value="180" min="40" max="500" style="width:100%; background:#20202a; border:1px solid var(--border); border-radius:30px; padding:8px;">
          <input type="number" id="sigHeight" value="70" min="30" max="200" style="width:100%; background:#20202a; border:1px solid var(--border); border-radius:30px; padding:8px;">

        📄 Click or drag PDF here

<script>
// ---- pdf.js setup ----
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// DOM elements
const drawCanvas = document.getElementById('sigCanvas');
const ctx = drawCanvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0;
let currentDrawColor = '#000000';
let brushSize = 3;
let strokes = [];
let currentStrokePoints = [];

function initCanvas() {
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
  ctx.fillStyle = currentDrawColor;
}
drawCanvas.width = 500; drawCanvas.height = 200;
initCanvas();

// Drawing handlers (mobile + mouse)
function getCoords(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  let x = (clientX - rect.left) * scaleX;
  let y = (clientY - rect.top) * scaleY;
  x = Math.min(Math.max(0, x), drawCanvas.width);
  y = Math.min(Math.max(0, y), drawCanvas.height);
  return { x, y };
}
function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const { x, y } = getCoords(e);
  lastX = x; lastY = y;
  currentStrokePoints = [{ x, y }];
  ctx.beginPath();
  ctx.moveTo(x, y);
  document.getElementById('drawPlaceholder')?.setAttribute('style','opacity:0');
}
function drawMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const { x, y } = getCoords(e);
  currentStrokePoints.push({ x, y });
  ctx.globalAlpha = 1;
  ctx.strokeStyle = currentDrawColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
  lastX = x; lastY = y;
}
function endDraw() {
  if (drawing && currentStrokePoints.length) {
    strokes.push({ points: [...currentStrokePoints], color: currentDrawColor, width: brushSize });
  }
  drawing = false;
  currentStrokePoints = [];
}
drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', drawMove);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', drawMove, { passive: false });
drawCanvas.addEventListener('touchend', endDraw);

function redrawAllStrokes() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
  strokes.forEach(s => {
    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    s.points.forEach((p, idx) => idx === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });
  if(strokes.length===0) document.getElementById('drawPlaceholder')?.setAttribute('style','opacity:0.7');
  else document.getElementById('drawPlaceholder')?.setAttribute('style','opacity:0');
}
document.getElementById('clearDrawBtn').onclick = () => { strokes = []; redrawAllStrokes(); };
document.getElementById('undoDrawBtn').onclick = () => { strokes.pop(); redrawAllStrokes(); };
document.getElementById('brushSize').oninput = (e) => { brushSize = parseInt(e.target.value); document.getElementById('brushVal').innerText = brushSize+'px'; };
// colors
function initDrawColors() {
  document.querySelectorAll('#drawColors .color-dot').forEach(dot => {
    dot.onclick = () => {
      document.querySelectorAll('#drawColors .color-dot').forEach(d=>d.classList.remove('active'));
      dot.classList.add('active');
      currentDrawColor = dot.dataset.color;
    };
  });
  document.getElementById('customDrawColor').onchange = (e) => {
    currentDrawColor = e.target.value;
    document.querySelectorAll('#drawColors .color-dot').forEach(d=>d.classList.remove('active'));
  };
}
initDrawColors();

// ---- Type signature generator ----
let currentTypeColor = '#000000';
let selectedFont = 'Great Vibes';
const fontFamilies = [
  'Great Vibes', 'Sacramento', 'Dancing Script', 'Pacifico', 'Satisfy', 'Allura', 'Alex Brush',
  'Petit Formal Script', 'Pinyon Script', 'Italianno', 'Euphoria Script', 'Mr Dafoe', 'Yellowtail',
  'Playball', 'Ruthie', 'Tangerine', 'Rouge Script', 'Monsieur La Doulaise', 'Cormorant Garamond', 'Fleur De Leah'
];
function buildFontGrid() {
  const container = document.getElementById('fontList');
  container.innerHTML = '';
  fontFamilies.forEach(font => {
    const card = document.createElement('div');
    card.className = 'font-card';
    if(font === selectedFont) card.classList.add('active');
    card.innerHTML = `<div class="font-preview" style="font-family:'${font}',cursive;">Sample</div><div class="font-name">${font}</div>`;
    card.onclick = () => {
      document.querySelectorAll('.font-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      selectedFont = font;
    };
    container.appendChild(card);
  });
}
buildFontGrid();
function updateTypePreviewColor() {
  document.querySelectorAll('.font-preview').forEach(el => el.style.color = currentTypeColor);
}
document.querySelectorAll('#typeColors .color-dot').forEach(dot => {
  dot.onclick = () => {
    document.querySelectorAll('#typeColors .color-dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    currentTypeColor = dot.dataset.color;
    updateTypePreviewColor();
  };
});
document.getElementById('customTypeColor').onchange = (e) => {
  currentTypeColor = e.target.value;
  updateTypePreviewColor();
};
function generateTypeSignatureDataUrl() {
  let text = document.getElementById('typeNameInput').value.trim();
  if(!text) text = "Signature";
  const canvas = document.createElement('canvas');
  canvas.width = 500;
  canvas.height = 160;
  const cctx = canvas.getContext('2d');
  cctx.fillStyle = '#ffffff';
  cctx.fillRect(0,0,canvas.width,canvas.height);
  cctx.fillStyle = currentTypeColor;
  let fontSize = 64;
  cctx.font = `${fontSize}px '${selectedFont}', cursive`;
  cctx.textAlign = 'center';
  cctx.textBaseline = 'middle';
  cctx.fillText(text, canvas.width/2, canvas.height/2);
  return canvas.toDataURL('image/png');
}

// ---- Image signature ----
let uploadedImageDataUrl = null;
document.getElementById('imgUploadTrigger').onclick = () => document.getElementById('imageFileInput').click();
document.getElementById('imageFileInput').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImageDataUrl = ev.target.result;
      document.getElementById('uploadedImgPreview').src = uploadedImageDataUrl;
      document.getElementById('uploadedImgPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
};

// Global signature data
let currentSignatureDataUrl = null; // holds the active signature to place
let pdfDoc = null, pdfBytes = null;
let currentPage = 1, totalPages = 1, scale = 1.3;
let placedSignatures = []; // {dataUrl, x, y, w, h, page}
let placeModeActive = false;

// PDF loading
const pdfUploadZone = document.getElementById('pdfUploadZone');
const pdfFileInput = document.getElementById('pdfFileInput');
pdfUploadZone.onclick = () => pdfFileInput.click();
pdfFileInput.onchange = (e) => { if(e.target.files[0]) loadPDF(e.target.files[0]); };
async function loadPDF(file) {
  pdfBytes = await file.arrayBuffer();
  const copy = pdfBytes.slice(0);
  pdfDoc = await pdfjsLib.getDocument({data: copy}).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  placedSignatures = [];
  document.getElementById('pdfEmptyMsg').style.display = 'none';
  document.getElementById('pdfCanvas').style.display = 'block';
  document.getElementById('pdfToolbar').style.display = 'flex';
  document.getElementById('downloadPdfBtn').disabled = false;
  renderPage(currentPage);
}
async function renderPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale });
  const canvas = document.getElementById('pdfCanvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = '100%';
  canvas.style.height = 'auto';
  const ctxR = canvas.getContext('2d');
  await page.render({ canvasContext: ctxR, viewport }).promise;
  document.getElementById('pageIndicator').innerText = `${pageNum} / ${totalPages}`;
  renderOverlays();
}
function renderOverlays() {
  const container = document.getElementById('pdfContainerArea');
  const oldOverlays = document.querySelectorAll('.sig-overlay');
  oldOverlays.forEach(el => el.remove());
  const canvas = document.getElementById('pdfCanvas');
  const canvasRect = canvas.getBoundingClientRect();
  placedSignatures.filter(s => s.page === currentPage).forEach((sig, idx) => {
    const div = document.createElement('div');
    div.className = 'sig-overlay';
    div.style.position = 'absolute';
    div.style.left = sig.x + 'px';
    div.style.top = sig.y + 'px';
    div.style.width = sig.w + 'px';
    div.style.height = sig.h + 'px';
    div.innerHTML = `<img src="${sig.dataUrl}" style="width:100%;height:100%;"><button class="del-btn" data-idx="${idx}">✕</button><div class="resize-handle" data-idx="${idx}"></div>`;
    container.style.position = 'relative';
    container.appendChild(div);
    makeDraggable(div, sig);
    div.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); removeSignatureByGlobalIndex(sig); };
    const handle = div.querySelector('.resize-handle');
    makeResizable(handle, sig, div);
  });
}
function removeSignatureByGlobalIndex(sig) {
  placedSignatures = placedSignatures.filter(s => s !== sig);
  renderOverlays();
}
function makeDraggable(el, sig) {
  let startX, startY, startLeft, startTop;
  el.onmousedown = (e) => {
    if(e.target.classList.contains('del-btn') || e.target.classList.contains('resize-handle')) return;
    e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    startLeft = sig.x; startTop = sig.y;
    const onMove = (me) => {
      sig.x = startLeft + (me.clientX - startX);
      sig.y = startTop + (me.clientY - startY);
      el.style.left = sig.x + 'px';
      el.style.top = sig.y + 'px';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}
function makeResizable(handle, sig, div) {
  handle.onmousedown = (e) => {
    e.stopPropagation();
    const startW = sig.w, startH = sig.h;
    const startX = e.clientX, startY = e.clientY;
    const onMove = (me) => {
      sig.w = Math.max(40, startW + (me.clientX - startX));
      sig.h = Math.max(30, startH + (me.clientY - startY));
      div.style.width = sig.w + 'px';
      div.style.height = sig.h + 'px';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}

function showToast(msg) {
  const toast = document.getElementById('toastMsg');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
function enablePlaceMode() {
  if(!currentSignatureDataUrl) { showToast('Create a signature first!'); return; }
  if(!pdfDoc) { showToast('Load a PDF first'); return; }
  placeModeActive = !placeModeActive;
  const btn = document.getElementById('placeModeBtn');
  if(placeModeActive) { btn.innerText = '✅ Click mode: ACTIVE (tap PDF)'; btn.style.background = '#e0b354'; btn.style.color = '#111'; }
  else { btn.innerText = '📍 Click-to-place mode: OFF'; btn.style.background = 'transparent'; btn.style.color = '#8f8ca3'; }
}
document.getElementById('placeModeBtn').onclick = enablePlaceMode;
document.getElementById('pdfCanvas').addEventListener('click', (e) => {
  if(!placeModeActive || !currentSignatureDataUrl || !pdfDoc) return;
  const rect = document.getElementById('pdfCanvas').getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const w = parseInt(document.getElementById('sigWidth').value);
  const h = parseInt(document.getElementById('sigHeight').value);
  placedSignatures.push({ dataUrl: currentSignatureDataUrl, x: x - w/2, y: y - h/2, w, h, page: currentPage });
  renderOverlays();
  showToast('Signature placed!');
  placeModeActive = false;
  document.getElementById('placeModeBtn').innerText = '📍 Click-to-place mode: OFF';
});

// Signature usage from each tab
document.getElementById('useDrawSigBtn').onclick = () => {
  if(strokes.length === 0) { showToast('Draw something first'); return; }
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = drawCanvas.width; tempCanvas.height = drawCanvas.height;
  const tctx = tempCanvas.getContext('2d');
  tctx.fillStyle = '#fff'; tctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
  strokes.forEach(s => {
    tctx.beginPath(); tctx.strokeStyle = s.color; tctx.lineWidth = s.width; tctx.lineCap = 'round';
    s.points.forEach((p,i)=> i===0 ? tctx.moveTo(p.x,p.y) : tctx.lineTo(p.x,p.y));
    tctx.stroke();
  });
  currentSignatureDataUrl = tempCanvas.toDataURL('image/png');
  showToast('Signature ready — tap "Click-to-place mode" and tap PDF');
};
document.getElementById('useTypeSigBtn').onclick = () => {
  currentSignatureDataUrl = generateTypeSignatureDataUrl();
  showToast('Typed signature ready — enable placement mode');
};
document.getElementById('useImageSigBtn').onclick = () => {
  if(!uploadedImageDataUrl) { showToast('Upload an image first'); return; }
  currentSignatureDataUrl = uploadedImageDataUrl;
  showToast('Image signature ready');
};
document.getElementById('clearAllSigsBtn').onclick = () => { placedSignatures = []; renderOverlays(); showToast('All signatures removed'); };
// Download signed PDF
document.getElementById('downloadPdfBtn').onclick = async () => {
  if(!pdfBytes) return;
  const { PDFDocument } = PDFLib;
  const pdfDocLib = await PDFDocument.load(pdfBytes);
  const pages = pdfDocLib.getPages();
  const canvas = document.getElementById('pdfCanvas');
  for(const sig of placedSignatures) {
    const page = pages[sig.page-1];
    const { width: pW, height: pH } = page.getSize();
    const scaleX = pW / canvas.width, scaleY = pH / canvas.height;
    const pdfX = sig.x * scaleX;
    const pdfY = pH - (sig.y * scaleY) - (sig.h * scaleY);
    const pdfW = sig.w * scaleX, pdfH = sig.h * scaleY;
    let imgEmbed;
    if(sig.dataUrl.includes('png')) imgEmbed = await pdfDocLib.embedPng(await fetch(sig.dataUrl).then(r=>r.arrayBuffer()));
    else imgEmbed = await pdfDocLib.embedJpg(await fetch(sig.dataUrl).then(r=>r.arrayBuffer()));
    page.drawImage(imgEmbed, { x: pdfX, y: pdfY, width: pdfW, height: pdfH });
  }
  const finalBytes = await pdfDocLib.save();
  const blob = new Blob([finalBytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'signed_document.pdf'; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ PDF signed & downloaded!');
};
// navigation
document.getElementById('prevPageBtn').onclick = () => { if(currentPage>1){currentPage--; renderPage(currentPage);} };
document.getElementById('nextPageBtn').onclick = () => { if(currentPage<totalPages){currentPage++; renderPage(currentPage);} };
document.getElementById('zoomInBtn').onclick = () => { scale = Math.min(scale+0.2, 3.2); if(pdfDoc) renderPage(currentPage); };
document.getElementById('zoomOutBtn').onclick = () => { scale = Math.max(scale-0.2, 0.8); if(pdfDoc) renderPage(currentPage); };
// Tab switching
function switchTab(tab) {
  document.getElementById('drawPanel').style.display = tab==='draw' ? 'block' : 'none';
  document.getElementById('typePanel').style.display = tab==='type' ? 'block' : 'none';
  document.getElementById('imagePanel').style.display = tab==='image' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  if(tab==='draw') document.getElementById('tabDrawBtn').classList.add('active');
  if(tab==='type') document.getElementById('tabTypeBtn').classList.add('active');
  if(tab==='image') document.getElementById('tabImageBtn').classList.add('active');
}
document.getElementById('tabDrawBtn').onclick = () => switchTab('draw');
document.getElementById('tabTypeBtn').onclick = () => switchTab('type');
document.getElementById('tabImageBtn').onclick = () => switchTab('image');
switchTab('draw');
</script>
