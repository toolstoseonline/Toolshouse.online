<body>

<div class="card">
    <h2>PDF Compressor - Reduce PDF Size</h2>

    <div class="drop-area" id="dropArea">
        Drag & Drop PDF Here<br>or Click to Upload
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>

    <div class="quality-control">
        <label>Compression Quality: <span id="qualityValue">75%</span></label>
        <input type="range" id="qualitySlider" min="10" max="100" value="75">
        <small>Higher quality = larger file size, better clarity</small>
    </div>

    <button id="compressBtn">Compress PDF</button>

    <div class="loader"><div></div></div>

    <div class="preview" id="preview"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const compressBtn = document.getElementById("compressBtn");
const loader = document.querySelector(".loader");
const qualitySlider = document.getElementById("qualitySlider");
const qualityValue = document.getElementById("qualityValue");

let selectedFile = null;

qualitySlider.addEventListener("input", (e) => {
    qualityValue.textContent = e.target.value + "%";
});

dropArea.addEventListener("click",()=>fileInput.click());

dropArea.addEventListener("dragover",(e)=>e.preventDefault());

dropArea.addEventListener("drop",(e)=>{
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change",(e)=>{
    handleFile(e.target.files[0]);
});

function handleFile(file){
    if(!file || file.type !== "application/pdf"){
        alert("Please upload a valid PDF file.");
        return;
    }
    selectedFile = file;
    preview.innerHTML="";
    previewPDF(file);
}

async function previewPDF(file){
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

    for(let i=1;i<=Math.min(pdf.numPages,3);i++){
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale:0.5});
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        preview.appendChild(canvas);

        await page.render({
            canvasContext:context,
            viewport:viewport,
            renderInteractiveForms: false
        }).promise;
    }
}

compressBtn.addEventListener("click",async ()=>{
    if(!selectedFile){
        alert("Upload a PDF first.");
        return;
    }

    loader.style.display="block";
    compressBtn.disabled = true;

    try {
        const arrayBuffer = await selectedFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const { PDFDocument } = PDFLib;
        const newPdf = await PDFDocument.create();
        
        const quality = qualitySlider.value / 100;

        for(let i=1;i<=pdf.numPages;i++){
            const page = await pdf.getPage(i);
            
            // Use higher scale for better quality
            const scale = 1.5; // Increase this for better quality (at cost of file size)
            const viewport = page.getViewport({scale: scale});
            
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d", { 
                alpha: false,
                willReadFrequently: true 
            });
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            // Better rendering settings
            await page.render({
                canvasContext: context,
                viewport: viewport,
                renderInteractiveForms: false,
                background: "white"
            }).promise;

            // Use higher quality for JPEG
            const imgData = canvas.toDataURL("image/jpeg", quality);
            const jpgImage = await newPdf.embedJpg(imgData);
            
            const pageNew = newPdf.addPage([viewport.width / scale, viewport.height / scale]);
            pageNew.drawImage(jpgImage, {
                x: 0,
                y: 0,
                width: viewport.width / scale,
                height: viewport.height / scale
            });
        }

        const pdfBytes = await newPdf.save();
        const blob = new Blob([pdfBytes],{type:"application/pdf"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "compressed_" + selectedFile.name;
        link.click();

        // Show original and compressed sizes
        const originalSize = (selectedFile.size / 1024).toFixed(2);
        const compressedSize = (pdfBytes.length / 1024).toFixed(2);
        alert(`Original: ${originalSize} KB\nCompressed: ${compressedSize} KB\nReduction: ${((1 - pdfBytes.length/selectedFile.size)*100).toFixed(1)}%`);

    } catch (error) {
        console.error(error);
        alert("Error compressing PDF: " + error.message);
    } finally {
        loader.style.display="none";
        compressBtn.disabled = false;
    }
});
</script>
