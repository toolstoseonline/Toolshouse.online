<style>

<body>

<div class="card">
    <h2>PDF Splitter</h2>

    <div class="drop-area" id="dropArea">
        📂 Tap or drag PDF here
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>
    <div class="small-note">✨ Select pages below, then download as new PDF</div>

    <div class="preview-container" id="previewContainer"></div>

    <button id="downloadBtn">⬇ Download Selected Pages</button>
    
    <footer>
        <p>🔒 100% Client-side processing | Your PDF never leaves your device</p>
        <p style="margin-top: 5px;">© 2024 Tools House Online - Free PDF Splitter</p>
    </footer>
</div>

<script>
    // Configure PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const dropArea = document.getElementById("dropArea");
    const fileInput = document.getElementById("fileInput");
    const previewContainer = document.getElementById("previewContainer");
    const downloadBtn = document.getElementById("downloadBtn");

    let pdfFile = null;
    let pdfDocument = null;

    function showError(message) {
        alert(message);
    }

    async function handleFile(file) {
        if (!file || file.type !== "application/pdf") {
            showError("Please upload a valid PDF file.");
            return;
        }

        if (file.size > 50 * 1024 * 1024) {
            showError("File too large (max 50MB). Please upload a smaller PDF.");
            return;
        }

        pdfFile = file;
        previewContainer.innerHTML = '<div style="padding:20px; color:#666;">Loading previews...</div>';

        try {
            const arrayBuffer = await file.arrayBuffer();
            pdfDocument = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const totalPages = pdfDocument.numPages;

            previewContainer.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                await renderPagePreview(pdfDocument, i);
            }

        } catch (err) {
            console.error("PDF load error:", err);
            previewContainer.innerHTML = '<div style="padding:20px; color:#d32f2f;">Failed to load PDF. File may be corrupted.</div>';
            showError("Failed to load PDF. Please try another file.");
        }
    }

    async function renderPagePreview(pdf, pageNumber) {
        try {
            const page = await pdf.getPage(pageNumber);
            const viewport = page.getViewport({ scale: 0.4 });

            const pageBox = document.createElement("div");
            pageBox.className = "page-box";

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = "100%";
            canvas.style.height = "auto";

            const labelSpan = document.createElement("span");
            labelSpan.className = "page-label";
            labelSpan.textContent = `Page ${pageNumber}`;

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = pageNumber - 1;
            checkbox.setAttribute("data-pagenum", pageNumber);

            pageBox.appendChild(canvas);
            pageBox.appendChild(labelSpan);
            pageBox.appendChild(checkbox);
            previewContainer.appendChild(pageBox);

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

        } catch (err) {
            console.warn(`Preview error on page ${pageNumber}:`, err);
        }
    }

    downloadBtn.addEventListener("click", async function() {
        if (!pdfFile) {
            showError("Please upload a PDF file first.");
            return;
        }

        const checkboxes = document.querySelectorAll("#previewContainer input[type='checkbox']");
        const checked = Array.from(checkboxes).filter(cb => cb.checked);

        if (checked.length === 0) {
            showError("Please select at least one page to download.");
            return;
        }

        downloadBtn.disabled = true;
        downloadBtn.textContent = "⏳ Processing...";

        try {
            const arrayBuffer = await pdfFile.arrayBuffer();
            const { PDFDocument } = PDFLib;
            const originalPdf = await PDFDocument.load(arrayBuffer);
            const newPdf = await PDFDocument.create();

            for (const cb of checked) {
                const pageIndex = parseInt(cb.value, 10);
                const [copiedPage] = await newPdf.copyPages(originalPdf, [pageIndex]);
                newPdf.addPage(copiedPage);
            }

            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = pdfFile.name.replace('.pdf', '_selected_pages.pdf');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 100);

            alert(`✅ Success! Downloaded ${checked.length} page(s).`);

        } catch (err) {
            console.error("Split error:", err);
            showError("Error splitting PDF: " + err.message);
        } finally {
            downloadBtn.disabled = false;
            downloadBtn.textContent = "⬇ Download Selected Pages";
        }
    });

    // File upload handlers
    dropArea.addEventListener("click", () => fileInput.click());

    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.style.background = "#dcd9f0";
        dropArea.style.borderColor = "#9f7aea";
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.style.background = "#f0f2fe";
        dropArea.style.borderColor = "#4a4e8f";
    });

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.style.background = "#f0f2fe";
        dropArea.style.borderColor = "#4a4e8f";
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
            handleFile(e.target.files[0]);
        }
        fileInput.value = '';
    });
</script>
