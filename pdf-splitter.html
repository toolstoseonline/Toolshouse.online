<body>

<div class="card">
    <h2>PDF Splitter</h2>

    <div class="drop-area" id="dropArea">
        📂 Click or drag PDF here
        <input type="file" id="fileInput" hidden accept="application/pdf">
    </div>
    <div class="small-note">✨ select pages, then download</div>

    <div class="preview-container" id="previewContainer"></div>

    <button id="downloadBtn">⬇ Download selected pages</button>
</div>

<script>
(function() {
    const dropArea = document.getElementById("dropArea");
    const fileInput = document.getElementById("fileInput");
    const previewContainer = document.getElementById("previewContainer");
    const downloadBtn = document.getElementById("downloadBtn");

    let pdfFile = null;            // raw File object
    let pdfDocument = null;        // pdf.js doc (for page count & previews)

    // ---------- trigger file picker ----------
    dropArea.addEventListener("click", (e) => {
        // avoid if clicking on hyperlink or inside preview (but preview is separate)
        fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
        if (e.target.files && e.target.files[0]) {
            handleFile(e.target.files[0]);
        }
        // reset input so selecting same file again triggers change
        fileInput.value = '';
    });

    // drag & drop
    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.style.background = "#dcd9f0";
        dropArea.style.borderColor = "#9f7aea";
    });
    dropArea.addEventListener("dragleave", () => {
        dropArea.style.background = "#f0f2fe";
        dropArea.style.borderColor = "#4a4e8f";
    });
    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.style.background = "#f0f2fe";
        dropArea.style.borderColor = "#4a4e8f";
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    // ---------- core handler ----------
    function handleFile(file) {
        if (!file || file.type !== "application/pdf") {
            alert("❌ Please upload a valid PDF file.");
            return;
        }

        pdfFile = file;
        previewContainer.innerHTML = ""; // clear previous previews

        const reader = new FileReader();
        reader.onload = function(evt) {
            const typedArray = new Uint8Array(evt.target.result);

            // load with pdf.js to get page count and render previews
            pdfjsLib.getDocument(typedArray).promise.then(pdf => {
                pdfDocument = pdf;     // store reference (not strictly needed later but handy)
                const totalPages = pdf.numPages;

                // generate previews page by page (preserve order)
                for (let i = 1; i <= totalPages; i++) {
                    renderPagePreview(pdf, i, typedArray); // pass typedArray only if needed? we have pdf obj
                }
            }).catch(err => {
                alert("Failed to load PDF: " + err.message);
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function renderPagePreview(pdf, pageNumber, optionalArrayBuffer) {
        pdf.getPage(pageNumber).then(page => {
            const viewport = page.getViewport({ scale: 0.4 }); // nice thumbnail size

            // create elements
            const pageBox = document.createElement("div");
            pageBox.className = "page-box";

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            // page label
            const labelSpan = document.createElement("span");
            labelSpan.className = "page-label";
            labelSpan.textContent = `Page ${pageNumber}`;

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            // we store the zero-based page index (for pdf-lib)
            checkbox.value = pageNumber - 1;   // page index
            // optionally add attribute for debugging
            checkbox.setAttribute("data-pagenum", pageNumber);

            // build structure
            pageBox.appendChild(canvas);
            pageBox.appendChild(labelSpan);
            pageBox.appendChild(checkbox);

            previewContainer.appendChild(pageBox);

            // render PDF page into canvas
            const renderTask = page.render({
                canvasContext: ctx,
                viewport: viewport
            });
            renderTask.catch(err => {
                console.warn("Preview render error page " + pageNumber, err);
            });
        }).catch(err => {
            console.warn("Could not load page " + pageNumber, err);
        });
    }

    // ---------- split & download using pdf-lib ----------
    downloadBtn.addEventListener("click", async function() {
        if (!pdfFile) {
            alert("📌 Please upload a PDF first.");
            return;
        }

        const checkboxes = document.querySelectorAll("#previewContainer input[type='checkbox']");
        const checked = Array.from(checkboxes).filter(cb => cb.checked);

        if (checked.length === 0) {
            alert("✋ Select at least one page to download.");
            return;
        }

        try {
            // read file as arrayBuffer for pdf-lib
            const arrayBuffer = await pdfFile.arrayBuffer();

            const { PDFDocument } = PDFLib; // from global PDFLib (loaded via umd)
            const originalPdf = await PDFDocument.load(arrayBuffer);
            const newPdf = await PDFDocument.create();

            // copy selected pages (by index stored in value)
            for (const cb of checked) {
                const pageIndex = parseInt(cb.value, 10); // 0-based
                // copyPages expects array of page indices
                const [copiedPage] = await newPdf.copyPages(originalPdf, [pageIndex]);
                newPdf.addPage(copiedPage);
            }

            // save and trigger download
            const pdfBytes = await newPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "selected-pages.pdf";   // you can modify filename
            link.click();

            // cleanup object URL
            setTimeout(() => URL.revokeObjectURL(link.href), 200);

        } catch (err) {
            console.error(err);
            alert("Something went wrong: " + err.message);
        }
    });

    // optional: reset preview if needed. Keep it simple.
})();
</script>
