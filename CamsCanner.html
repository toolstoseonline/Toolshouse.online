<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Smart Scanner · working camera · PDF · OCR</title>
  <!-- PDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Tesseract.js for OCR (lightweight CDN) -->
  <script src='https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js'></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      transition: background 0.3s;
    }
    
    body.dark-mode {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    
    .container {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 25px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }
    
    body.dark-mode .container {
      background: rgba(30, 30, 46, 0.95);
      color: #fff;
    }
    
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 1.1rem;
    }
    
    body.dark-mode .subtitle {
      color: #aaa;
    }
    
    /* Camera Container */
    .camera-container {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid #667eea;
      background: #000;
      aspect-ratio: 4/3;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    #cropOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border: 3px solid #ffd700;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
      display: none;
    }
    
    .mode-indicator {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: rgba(102, 126, 234, 0.9);
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      backdrop-filter: blur(5px);
      z-index: 10;
    }
    
    /* Button Grid */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    
    button {
      padding: 14px 20px;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      background: white;
      color: #333;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    
    button.primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    body.dark-mode button {
      background: #2d3748;
      color: #fff;
    }
    
    /* Preview Section */
    .preview-section {
      margin: 25px 0;
      padding: 20px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 20px;
    }
    
    body.dark-mode .preview-section {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .preview-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-weight: 600;
    }
    
    .thumbnail-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      min-height: 100px;
    }
    
    .thumbnail {
      position: relative;
      width: 100px;
      height: 130px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #667eea;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
    
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .thumbnail .remove-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 24px;
      height: 24px;
      background: #ff4444;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid white;
    }
    
    /* OCR Panel */
    .ocr-panel {
      margin-top: 20px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 20px;
    }
    
    body.dark-mode .ocr-panel {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .ocr-text {
      background: white;
      padding: 15px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.95rem;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 10px;
      border: 1px solid #ddd;
    }
    
    body.dark-mode .ocr-text {
      background: #1a1a2e;
      color: #fff;
      border-color: #333;
    }
    
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.9rem;
    }
    
    /* Hidden canvas for processing */
    #hiddenCanvas {
      display: none;
    }
    
    /* Loading indicator */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Smart Document Scanner</h1>
    <div class="subtitle">Camera • PDF • OCR • Dark Mode</div>
    
    <!-- Camera Container -->
    <div class="camera-container">
      <video id="video" autoplay playsinline></video>
      <div id="cropOverlay"></div>
      <div class="mode-indicator" id="modeText">📸 Camera Ready</div>
    </div>
    
    <!-- Button Controls -->
    <div class="button-grid">
      <button onclick="startCamera()" class="primary">📷 Start Camera</button>
      <button onclick="switchCamera()">🔄 Switch Camera</button>
      <button onclick="toggleMode()">✂️ Toggle Crop</button>
      <button onclick="captureImage()">✅ Capture</button>
    </div>
    
    <div class="button-grid">
      <button onclick="enhanceLastImage()">✨ Auto Enhance</button>
      <button onclick="generatePDF()">📥 Save PDF</button>
      <button onclick="runOCR()">🔤 OCR Text</button>
      <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
    
    <!-- Preview Section -->
    <div class="preview-section">
      <div class="preview-title">
        <span>📸 Captured Pages (<span id="imageCount">0</span>)</span>
        <button onclick="clearAll()" style="padding: 5px 15px;">🗑 Clear All</button>
      </div>
      <div class="thumbnail-grid" id="preview"></div>
    </div>
    
    <!-- OCR Panel -->
    <div class="ocr-panel">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span>🔍 Extracted Text</span>
        <span id="ocrStatus"></span>
      </div>
      <div class="ocr-text" id="ocrResult">Click OCR button to extract text from the latest capture</div>
    </div>
    
    <div class="footer">
      🔒 100% Private • No Upload • Works Offline
    </div>
  </div>
  
  <!-- Hidden canvas for image processing -->
  <canvas id="hiddenCanvas"></canvas>
  
  <script>
    // DOM Elements
    const video = document.getElementById('video');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const ctx = hiddenCanvas.getContext('2d');
    const preview = document.getElementById('preview');
    const imageCountSpan = document.getElementById('imageCount');
    const modeText = document.getElementById('modeText');
    const cropOverlay = document.getElementById('cropOverlay');
    const ocrResult = document.getElementById('ocrResult');
    const ocrStatus = document.getElementById('ocrStatus');
    
    // State variables
    let images = [];
    let currentStream = null;
    let usingFrontCamera = false;
    let cropMode = false;
    let darkMode = false;
    
    // Initialize camera on page load
    window.addEventListener('load', () => {
      startCamera();
    });
    
    // Start Camera Function
    async function startCamera() {
      try {
        // Stop any existing stream
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }
        
        const constraints = {
          video: {
            facingMode: usingFrontCamera ? 'user' : 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };
        
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        
        // Wait for video to be ready
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            resolve();
          };
        });
        
        modeText.innerText = '📸 Camera Active';
      } catch (error) {
        alert('Camera access failed: ' + error.message);
        modeText.innerText = '❌ Camera Error';
      }
    }
    
    // Switch between front and back camera
    async function switchCamera() {
      usingFrontCamera = !usingFrontCamera;
      await startCamera();
    }
    
    // Toggle crop mode overlay
    function toggleMode() {
      cropMode = !cropMode;
      if (cropMode) {
        cropOverlay.style.display = 'block';
        modeText.innerText = '✂️ Crop Mode ON';
      } else {
        cropOverlay.style.display = 'none';
        modeText.innerText = '📸 Camera Ready';
      }
    }
    
    // Capture image from video
    function captureImage() {
      if (!video.videoWidth) {
        alert('Please start the camera first');
        return;
      }
      
      // Set canvas dimensions to match video
      hiddenCanvas.width = video.videoWidth;
      hiddenCanvas.height = video.videoHeight;
      
      // Draw video frame to canvas
      ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
      
      // Apply basic enhancement by default
      enhanceImageData();
      
      // Convert to data URL and save
      const imageDataURL = hiddenCanvas.toDataURL('image/jpeg', 0.9);
      images.push(imageDataURL);
      
      // Add thumbnail
      addThumbnail(imageDataURL);
      
      // Update count
      imageCountSpan.innerText = images.length;
      
      // Show success message
      modeText.innerText = '✅ Captured!';
      setTimeout(() => {
        modeText.innerText = cropMode ? '✂️ Crop Mode ON' : '📸 Camera Ready';
      }, 1500);
    }
    
    // Basic image enhancement (brightness, contrast)
    function enhanceImageData() {
      const imageData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
      const data = imageData.data;
      
      // Auto-contrast and brightness adjustment
      let min = 255, max = 0;
      
      // Find min and max values
      for (let i = 0; i < data.length; i += 4) {
        const brightness = 0.34 * data[i] + 0.5 * data[i+1] + 0.16 * data[i+2];
        min = Math.min(min, brightness);
        max = Math.max(max, brightness);
      }
      
      // Apply contrast stretch
      const range = max - min;
      if (range > 0) {
        for (let i = 0; i < data.length; i += 4) {
          data[i] = ((data[i] - min) / range) * 255;
          data[i+1] = ((data[i+1] - min) / range) * 255;
          data[i+2] = ((data[i+2] - min) / range) * 255;
        }
      }
      
      ctx.putImageData(imageData, 0, 0);
    }
    
    // Enhance the last captured image
    function enhanceLastImage() {
      if (images.length === 0) {
        alert('No images to enhance');
        return;
      }
      
      // Get last image
      const lastImage = new Image();
      lastImage.src = images[images.length - 1];
      
      lastImage.onload = () => {
        hiddenCanvas.width = lastImage.width;
        hiddenCanvas.height = lastImage.height;
        ctx.drawImage(lastImage, 0, 0);
        enhanceImageData();
        
        // Update the last image with enhanced version
        images[images.length - 1] = hiddenCanvas.toDataURL('image/jpeg', 0.9);
        
        // Refresh thumbnails
        refreshThumbnails();
        
        modeText.innerText = '✨ Enhanced!';
        setTimeout(() => {
          modeText.innerText = cropMode ? '✂️ Crop Mode ON' : '📸 Camera Ready';
        }, 1500);
      };
    }
    
    // Add thumbnail to preview
    function addThumbnail(imageDataURL) {
      const thumbnailDiv = document.createElement('div');
      thumbnailDiv.className = 'thumbnail';
      
      const img = document.createElement('img');
      img.src = imageDataURL;
      
      const removeBtn = document.createElement('div');
      removeBtn.className = 'remove-btn';
      removeBtn.innerHTML = '×';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        const index = Array.from(preview.children).indexOf(thumbnailDiv);
        if (index !== -1) {
          images.splice(index, 1);
          thumbnailDiv.remove();
          imageCountSpan.innerText = images.length;
        }
      };
      
      thumbnailDiv.appendChild(img);
      thumbnailDiv.appendChild(removeBtn);
      preview.appendChild(thumbnailDiv);
    }
    
    // Refresh all thumbnails
    function refreshThumbnails() {
      preview.innerHTML = '';
      images.forEach(img => addThumbnail(img));
    }
    
    // Clear all images
    function clearAll() {
      images = [];
      preview.innerHTML = '';
      imageCountSpan.innerText = '0';
      ocrResult.innerText = 'Click OCR button to extract text from the latest capture';
    }
    
    // Generate PDF
    function generatePDF() {
      if (images.length === 0) {
        alert('No images to save');
        return;
      }
      
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();
      
      // Add each image to PDF
      images.forEach((img, index) => {
        if (index > 0) {
          pdf.addPage();
        }
        
        // Calculate dimensions to fit page
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        
        pdf.addImage(img, 'JPEG', 10, 10, pdfWidth - 20, 0);
      });
      
      pdf.save('scanned_document.pdf');
      
      modeText.innerText = '📥 PDF Saved!';
      setTimeout(() => {
        modeText.innerText = cropMode ? '✂️ Crop Mode ON' : '📸 Camera Ready';
      }, 1500);
    }
    
    // OCR Function
    async function runOCR() {
      if (images.length === 0) {
        alert('Capture an image first');
        return;
      }
      
      const latestImage = images[images.length - 1];
      ocrStatus.innerHTML = '<span class="loading"></span> Processing...';
      ocrResult.innerText = 'Recognizing text...';
      
      try {
        const { data: { text } } = await Tesseract.recognize(
          latestImage,
          'eng',
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                ocrStatus.innerText = `OCR: ${Math.round(m.progress * 100)}%`;
              }
            }
          }
        );
        
        if (text.trim()) {
          ocrResult.innerText = text;
          ocrStatus.innerText = '✅ Complete';
        } else {
          ocrResult.innerText = 'No text detected in image';
          ocrStatus.innerText = '⚠️ No text';
        }
      } catch (error) {
        ocrResult.innerText = 'OCR failed: ' + error.message;
        ocrStatus.innerText = '❌ Error';
      }
    }
    
    // Toggle dark mode
    function toggleDarkMode() {
      darkMode = !darkMode;
      if (darkMode) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }
    
    // Handle video resize when metadata loads
    video.addEventListener('loadedmetadata', () => {
      hiddenCanvas.width = video.videoWidth;
      hiddenCanvas.height = video.videoHeight;
    });
  </script>
</body>
</html>
