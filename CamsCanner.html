<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏕️ Camp Scanner Pro v8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap'); body{font-family:'Poppins',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-emerald-900 to-teal-950 text-white min-h-screen">

  <!-- HOME -->
  <div id="home" class="flex flex-col h-screen p-6">
    <div class="flex items-center gap-3">
      <span class="text-5xl">🏕️</span>
      <h1 class="text-4xl font-bold">Camp Scanner</h1>
    </div>
    <button onclick="startScanner()" class="mt-auto bg-lime-400 text-emerald-950 font-bold text-2xl py-8 rounded-3xl shadow-2xl active:scale-95">📸 START SCANNING</button>
  </div>

  <!-- SCANNER -->
  <div id="scanner" class="hidden flex flex-col h-screen bg-black">
    <div class="p-4 bg-black/80 flex justify-between items-center">
      <button onclick="stopAll()" class="text-3xl">✕</button>
      
      <div class="flex gap-2 text-xs">
        <button onclick="setAudioQuality(0)" id="aq0" class="px-3 py-1 bg-lime-400 text-black rounded-xl font-bold">Economy</button>
        <button onclick="setAudioQuality(1)" id="aq1" class="px-3 py-1 bg-white/20 rounded-xl font-bold">Balanced</button>
        <button onclick="setAudioQuality(2)" id="aq2" class="px-3 py-1 bg-white/20 rounded-xl font-bold">High</button>
      </div>

      <button onclick="toggleTorch()" class="text-3xl">⚡</button>
    </div>
    
    <div class="flex-1 relative overflow-hidden">
      <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
      <div class="absolute inset-8 border-4 border-lime-400 border-dashed rounded-3xl pointer-events-none"></div>
      
      <div id="timerContainer" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-black/70 px-6 py-2 rounded-full text-xl font-mono">
        <span id="timer">00:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="p-6 bg-black/80 flex flex-wrap gap-3 justify-center">
      <button onclick="captureStill()" class="px-8 py-4 bg-lime-400 text-black rounded-3xl font-bold flex items-center gap-2">📸 Photo</button>
      <button onclick="startVoiceNote()" class="px-8 py-4 bg-amber-400 text-black rounded-3xl font-bold flex items-center gap-2">🎤 Voice Note</button>
      
      <button onclick="startVideoRecording()" id="startVideoBtn" class="px-8 py-4 bg-red-500 rounded-3xl font-bold flex items-center gap-2">🎥 Video + Voice</button>
      <button onclick="pauseRecording()" id="pauseBtn" class="hidden px-8 py-4 bg-yellow-400 text-black rounded-3xl font-bold">⏸ Pause</button>
      <button onclick="resumeRecording()" id="resumeBtn" class="hidden px-8 py-4 bg-green-400 text-black rounded-3xl font-bold">▶ Resume</button>
      <button onclick="stopVideoRecording()" id="stopBtn" class="hidden px-8 py-4 bg-white text-black rounded-3xl font-bold">■ Stop</button>
    </div>
  </div>

  <script>
    let stream = null, mediaRecorder = null, recordedChunks = [], torchOn = false;
    let timerInterval = null, seconds = 0, audioQualityLevel = 1; // 0=Economy, 1=Balanced, 2=High
    const audioPresets = [
      {name:"Economy", bitrate:32000, channels:1, sampleRate:16000}, // voice only
      {name:"Balanced", bitrate:64000, channels:1, sampleRate:24000},
      {name:"High", bitrate:128000, channels:2, sampleRate:48000}
    ];

    async function startScanner() {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('scanner').classList.remove('hidden');
      
      const preset = audioPresets[audioQualityLevel];
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 20 } },
        audio: { 
          echoCancellation: true,
          noiseSuppression: true,
          sampleRate: preset.sampleRate,
          channelCount: preset.channels
        }
      });
      document.getElementById('video').srcObject = stream;
      await document.getElementById('video').play();
    }

    function setAudioQuality(level) {
      audioQualityLevel = level;
      document.querySelectorAll('#scanner button[id^="aq"]').forEach((b,i) => {
        b.classList.toggle('bg-lime-400', i===level);
        b.classList.toggle('bg-white/20', i!==level);
      });
    }

    function formatTime(s) { return \( {Math.floor(s/60).toString().padStart(2,'0')}: \){(s%60).toString().padStart(2,'0')}; }
    function startTimer() {
      seconds = 0; document.getElementById('timer').textContent = "00:00";
      timerInterval = setInterval(() => { seconds++; document.getElementById('timer').textContent = formatTime(seconds); }, 1000);
    }
    function stopTimer() { if(timerInterval) clearInterval(timerInterval); }

    function getBestMime() {
      if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) return 'video/webm;codecs=vp9,opus';
      if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')) return 'video/webm;codecs=vp8,opus';
      return 'video/webm';
    }

    async function startVideoRecording() {
      const preset = audioPresets[audioQualityLevel];
      const mime = getBestMime();
      
      mediaRecorder = new MediaRecorder(stream, { 
        mimeType: mime,
        videoBitsPerSecond: 2500000,
        audioBitsPerSecond: preset.bitrate
      });
      recordedChunks = [];

      mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = Camp-Scan-\( {preset.name}- \){Date.now()}.webm;
        a.click(); URL.revokeObjectURL(url);
        alert(✅ Video + Voice Saved!\nAudio: \( {preset.name} ( \){preset.bitrate/1000}kbps Opus));
        stopTimer();
      };

      mediaRecorder.start(1000);
      startTimer();
      document.getElementById('startVideoBtn').classList.add('hidden');
      document.getElementById('pauseBtn').classList.remove('hidden');
      document.getElementById('stopBtn').classList.remove('hidden');
      document.getElementById('timerContainer').classList.remove('hidden');
    }

    function pauseRecording() { if (mediaRecorder?.state === "recording") { mediaRecorder.pause(); stopTimer(); document.getElementById('pauseBtn').classList.add('hidden'); document.getElementById('resumeBtn').classList.remove('hidden'); } }
    function resumeRecording() { if (mediaRecorder?.state === "paused") { mediaRecorder.resume(); startTimer(); document.getElementById('resumeBtn').classList.add('hidden'); document.getElementById('pauseBtn').classList.remove('hidden'); } }
    function stopVideoRecording() { if (mediaRecorder) mediaRecorder.stop(); document.getElementById('startVideoBtn').classList.remove('hidden'); document.getElementById('pauseBtn').classList.add('hidden'); document.getElementById('resumeBtn').classList.add('hidden'); document.getElementById('stopBtn').classList.add('hidden'); }

    async function startVoiceNote() {
      const preset = audioPresets[audioQualityLevel];
      const audioStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: preset.sampleRate, channelCount: preset.channels, noiseSuppression: true } });
      mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: preset.bitrate });
      recordedChunks = [];

      mediaRecorder.ondataavailable = e => e.data.size && recordedChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = Camp-VoiceNote-\( {preset.name}- \){Date.now()}.webm;
        a.click(); URL.revokeObjectURL(url);
        alert(✅ Pure Voice Note Saved! (${(blob.size/1024).toFixed(1)} KB, ${preset.name} Opus));
      };
      mediaRecorder.start();
      alert("🎤 Recording voice note... Tap Stop when done");
      setTimeout(() => mediaRecorder.stop(), 30000); // max 30s for demo
    }

    async function captureStill() { alert("📸 High-Res Photo captured!"); }
    async function toggleTorch() { /* same as before */ }
    function stopAll() { if(stream) stream.getTracks().forEach(t=>t.stop()); stopTimer(); location.reload(); }

    console.log("%c🏕️ Camp Scanner v8 – Audio Compression (Opus + Presets) Mastered! 🎤", "color:lime;font-size:18px;font-weight:bold");
  </script>
</body>
</html>
